<div class="container mt-4">
  <h2>LAPORAN VAKSIN</h2>

  <table class="table table-bordered table-striped mt-3">
    <thead>
      <tr>
        <th>Tarikh</th>
        <th>Nama Vaksin</th>
        <th>Jumlah Tolak</th>
        <th>Jumlah Terima</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let report of reports">
        <td>{{ report.vaccDate | date:'dd/MM/yyyy' }}</td>
        <td>{{ report.vaccName }}</td>
        <td>{{ report.jumlahTolak }}</td>
        <td>{{ report.jumlahTerima }}</td>i
      </tr>
    </tbody>
  </table>
</div>
