<c-container fluid>
  <c-row class="justify-content-center">

    <!-- Stepper Navigation -->
         <div class="row mb-3">
            <div class="horizontal-stepper">
                <!-- Stepper -->
                <div class="stepper-list">
                    <app-navigation-flow 
                        [currentStep]="step" 
                        (stepChange)="onStepChange($event)">
                    </app-navigation-flow>
                </div>

                <!-- Buttons -->
                <div class="d-flex align-items-center gap-2 ms-3">
                    <button class="horizontal-stepper step-btn" (click)="previousStep()" disabled>&lt;</button>
                    <button class="horizontal-stepper step-btn" (click)="nextStep()" >&gt;</button>
                </div>
            </div>
         </div>
