<head>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

<c-container fluid>
 <div class="form search-input-group"> 
    <div class="form-section h-100">
        <h2 class="section-title">Maklumat Carian</h2>
        <form #searchForm="ngForm" (ngSubmit)="onSearch()" class="form-group5">
            <div class="container">

                <!-- Negeri -->
                 <div class="row mb-3">
                    <div class="col-2 text-start">
                        <label for="state" class="col-form-label">Negeri</label>
                    </div>
                    <div class="col-6">
                        <select class="form-select form-control field-medium" id="negeri" >
                        <option value="">-Sila Pilih-</option>    
                        <option *ngFor="let state of states" [value]="filters.stateCode">
                            {{ state.stateBmDesc }}
                        </option>
                        </select>
                    </div>
                 </div>

                 <!-- Cawangan -->
                 <div class="row align-items-center mb-3">
                    <div class="col-2 text-start">
                        <label for="cawangan" class="col-form-label">
                        Cawangan/ Bahagian/ Unit yang Menerima
                        </label>
                    </div>
                    <div class="col-6">
                        <select class="form-select form-control field-medium" id="cawangan" >
                        <option value="">-Sila Pilih-</option>    
                        <option *ngFor="let branch of branches" [value]="filters.branchCode">
                            {{ branch.shortName }}
                        </option>
                        </select>
                    </div>
                 </div>

                 <!-- Bahagian -->
                  <div class="row mb-3">
                    <div class="col-2 text-start">
                        <label for="division" class="col-form-label">Bahagian</label>
                    </div>
                    <div class="col-6">
                        <select class="form-select" id="division" [(ngModel)]="filters.division" name="division">
                            <option value="" disabled selected>Sila Pilih</option>
                            <option value="Bahagian Depot Tahanan Imegresen">Bahagian Depot Tahanan Imegresen</option>
                            <option value="Bahagian Pintu Kemasukan">Bahagian Pintu Kemasukan</option>
                            <option value="Bahagian Pemeriksaan">Bahagian Pemeriksaan</option>
                            <option value="Bahagian Main-main">Bahagian Main-main</option>
                            <option value="Lain-lain">Lain-lain</option>
                        </select>
                    </div>
                 </div>

                 <!-- Unit -->
                  <div class="row mb-3">
                    <div class="col-2 text-start">
                        <label for="unit" class="col-form-label">Unit</label>
                    </div>
                    <div class="col-6">
                        <select class="form-select form-control field-medium" id="unit" >
                        <option value="">-Sila Pilih-</option>    
                        <option *ngFor="let unit of units" [value]="filters.unitCode">
                            {{ unit.unitBmDesc }}
                        </option>
                        </select>
                    </div>
                 </div>

                 <!-- Tahun -->
                  <div class="row align-items-center mb-3">
                    <div class="col-2 text-start">
                    <label for="year" class="col-form-label">Tahun</label>
                    </div>
                    <div class="col-6">
                        <input type="text" maxlength="10" class="form-control field-medium" 
                        id="year" name="year" [(ngModel)]="filters.year" name="year">
                    </div>
                  </div>

                 <!-- Status -->
                  <div class="row align-items-center mb-3">
                    <div class="col-2 text-start">
                    <label for="consent" class="col-form-label">Status</label>
                    </div>
                    <div class="col-6">
                        <select class="form-select" id="consent" [(ngModel)]="filters.consent" name="consent" placeholder="Sila Pilih">
                            <option value="" disabled selected>Sila Pilih</option>
                            <option value="Setuju">Setuju</option>
                            <option value="Tidak Setuju">Tidak Setuju</option>
                        </select>
                    </div>

                    <!-- Button Carian -->
                        <div class="col-auto">
                            <button type="submit" class="blue-btn"><i class="fa fa-search"></i> Cari</button>
                        </div>
                  </div>

            </div>
        </form>
    </div>

    <div class="results-section" *ngIf="hasSearched && searchResults.length > 0">
        <h3 class="results-title">Maklumat Tarikh Temu Janji</h3>

        <form class="form-group5">

            <div class="container">

                <!-- Nama -->
                 <div *ngIf="filters.name" class="row align-items-center mb-3">
                    <div class="col-2 text-start">
                        <label for="name" class="col-form-label">Nama</label>
                    </div>
                    <div class="col-6">
                        <input 
                        type="text" 
                        class="form-control field-medium" 
                        id="name" 
                        [(ngModel)]="filters.name" 
                        name="name" 
                        readonly
                        >
                    </div>
                 </div>

                 <!-- Cawangan -->
                 <div *ngIf="filters.branch" class="row align-items-center mb-3">
                    <div class="col-2 text-start">
                        <label for="branch" class="col-form-label">Cawangan</label>
                    </div>
                    <div class="col-6">
                        <input 
                        type="text" 
                        class="form-control field-medium" 
                        id="branch" 
                        [(ngModel)]="filters.branch" 
                        name="branch" 
                        readonly
                        >
                    </div>
                 </div>

                 <!-- Bahagian -->
                  <div *ngIf="filters.division" class="row align-items-center mb-3">
                    <div class="col-2 text-start">
                        <label for="division" class="col-form-label">Bahagian</label>
                    </div>
                    <div class="col-6">
                        <input 
                        type="text" 
                        class="form-control field-medium" 
                        id="division" 
                        [(ngModel)]="filters.division" 
                        name="division" 
                        readonly
                        >
                    </div>
                 </div>

                 <!-- Unit -->
                  <div *ngIf="filters.unit" class="row align-items-center mb-3">
                    <div class="col-2 text-start">
                        <label for="unit" class="col-form-label">Unit</label>
                    </div>
                    <div class="col-6">
                        <input 
                        type="text" 
                        class="form-control field-medium" 
                        id="unit" 
                        [(ngModel)]="filters.unit" 
                        name="unit" 
                        readonly
                        >
                    </div>
                 </div>

                 <!-- Kumpulan -->
                  <div *ngIf="filters.group" class="row align-items-center mb-3">
                    <div class="col-2 text-start">
                        <label for="group" class="col-form-label">Kumpulan</label>
                    </div>
                    <div class="col-6">
                        <input 
                        type="text" 
                        class="form-control field-medium" 
                        id="group" 
                        [(ngModel)]="filters.group" 
                        name="group" 
                        readonly
                        >
                    </div>
                 </div>

                 <!-- Nama Vaksin -->
                  <div *ngIf="filters.vaccName" class="row align-items-center mb-3">
                    <div class="col-2 text-start">
                        <label for="vaccName" class="col-form-label">Nama Vaksin</label>
                    </div>
                    <div class="col-6">
                        <input 
                        type="text" 
                        class="form-control field-medium" 
                        id="vaccName" 
                        [(ngModel)]="filters.vaccName" 
                        name="vaccName" 
                        readonly
                        >
                    </div>
                  </div>

                 <!-- Kuota Vaksin -->
                  <div *ngIf="filters.vaccQuota" class="row align-items-center mb-3">
                    <div class="col-2 text-start">
                        <label for="vaccName" class="col-form-label">Kuota Vaksin</label>
                    </div>
                    <div class="col-6">
                        <input 
                        type="text" 
                        class="form-control field-medium" 
                        id="vaccQuota" 
                        [(ngModel)]="filters.vaccQuota" 
                        name="vaccQuota" 
                        readonly
                        >
                    </div>
                 </div>

                 <!-- Tarikh Mula Permohonan -->
                  <div *ngIf="filters.startDate" class="row align-items-center mb-3">
                    <div class="col-2 text-start">
                        <label for="startDate" class="col-form-label">Tarikh Mula Permohonan</label>
                    </div>
                    <div class="col-6">
                        <input 
                        type="text" 
                        class="form-control field-medium" 
                        id="startDate" 
                        [(ngModel)]="filters.startDate" 
                        name="startDate" 
                        readonly
                        >
                    </div>
                 </div>

                 <!-- Tarikh Tamat Permohonan -->
                  <div *ngIf="filters.endDate" class="row align-items-center mb-3">
                    <div class="col-2 text-start">
                        <label for="startDate" class="col-form-label">Tarikh Tamat Permohonan</label>
                    </div>
                    <div class="col-6">
                        <input 
                        type="text" 
                        class="form-control field-medium" 
                        id="endDate" 
                        [(ngModel)]="filters.endDate" 
                        name="endDate" 
                        readonly
                        >
                    </div>
                 </div>              

            </div>
        </form>

        <!-- Button Lulus / Gagal -->
        <!-- <div class="d-flex justify-content-end">
            <button class="blue-btn me-3" (click)="onLulus(selectedRow)"><i class="fa fa-check"></i>Lulus</button>
            <button class="blue-btn" (click)="onGagal(selectedRow)"><i class="fa fa-times"></i>Gagal</button>
        </div> -->
    </div>
 </div>
</c-container>
