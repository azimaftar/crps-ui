<head>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

<c-card>
  <c-container>
    <c-row>
      <c-col md="12" class="p-4">
          <!-- Horizontal Stepper -->
        <div class="horizontal-stepper">
            <ul class="stepper-list d-flex align-items-center justify-content-start flex-wrap">
            <li
                class="stepper-item"
                *ngFor="let step of steps"
                (click)="navigateTo(step)"
                [class.active]="isStepActive(step.number)">
                <button type="button" class="step-btn">
                <span class="step-number">{{ step.number }}</span>
                <span class="step-title">{{ step.title }}</span>
                </button>
            </li>
            </ul>
        </div><br>
        <h3 class="mb-4">Muat Naik Dokumen</h3>

        <!-- Reactive Form Start -->
        <form [formGroup]="folderWujudForm" (ngSubmit)="muatNaikFW()">
            
          <div class="form-group5 d-flex align-items-center2">
            <label>Nama Pegawai</label>
                    <input type="text" class="form-control" formControlName="Staff_name">
                    <div *ngIf="folderWujudForm.get('Staff_name')?.invalid && folderWujudForm.get('Staff_name')?.touched" 
                      class="text-danger">
                     Nama Pegawai diperlukan.
                    </div>
          </div>

          <!-- <div class="mb-3">
            <label>Bahagian</label>
                    <input type="text" class="form-control" formControlName="Bahagian">
                    <div *ngIf="folderWujudForm.get('Bahagian')?.invalid && folderWujudForm.get('Bahagian')?.touched" 
                      class="text-danger">
                     Bahagian diperlukan.
                    </div>
          </div> -->

          <!-- <div class="mb-3">
            <label>Jenis Dokumen</label>
            <input type="text" class="form-control" formControlName="Doc_type">
            <div *ngIf="folderWujudForm.get('Doc_type')?.invalid && folderWujudForm.get('Doc_type')?.touched" 
                      class="text-danger">
                     Jenis Dokumen diperlukan.
            </div>
          </div> -->

          <div class="form-group5 d-flex align-items-center2">
            <label>Nama Folder</label>
            <input type="text" class="form-control" formControlName="selectedFolder">
            <div *ngIf="folderWujudForm.get('selectedFolder')?.invalid && folderWujudForm.get('selectedFolder')?.touched" 
                      class="text-danger">
                     Nama Folder diperlukan.
            </div>
          </div>

          <div class="form-group5 d-flex align-items-center2">
            <label>Nama Dokumen</label>
            <input type="text" class="form-control" formControlName="fileName" readonly>
            <div *ngIf="folderWujudForm.get('fileName')?.invalid && folderWujudForm.get('fileName')?.touched" 
                      class="text-danger">
                     Nama Dokumen diperlukan.
            </div>
          </div>

          <div class="form-group5 d-flex align-items-center2">
            <label>Masa</label>
            <input type="time" class="form-control" formControlName="Upload_time">
            <div *ngIf="folderWujudForm.get('Upload_time')?.invalid && folderWujudForm.get('Upload_time')?.touched" 
                      class="text-danger">
                     Masa diperlukan.
            </div>
          </div>

          <div class="form-group5 d-flex align-items-center2">
            <label>Tarikh Publish</label>
            <input type="date" class="form-control" formControlName="Upload_date">
            <!-- <div *ngIf="folderWujudForm.get('Upload_date')?.invalid && folderWujudForm.get('Upload_date')?.touched" 
                      class="text-danger">
                     Tarikh Publish diperlukan.
            </div> -->
                      <!-- Past date error -->
            <div *ngIf="folderWujudForm.get('Upload_date')?.hasError('pastDate') 
                        && folderWujudForm.get('Upload_date')?.touched"
                class="text-danger">
              Tarikh Publish mesti hari ini atau selepas.
            </div>
          </div>

          <div class="mb-3">
            <label>Nama Fail</label>
            <input type="file" class="form-control" (change)="onFileSelected($event)" accept=".pdf,image/*,video/*">
            <div *ngIf="!selectedFile && folderWujudForm.touched" class="text-danger">
              Sila Pilih Fail.
            </div>
            <div *ngIf="selectedFileName">
              <p>{{ selectedFileName }}</p>
            </div>
          </div>

          <div class="form-group5 d-flex align-items-center2" *ngIf="uploadedFileLink">
            <label>Fail Dimuat Naik</label>
            <a [href]="uploadedFileLink" target="_blank">{{ uploadedData?.fileName }}</a>
          </div>

          <!-- Navigation Footer -->
          <!-- Step 1: Show only Muat Naik if no file uploaded -->
          <button 
            *ngIf="!hasUploaded" 
            class="btn btn-primary"
            type="submit">
            <i class="fa fa-upload"></i> Muat Naik
          </button>
        </form>
        <!-- Step 2: Once file uploaded, show Simpan + Hantar -->
          <div *ngIf="hasUploaded" class="d-flex gap-2">
            <button class="btn btn-success" (click)="showHantarModal()">
              <i class="fa fa-save"></i> Simpan
            </button>

            <button class="btn btn-warning" (click)="showHantarModalsend()">
              <i class="fa fa-paper-plane"></i> Hantar
            </button>
          </div>
        <!-- Reactive Form End -->
      </c-col>
    </c-row>
  </c-container>
</c-card>

<!-- Modals -->
<app-modal-sucess-send-save 
  [Hantarmodel]="HantarModalsave" 
  (close)="closeModal()"
  (confirm)="simpanPermohonan()">
</app-modal-sucess-send-save>

<app-modal-sucess-send 
  [Hantarmodel]="HantarModalsend" 
  (close)="closeModal()"
  (confirm)="hantarPermohonan()">
</app-modal-sucess-send>
