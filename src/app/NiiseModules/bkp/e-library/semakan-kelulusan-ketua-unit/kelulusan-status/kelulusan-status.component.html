<head>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

<c-card>
    <c-container>
        <c-row>
            <c-col md="12" class="p-4">
                <div class="container mt-3">
                   <!-- Horizontal Stepper -->
                  <div class="horizontal-stepper">
                      <ul class="stepper-list d-flex align-items-center justify-content-start flex-wrap">
                      <li
                          class="stepper-item"
                          *ngFor="let step of steps"
                          (click)="navigateTo(step)"
                          [class.active]="isStepActive(step.number)">
                          <button type="button" class="step-btn">
                          <span class="step-number">{{ step.number }}</span>
                          <span class="step-title">{{ step.title }}</span>
                          </button>
                      </li>
                      </ul>
                  </div><br>

                  <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3>Maklumat Dokumen</h3>
                    <button cButton color="secondary" (click)="goBack()">
                        <i class="fa fa-arrow-left" style="margin-right: 8px;"></i>Kembali
                    </button>
                  </div>

                  <!-- Loading indicator -->
                  <div *ngIf="isLoading" class="text-center p-4">
                      <div class="spinner-border text-primary" role="status">
                          <span class="visually-hidden">Loading...</span>
                      </div>
                      <p class="mt-2">Memuatkan maklumat dokumen...</p>
                  </div>

                  <!-- Form (only show when data is loaded) -->
                  <div *ngIf="!isLoading && dokumenData">
                      <form [formGroup]="kelulusanForm" (ngSubmit)="onSubmit()">

                          <!-- Document UID (readonly) -->
                          <div class="form-group5 d-flex align-items-center2">
                              <label class="form-label"><strong>ID Dokumen</strong></label>
                              <input type="text" class="form-control" formControlName="uid" readonly>
                          </div>

                          <!-- File Name (readonly) -->
                          <div class="form-group5 d-flex align-items-center2">
                              <label class="form-label"><strong>Nama Dokumen</strong></label>
                              <input type="text" class="form-control" formControlName="fileName" readonly>
                          </div>

                          <!-- Staff ID (readonly) -->
                          <div class="form-group5 d-flex align-items-center2">
                              <label class="form-label"><strong>ID Pegawai</strong></label>
                              <input type="text" class="form-control" formControlName="staffId" readonly>
                          </div>

                          <!-- Folder Name (readonly) -->
                          <div class ="form-group5 d-flex align-items-center2">
                              <label class="form-label"><strong>Nama Folder</strong></label>
                              <input type="text" class="form-control" formControlName="folderName" readonly>
                          </div>

                          <!-- Upload Date (readonly) -->
                          <div class ="form-group5 d-flex align-items-center2">
                              <label class="form-label"><strong>Tarikh Upload</strong></label>
                              <input type="text" class="form-control" [value]="dokumenData?.uploadDate | date: 'dd/MM/yyyy'" readonly>
                          </div>

                          <!-- Current Approval Status (readonly) -->
                          <div class ="form-group5 d-flex align-items-center2">
                              <label class="form-label"><strong>Status Kelulusan Semasa</strong></label>
                              <input type="text" class="form-control" [value]="getApprovalStatusText(dokumenData?.approvalStatus || '')" readonly>
                          </div>

                          <!-- Current Record Status (readonly) -->
                          <div class ="form-group5 d-flex align-items-center2">
                              <label class="form-label"><strong>Status Rekod Semasa</strong></label>
                              <input type="text" class="form-control" [value]="getRecordStatusText(dokumenData?.recordStatus || '')" readonly>
                          </div>

                          <hr>
                          <h5 class ="form-group5 d-flex align-items-center2 text-primary">Keputusan Ketua Unit</h5>

                          <!-- Approval Decision (user can change) -->
                          <div class ="form-group5 d-flex align-items-center2">
                              <label class="form-label"><strong>Kelulusan <span class="text-danger">*</span></strong></label>
                              <div class="form-check">
                                  <input class="form-check-input" type="radio" formControlName="kelulusan" value="setuju" id="setuju">
                                  <label class="form-check-label" for="setuju">
                                      <i class="icon-check text-success me-1"></i>Setuju
                                  </label>
                              </div>
                              <div class="form-check">
                                  <input class="form-check-input" type="radio" formControlName="kelulusan" value="tolak" id="tolak">
                                  <label class="form-check-label" for="tolak">
                                      <i class="icon-close text-danger me-1"></i>Tolak
                                  </label>
                              </div>
                          </div>

                          <!-- Publish Status (user can change) -->
                          <div class="form-group5 d-flex align-items-center2">
                              <label class="form-label"><strong>Status Publish <span class="text-danger">*</span></strong></label>
                              <div class="form-check">
                                  <input class="form-check-input" type="radio" formControlName="publish" value="aktif" id="aktif">
                                  <label class="form-check-label" for="aktif">
                                      <i class="icon-energy text-success me-1"></i>Aktif
                                  </label>
                              </div>
                              <div class="form-check">
                                  <input class="form-check-input" type="radio" formControlName="publish" value="tidak-aktif" id="tidak-aktif">
                                  <label class="form-check-label" for="tidak-aktif">
                                      <i class="icon-ban text-secondary me-1"></i>Tidak Aktif
                                  </label>
                              </div>
                          </div>

                          <!-- File Link (if available) -->
                          <div class="form-group5 d-flex align-items-center2" *ngIf="dokumenData?.filePath">
                              <label class="form-label"><strong>Fail</strong></label>
                              <div class="border p-2 rounded bg-light">
                                  <i class="icon-doc me-2 text-primary"></i>
                                  <a [href]="dokumenData.filePath" target="_blank" class="text-decoration-none">
                                      {{ dokumenData.fileName }}
                                  </a>
                              </div>
                          </div>

                      </form>
                  </div>

                  <!-- No data message -->
                  <div *ngIf="!isLoading && !dokumenData" class="alert alert-info text-center">
                      <i class="icon-info me-2"></i>
                      Tiada maklumat dokumen dijumpai
                  </div>
                </div>
            </c-col>
        </c-row>
    </c-container>
     
    <!-- Navigation Footer -->
    <div class="bg-light border-top p-3">
        <div class="d-grid gap-2 d-md-flex justify-content-center">
            <button 
                cButton 
                color="primary" 
                class="blue-btn" 
                (click)="onHantar()" 
                [disabled]="isSubmitting || isLoading"
                style="white-space: normal;">
                <span *ngIf="isSubmitting" class="spinner-border spinner-border-sm me-1"></span>
                <i class="fa fa-paper-plane"></i>{{ isSubmitting ? 'Menghantar...' : 'Hantar' }}
            </button>
            <button 
                cButton 
                color="primary" 
                class="blue-btn" 
                (click)="onSimpan()" 
                [disabled]="isSubmitting || isLoading"
                style="white-space: normal;">
                <span *ngIf="isSubmitting" class="spinner-border spinner-border-sm me-1"></span>
                <i class="fa fa-floppy-o"></i>Simpan
            </button>
        </div>
    </div>
</c-card>

<!-- Modals -->
<app-modal-sucess-send-save [Hantarmodel]="HantarModalsave" (close)="closeModal()"></app-modal-sucess-send-save>
<app-modal-sucess-send [Hantarmodel]="HantarModalsend" (close)="closeModal()"></app-modal-sucess-send>
