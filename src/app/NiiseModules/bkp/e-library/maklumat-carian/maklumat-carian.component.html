<head>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

<c-card>
    <c-container>
        <c-row>
            <c-col md="12" class="p-4">
                  <div class="horizontal-stepper">
                      <ul class="stepper-list d-flex align-items-center justify-content-start flex-wrap">
                      <li
                          class="stepper-item"
                          *ngFor="let step of steps"
                          (click)="navigateTo(step)"
                          [class.active]="isStepActive(step.number)">
                          <button type="button" class="step-btn">
                          <span class="step-number">{{ step.number }}</span>
                          <span class="step-title">{{ step.title }}</span>
                          </button>
                      </li>
                      </ul>
                  </div><br>
                  <div class="section-title2 mb-3">
                    <h2>Maklumat Kekunci Carian</h2>
                  </div><br>

                  <!-- Search Form -->
                  <form [formGroup]="searchForm" (ngSubmit)="onSearch()">
                    <div class="form-group5 d-flex align-items-center2">
                      <div class="form-group5 d-flex align-items-center2">
                        <label for="namaDokumen">Nama Dokumen:</label>
                        <input 
                          type="text" 
                          uid="namaDokumen" 
                          formControlName="namaDokumen"
                          class="form-control"
                          placeholder="Masukkan nama dokumen">
                      </div>

                      <div class="form-group5 d-flex align-items-center2">
                        <label for="nomborDokumen">Nombor Dokumen:</label>
                        <input 
                          type="text" 
                          uid="nomborDokumen" 
                          formControlName="nomborDokumen"
                          class="form-control"
                          placeholder="Masukkan nombor dokumen">
                      </div>

                      <div class="form-group5 d-flex align-items-center2">
                        <label for="tahun">Tahun:</label>
                        <input 
                          type="text" 
                          uid="tahun" 
                          formControlName="tahun"
                          class="form-control"
                          placeholder="Masukkan tahun (cth: 2024)">
                      </div>
                   </div>
                    <!-- button cari n reset-->
                   <div class="p-3">
                      <!-- Buttons row -->
                      <div class="d-grid gap-2 d-md-flex justify-content-center mb-3">
                        <button 
                          cButton 
                          type="submit" 
                          class="blue-btn" 
                          style="white-space: normal" 
                          [disabled]="isLoading">
                          <span *ngIf="isLoading" class="spinner"></span>
                          <i class="fa fa-search"></i>{{ isLoading ? 'Mencari' : 'Cari' }}
                        </button>
                        <button 
                          cButton 
                          color="dark" 
                          (click)="goMuatNaik()" 
                          class="blue-btn"
                          style="white-space: normal">
                          <i class="fa fa-upload"></i>Muat Naik
                        </button>    
                        <button 
                          type="button" 
                          cButton 
                          color="dark"
                          class="set-semula-button" 
                          style="white-space: normal"
                          (click)="onReset()">
                          <i class="fa fa-refresh"></i>Set Semula
                        </button>
                      </div>

                      <!-- Alert row -->
                      <div *ngIf="showNoResults" class="row">
                        <div class="col-12 d-flex justify-content-center">
                          <div class="alert alert-warning text-center">
                            <i class="icon-warning me-2"></i>
                            Maklumat carian tidak wujud
                          </div>
                        </div>
                      </div>

                    </div>

                  </form>
                  <!-- Search Results -->
                  <div *ngIf="searchResults.length > 0" class="results-section">
                    <h3>Maklumat Dokumen ({{ searchResults.length }} dokumen)</h3>

                    <!-- Results in table format -->
                    <table border="1" cellspacing="0" cellpadding="5" width="100%">
                      <thead>
                        <tr>
                          <th>Nama Dokumen</th>
                          <th>ID Dokumen</th>
                          <th>Tahun</th>
                          <th>Nama Folder</th>
                          <th>Tindakan</th>

                        </tr>
                      </thead>
                      <tbody>
                        <tr *ngFor="let doc of searchResults">
                          <td>{{ doc.namaDokumen }}</td>
                          <td>{{ doc.uid }}</td>  <!-- Changed from nomborDokumen -->
                          <td>{{ doc.tahun }}</td>
                         <!--  <td>{{ doc.status }}</td> Show status from backend -->
                          <td>{{ doc.folderName }}</td>  <!-- Show folder name -->
                          <td style="white-space: nowrap; text-align: center;">
                            <div style="display: inline-flex; gap: 6px;">
                              <button 
                                type="button" 
                                class="btn btn-sm" 
                                (click)="onKemaskini(doc.uid)" 
                                style="background-color: transparent; border: 1px solid #6c757d; color: #6c757d; padding: 4px 8px;">
                                <i class="fa fa-pencil"></i>
                              </button>

                              <button 
                                type="button" 
                                class="btn btn-sm" 
                                (click)="onPadam(doc.uid)" 
                                style="background-color: transparent; border: 1px solid #dc3545; color: #dc3545; padding: 4px 8px;">
                                <i class="fa fa-trash"></i>
                              </button>

                              <button 
                                type="button" 
                                class="btn btn-sm" 
                                (click)="onView(doc.uid)" 
                                style="background-color: transparent; border: 1px solid blue; color: blue; padding: 4px 8px;">
                                <i class="fa fa-eye"></i>
                              </button>
                            </div>
                          </td>

                        </tr>
                      </tbody>
                    </table>
                  </div>
            </c-col>
        </c-row>
    </c-container>
</c-card>
