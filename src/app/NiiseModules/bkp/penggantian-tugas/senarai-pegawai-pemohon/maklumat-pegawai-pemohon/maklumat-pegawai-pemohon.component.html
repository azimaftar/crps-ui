<div class="container-fluid">
  <div class="form-section">
    <div class="row">
      <!-- Left Side: Officer Info -->
      <div class="col-md-9 border-end pe-4">
        <h5>Maklumat Pegawai Pemohon</h5>

        <!-- Image Placeholder -->
        <div class="mb-3 photo-class">
            <img src="assets/images/passport-photo.jpg" class="passport-photo" alt="Passport Photo">
        </div>

        <form class="mt-3">
           <!-- row 1 -->
                  <!-- row 1 -->
                  <div class="row mb-3">
                    <div class="col-md-6">
                      <label class="form-label required">Nama Pegawai</label>
                      <input type="text"  class="form-control" [(ngModel)]="pemohon.nama" name="nama" [disabled]="true"/>
                    </div>
                    <div class="col-md-6">
                      <label class="form-label required">Bahagian</label>
                      <select class="form-select" [(ngModel)]="pemohon.bahagian" name="bahagian" [disabled]="true">
                      <option *ngFor="let item of pemohon.bahagian" [value]="item.div">
                        {{ item.div }}
                      </option>
                    </select>
                  </div>
                  </div>

                  <!-- row 2 -->
                  <div class="row mb-3">
                    <div class="col-md-6">
                      <label class="form-label required">Nombor Kad Pengenalan</label>
                      <input type="text"  class="form-control" [(ngModel)]="pemohon.ic" name="ic" [disabled]="true"/>
                    </div>
                    <div class="col-md-6">
                      <label class="form-label required">Unit</label>
                      <select class="form-select" [(ngModel)]="pemohon.unit" name="unit" [disabled]="true">
                      <option *ngFor="let item of pemohon.unit" [value]="item.units">
                        {{ item.units }}
                      </option>
                    </select>
                  </div>
                  </div>

                  <!-- row 3 -->
                  <div class="row mb-3">
                    <div class="col-md-6">
                      <label class="form-label required">Gred Jawatan</label>
                      <input type="text"  class="form-control" [(ngModel)]="pemohon.gred" name="gred" [disabled]="true"/>
                    </div>
                    <div class="col-md-6">
                      <label class="form-label required">Kumpulan</label>
                      <select class="form-select" [(ngModel)]="pemohon.group" name="group" [disabled]="true">
                      <option *ngFor="let item of pemohon.group" [value]="item.kumpulan">
                        {{ item.kumpulan }}
                      </option>
                    </select>
                  </div>
                </div>

                  <!-- row 4 -->
                  <div class="row mb-3">
                    <div class="col-md-6">
                      <label class="form-label required">Tarikh</label>
                      <input type="date" class="form-control" [(ngModel)]="pemohon.tarikh" name="tarikh" (change)="updateDayFromDate()" [disabled]="true"/>
                    </div>
                    <div class="col-md-6">
                      <label class="form-label required">Hari</label>
                      <input
                        type="text"
                        class="form-control"
                        id="hari"
                        [value]="pemohon.hari || 'Sila Pilih Tarikh'"
                        readonly
                        [disabled]="true"
                      />
                  </div>
                  </div>

                  <!-- row 5 -->
                  <div class="row mb-3">
                    <div class="col-md-6">
                      <label class="form-label required">Masa</label>
                      <input type="time" class="form-control" [(ngModel)]="pemohon.masa" name="masa" [disabled]="true"/>
                    </div>
                    <div class="col-md-6">
                      <label class="form-label required">Lokasi Bertugas</label>
                       <input type="text"  class="form-control" [(ngModel)]="pemohon.lokasi" name="lokasi" [disabled]="true"/>
                    </div>
                  </div>

                  <!-- Row 6 -->
                  <div class="mb-3">
                    <label class="form-label">Tandatangan Digital</label>
                    <input type="text" class="form-control sign-input" [disabled]="true">
                  </div>
        </form>
      </div>

      <!-- Right Side: Steps with vertical line -->
      <div class="col-md-3 ps-4 border-start">
        <div
          class="step"
          [class.active]="isStepActive(1)"
          [class.completed]="isStepCompleted(1)"
        >
          <div class="circle">1</div>
          <div class="label">Maklumat Pegawai Pemohon</div>
        </div>
        <div
          class="step"
          [class.active]="isStepActive(2)"
          [class.completed]="isStepCompleted(2)"
        >
          <div class="circle">2</div>
          <div class="label">Maklumat Pegawai Pengganti</div>
        </div>
      </div>
    </div>

    <!-- Navigation Buttons -->
    <div class="d-flex justify-content-end mt-4">
      <button
        class="btn btn-secondary me-2"
        (click)="goToPreviousStep()"
        [disabled]="currentStep === 1"
      >
        &lt;
      </button>
      <button
        class="btn btn-dark"
        (click)="goToMaklumatPengganti()"
        [disabled]="currentStep === maxStep"
      >
        &gt;
      </button>
    </div>
  </div>
</div>
