<div class="container-fluid">
<div class="table-section">
<c-container fluid class="h-100">
    
    <!-- Main Content Area (Left Panel) -->
    <c-col class="d-flex flex-column">
      <c-card class="h-100 border-0 shadow-sm">
        
        <c-card-body class="flex-grow-1 p-4">
              <h6 class="text-medium-emphasis mb-3"></h6>
              <!-- <div class="table-responsive"> -->
                <h5 class="section-title">Senarai Ganti Tugas</h5>

                <div class="row mb-3">
                  <div class="col-md-6 d-flex align-items-end">
                    <div class="w-100 me-2">
                      <label class="form-label required">Tarikh</label>
                      <input type="date" class="form-control" name="tarikh" [(ngModel)]="tarikh" />
                    </div>
                    <button cButton type="button" class="btn btn-dark" (click)="searchSenarai()">
                      Cari
                    </button>
                  </div>
                </div>

                <table class="table table-hover">
                  <thead class="table-light">
                    <tr>
                      <th>Bil</th>
                      <th>Nama Pegawai</th>
                      <th>No. Kad Pengenalan</th>
                      <th>Gred Jawatan</th>
                      <th>Bahagian</th>
                      <th>Unit</th>
                      <th>Kumpulan</th>
                      <th>Tindakan</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr *ngFor="let item of tableData; let i = index" class="align-middle">
                      <td>{{ item.id }}</td>
                      <td>{{ item.namapegawai }}</td>
                      <td>{{ item.nokp }}</td>
                      <td>{{ item.gred }}</td>
                      <td>{{ item.bahagian }}</td>
                      <td>{{ item.unit}}</td>
                      <td>{{ item.kumpulan }}</td>
                      <td>
                        <button cButton 
                          variant="outline" 
                          color="dark" 
                          class="w-100"
                          (click)="ondetail(item)">
                          <i class="bi bi-upc-scan me-1"></i>
                          Lihat
                        </button>
                      </td>
                    </tr>
                    <tr *ngIf="!tableData || tableData.length === 0">
                      <td colspan="8" class="text-center text-muted">
                        Tiada data dijumpai
                      </td>
                    </tr>
                  </tbody>
                </table>
        </c-card-body>
      </c-card>
    </c-col>
</c-container>
</div>
</div>
