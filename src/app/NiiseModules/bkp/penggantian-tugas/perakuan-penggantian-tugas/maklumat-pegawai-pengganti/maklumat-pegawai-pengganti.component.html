<div class="container-fluid">

  <!-- STEPPER -->
  <!-- <reusable-tab [currentStep]="currentStep" [steps]="steps"></reusable-tab> -->

    <div class="horizontal-stepper">
                        <ul class="stepper-list d-flex align-items-center justify-content-start flex-wrap">
                        <li
                            class="stepper-item"
                            *ngFor="let step of steps"
                            [class.active]="isStepActive(step.number)">
                            <button 
                                type="button" 
                                class="step-btn">
                                <span class="step-number">{{ step.number }}</span>
                                <span class="step-title">{{ step.title }}</span>
                            </button>
                        </li>
                        </ul>
                    </div>

  <div class="form-section">
    <div class="row">
      <!-- Full Width: Officer Info -->
      <div class="col-12 pe-4">
        <h5>Maklumat Pegawai Pengganti</h5>

        <!-- Image Placeholder -->
        <div class="mb-3 photo-class text-center">
          <img src="assets/images/passport-photo.jpg" class="passport-photo" alt="Passport Photo">
        </div>

        <form class="mt-3">
          <!-- row 1 -->
          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label required">Nama Pegawai</label>
              <input type="text" class="form-control" [(ngModel)]="pegawai.namapegawai" name="nama" readonly />
            </div>
            <div class="col-md-6">
              <label class="form-label required">Bahagian</label>
              <select class="form-select" [(ngModel)]="pegawai.bahagian" name="bahagian">
                <option *ngFor="let item of bahagianList" [value]="item">
                  {{ item }}
                </option>
              </select>
            </div>
          </div>

          <!-- row 2 -->
          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label required">Nombor Kad Pengenalan</label>
              <input type="text" class="form-control" [(ngModel)]="pegawai.nokp" name="ic" readonly />
            </div>
            <div class="col-md-6">
              <label class="form-label required">Unit</label>
              <select class="form-select" [(ngModel)]="pegawai.unit" name="unit">
                <option *ngFor="let item of unitList" [value]="item">
                  {{ item }}
                </option>
              </select>
            </div>
          </div>

          <!-- row 3 -->
          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label required">Gred Jawatan</label>
              <input type="text" class="form-control" [(ngModel)]="pegawai.gred" name="gred" readonly />
            </div>
            <div class="col-md-6">
              <label class="form-label required">Kumpulan</label>
              <select class="form-select" [(ngModel)]="pegawai.kumpulan" name="kumpulan">
                <option *ngFor="let item of kumpulanList" [value]="item">
                  {{ item }}
                </option>
              </select>
            </div>
          </div>
          
          <div class="mb-3">
            <label class="form-label">Tandatangan Digital</label>
            <div class="mt-2">
              <canvas #signaturePad width="400" height="200"
                style="border:1px solid #ccc; border-radius:8px; background:#fff;"></canvas>
            </div>
            <div class="mt-2">
              <button type="button" class="btn btn-secondary btn-sm me-2" (click)="clearSignature()">Clear</button>
              <button type="button" class="btn btn-primary btn-sm" (click)="saveSignature()">Save</button>
            </div>

            <!-- Preview signature after saving -->
            <div *ngIf="pegawai?.tandatangan" class="mt-2">
              <p>Preview:</p>
              <img [src]="pegawai.tandatangan" alt="Signature Preview" style="max-width: 400px; border:1px solid #ddd;">
            </div>
          </div>

           <div class="mb-3">
                    <label class="form-label fw-bold">Keputusan</label>

                    <!-- Radio buttons row -->
                    <div class="d-flex mb-2">
                      <!-- Radio: Lulus -->
                      <div class="form-check d-flex align-items-center me-4">
                        <input class="form-check-input big-square-radio" 
                              type="radio" 
                              id="lulus" 
                              name="keputusan" 
                              value="Lulus"
                              (click)="toggleRadio('Lulus')"
                              [(ngModel)]="keputusan">
                        <label class="form-check-label ms-2" for="lulus">Lulus</label>
                      </div>

                      <!-- Radio: Tolak -->
                      <div class="form-check d-flex align-items-center me-4">
                        <input class="form-check-input big-square-radio" 
                              type="radio" 
                              id="tolak" 
                              name="keputusan" 
                              value="Tolak"
                              (click)="toggleRadio('Tolak')"
                              [(ngModel)]="keputusan">
                        <label class="form-check-label ms-2" for="tolak">Tolak</label>
                      </div>
                      </div>

                      <div *ngIf="keputusan === 'Tolak'" class="mt-3">
                        <label for="catatan" class="form-label">Catatan</label>
                        <textarea id="catatan"
                                  class="form-control"
                                  [(ngModel)]="catatan"
                                  rows="3"></textarea>
                      </div>
                    

                    <!-- Column 2: Perakuan -->
                    <div>
                      <label class="form-label ms-4 mt-4">Perakuan</label>
                      <div class="form-check d-flex align-items-start">
                        <input class="form-check-input big-square-radio mt-1"
                              type="checkbox"
                              id="syarat"
                              [(ngModel)]="setuju">
                        <label class="form-check-label ms-2" for="syarat">
                          Saya dengan ini bersetuju untuk mengambi alih tugas yang dinyatakan seperti dalam borang ini. 
                          Dan akan melaksanakan tanggungjawab tersebut mengikut tarikh dan masa yang telah ditetapkan
                        </label>
                      </div>
                    </div>
                  </div>

        </form>
      </div>
    </div>
    <!-- Action Buttons -->
    <div class="d-flex justify-content-end mt-4 gap-2">
        <button cButton type="button" class="btn btn-dark" (click)="showHantarSubmit()">
          Set Semula
        </button>
        <button cButton type="button" class="btn btn-dark" (click)="showHantarSimpan()">
          Simpan
        </button>
        <button cButton type="button" class="btn btn-dark" (click)="showHantarSubmit()">
          Hantar
        </button>
      </div>

      <div class="d-flex justify-content-end mt-4">
      <button class="btn btn-secondary me-2"
              (click)="goToPreviousStep()"
              [disabled]="currentStep === minStep">
        &lt;
      </button>
      <button class="btn btn-secondary me-2"
              [disabled]="currentStep === maxStep">
        &gt;
      </button>
    </div>
  </div>
</div>


<!-- Popup -->
<app-on-submit-popup
  [Hantarsubmit]="HantarSubmitPopup"
  [Hantarsimpan]="HantarSimpanPopup"
  [Hantarreset]="HantarResetPopup"
  (close)="closeModal()">
</app-on-submit-popup>
