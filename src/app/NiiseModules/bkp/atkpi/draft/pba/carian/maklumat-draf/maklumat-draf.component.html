<div class="container-fluid">
    <div class="form-section">
      <div class="row">
        <div class="col-md-8 border-end pe-4">
          <h5>Maklumat Draf Cadangan</h5>

          <!-- Draf Cadangan & Process Owner-->
        <div class="row mb-3">
        <div class="col-md-6">
          <label class="form-label required">Draf Cadangan*</label>
          <input type="text" class="form-control" value="Proses Kemasukan Pelawat Asing di Pintu Masuk" />
        </div>
        <div class="col-md-6">
          <label class="form-label required">Process Owner*</label>
          <input type="text" class="form-control" value="Bahagian Operasi" />
        </div>
      </div>

       <!-- Tajuk & Bidang (Umum)-->
       <div class="row mb-3">
        <div class="col-md-6">
          <label class="form-label required">Tajuk*</label>
          <input type="text" class="form-control" value="Garis Panduan Pemeriksaan Imigresen Untuk Pelawat Asing" />
        </div>
        <div class="col-md-6">
          <label class="form-label required">Bidang (Umum)*</label>
          <input type="text" class="form-control" value="Dokumentasi Dan Kemasukan" />
        </div>
      </div>
  
       <!-- Bidang (Khusus) & Tujuan-->
       <div class="row mb-3">
        <div class="col-md-6">
          <label class="form-label required">Bidang (Khusus)*</label>
          <input type="text" class="form-control" value="Prosedur Pemeriksaan Di Pintu Masuk" />
        </div>
        <div class="col-md-6">
          <label class="form-label required">Tujuan*</label>
          <input type="text" class="form-control" value="Menambah baik pemeriksaan pelawat asing" />
        </div>
      </div>

      <!-- Punca Kuasa & Tafsiran-->
      <div class="row mb-3">
        <div class="col-md-6">
          <label class="form-label required">Punca Kuasa*</label>
          <input type="text" class="form-control" value="Akta Imigresen 1959/63 (Pindaan 2002)" />
        </div>
        <div class="col-md-6">
          <label class="form-label required">Tafsiran*</label>
          <input type="text" class="form-control" value="Garis Panduan Pemeriksaan Imigresen Untuk Pelawat Asing" />
        </div>
      </div>

      <!-- Latar Belakang & Praktis-->
      <div class="row mb-3">
        <div class="col-md-6">
          <label class="form-label required">Latar Belakang*</label>
          <input type="text" class="form-control" value="Penambahbaikan diperlukan bagi menangani isu pelawat asing" />
        </div>
        <div class="col-md-6">
          <label class="form-label required">Praktis*</label>
          <input type="text" class="form-control" value="Pemeriksaan secara manual tanpa sistem pemantauan digital" />
        </div>
      </div>

      <!-- Arahan Baharu & Tarikh Kuat Kuasa-->
      <div class="row mb-3">
        <div class="col-md-6">
          <label class="form-label required">Arahan Baharu*</label>
          <input type="text" class="form-control" value="Depot Tahanan Imigresen" />
        </div>
        <div class="col-md-6">
          <label class="form-label required">Tarikh Kuat Kuasa*</label>
          <input type="date" class="form-control" value="2025/06/07" />
        </div>
      </div>

      <!-- Proses Kerja -->
<div class="mb-3">
    <label class="form-label d-block">Proses Kerja</label>
  
    <div class="d-flex flex-wrap gap-4 align-items-center">
      <div class="form-check">
        <input class="form-check-input" type="checkbox" id="syaratPermohonan" name="prosesKerja" value="syarat-permohonan">
        <label class="form-check-label" for="syaratPermohonan">Syarat syarat permohonan</label>
      </div>
  
      <div class="form-check">
        <input class="form-check-input" type="checkbox" id="prosesPendaftaran" name="prosesKerja" value="proses-pendaftaran" checked>
        <label class="form-check-label" for="prosesPendaftaran">Proses Pendaftaran</label>
      </div>
  
      <div class="form-check">
        <input class="form-check-input" type="checkbox" id="tanggungjawab" name="prosesKerja" value="tanggungjawab">
        <label class="form-check-label" for="tanggungjawab">Tanggungjawab</label>
      </div>
  
      <div class="form-check">
        <input class="form-check-input" type="checkbox" id="tindakanPintuMasuk" name="prosesKerja" value="tindakan-pintu-masuk">
        <label class="form-check-label" for="tindakanPintuMasuk">Tindakan Di Pintu Masuk</label>
      </div>
  
      <div class="form-check">
        <input class="form-check-input" type="checkbox" id="flowChart" name="prosesKerja" value="flow-chart">
        <label class="form-check-label fst-italic" for="flowChart">Flow Chart</label>
      </div>
    </div>
  </div>
  
  <!-- Termasuk -->
  <div class="mb-3">
    <label class="form-label d-block">Termasuk</label>
  
    <div class="d-flex flex-wrap gap-4 align-items-center">
      <div class="form-check">
        <input class="form-check-input" type="checkbox" id="sabah" name="termasuk" value="sabah">
        <label class="form-check-label" for="sabah">Sabah</label>
      </div>
  
      <div class="form-check">
        <input class="form-check-input" type="checkbox" id="sarawak" name="termasuk" value="sarawak">
        <label class="form-check-label" for="sarawak">Sarawak</label>
      </div>
    </div>
  </div>

   <!-- Pematuhan & Permohonan-->
   <div class="row mb-3">
    <div class="col-md-6">
      <label class="form-label required">Pematuhan</label>
      <input type="text" class="form-control" value="Depot Tahanan Imigresen" />
    </div>
    <div class="col-md-6">
      <label class="form-label required">Permohonan</label>
      <input type="date" class="form-control" value="Depot Tahanan Imigresen" />
    </div>
  </div>

  <!-- RUJUKAN -->
<div class="mb-3">
    <label class="form-label d-block">Rujukan</label>
    <div class="d-flex flex-wrap gap-4">
      <div class="form-check">
        <input class="form-check-input" type="checkbox" id="rujBersama" name="rujukan" value="dibaca-bersama">
        <label class="form-check-label" for="rujBersama">Pekeliling Dibaca Bersama</label>
      </div>
  
      <div class="form-check">
        <input class="form-check-input" type="checkbox" id="rujDigugurkan" name="rujukan" value="digugurkan">
        <label class="form-check-label" for="rujDigugurkan">Pekeliling Digugurkan</label>
      </div>
    </div>
  </div>
  
  <!-- JENIS DRAF -->
  <div class="mb-3">
    <label class="form-label d-block">Jenis Draf</label>
  
    <div class="row g-3">
      <div class="col-md-4">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="jdSuratMemo" name="jenisDraf" value="surat-memo">
          <label class="form-check-label" for="jdSuratMemo">
            Surat/memo daripada Bahagian/Negeri
          </label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="jdATKPI" name="jenisDraf" value="atkpi">
          <label class="form-check-label" for="jdATKPI">
            Arahan Tetap Ketua Pengarah Imigresen (ATKPI)
          </label>
        </div>
      </div>
  
      <div class="col-md-4">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="jdPIM" name="jenisDraf" value="pim">
          <label class="form-check-label" for="jdPIM">Pekeliling Imigresen Malaysia (PIM)</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="jdPentadbiran" name="jenisDraf" value="pentadbiran">
          <label class="form-check-label" for="jdPentadbiran">Arahan Pentadbiran</label>
        </div>
      </div>
  
      <div class="col-md-4">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="jdPIMT" name="jenisDraf" value="pimt">
          <label class="form-check-label" for="jdPIMT">Pekeliling Imigresen Malaysia Terhad (PIMT)</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="jdArahanImigresen" name="jenisDraf" value="arahan-imigresen">
          <label class="form-check-label" for="jdArahanImigresen">Arahan Imigresen</label>
        </div>
      </div>
    </div>
  </div>
  
  <!-- LAMPIRAN -->
  <div class="mb-3">
    <label class="form-label d-block">Lampiran</label>
  
    <!-- Upload button + file input -->
    <div class="d-flex align-items-center gap-3">
      <div>
        <input type="file" id="lampiranInput" class="d-none" multiple>
        <label for="lampiranInput" class="btn btn-dark btn-sm">+ Muat Naik</label>
      </div>

      <!-- MUAT TURUN, CETAK -->
    <div class="mb-3">
         <button type="button" class="btn btn-dark">Muat Turun</button>
         <button type="button" class="btn btn-dark">Cetak</button>
    </div>

    <!-- MUAT NAIK -->
    <div class="mb-3">
        <button type="button" class="btn btn-dark">+ Muat Naik</button>
    </div>
  
      <!-- Placeholder for attachment icons -->
      <button type="button" class="btn btn-outline-secondary btn-sm" title="Lampiran 1">
        <span style="width:16px;height:16px;display:inline-block;border:1px solid #666;"></span>
      </button>
      <button type="button" class="btn btn-outline-secondary btn-sm" title="Lampiran 2">
        <span style="width:16px;height:16px;display:inline-block;border:1px solid #666;"></span>
      </button>
    </div>
  </div>
  
  <!-- CATATAN -->
  <div class="mb-3">
    <label for="catatan" class="form-label">Catatan</label>
    <textarea id="catatan" class="form-control" rows="3" placeholder=""></textarea>
  </div>

  <!-- SEMAKAN SYOR -->
<div class="mb-3">
    <label class="form-label">Semakan Syor</label>
    <div class="form-check">
      <input class="form-check-input" type="radio" id="sokong" name="semakanSy" value="sokong">
      <label class="form-check-label" for="sokong">Sokong</label>
    </div>
    <div class="form-check">
      <input class="form-check-input" type="radio" id="tidakSokong" name="semakanSy" value="tidakSokong">
      <label class="form-check-label" for="tidakSokong">Tidak Sokong</label>
    </div>
  </div>

  <!-- CATATAN -->
  <div class="mb-3">
    <label for="catatan" class="form-label">Catatan</label>
    <textarea id="catatan" class="form-control" rows="3" placeholder=""></textarea>
  </div>
  
        <!-- Right Side: Steps with vertical line -->
        <div class="col-md-4 ps-4 border-start">
          <div
            class="step"
            [class.active]="isStepActive(1)"
            [class.completed]="isStepCompleted(1)"
          >
            <div class="circle">1</div>
            <div class="label">Maklumat Pegawai</div>
          </div>
          <div
            class="step"
            [class.active]="isStepActive(2)"
            [class.completed]="isStepCompleted(2)"
          >
            <div class="circle">2</div>
            <div class="label">Maklumat Draf Cadangan</div>
          </div>
        </div>
      </div>
  
      <!-- Navigation Buttons -->
      <div class="d-flex justify-content-end mt-4 gap-2">
        <button cButton type="button" class="btn btn-dark" (click)="onSubmit()">
          Hantar
        </button>
  
        <button cButton type="button" class="btn btn-dark" (click)="onSave()">
          Simpan
        </button>
  
        <button
          class="btn btn-secondary me-2"
          (click)="goToMaklumatPegawai()"
          [disabled]="currentStep === 1"
        >
          &lt;
        </button>
        <button class="btn btn-dark" [disabled]="currentStep === maxStep">
          &gt;
        </button>
      </div>
    </div>
  </div>
  
  <!-- Success Popup -->
  <div class="popup-overlay" *ngIf="showSuccessPopup">
    <div class="popup-box">
      <p>Rekod telah berjaya dihantar</p>
      <button (click)="closePopup()">Okay</button>
    </div>
  </div>
  
  <!-- Save Popup -->
  <div class="popup-overlay" *ngIf="showSavePopup">
    <div class="popup-box">
      <p>Rekod telah berjaya disimpan</p>
      <button (click)="closePopup()">Okay</button>
    </div>
  </div>
