<div class="container-fluid">
    <div class="form-section">
      <h5 class="section-title">Penjanaan Nombor Dokumen</h5>
      <form>
        <!-- Row 1 -->
        <div class="mb-3">
          <label class="form-label required">Nama Dokumen</label>
          <input type="text" class="form-control" value=" " />
          
        </div>

        <!-- Row 2 -->
        <div class="mb-3">
          <label class="form-label">Nombor Bilangan</label>
          <input type="text" class="form-control" value="BIL 01" />
        </div>

        <!-- Row 3 -->
        <div class="mb-3">
            <label class="form-label">Tahun Dikeluarkan</label>
            <input type="text" class="form-control" value="2025" />
          </div>
  
          <div class="d-flex justify-content-center">
            <button type="button" class="btn btn-dark mx-2" (click)="onJana()">Jana</button>
            <button type="button" class="btn btn-dark mx-2" (click)="onHantar()">Hantar</button>
            <button type="button" class="btn btn-dark mx-2" (click)="onSimpan()">Simpan</button>
          </div>
      </form>
    </div>

            <!-- Right Side: Steps with vertical line -->
            <div class="col-md-4 ps-4 border-start">
                <div
                  class="step"
                  [class.active]="isStepActive(1)"
                  [class.completed]="isStepCompleted(1)"
                >
                  <div class="circle">1</div>
                  <div class="label">Penjanaan Nombor Dokumen</div>
                </div>

                <div
                  class="step"
                  [class.active]="isStepActive(2)"
                  [class.completed]="isStepCompleted(2)"
                >
                  <div class="circle">2</div>
                  <div class="label">Maklumat Pegawai ISO
                  </div>
                </div>

                <div
                  class="step"
                  [class.active]="isStepActive(2)"
                  [class.completed]="isStepCompleted(2)"
                >
                  <div class="circle">3</div>
                  <div class="label">Memuat Naik Dokumen</div>
                </div>
              </div>
        
            <!-- Navigation Buttons -->
            <div class="d-flex justify-content-end mt-4">
              <button
                class="btn btn-secondary me-2"
                (click)="goToPreviousStep()"
                [disabled]="currentStep === 1"
              >
                &lt;
              </button>

              <button
                class="btn btn-dark"
                (click)="goToMaklumatPegawaiISO()"
                [disabled]="currentStep === 2"
              >
                &gt;
              </button>

              <button
              class="btn btn-dark"
              (click)="goToMuatNaikDoku()"
              [disabled]="currentStep === maxStep"
            >
              &gt;
            </button>
            </div>
  </div>
