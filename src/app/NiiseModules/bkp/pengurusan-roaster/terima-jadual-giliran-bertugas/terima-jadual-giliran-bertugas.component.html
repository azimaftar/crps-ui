<c-container fluid>
    <div class="form-section h-100">
        <h2 class="section-title">Maklumat Lokasi</h2>
        <form>
            <!-- Nama Pegawai -->
            <div class="mb-3 form-row">
                <label for="namaPegawai" class="form-label-inline">Nama Pegawai</label>
                <input type="text" id="namaPegawai" class="form-control field-inline" value="Muhammad Firdaus Bin Azmi"/>
            </div>

            <!-- Nombor Kad Pengenalan -->
            <div class="form-group5 d-flex align-items-center2">
                <label for="noKadPengenalan" class="form-label-inline">Nombor Kad Pengenalan</label>
                <input type="text" id="noKadPengenalan" class="form-control field-inline" value="781231-14-5777"/>
            </div>

            <!-- Nombor Perkhidmatan -->
            <div class="form-group5 d-flex align-items-center2">
                <label for="noPerkhidmatan" class="form-label-inline">Nombor Perkhidmatan</label>
                <input type="text" id="noPerkhidmatan" class="form-control field-inline-short" value="J765432"/>
            </div>

            <!-- Jawatan -->
            <div class="form-group5 d-flex align-items-center2">
                <label for="jawatan" class="form-label-inline">Jawatan</label>
                <input type="text" id="jawatan" class="form-control field-inline-short" value="N41 - Penolong Pegawai Tadbir"/>
            </div>

            <!-- Unit/Bahagian -->
            <div class="form-group5 d-flex align-items-center2">
                <label for="unitBahagian" class="form-label-inline">Unit/Bahagian</label>
                <select class="form-select field-inline-dropdown" id="unitBahagian" name="unitBahagian">
                    <option value="bahagian-pengurusan" selected>Bahagian Pengurusan Operasi Imigresen</option>
                    <option value="unit1">Unit Pemeriksaan Laluan Masuk</option>
                    <option value="unit2">Unit Kawalan Sempadan</option>
                </select>
            </div>

            <!-- Tarikh -->
            <div class="form-group5 d-flex align-items-center2">
                <label for="tarikh" class="form-label-inline">Tarikh</label>
                <div class="date-input-wrapper">
                    <input type="date" id="tarikh" class="form-control field-inline-date" value="2025-05-03"/>
                </div>
            </div>

            <!-- Lokasi Bertugas -->
            <div class="form-group5 d-flex align-items-center2">
                <label for="lokasiBertugas" class="form-label-inline">Lokasi Bertugas</label>
                <input type="text" id="lokasiBertugas" class="form-control field-inline-wide" value="Putrajaya"/>
            </div>

            <!-- Action Buttons -->
            <div class="d-flex justify-content-center gap-3 mt-4">
                <button type="button" class="blue-btn">Ok</button>
                <button type="button" class="btn-dark">Tutup</button>
            </div>
        </form>
    </div>
</c-container>
