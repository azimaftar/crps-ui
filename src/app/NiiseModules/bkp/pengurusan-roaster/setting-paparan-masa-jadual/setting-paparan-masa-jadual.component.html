<c-container fluid>
    <div class="form-section">
        <h2 class="section-title">Maklumat Kekunci Carian</h2>

        <div *ngIf="errorMessage" class="alert alert-danger">
            {{ errorMessage }}
        </div>

         <!-- Loading Spinner -->
        <div *ngIf="isLoading" class="text-center my-4">
            <div class="spinner-border" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-2">Sedang mencari...</p>
        </div>

        <form cForm (ngSubmit)="onSearch(searchForm)" #searchForm="ngForm">
            <!-- Bahagian -->
            <div class="mb-3">
                <label for="bahagian" class="form-label">Bahagian*</label>
                <select class="form-select field-full" id="bahagian" name="bahagian" [(ngModel)]="filters.bahagian"
                    required>
                    <option *ngFor="let option of bahagianOptions" [value]="option.value">
                        {{option.label}}
                    </option>
                </select>
            </div>

            <!-- Unit -->
            <div class="mb-3">
                <label for="unit" class="form-label">Unit*</label>
                <select class="form-select field-full" id="unit" name="unit" [(ngModel)]="filters.unit" required>
                    <option *ngFor="let option of unitOptions" [value]="option.value">
                        {{option.label}}
                    </option>
                </select>
            </div>

            <!-- Search Criteria Row -->
            <div class="row">
                <!-- Kumpulan -->
                <div class="col-md-3">
                    <div class="mb-3">
                        <label for="kumpulan" class="form-label">Kumpulan*</label>
                        <select class="form-select" id="kumpulan" name="kumpulan" [(ngModel)]="filters.kumpulan"
                            required>
                            <option *ngFor="let option of kumpulanOptions" [value]="option.value">
                                {{option.label}}
                            </option>
                        </select>
                    </div>
                </div>

                <!-- Bulan -->
                <div class="col-md-3">
                    <div class="mb-3">
                        <label for="bulan" class="form-label">Bulan*</label>
                        <select class="form-select" id="bulan" name="bulan" [(ngModel)]="filters.bulan" required>
                            <option *ngFor="let option of bulanOptions" [value]="option.value">
                                {{option.label}}
                            </option>
                        </select>
                    </div>
                </div>

                <!-- Tahun -->
                <div class="col-md-3">
                    <div class="mb-3">
                        <label for="tahun" class="form-label">Tahun*</label>
                        <select class="form-select" id="tahun" name="tahun" [(ngModel)]="filters.tahun" required>
                            <option *ngFor="let option of tahunOptions" [value]="option.value">
                                {{option.label}}
                            </option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Submit Button -->
            <div class="d-flex justify-content-end mt-4">
                <button type="submit" class="btn btn-dark px-4" [disabled]="isLoading">
                    {{ isLoading ? 'Sedang Mencari...' : 'Cari' }}
                </button>
            </div>
        </form>

        <!-- Results Table Section - Only show after search -->
        <div class="results-section mt-4" *ngIf="hasSearched && searchResults.length > 0">
            <h3 class="results-title">Maklumat Lokasi</h3>
            <div class="table-container">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Bil.</th>
                            <th>Nama Pegawai</th>
                            <th>No Perkhidmatan</th>
                            <th>Gred Jawatan</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let pegawai of searchResults; let i = index">
                            <td>{{ i + 1 }}</td>
                            <td>{{ pegawai.Name }}</td>
                            <td>{{ pegawai.NoPerkhidmatan }}</td>
                            <td>{{ pegawai.Gred_CD }}</td>
                            <td>
                                <button class="btn-view" title="View" (click)="onView(pegawai)">
                                    <span class="action-text">VIEW</span>
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Modal for No Data Found -->
        <c-modal [visible]="isModalVisible" (visibleChange)="isModalVisible = $event" id="noDataModal" size="lg"
            centered="true" [backdrop]="true">

            <c-modal-header class="modal-header-custom">
                <div class="modal-icon-container">
                    <div class="modal-square-icon">
                        <div class="modal-x-line-1"></div>
                        <div class="modal-x-line-2"></div>
                    </div>
                </div>
            </c-modal-header>

            <c-modal-body class="modal-body-custom">
                <p class="modal-message">
                    Maklumat carian tidak wujud. Sila masukkan kunci<br>
                    carian lain.
                </p>
            </c-modal-body>

            <c-modal-footer class="modal-footer-custom">
                <div class="modal-button-container">
                    <button type="button" class="modal-ok-button" (click)="onModalOk()">
                        OK
                    </button>
                </div>
            </c-modal-footer>
        </c-modal>
    </div>
</c-container>
