<c-container fluid>
    <div class="form-section h-100">
        <h2 class="section-title">Jadual Roster</h2>

        <form (ngSubmit)="onSubmit()" #rosterForm="ngForm">

            <!-- Bahagian -->
            <div class="form-group5 d-flex align-items-center2">
                <label for="bahagian" class="form-label">Bahagian*</label>
                <input type="text" class="form-control field-medium" id="bahagian" name="bahagian"
                    [(ngModel)]="formData.bahagian" readonly>
            </div>

            <!-- Unit -->
            <div class="form-group5 d-flex align-items-center2">
                <label for="unit" class="form-label">Unit*</label>
                <input type="text" class="form-control field-medium" id="unit" name="unit" [(ngModel)]="formData.unit"
                    readonly>
            </div>

            <!-- Kumpulan -->
            <div class="form-group5 d-flex align-items-center2">
                <label for="kumpulan" class="form-label">Kumpulan*</label>
                <input type="text" class="form-control field-short" id="kumpulan" name="kumpulan"
                    [(ngModel)]="formData.kumpulan" readonly>
            </div>


            <!-- Tarikh -->
            <div class="form-group5 d-flex align-items-center2">
                <label for="tarikh" class="form-label">Tarikh*</label>
                <input type="text" class="form-control field-short" id="tarikh" name="tarikh"
                    [(ngModel)]="formData.tarikh" readonly />
            </div>

            <!-- Kaunter -->
            <div class="form-group5 d-flex align-items-center2">
                <label for="kaunter" class="form-label">Kaunter*</label>
                <input type="text" class="form-control field-medium" id="kaunter" name="kaunter"
                    [(ngModel)]="formData.kaunter" readonly>
            </div>

            <!-- Nama Pegawai -->
            <div class="form-group5 d-flex align-items-center2">
                <label for="namaPegawai" class="form-label">Nama Pegawai*</label>
                <input type="text" class="form-control field-medium" id="namaPegawai" name="namaPegawai"
                    [(ngModel)]="formData.namaPegawai" readonly>
            </div>

            <!-- Nombor Perkhidmatan -->
            <div class="form-group5 d-flex align-items-center2">
                <label for="nomborPerkhidmatan" class="form-label">Nombor Perkhidmatan*</label>
                <input type="text" class="form-control field-short" id="nomborPerkhidmatan" name="nomborPerkhidmatan"
                    [(ngModel)]="formData.nomborPerkhidmatan" readonly>
            </div>

            <!-- Tempoh Masa Pegawai Jadual -->
            <div class="form-group5 d-flex align-items-center2">
                <label class="form-label">Tempoh Masa Pegawai Jadual*</label>
                <div class="row time-row">

                    <!-- Masa Mula (Editable) -->
                    <div class="col-md-6">
                        <label for="masaMula" class="form-label-sub">Masa Mula*</label>
                        <div class="time-input-container">
                            <input type="time" class="form-control field-medium" id="masaMula" name="masaMula"
                                [(ngModel)]="formData.masaMula">
                        </div>
                    </div>

                    <!-- Masa Akhir (Editable) -->
                    <div class="col-md-6">
                        <label for="masaAkhir" class="form-label-sub">Masa Akhir*</label>
                        <div class="time-input-container">
                            <input type="time" class="form-control field-medium" id="masaAkhir" name="masaAkhir"
                                [(ngModel)]="formData.masaAkhir">
                        </div>
                    </div>

                </div>
            </div>

            <!-- Gred Jawatan -->
            <div class="form-group5 d-flex align-items-center2">
                <label for="gredJawatan" class="form-label">Gred Jawatan*</label>
                <input type="text" class="form-control field-medium" id="gredJawatan" name="gredJawatan"
                    [(ngModel)]="formData.gredJawatan" readonly>
            </div>

            <!-- Catatan -->
            <div class="form-group5 d-flex align-items-center2">
                <label for="catatan" class="form-label">Catatan*</label>
                <textarea class="form-control field-full" id="catatan" name="catatan" rows="4"
                    [(ngModel)]="formData.catatan" readonly></textarea>
            </div>

            <!-- Hidden userUid -->
            <input type="hidden" name="userUid" [(ngModel)]="formData.userUid">

            <!-- Action Buttons -->
            <div class="d-flex justify-content-end gap-3 mt-4">
                <button type="button" class="set-semula-button" (click)="onSetSemula()">Set Semula</button>
                <button type="button" class="blue-btn" (click)="onHantar()">Hantar</button>
                <button type="submit" class="blue-btn" (click)="onSimpan()">Simpan</button>
            </div>

            <!-- Modals -->
            <app-modal-simpan [isSuccessModalVisible]="showModalSimpan"
                (modalClosed)="onModalSimpanClosed()"></app-modal-simpan>

            <app-modal-hantar [isSuccessModalVisible]="showModalHantar"
                (modalClosed)="onModalHantarClosed()"></app-modal-hantar>

        </form>
    </div>
</c-container>
