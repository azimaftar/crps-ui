<c-container fluid>
  <div class="form-section h-100">
    <h2 class="section-title">Jadual Roster</h2>
    <form cForm>

      <!-- Schedule Table -->
      <c-row class="mt-4">
        <c-col md="12">
          <div class="table-responsive">
            <table class="table table-bordered text-center">
              <thead>
                <tr>
                  <th class="bg-success text-white">Hari/Tarikh</th>
                  <th *ngFor="let header of shiftHeaders" class="bg-success text-white">
                    {{header}}
                  </th>
                  <th class="bg-success text-white">Cuti</th>
                </tr>
              </thead>
              <tbody>
                <tr *ngFor="let day of schedule">
                  <td class="bg-success text-white">
                    {{day.dayName}}<br>
                    <small>{{day.date | date:'dd/MM'}}</small>
                  </td>
                  <td *ngFor="let assignment of day.assignments" class="bg-light">
                    {{assignment}}
                  </td>
                  <td class="bg-light">{{day.offDuty}}</td>
                </tr>
              </tbody>
            </table>
          </div>
        </c-col>
      </c-row>
    </form>
  </div>
</c-container>
