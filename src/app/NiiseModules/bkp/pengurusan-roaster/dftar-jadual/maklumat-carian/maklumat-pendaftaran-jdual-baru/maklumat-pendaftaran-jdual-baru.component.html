<c-container fluid>
    <div class="registration-section h-100">
        <h2 class="section-title2">Maklumat Pendaftaran</h2>

        <form cForm>
            <!-- Bilangan Syif dan Bilangan Kumpulan (bersebelahan) -->
            <div class="row-fields">
                <div class="mb-3">
                    <label class="form-label">Bilangan Syif<span class="required">*</span></label>
                    <select class="form-select" [(ngModel)]="formData.bilanganSyif"
                        (change)="onBilanganSyifChange(formData.bilanganSyif)" name="bilanganSyif"
                        [class.is-invalid]="formSubmitted && !formData.bilanganSyif">
                        <option [ngValue]="null" disabled>Pilih Bilangan Syif</option>
                        <option *ngFor="let i of [1, 2, 3]" [ngValue]="i">{{i}}</option>
                    </select>
                    <div *ngIf="formSubmitted && !formData.bilanganSyif" class="invalid-feedback">
                        Sila pilih bilangan syif
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Bilangan Kumpulan<span class="required">*</span></label>
                    <select class="form-select" [(ngModel)]="formData.bilanganKumpulan"
                        (change)="onBilanganKumpulanChange($event)" name="bilanganKumpulan"
                        [class.is-invalid]="formSubmitted && !formData.bilanganKumpulan">
                        <option [ngValue]="null" disabled>Pilih Bilangan Kumpulan</option>
                        <option *ngFor="let i of [1, 2, 3, 4]" [ngValue]="i">{{i}}</option>
                    </select>
                    <div *ngIf="formSubmitted && !formData.bilanganKumpulan" class="invalid-feedback">
                        Sila pilih bilangan kumpulan
                    </div>
                </div>
            </div>

            <!-- Dynamic Syif Time Fields -->
            <div *ngFor="let syif of getSyifArray(); let i = index">
                <h5 class="syif-title">Syif {{syif}}</h5>
                <div class="row-fields">
                    <div class="mb-3">
                        <label [for]="'startTime' + i" class="form-label">Start Time<span
                                class="required">*</span></label>
                        <input type="time" [id]="'startTime' + i" [(ngModel)]="formData.syifTimes[i].start"
                            [name]="'startTime' + i" class="form-control"
                            [class.is-invalid]="formSubmitted && !formData.syifTimes[i].start">
                        <div *ngIf="formSubmitted && !formData.syifTimes[i].start" class="invalid-feedback">
                            Sila isi start time
                        </div>
                    </div>
                    <div class="mb-3">
                        <label [for]="'endTime' + i" class="form-label">End Time<span class="required">*</span></label>
                        <input type="time" [id]="'endTime' + i" [(ngModel)]="formData.syifTimes[i].end"
                            [name]="'endTime' + i" class="form-control"
                            [class.is-invalid]="formSubmitted && !formData.syifTimes[i].end">
                        <div *ngIf="formSubmitted && !formData.syifTimes[i].end" class="invalid-feedback">
                            Sila isi end time
                        </div>
                    </div>
                </div>
            </div>

            <!-- Flexible Shift (Syif Anjal) -->
            <div *ngIf="isAnjalShiftVisible()">
                <h5 class="syif-title">Syif Anjal</h5>
                <div class="row-fields">
                    <div class="mb-3">
                        <label [for]="'startTimeAnjal'" class="form-label">Start Time (Anjal)<span
                                class="required">*</span></label>
                        <input type="time" id="startTimeAnjal"
                            [(ngModel)]="formData.syifTimes[formData.bilanganSyif].start" name="startTimeAnjal"
                            class="form-control"
                            [class.is-invalid]="formSubmitted && !formData.syifTimes[formData.bilanganSyif].start">
                        <div *ngIf="formSubmitted && !formData.syifTimes[formData.bilanganSyif].start"
                            class="invalid-feedback">
                            Sila isi start time untuk syif anjal
                        </div>
                    </div>
                    <div class="mb-3">
                        <label [for]="'endTimeAnjal'" class="form-label">End Time (Anjal)<span
                                class="required">*</span></label>
                        <input type="time" id="endTimeAnjal"
                            [(ngModel)]="formData.syifTimes[formData.bilanganSyif].end" name="endTimeAnjal"
                            class="form-control"
                            [class.is-invalid]="formSubmitted && !formData.syifTimes[formData.bilanganSyif].end">
                        <div *ngIf="formSubmitted && !formData.syifTimes[formData.bilanganSyif].end"
                            class="invalid-feedback">
                            Sila isi end time untuk syif anjal
                        </div>
                    </div>
                </div>
            </div>

            <!-- Dynamic Kumpulan Fields (vertikal) -->
            <div class="row-fields">
                <div *ngFor="let kumpulan of getKumpulanArray(); let i = index">
                    <div class="mb-3">
                        <label [for]="'kumpulan' + i" class="form-label">Kumpulan {{i+1}}<span
                                class="required">*</span></label>
                        <select class="form-select" [id]="'kumpulan' + i" [(ngModel)]="formData.kumpulan[i]"
                            [name]="'kumpulan' + i" [class.is-invalid]="formSubmitted && !formData.kumpulan[i]">
                            <option [ngValue]="null" disabled>Pilih Kumpulan</option>
                            <option *ngFor="let group of ['A','B','C','D']" [ngValue]="group">{{group}}</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Kumpulan Pertama -->
            <div class="mb-3">
                <label for="kumpulanPertama" class="form-label">Kumpulan Pertama<span class="required">*</span></label>
                <select class="form-select" [(ngModel)]="formData.kumpulanPertama" name="kumpulanPertama"
                    [class.is-invalid]="formSubmitted && !formData.kumpulanPertama">
                    <option [ngValue]="null" disabled>Pilih Kumpulan Pertama</option>
                    <option *ngFor="let group of formData.kumpulan" [ngValue]="group">{{group}}</option>
                </select>
            </div>

            <!-- Tarikh Mula Roster -->
            <div class="mb-3">
                <label for="tarikhMulaRoster" class="form-label">Tarikh Mula Roster<span
                        class="required">*</span></label>
                <input type="date" class="form-control" [(ngModel)]="formData.tarikhMulaRoster"
                    (change)="onTarikhMulaChange(formData.tarikhMulaRoster)" name="tarikhMulaRoster"
                    [class.is-invalid]="formSubmitted && !formData.tarikhMulaRoster">
            </div>

            <!-- Tarikh Akhir Roster -->
            <div class="mb-4">
                <label for="tarikhAkhirRoster" class="form-label">Tarikh Akhir Roster<span
                        class="required">*</span></label>
                <input type="date" class="form-control" [(ngModel)]="formData.tarikhAkhirRoster"
                    name="tarikhAkhirRoster" [class.is-invalid]="formSubmitted && !formData.tarikhAkhirRoster">
            </div>

            <!-- Action Buttons -->
            <div class="action-buttons">
                <button type="button" class="btn btn-dark btn-action" (click)="onReset()">Set Semula</button>
                <button type="button" class="btn btn-dark btn-action" (click)="onJana()">Jana</button>
                <button type="button" class="btn btn-dark btn-action" (click)="onHantar()">Hantar</button>
                <button type="button" class="btn btn-dark btn-action" (click)="onSimpan()">Simpan</button>
            </div>
        </form>
    </div>
    <app-modal-simpan [isSuccessModalVisible]="showModalSimpan"
        (modalClosed)="onModalSimpanClosed()"></app-modal-simpan>
    <app-modal-hantar [isSuccessModalVisible]="showModalHantar"
        (modalClosed)="onModalHantarClosed()"></app-modal-hantar>
</c-container>
