<c-container fluid>
    <div class="form-section">
        <h2 class="section-title">Maklumat Lokasi</h2>

        <form>
            <!-- Bahagian -->
            <div class="mb-3">
                <label for="bahagian" class="form-label">Bahagian*</label>
                <select class="form-select field-full" id="bahagian" name="bahagian" [(ngModel)]="formData.bahagian"
                    readonly disabled>
                    <option value="">Pilih Bahagian</option>
                    <option value="D">DV01</option>
                </select>
            </div>

            <!-- Unit -->
            <div class="mb-3">
                <label for="unit" class="form-label">Unit*</label>
                <select class="form-select field-full" id="unit" name="unit" [(ngModel)]="formData.unit" readonly
                    disabled>
                    <option value="">Pilih Unit</option>
                    <option value="U01">U01</option>
                </select>
            </div>

            <!-- Kumpulan -->
            <div class="mb-3">
                <label for="kumpulan" class="form-label">Kumpulan*</label>
                <select class="form-select field-short" id="kumpulan" name="kumpulan" [(ngModel)]="formData.kumpulan"
                    readonly disabled>
                    <option value="">Pilih Kumpulan</option>
                    <option value="01">G1</option>
                </select>
            </div>

            <!-- Tarikh -->
            <div class="mb-3">
                <label for="tarikh" class="form-label">Tarikh*</label>
                <input type="date" id="tarikh" class="form-control field-short" [(ngModel)]="formData.tarikh"
                    name="tarikh" readonly disabled />
            </div>

            <!-- Kaunter -->
            <div class="mb-3">
                <label for="kaunter" class="form-label">Kaunter*</label>
                <input type="text" id="kaunter" class="form-control field-kaunter" [(ngModel)]="formData.kaunter"
                    name="kaunter" readonly disabled />
            </div>

            <!-- Nama Pegawai* -->
            <div class="mb-3">
                <label for="nama" class="form-label">Nama Pegawai*</label>
                <input type="text" id="nama" class="form-control field-kaunter" [(ngModel)]="formData.nama" name="nama"
                    readonly disabled />
            </div>

            <!-- Nombor Perkhidmatan* -->
            <div class="mb-3">
                <label for="noPerkhidmatan" class="form-label">Nombor Perkhidmatan*</label>
                <input type="text" id="noPerkhidmatan" class="form-control field-med"
                    [(ngModel)]="formData.noPerkhidmatan" name="noPerkhidmatan" readonly disabled />
            </div>

            <!-- Tempoh Masa Paparan Jadual* -->
            <div class="mb-3 mt-4">
                <label class="form-label">Tempoh Masa Paparan Jadual*</label>
                <div class="d-flex align-items-center gap-3">
                    <div class="time-input-group">
                        <label for="masaMula" class="form-label-small">Masa Mula*</label>
                        <input type="time" id="masaMula" class="form-control field-time"
                            [(ngModel)]="formData.startTime" name="masaMula" readonly disabled />
                    </div>
                    <div class="time-input-group">
                        <label for="masaAkhir" class="form-label-small">Masa Akhir*</label>
                        <input type="time" id="masaAkhir" class="form-control field-time" [(ngModel)]="formData.endTime"
                            name="masaAkhir" readonly disabled />
                    </div>
                </div>
            </div>

            <!-- Gred Jawatan* -->
            <div class="mb-3">
                <label for="gredJawatan" class="form-label">Gred Jawatan*</label>
                <input type="text" id="gredJawatan" name="gredJawatan" class="form-control field-med"
                    placeholder="Masukkan Gred Jawatan" [(ngModel)]="formData.gredJawatan" readonly disabled />
            </div>

            <!-- Catatan* -->
            <div class="mb-3">
                <label for="catatan" class="form-label">Catatan*</label>
                <textarea id="catatan" class="form-control field-textarea" rows="3" name="catatan"
                    [(ngModel)]="formData.remarks" placeholder="Diberi kelulusan"></textarea>
            </div>

            <!-- Kelulusan -->
            <div class="mb-3">
                <label class="form-label">Kelulusan</label>
                <div class="d-flex gap-3">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="lulus" name="kelulusan" value="lulus"
                            [checked]="formData.kelulusan === 'Lulus'"
                            [disabled]="formData.originalStatus !== '0'"
                            (change)="onKelulusanChange('Lulus', $event)">
                        <label class="form-check-label" for="lulus">
                            Lulus
                        </label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="gagal" name="kelulusan" value="gagal"
                            [checked]="formData.kelulusan === 'Gagal'"
                            [disabled]="formData.originalStatus !== '0'"
                            (change)="onKelulusanChange('Gagal', $event)">
                        <label class="form-check-label" for="gagal">
                            Gagal
                        </label>
                    </div>
                </div>
            </div>

            <!-- Submit Button -->
            <div class="action-buttons">
                <button type="button" class="btn btn-dark action-btn" (click)="onHantar()">Hantar</button>
                <button type="button" class="btn btn-dark action-btn" (click)="onSimpan()">Simpan</button>
            </div>
        </form>
    </div>
    <app-modal-simpan [isSuccessModalVisible]="showModalSimpan"
        (modalClosed)="onModalSimpanClosed()"></app-modal-simpan>
    <app-modal-hantar [isSuccessModalVisible]="showModalHantar"
        (modalClosed)="onModalHantarClosed()"></app-modal-hantar>
</c-container>
