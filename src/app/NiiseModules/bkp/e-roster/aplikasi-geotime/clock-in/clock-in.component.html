<div class="container-fluid">
  <div class="form-section">
    <h5>Clock In</h5>

    <form class="mt-3">
      <div class="mb-2">
        <label>Nama Pegawai</label>
        <input
          type="text"
          class="form-control"
          [(ngModel)]="data.nama"
          name="nama"
          readonly
        />
      </div>

      <div class="mb-2">
        <label>Tarikh</label>
        <input
          type="text"
          class="form-control"
          [(ngModel)]="data.tarikh"
          name="nokp"
          readonly
        />
      </div>

      <div class="mb-2">
        <label>Masa</label>
        <input
          type="text"
          class="form-control"
          [(ngModel)]="data.masa"
          name="gredJawatan"
          readonly
        />
      </div>

      <div class="button-group">
        <button type="button" class="btn btn-dark" (click)="goToClockIn()">CLOCK IN</button>
      </div>
    </form>
  </div>
</div>
