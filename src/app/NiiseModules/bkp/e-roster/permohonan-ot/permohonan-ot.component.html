<div class="container-fluid">
  <div class="row">
    <div>
      <c-card class="page-content">
        <c-card>
          <c-card-header></c-card-header>
          <h5 class="card-title">Maklumat Permohonan OT</h5>
          <c-card-body>
            <form>
              <div class="horizontal-stepper">
                <ul class="stepper-list d-flex align-items-center justify-content-start flex-wrap">
                  <li class="stepper-item" *ngFor="let step of steps" [class.active]="isStepActive(step.number)">
                    <button type="button" class="step-btn">
                      <span class="step-number">{{ step.number }}</span>
                      <span class="step-title">{{ step.title }}</span>
                    </button>
                  </li>
                </ul>
              </div>
              <c-row>
                <c-col class="d-flex justify-content-center">
                  <div
                    style="border: 1px solid #ccc; border-radius: 6px; padding:60px 30px; text-align: center; height: 200px;">
                    <img src="" alt="Profile Image" class="img-fluid rounded shadow" />
                  </div>
                </c-col>
                <c-col></c-col>
              </c-row>

              <c-row class="mb-3">
                <c-col>
                  <label class="form-label">Nama Pengawai<span class="text-danger">*</span></label>
                  <input type="text" class="form-control greyed-input" [(ngModel)]="formData.name" name="name" placeholder="Masukkan nama penuh" disabled />
                </c-col>
                <c-col>
                  <label class="form-label">Bahagian<span class="text-danger">*</span></label>
                  <input type="text" class="form-control greyed-input" [(ngModel)]="formData.division" name="division" placeholder="Masukkan nama penuh" disabled />
                  <!-- <select class="form-select" [(ngModel)]="bahagian" name="bahagian" disabled>
                    <option value="" disabled selected>Sila Pilih</option>
                    <option value="BPOI">Bahagian Pengurusan Operasi Imigresen</option>
                  </select> -->
                </c-col>
              </c-row>

              <c-row class="mb-3">
                <c-col>
                  <label class="form-label">Nombor Kad Pengenalan<span class="text-danger">*</span></label>
                  <input type="text" class="form-control greyed-input" [(ngModel)]="formData.icNo" name="icNo" placeholder="Masukkan nombor Kad Pengenalan" disabled />
                </c-col>
                <c-col>
                  <label class="form-label">Unit<span class="text-danger">*</span></label>
                  <input type="text" class="form-control greyed-input" [(ngModel)]="formData.unit" name="unit" disabled />
                  <!-- <select class="form-select" [(ngModel)]="unit" name="unit" disabled>
                    <option value="" disabled selected>Sila Pilih</option>
                    <option value="BPOI">Unit Pemeriksaan Laluan masuk</option>
                  </select> -->
                </c-col>
              </c-row>

              <c-row class="mb-3">
                <c-col>
                  <label class="form-label">Gred Jawatan<span class="text-danger">*</span></label>
                  <input type="text" class="form-control greyed-input" [(ngModel)]="formData.gred" name="gred" disabled />
                </c-col>
                <c-col>
                  <label class="form-label">Kumpulan<span class="text-danger">*</span></label>
                  <input type="text" class="form-control greyed-input" [(ngModel)]="formData.groupRSTR" name="group"  disabled />
                  <!-- <select class="form-select" [(ngModel)]="kumpulan" name="kumpulan" disabled>
                    <option value="" disabled selected>Sila Pilih</option>
                    <option value="1">1</option>
                  </select> -->
                </c-col>
              </c-row>

              <c-row class="mb-3">
                <c-col>
                  <label class="form-label">Tarikh<span class="text-danger">*</span></label>
                  <input type="date" class="form-control" [(ngModel)]="formOTData.otDate" name="tarikh" />
                </c-col>
                <c-col></c-col>
              </c-row>

              <c-row class="mb-3">
                <c-col>
                  <label class="form-label">Masa Mula OT<span class="text-danger">*</span></label>
                  <input type="time" class="form-control" [(ngModel)]="formOTData.startTime" name="masaMula" />
                </c-col>
                <c-col>
                  <label class="form-label">Masa Akhir OT<span class="text-danger">*</span></label>
                  <input type="time" class="form-control" [(ngModel)]="formOTData.endTime" name="masaAkhir" />
                </c-col>
              </c-row>

              <c-row class="mb-3">
                <c-col>
                  <label class="form-label">Kumpulan Syif untuk OT<span class="text-danger">*</span></label>
                  <select class="form-select" [(ngModel)]="syif" name="syif">
                    <option value="" disabled selected>Sila Pilih</option>
                    <option value="A">A</option>
                    <option value="B">B</option>
                    <option value="C">C</option>
                    <option value="D">D</option>
                  </select>
                </c-col>
              </c-row>

              <c-row class="mb-3">
                <c-col>
                  <label class="form-label">Alasan (Freetext)<span class="text-danger">*</span></label>
                  <input type="text" class="form-control" [(ngModel)]="formOTData.reason" name="alasan" />
                </c-col>
              </c-row>

              <c-row class="mb-3">
                <c-col>
                  <label class="form-label">Digital Sign<span class="text-danger">*</span></label>
                  <textarea class="form-control" [(ngModel)]="digitalSign" name="digitalSign"></textarea>
                </c-col>
                <c-col></c-col>
              </c-row>
            </form>
          </c-card-body>
        </c-card>

       
      </c-card>
    </div>
     <c-col class="action-footer  d-flex justify-content-end">
          <button class="btn btn-reset btn-dark m-2" (click)="setsemula()">Set Semula</button>
          <button class="btn btn-reset btn-dark m-2" (click)="hantarOT()">Hantar</button>
          <button class="btn btn-back btn-dark m-2" (click)="SimpanOT()">Simpan</button>
        </c-col>
  </div>
</div>

<!-- Modal -->
<app-modal-sucess-send-save
  [Hantarmodel]="HantarModalsave"
  (close)="closeModal()">
</app-modal-sucess-send-save>
<app-modal-sucess-send 
[Hantarmodel]="HantarModalsend"
  (close)="closeModal()">
</app-modal-sucess-send>
