<div class="container-fluid">
    <c-card>
        <c-card-body>

        </c-card-body>
    </c-card>
    <!-- Main Row -->
    <div class="row">
        <!-- Left Column: Main Form (9 columns) -->
        <div >
            <c-card>
                <c-card-body class="page-content">
                    <h5 class="card-title">Maklumat Kebenaran Keluar Awal</h5>
                     <div class="horizontal-stepper">
                        <ul class="stepper-list d-flex align-items-center justify-content-start flex-wrap">
                            <li class="stepper-item" *ngFor="let step of steps" [class.active]="isStepActive(step.number)">
                                <button type="button" class="step-btn">
                                    <span class="step-number">{{ step.number }}</span>
                                    <span class="step-title">{{ step.title }}</span>
                                </button>
                            </li>
                        </ul>
                    </div>
                    <form>
                        <!-- Image -->
                        <c-row class="mb-3">
                            <c-col class="d-flex justify-content-center">
                                <div
                                    style="border: 1px solid #ccc; border-radius: 6px; padding: 60px 30px; text-align: center; height: 200px;">
                                    <img src="" alt="Profile Image" class="img-fluid rounded shadow" />
                                </div>
                            </c-col>
                            <c-col></c-col>
                        </c-row>

                        <!-- Nama & Bahagian -->
                        <c-row class="mb-3">
                            <c-col>
                                <label class="form-label">Nama Pegawai<span class="text-danger">*</span></label>
                                <input type="text" class="form-control" [(ngModel)]="nama" name="nama"
                                    placeholder="Masukkan nama penuh" />
                            </c-col>
                            <c-col>
                                <label class="form-label">Bahagian<span class="text-danger">*</span></label>
                                <select class="form-select" [(ngModel)]="bahagian" name="bahagian">
                                    <option value="" disabled selected>Sila Pilih</option>
                                    <option value="BPOI">Bahagian Pengurusan Operasi Imigresen</option>
                                </select>
                            </c-col>
                        </c-row>

                        <!-- IC & Unit -->
                        <c-row class="mb-3">
                            <c-col>
                                <label class="form-label">Nombor Kad Pengenalan<span
                                        class="text-danger">*</span></label>
                                <input type="text" class="form-control" [(ngModel)]="ic" name="ic"
                                    placeholder="Masukkan nombor Kad Pengenalan" />
                            </c-col>
                            <c-col>
                                <label class="form-label">Unit<span class="text-danger">*</span></label>
                                <select class="form-select" [(ngModel)]="unit" name="unit">
                                    <option value="" disabled selected>Sila Pilih</option>
                                    <option value="UPLM">Unit Pemeriksaan Laluan Masuk</option>
                                </select>
                            </c-col>
                        </c-row>

                        <!-- Gred & Kumpulan -->
                        <c-row class="mb-3">
                            <c-col>
                                <label class="form-label">Gred Jawatan<span class="text-danger">*</span></label>
                                <input type="text" class="form-control" [(ngModel)]="gred" name="gred"
                                    placeholder="Masukkan gred jawatan" />
                            </c-col>
                            <c-col>
                                <label class="form-label">Kumpulan<span class="text-danger">*</span></label>
                                <select class="form-select" [(ngModel)]="kumpulan" name="kumpulan">
                                    <option value="" disabled selected>Sila Pilih</option>
                                    <option value="1">1</option>
                                </select>
                            </c-col>
                        </c-row>

                        <c-row class="mb-3">
                            <c-row>
                                <label class="form-label">Catatan<span class="text-danger">*</span></label>
                                <input type="time" class="form-control" [(ngModel)]="catatan" name="catatan" />
                            </c-row>
                            <c-row>
                                <label>Dokumen Pengesahan</label>
                                <div class="d-flex">
                                    <button class="btn btn-reset btn-dark m-2" (click)="null">+ Muat Naik</button>
                                </div>
                            </c-row>
                        </c-row>
                    </form>
                </c-card-body>
            </c-card>
        </div>

        <!-- Right Column: Breadcrumb (3 columns) with vertical separator -->
        <!-- <div class="col-md-3 ps-0" style="border-left: 2px solid #ccc;">
            <div class="card h-100 shadow-sm border-0 bg-white rounded-0">
                <div class="card-body">
                    <app-breadcrumb-Tanpakebenaran [activeStep]="1"></app-breadcrumb-Tanpakebenaran>
                </div>
            </div>
        </div> -->
    </div>

    <!-- Horizontal Separator & Button Row -->
    <div class="action-footer justify-content-end">
        <button class="btn btn-reset btn-dark m-2" (click)="showHantarModalsend()">Hantar</button>
        <button class="btn btn-back btn-dark m-2" (click)="showHantarModal()">Simpan</button>
    </div>
</div>

<!-- Modals -->
<app-modal-sucess-send-save [Hantarmodel]="HantarModalsave" (close)="closeModal()"></app-modal-sucess-send-save>
<app-modal-sucess-send [Hantarmodel]="HantarModalsend" (close)="closeModal()"></app-modal-sucess-send>
