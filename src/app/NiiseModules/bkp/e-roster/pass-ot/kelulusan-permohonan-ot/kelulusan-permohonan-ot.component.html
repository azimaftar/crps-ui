<div class="container-fluid">
    <c-card>
        <c-card-body>

        </c-card-body>
    </c-card>
    <!-- Main Row -->
    <div class="row">
        <!-- Left Column: Main Form (9 columns) -->
        <div class="page-content">
            <c-card>
                <c-card-body>
                    <h5 class="card-title">Maklumat Permohonan OT</h5>
                    <div class="horizontal-stepper">
                        <ul class="stepper-list d-flex align-items-center justify-content-start flex-wrap">
                            <li class="stepper-item" *ngFor="let step of steps" [class.active]="isStepActive(step.number)">
                                <button type="button" class="step-btn">
                                    <span class="step-number">{{ step.number }}</span>
                                    <span class="step-title">{{ step.title }}</span>
                                </button>
                            </li>
                        </ul>
                    </div>
                    <form>
                        <!-- Image -->
                        <c-row class="mb-3">
                            <c-col class="d-flex justify-content-center">
                                <div
                                    style="border: 1px solid #ccc; border-radius: 6px; padding: 60px 30px; text-align: center; height: 200px;">
                                    <img src="" alt="Profile Image" class="img-fluid rounded shadow" />
                                </div>
                            </c-col>
                            <c-col></c-col>
                        </c-row>

                        <!-- Nama & Bahagian -->
                        <c-row class="mb-3">
                            <c-col>
                                <label class="form-label">Nama Pegawai<span class="text-danger">*</span></label>
                                <!-- <input type="text" class="form-control" [(ngModel)]="formData.nama" name="nama"
                                    placeholder="Masukkan nama penuh" disabled/> -->
                            </c-col>
                            <c-col>
                                <label class="form-label">Bahagian<span class="text-danger">*</span></label>
                                <!-- <input type="text" class="form-control" [(ngModel)]="formData.bahagian" name="nama" placeholder="Masukkan nama penuh" disabled/> -->
                                <!-- <select class="form-select" [(ngModel)]="bahagian" name="bahagian">
                                    <option value="" disabled selected>Sila Pilih</option>
                                    <option value="BPOI">Bahagian Pengurusan Operasi Imigresen</option>
                                </select> -->
                            </c-col>
                        </c-row>

                        <!-- IC & Unit -->
                        <c-row class="mb-3">
                            <c-col>
                                <label class="form-label">Nombor Kad Pengenalan<span
                                        class="text-danger">*</span></label>
                                <!-- <input type="text" class="form-control" [(ngModel)]="formData.ic" name="ic"
                                    placeholder="Masukkan nombor Kad Pengenalan" /> -->
                            </c-col>
                            <c-col>
                                <label class="form-label">Unit<span class="text-danger">*</span></label>
                                <!-- <select class="form-select" [(ngModel)]="formData.unit" name="unit">
                                    <option value="" disabled selected>Sila Pilih</option>
                                    <option value="UPLM">Unit Pemeriksaan Laluan Masuk</option>
                                </select> -->
                            </c-col>
                        </c-row>

                        <!-- Gred & Kumpulan -->
                        <c-row class="mb-3">
                            <c-col>
                                <label class="form-label">Gred Jawatan<span class="text-danger">*</span></label>
                                <!-- <input type="text" class="form-control" [(ngModel)]="formData.gred" name="gred"
                                    placeholder="Masukkan gred jawatan" /> -->
                            </c-col>
                            <c-col>
                                <label class="form-label">Kumpulan<span class="text-danger">*</span></label>
                                <select class="form-select" [(ngModel)]="kumpulan" name="kumpulan">
                                    <option value="" disabled selected>Sila Pilih</option>
                                    <option value="1">1</option>
                                </select>
                            </c-col>
                        </c-row>

                        <!-- Tarikh -->
                        <c-row class="mb-3">
                            <c-col>
                                <label class="form-label">Tarikh<span class="text-danger">*</span></label>
                                <input type="date" class="form-control" [(ngModel)]="tarikh" name="tarikh" />
                            </c-col>
                            <c-col></c-col>
                        </c-row>

                        <!-- Masa Mula & Masa Akhir -->
                        <c-row class="mb-3">
                            <c-col>
                                <label class="form-label">Masa Mula OT<span class="text-danger">*</span></label>
                                <input type="time" class="form-control" [(ngModel)]="masaMula" name="masaMula" />
                            </c-col>
                            <c-col>
                                <label class="form-label">Masa Akhir OT<span class="text-danger">*</span></label>
                                <input type="time" class="form-control" [(ngModel)]="masaAkhir" name="masaAkhir" />
                            </c-col>
                        </c-row>

                        <!-- Kumpulan Syif -->
                        <c-row class="mb-3">
                            <c-col>
                                <label class="form-label">Kumpulan Syif untuk OT<span
                                        class="text-danger">*</span></label>
                                <select class="form-select" [(ngModel)]="syif" name="syif">
                                    <option value="" disabled selected>Sila Pilih</option>
                                    <option value="A">A</option>
                                    <option value="B">B</option>
                                    <option value="C">C</option>
                                    <option value="D">D</option>
                                </select>
                            </c-col>
                        </c-row>

                        <!-- Alasan -->
                        <c-row class="mb-3">
                            <c-col>
                                <label class="form-label">Alasan (Freetext)<span class="text-danger">*</span></label>
                                <input type="text" class="form-control" [(ngModel)]="alasan" name="alasan" />
                            </c-col>
                        </c-row>

                        <!-- Digital Sign -->
                        <c-row class="mb-3">
                            <c-col>
                                <label class="form-label">Digital Sign<span class="text-danger">*</span></label>
                                <textarea class="form-control" [(ngModel)]="digitalSign" name="digitalSign"></textarea>
                            </c-col>
                            <c-col></c-col>
                        </c-row>

                        <!-- Approval Checkboxes -->
                        <c-row>
                            <c-col class="col-2">
                                <input type="radio" class="form-check-input" name="kelulusan" [(ngModel)]="kelulusan"
                                    value="lulus" />
                                Lulus
                            </c-col>
                            <c-col class="col-3">
                                <input type="radio" class="form-check-input" name="kelulusan" [(ngModel)]="kelulusan"
                                    value="tidakLulus" />
                                Tidak Lulus
                            </c-col>
                        </c-row>

                    </form>
                </c-card-body>
            </c-card>
        </div>

        <!-- Right Column: Breadcrumb (3 columns) with vertical separator -->
        <!-- <div class="col-md-3 ps-0" style="border-left: 2px solid #ccc;">
            <div class="card h-100 shadow-sm border-0 bg-white rounded-0">
                <div class="card-body">
                    <app-breadcrumb-KPOT [activeStep]="1"></app-breadcrumb-KPOT>
                </div>
            </div>
        </div> -->
    </div>

    <!-- Horizontal Separator & Button Row -->
            <div class="action-footer">
                <div class="nav-buttons">
                    <button class="btn btn-reset btn-dark m-2" (click)="showHantarModalsend()">Hantar</button>
                    <button class="btn btn-back btn-dark m-2" (click)="showHantarModal()">Simpan</button>
                </div>
            </div>
</div>

<!-- Modals -->
<app-modal-sucess-send-save [Hantarmodel]="HantarModalsave" (close)="closeModal()"></app-modal-sucess-send-save>
<app-modal-sucess-send [Hantarmodel]="HantarModalsend" (close)="closeModal()"></app-modal-sucess-send>
