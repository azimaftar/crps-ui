<c-card class="mb-3">
  <c-card-body>
    <c-row>
      <c-col md="9">
        <h5 class="mb-4">
          {{ categoryTitles[confirmedCategory] || 'Kategori Carian' }}
        </h5>

        <div class="form-group col-6 d-flex align-items-end">
          <div class="flex-grow-1">
            <label for="category">Kategori Carian</label>
            <select id="category" class="form-select" [(ngModel)]="selectedCategory">
              <option value="" disabled hidden>Silih Pilih</option>
              <option *ngFor="let category of categories" [value]="category">
                {{ category }}
              </option>
            </select>
          </div>
          <button
            cButton
            color="primary"
            class="btn-search ms-3 me-3"
            (click)="onSearch()">
            Teruskan
          </button>
        </div>
      </c-col>

      <!-- Stepper Column -->
      <c-col md="3" class="px-4 py-3 mt-3 stepper-container">
        <ul class="stepper-list">
          <li
            class="stepper-item"
            *ngFor="let step of steps; let i = index"
            [class.active]="isStepActive(step.number)">
            <div class="stepper-content">

              <!-- Clickable Step (Only for step number 1) -->
              <ng-container *ngIf="step.number === 1; else nonClickableStep">
                <span (click)="navigateToStep1()" class="step-number step-link" [class.active]="isStepActive(step.number)">
                  {{ step.number }}
                </span>
                <span (click)="navigateToStep1()" class="step-title step-link" [class.active]="isStepActive(step.number)">
                  {{ step.title }}
                </span>
              </ng-container>

              <!-- Non-clickable Step -->
              <ng-template #nonClickableStep>
                <span class="step-number" [class.active]="isStepActive(step.number)">
                  {{ step.number }}
                </span>
                <span class="step-title" [class.active]="isStepActive(step.number)">
                  {{ step.title }}
                </span>
              </ng-template>

            </div>

            <!-- Add line only if not the last step -->
            <div *ngIf="i < steps.length - 1" class="stepper-line"></div>
          </li>
        </ul>
      </c-col>
    </c-row>
  </c-card-body>
</c-card>

<!-- Modal -->
<c-modal 
  [visible]="modalVisible" 
  (visibleChange)="modalVisible = $event"
  backdrop="static"
  keyboard="false">

  <c-modal-body class="text-center">
    <div class="mb-3">
      <svg width="64" height="48" viewBox="0 0 64 48" fill="none">
        <rect x="8" y="8" width="48" height="32" stroke="#6c757d" stroke-width="2" fill="none"/>
        <line x1="16" y1="16" x2="48" y2="32" stroke="#6c757d" stroke-width="2"/>
        <line x1="48" y1="16" x2="16" y2="32" stroke="#6c757d" stroke-width="2"/>
      </svg>
    </div>
    <p>{{ modalMessage }}</p>
  </c-modal-body>

  <c-modal-footer>
    <button
      type="button"
      cButton
      color="dark"
      (click)="onModalOk()"
      class="px-4 mx-auto d-block w-50">
      OK
    </button>
  </c-modal-footer>
</c-modal>

<router-outlet class="mt-4"></router-outlet>
