<div class="horizontal-stepper">
    <ul class="stepper-list d-flex align-items-center justify-content-start flex-wrap">
    <li
        class="stepper-item"
        *ngFor="let step of steps; let i = index" 
        [class.active]="currentStep === step.number" 
        (click)="navigateToStep(i)">
        <button type="button" class="step-btn" [class.disabled]="step.isAccessible === false">
        <span class="step-number">{{ step.number }}</span>
        <span class="step-title">{{ step.title }}</span>
        </button>
    </li>
    </ul>
</div>

<c-card class="mb-3">
    <c-card-body>
        <form (ngSubmit)="onSubmit($event)">
            <c-col md="9">
                <div style="margin-bottom: 2rem;">
                    <h4 class="fw-semibold" style="margin-bottom: 1.5rem;">Maklumat Pemohon</h4>

                    <div class="mb-3">
                        <label class="form-label fw-semibold" for="kategoriPermohonan">
                            Kategori Permohonan
                        </label>
                        <input class="form-control" id="kategoriPermohonan" name="kategoriPermohonan" type="text" 
                            style="width: 50%;" [(ngModel)]="formData.applCat" disabled>
                    </div>

                    <c-row class="mb-3">
                        <c-col md="6">
                            <label class="form-label fw-semibold" for="pejabatNegeri">
                                Pejabat Negeri
                            </label>
                            <input class="form-control" id="pejabatNegeri" name="pejabatNegeri" type="text" 
                                style="width: 50%;" [(ngModel)]="formData.officeState" disabled>
                        </c-col>
                        <c-col md="6" *ngIf="formData.applCat == 'Pengesahan Pas'">
                            <label class="form-label fw-semibold" for="bahagian">
                                Bahagian
                            </label>
                            <input class="form-control" id="bahagian" name="bahagian" type="text" style="width: 50%;" [(ngModel)]="formData.bahagian" disabled>
                        </c-col>
                    </c-row>
                </div>

                <div *ngIf="formData.applCat">

                    <div style="margin-top: 2.5rem; margin-bottom: 2rem;">
                        <h4 class="fw-semibold" style="margin-bottom: 1.5rem;">Maklumat Surat</h4>
                        
                        <div class="mb-3">
                            <label class="form-label fw-semibold" for="noRujukan">
                                No. Rujukan
                            </label>
                            <input class="form-control" id="noRujukan" name="noRujukan" type="text" style="width: 50%;" [(ngModel)]="formData.refNo" disabled>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold" for="tarikhSurat">
                                Tarikh Surat
                            </label>
                            <input class="form-control" id="tarikhSurat" name="tarikhSurat" type="date" style="width: 40%;" [(ngModel)]="formData.letterDate" disabled>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold" for="namaPegawai">
                                Nama Pegawai Pemohon
                            </label>
                            <input class="form-control" id="namaPegawai" name="namaPegawai" type="text" style="width: 80%;" [(ngModel)]="formData.officerName" disabled>
                        </div>

                        <c-row class="mb-3">
                            <c-col md="6">
                                <label class="form-label fw-semibold">Alamat</label>
                                <input class="form-control mb-2" type="text" disabled [(ngModel)]="formData.address[0]" name="alamat0">
                                <input class="form-control mb-2" type="text" disabled [(ngModel)]="formData.address[1]" name="alamat1">
                                <input class="form-control" type="text" disabled [(ngModel)]="formData.address[2]" name="alamat2">
                            </c-col>
                            <c-col md="6">
                                <div class="mb-3">
                                    <label class="form-label fw-semibold" for="poskod">
                                        Poskod
                                    </label>
                                    <input class="form-control" id="poskod" name="poskod" type="text" style="width: 80%;" [(ngModel)]="formData.poskod" disabled>
                                </div>
                                <div>
                                    <label class="form-label fw-semibold" for="bandar">
                                        Bandar
                                    </label>
                                    <input class="form-control" id="bandar" name="bandar" type="text" style="width: 50%;" [(ngModel)]="formData.bandar" disabled>
                                </div>
                            </c-col>
                        </c-row>

                        <div class="mb-3">
                            <label class="form-label fw-semibold" for="emel">E-Mel</label>
                            <input class="form-control" id="emel" name="emel" type="email" style="width: 60%;" [(ngModel)]="formData.emel" disabled>
                        </div>
                    </div>

                    <div *ngIf="formData.applCat == 'Pengesahan Pergerakan'">
                        <div class="mb-3">
                            <label class="form-label fw-semibold" for="tujuanPermohonan">Tujuan Permohonan</label>
                            <textarea class="form-control" id="tujuanPermohonan" name="tujuanPermohonan" style="width: 85%;" [(ngModel)]="formData.applPurpose" disabled>
                            </textarea>
                        </div>
                    </div>

                    <div *ngIf="formData.applCat === 'Pengesahan Cap Keselamatan'" style="margin-top: 2.5rem; margin-bottom: 2rem;">
                        <h4 class="fw-semibold" style="margin-bottom: 1.5rem;">Butiran Maklumat Cap Keselamatan</h4>
                        <c-row class="mb-3">
                            <c-col md="6">
                                <label class="form-label fw-semibold" for="nomborCapKeselamatan">
                                    Nombor Cap Keselamatan
                                </label>
                                <input class="form-control" id="nomborCapKeselamatan" name="nomborCapKeselamatan" type="text" [(ngModel)]="formData.stampNo" disabled>
                            </c-col>
                            <c-col md="6">
                                <label class="form-label fw-semibold" for="nomborDokumenPerjalanan">
                                    Nombor Dokumen Perjalanan
                                </label>
                                <input class="form-control" id="nomborDokumenPerjalanan" name="nomborDokumenPerjalanan" type="text" [(ngModel)]="formData.docNo" disabled>
                            </c-col>
                        </c-row>
                    </div>

                    <div *ngIf="formData.applCat == 'Pengesahan Pas' || formData.applCat == 'Pengesahan Senarai Syak'" style="margin-top: 2.5rem; margin-bottom: 2rem;">
                        <h5 class="fw-semibold" style="margin-bottom: 1.5rem;">Maklumat Orang Yang Dikehendaki</h5>
                        
                        <div class="mb-3">
                            <label class="form-label fw-semibold" for="nama">Nama</label>
                            <input class="form-control" id="nama" name="nama" type="text" style="width: 70%;" [(ngModel)]="formData.name" disabled>
                        </div>

                        <c-row class="mb-3">
                            <c-col md="6">
                                <label class="form-label fw-semibold" for="noKadPengenalan">
                                    No. Kad Pengenalan
                                </label>
                                <input class="form-control" id="noKadPengenalan" name="noKadPengenalan" type="text" [(ngModel)]="formData.kpNo" disabled>
                            </c-col>
                            <c-col md="6">
                                <label class="form-label fw-semibold" for="warganegara">
                                    Warganegara
                                </label>
                                <input class="form-control" id="warganegara" name="warganegara" type="text" style="width: 50%;" [(ngModel)]="formData.citizenship" disabled>
                            </c-col>
                        </c-row>
                    </div>

                    <div *ngIf="formData.applCat === 'Pengesahan Pas'" style="margin-top: 2.5rem; margin-bottom: 2rem;">
                        <div class="mb-3">
                            <label class="form-label fw-semibold" for="nomborDokumen">
                                Nombor Dokumen
                            </label>
                            <input class="form-control" id="nomborDokumen" name="nomborDokumen" type="text" style="width: 60%;" [(ngModel)]="formData.docNo" disabled>
                        </div>
                        <c-row class="mb-3">
                            <c-col md="6">
                                <label class="form-label fw-semibold" for="jenisPas">
                                    Jenis Pas
                                </label>
                                <input class="form-control" id="jenisPas" name="jenisPas" type="text" style="width: 50%;" [(ngModel)]="formData.pasType" disabled>
                            </c-col>
                        </c-row>
                    </div>
                </div>

                <div *ngIf="(formData.applCat === 'Pengesahan Pergerakan')" style="margin-top: 2.5rem; margin-bottom: 2rem;">
                    <h4 class="fw-semibold" style="margin-bottom: 1.5rem;">Maklumat Pergerakan</h4>
                    
                    <div class="mb-3">
                        <label class="form-label fw-semibold" for="tempohMaklumatPergerakan">
                            Tempoh Maklumat Pergerakan
                        </label>
                        <input class="form-control" id="tempohMaklumatPergerakan" name="tempohMaklumatPergerakan" type="text" style="width: 60%;" 
                            [(ngModel)]="formData.tempohMaklumatPergerakan" disabled>
                    </div>

                    <c-row class="mb-3">
                        <c-col md="6">
                            <label class="form-label fw-semibold" for="tarikhMulaPergerakan">
                                Tarikh Mula Pergerakan
                            </label>
                            <input class="form-control" id="tarikhMulaPergerakan" name="tarikhMulaPergerakan" type="date" [(ngModel)]="formData.moveStartDt" disabled>
                        </c-col>
                        <c-col md="6">
                            <label class="form-label fw-semibold" for="tarikhAkhirPergerakan">
                                Tarikh Akhir Pergerakan
                            </label>
                            <input class="form-control" id="tarikhAkhirPergerakan" name="tarikhAkhirPergerakan" type="date" [(ngModel)]="formData.moveEndDt" disabled>
                        </c-col>
                    </c-row>

                    <div class="mb-3">
                        <label class="form-label fw-semibold" for="maklumatPergerakanTerakhir">
                            Maklumat Pergerakan Terakhir
                        </label>
                        <input class="form-control" id="maklumatPergerakanTerakhir" name="maklumatPergerakanTerakhir" type="text" style="width: 80%;" 
                            [(ngModel)]="formData.maklumatPergerakanTerakhir" disabled>
                    </div>

                    <h5 class="fw-semibold" style="margin-top: 2rem; margin-bottom: 1rem;">Maklumat Orang Yang Dikehendaki</h5>
                    
                    <div class="mb-3">
                        <label class="form-label fw-semibold" for="nama2">Nama</label>
                        <input class="form-control" id="nama2" name="nama2" type="text" style="width: 70%;" [(ngModel)]="formData.name" disabled>
                    </div>

                    <c-row class="mb-3">
                        <c-col md="6">
                            <label class="form-label fw-semibold" for="noKadPengenalan2">
                                No. Kad Pengenalan
                            </label>
                            <input class="form-control" id="noKadPengenalan2" name="noKadPengenalan2" type="text" [(ngModel)]="formData.kpNo" disabled>
                        </c-col>
                        <c-col md="6">
                            <label class="form-label fw-semibold" for="warganegara2">
                                Warganegara
                            </label>
                            <input class="form-control" id="warganegara2" name="warganegara2" type="text" style="width: 50%;" [(ngModel)]="formData.citizenship" disabled>
                        </c-col>
                    </c-row>
                </div>

                <div style="margin-top: 2.5rem; margin-bottom: 2rem;">
                    <h4 class="fw-semibold" style="margin-bottom: 1.5rem;">Dokumen Sokongan</h4>

                    <div class="table-responsive">
                        <table cTable hover class="table align-middle">
                            <thead>
                                <tr>
                                    <th>Bil.</th>
                                    <th>Keterangan</th>
                                    <th>Nama Dokumen</th>
                                    <th>Format</th>
                                    <th>Tindakan</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr *ngFor="let doc of documents; let i = index">
                                    <td>{{ i + 1 }}</td>
                                    <td>{{ doc.keterangan }}</td>
                                    <td>
                                        <span *ngIf="doc.fileName" class="text-dark fw-semibold">
                                            {{ doc.fileName }}
                                        </span>
                                    </td>
                                    <td>
                                        <span *ngIf="doc.format" class="badge text-bg-secondary">
                                            {{ doc.format }}
                                        </span>
                                    </td>
                                    <td>
                                        <button type="button" cButton color="primary" *ngIf="doc.fileName" (click)="paparFail(i)">
                                            Papar
                                        </button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </c-col>

            <c-row class="mt-4 mb-3">
                <c-col class="d-flex justify-content-end align-items-center gap-2">
                    <div class="d-flex gap-2 ms-4">
                        <button cButton type="button" [disabled]="!disableGoBack()" 
                                color="primary" class="text-white px-3 nav-btn" (click)="goBack()">
                            &lt;
                        </button>
                        <button cButton type="button" [disabled]="disableGoNext()" 
                                color="primary" class="text-white px-3 nav-btn" (click)="goNext()">
                            &gt;
                        </button>
                    </div>
                </c-col>
            </c-row>
        </form>
    </c-card-body>
</c-card>
