<div class="horizontal-stepper">
    <ul class="stepper-list d-flex align-items-center justify-content-start flex-wrap">
    <li
        class="stepper-item"
        *ngFor="let step of steps; let i = index" 
        [class.active]="currentStep === step.number" 
        (click)="navigateToStep(i)">
        <button type="button" class="step-btn" [class.disabled]="step.isAccessible === false">
        <span class="step-number">{{ step.number }}</span>
        <span class="step-title">{{ step.title }}</span>
        </button>
    </li>
    </ul>
</div>

<c-card class="mb-3">
    <c-card-body>
        <form (ngSubmit)="onSubmit($event)">
            <c-col md="9">
                <div>
                    <h4 class="mb-4 fw-semibold">Carian Permohonan</h4>

                    <c-row class="mb-3 align-items-end">
                        <c-col md="8" class="d-flex align-items-end" >
                            <div class="me-2 flex-grow-1"  style="width:40%;">
                                <label class="form-label fw-semibold" for="nomborRujukanPermohonan">
                                    Nombor Rujukan Permohonan<span style="color: red;">*</span>
                                </label>
                                <input class="form-control" id="nomborRujukanPermohonan" name="nomborRujukanPermohonan" 
                                    type="text" placeholder="Contoh: A123456, B123456, C123456, D123456" [(ngModel)]="refNo" required>
                            </div>
                            <button cButton type="button" (click)="onSearch()" color="primary"  
                                    style="width:20%;" class="text-white px-3 nav-btn">
                                Cari
                            </button>
                        </c-col>
                    </c-row>

                </div>
            <div  class="mt-5" *ngIf="!showNoResults">
                <h5 class="mb-4 fw-semibold">Senarai Permohonan</h5>

                <div class="table-responsive" style="margin-top: 10px;">
                    <table class="table mb-5">
                        <thead>
                            <tr>
                                <th scope="col">No Rujukan</th>
                                <th scope="col">Kategori Permohonan</th>
                                <th scope="col">Tarikh Surat</th>
                                <th scope="col">Status</th>
                                <th scope="col" class="text-nowrap">Tindakan</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr *ngIf="!resultNull()">
                                <td data-label="noRujukan">{{ result.refNo }}</td>
                                <td data-label="nama">{{ result.applCat }}</td>
                                <td data-label="warganegara">{{ result.letterDate }}</td>

                                <td data-label="Status">
                                    <span class="badge" [ngClass]="status === 'aktif' ? 'bg-success' : 'bg-secondary'">
                                        {{ status }}
                                    </span>
                                </td>
                                <td data-label="Tindakan">
                                    <div class="d-flex flex-wrap gap-2">
                                        <button class="btn btn-sm btn-outline-primary" size="sm"
                                                title="Papar butiran lengkap" (click)="paparDetails()">
                                            <i class="fas fa-eye me-1"></i>
                                            Papar
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div *ngIf="showNoResults" class="alert alert-info">
                    Tiada rekod dijumpai berdasarkan kriteria carian.
                </div>
            </div>
            </c-col>
        </form>
    </c-card-body>
</c-card>

<app-shared-modal
  [visible]="modalVisible"
  [message]="modalMessage"
  [mode]="modalMode" 
  (confirm)="handleConfirmSubmit()"
  (cancel)="handleCancelModal()">
</app-shared-modal>
