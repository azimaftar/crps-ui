<div class="container-fluid">
    <!-- Tab Navigation -->
    <ul class="nav nav-tabs" id="myTab" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link" [class.active]="activeTab === 1" (click)="setActiveTab(1)" role="tab">
                Maklumat Peribadi Subjek
            </button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" [class.active]="activeTab === 2" (click)="setActiveTab(2)" role="tab">
                Kastam
            </button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" [class.active]="activeTab === 3" (click)="setActiveTab(3)" role="tab">
                LHDN
            </button>
        </li>
    </ul>

    <!-- Tab Content -->
    <div class="tab-content" id="myTabContent">
        <div class="row g-0">
            <div class="col-md-9">
                <div class="form-section h-100">
                    <h2 class="section-title">Maklumat Peribadi Subjek</h2>
                    <form>
                        <!-- Basic Personal Information -->
                        <div class="row mb-3">
                            <div class="col-md-12">
                                <label class="form-label required">Nama*</label>
                                <input type="text" class="form-control" [(ngModel)]="nama" name="nama"
                                    placeholder="Masukkan nama penuh">
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label class="form-label required">No. Kad Pengenalan*</label>
                                <input type="text" class="form-control" [(ngModel)]="noKadPengenalan"
                                    name="noKadPengenalan" placeholder="Contoh: 123456789012">
                            </div>
                            <div class="col-md-2"></div>
                            <div class="col-md-6">
                                <label class="form-label required">Jenis Pengenalan*</label>
                                <select class="form-select" [(ngModel)]="jenisPengenalan" name="jenisPengenalan">
                                    <option value="ic">Kad Pengenalan Malaysia</option>
                                    <option value="passport">Pasport</option>
                                    <option value="police_id">Kad Pengenalan Polis</option>
                                    <option value="military_id">Kad Pengenalan Tentera</option>
                                </select>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label class="form-label">No. Dokumen</label>
                                <input type="text" class="form-control" [(ngModel)]="noDokumen" name="noDokumen"
                                    placeholder="Masukkan nombor dokumen">
                            </div>
                            <div class="col-md-2"></div>
                            <div class="col-md-6">
                                <label class="form-label">Jenis Dokumen</label>
                                <select class="form-select" [(ngModel)]="jenisDokumen" name="jenisDokumen">
                                    <option value="passport_malaysia">Pasport Malaysia - Semenanjung</option>
                                    <option value="passport_sabah">Pasport Malaysia - Sabah</option>
                                    <option value="passport_sarawak">Pasport Malaysia - Sarawak</option>
                                    <option value="travel_document">Dokumen Perjalanan</option>
                                </select>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-5">
                                <label class="form-label required">Warganegara*</label>
                                <select class="form-select" [(ngModel)]="warganegara" name="warganegara">
                                    <option value="malaysia">Malaysia</option>
                                    <option value="singapore">Singapura</option>
                                    <option value="indonesia">Indonesia</option>
                                    <option value="thailand">Thailand</option>
                                    <option value="other">Lain-lain</option>
                                </select>
                            </div>
                            <div class="col-md-1"></div>
                            <div class="col-md-3">
                                <label class="form-label">Bangsa</label>
                                <select class="form-select" [(ngModel)]="bangsa" name="bangsa">
                                    <option value="melayu">Melayu</option>
                                    <option value="cina">Cina</option>
                                    <option value="india">India</option>
                                    <option value="kadazan">Kadazan</option>
                                    <option value="iban">Iban</option>
                                    <option value="other">Lain-lain</option>
                                </select>
                            </div>
                            <div class="col-md-3"></div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-3">
                                <label class="form-label">Tarikh Lahir*</label>
                                <input type="date" class="form-control" [(ngModel)]="tarikhLahir" name="tarikhLahir">
                            </div>
                            <div class="col-md-3"></div>
                            <div class="col-md-3">
                                <label class="form-label">Jantina</label>
                                <select class="form-select" [(ngModel)]="jantina" name="jantina">
                                    <option value="lelaki">Lelaki</option>
                                    <option value="perempuan">Perempuan</option>
                                </select>
                            </div>
                            <div class="col-md-3"></div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Negara Lahir</label>
                                <select class="form-select" [(ngModel)]="negaraLahir" name="negaraLahir">
                                    <option value="malaysia">Malaysia</option>
                                    <option value="singapore">Singapura</option>
                                    <option value="indonesia">Indonesia</option>
                                    <option value="thailand">Thailand</option>
                                    <option value="other">Lain-lain</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Tempat Lahir*</label>
                                <input type="text" class="form-control" [(ngModel)]="tempatLahir" name="tempatLahir"
                                    placeholder="Masukkan tempat lahir">
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label class="form-label">Unik ID</label>
                                <input type="text" class="form-control" [(ngModel)]="unikId" name="unikId">
                            </div>
                            <div class="col-md-2"></div>
                            <div class="col-md-4">
                                <label class="form-label">Data Biometrik</label>
                                <input type="text" class="form-control" [(ngModel)]="dataBiometrik"
                                    name="dataBiometrik">
                            </div>
                            <div class="col-md-2"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Catatan Fizikal (Jika Ada)</label>
                            <textarea class="form-control" rows="4" [(ngModel)]="catatanFizikal"
                                name="catatanFizikal"></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Catatan Tambahan</label>
                            <textarea class="form-control" rows="4" [(ngModel)]="catatanTambahan"
                                name="catatanTambahan"></textarea>
                        </div>

                        <!-- Maklumat Syarikat Section - Only shown in tab 2 (Kastam) -->
                        <div *ngIf="activeTab === 2" class="mb-4">
                            <div class="row mb-3">
                                <div class="col-md-4">
                                    <label class="form-label">Nombor Syarikat</label>
                                    <input type="text" class="form-control" [(ngModel)]="nomborSyarikat"
                                        name="nomborSyarikat">
                                </div>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-8">
                                    <label class="form-label">Nama Syarikat</label>
                                    <input type="text" class="form-control" [(ngModel)]="namaSyarikat"
                                        name="namaSyarikat">
                                </div>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-4">
                                    <label class="form-label">Tarikh Surat Agensi</label>
                                    <input type="date" class="form-control" [(ngModel)]="tarikhSuratAgensi"
                                        name="tarikhSuratAgensi">
                                </div>
                            </div>
                        </div>

                        <!-- tab 3 -->
                        <div *ngIf="activeTab === 3" class="mb-4">
                            <div class="row mb-3">
                                <div class="col-md-4">
                                    <label class="form-label">Tarikh Sijil Agensi</label>
                                    <input type="date" class="form-control" [(ngModel)]="tarikhSijilAgensi"
                                        name="tarikhSijilAgensi">
                                </div>
                            </div>
                        </div>

                        <!-- Confirmation Checkbox -->
                        
                    </form>
                </div>
            </div>

            <!-- Right section - Steps -->
            <div class="col-md-3">
                <div class="form-section h-100">
                    <app-progress-flow [currentStep]="step" (stepChange)="onStepChange($event)"></app-progress-flow>
                </div>
            </div>
        </div>

        <!-- Navigation Footer -->
        <div class="bg-light border-top p-3">
            <div class="d-flex justify-content-end align-items-center flex-wrap gap-2">
                <button class="btn btn-back btn-dark" (click)="resetForm()">Set Semula</button>
                <button class="btn btn-back btn-dark" (click)="previousStep()">Kembali</button>
                <button class="btn btn-back btn-dark" (click)="previousStep()">&lt;</button>
                <button class="btn btn-back btn-dark    " (click)="nextStep()">&gt;</button>
            </div>
        </div>
    </div>
</div>
