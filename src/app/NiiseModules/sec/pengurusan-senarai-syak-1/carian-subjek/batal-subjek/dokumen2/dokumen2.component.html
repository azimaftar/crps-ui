<c-row>
    <!-- MAIN CONTENT -->
    <c-col md="9" class="pe-0">
        <div class="container-fluid">
            <div class="row">
                <div class="col-md-12">
                    <div class="card">
                        <div class="card-header">
                            <h5 class="card-title">Dokumen Sokongan</h5>
                        </div>
                        <div class="card-body">
                            <form>
                                <div class="table-container">
                                    <!-- Fixed upload button at top -->
                                    <div class="d-flex justify-content-end mb-3">
                                        <button class="btn btn-dark" (click)="onUpload()">
                                            <i class="fas fa-plus me-1"></i> Muat Naik
                                        </button>
                                    </div>

                                    <!-- Responsive table -->
                                    <div class="table-responsive">
                                        <table class="table table-bordered table-striped">
                                            <thead>
                                                <tr>
                                                    <th style="width: 10%">Bil</th>
                                                    <th style="width: 30%">Keterangan</th>
                                                    <th style="width: 25%">Nama Dokumen</th>
                                                    <th style="width: 15%">Format</th>
                                                    <th style="width: 20%">Tindakan</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <tr>
                                                    <td>1</td>
                                                    <td>Permohonan SL</td>
                                                    <td></td>
                                                    <td></td>
                                                    <td>
                                                        <button class="btn btn-dark btn-sm" (click)="onUpload()">
                                                            <i class="fas fa-plus me-1"></i> Muat Naik
                                                        </button>
                                                    </td>
                                                </tr>
                                                <tr>
                                                    <td>2</td>
                                                    <td>Salinan Kad Pengenalan</td>
                                                    <td></td>
                                                    <td></td>
                                                    <td>
                                                        <button class="btn btn-dark btn-sm" (click)="onUpload()">
                                                            <i class="fas fa-plus me-1"></i> Muat Naik
                                                        </button>
                                                    </td>
                                                </tr>
                                            </tbody>
                                        </table>
                                    </div>

                                    <!-- Fixed footnote at bottom -->
                                    <p class="mt-2 mb-0 text-muted">*Saiz fail Maximum: 10MB</p>
                                </div>
                            </form>
                        </div>
                        <div class="card-body">
                            <form>
                                <div class="mb-3">
                                    <label class="form-label">Catatan</label>
                                    <textarea class="form-control" rows="2"></textarea>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- footer -->
        <div class="bottom-navigation d-flex justify-content-end p-3">
            <div class="nav-buttons d-flex align-items-center">
                <button class="btn btn-reset btn-dark m-2" (click)="onReset()">Set Semula</button>
                <button class="btn btn-back btn-dark m-2" (click)="modelforhantar()">Hantar</button>
                <div class="right-buttons">
                    <button class="btn btn-back btn-dark m-2" (click)="goToPreviousSection()">
                        &lt;
                    </button>
                    <button class="btn btn-next btn-dark m-2" disabled>
                        &gt;
                    </button>
                </div>
            </div>
        </div>
    </c-col>

    <!-- STEPPER -->
    <c-col md="3" class="px-4 py-3 mt-3 stepper-container">
        <ul class="stepper-list">
            <li class="stepper-item" [class.active]="currentStep === step.number"
                *ngFor="let step of steps; let i = index">
                <div class="stepper-content">
                    <span class="step-number" [class.active]="currentStep === step.number">
                        {{ step.number }}
                    </span>
                    <span class="step-title" [class.active]="currentStep === step.number">
                        {{ step.title }}
                    </span>
                </div>
            </li>
        </ul>
    </c-col>
</c-row>

<!-- Hantar confirmation modal -->
<c-modal [visible]="Hantarmodel" (close)="closeModal()">
    <c-modal-body class="d-flex justify-content-center align-items-center" style="min-height: 150px;">
        <h5 class="text-center m-0">Adakah Anda Pasti</h5>
    </c-modal-body>
    <c-modal-footer class="d-flex justify-content-center">
        <button class="btn btn-secondary btn-dark" (click)="Pasti()">Ya</button>
        <button class="btn btn-secondary btn-dark" (click)="closeModal()">Tidak</button>
    </c-modal-footer>
</c-modal>

<!-- Success confirmation modal -->
<c-modal [visible]="PastiyesPasti" (close)="closePastiModal()">
    <c-modal-body class="d-flex justify-content-center align-items-center" style="min-height: 150px;">
        <h5 class="text-center m-0">Permohonan telah berjaya disimpan untuk kelulusan</h5>
    </c-modal-body>
    <c-modal-footer class="d-flex justify-content-center">
        <button class="btn btn-secondary btn-dark" (click)="closePastiModal()">Ok</button>
    </c-modal-footer>
</c-modal>
