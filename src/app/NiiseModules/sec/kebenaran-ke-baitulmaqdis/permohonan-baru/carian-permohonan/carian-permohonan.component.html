<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<div class="content-wrapper">
  <!-- Top Stepper -->
  <div class="horizontal-stepper"> 
    <ul class="stepper-list">
      <li
        class="active"
        *ngFor="let step of steps"
        [class.active]="isStepActive(step.number)"
        (click)="goToStep(step)"
      >
        <button type="button" class="step-btn">
          <span class="step-number">{{ step.number }}</span>
          <span class="step-title">{{ step.title }}</span>
        </button>
      </li>
    </ul>
  </div>

  <section class="card">
    <h2 class="card-title">Carian Permohonan</h2>

    <form #carianForm="ngForm" (ngSubmit)="onCari(carianForm)" class="search-grid">
      <!-- Baris 1 -->
      <div class="field">
        <label for="kategori">Kategori Carian</label>
        <select 
  id="kategori" 
  name="kategori" 
  [(ngModel)]="kategoriCarian" 
  (ngModelChange)="onKategoriChange($event)" 
  required>
  <option value="nomborRujukan">No Rujukan Permohonan</option>
  <option value="namaAgensi">Nama Agensi</option>
  <option value="tarikh">Tarikh</option>
</select>
      </div>

      <div class="field">
        <label for="tarikhDari">Tarikh Permohonan Dari</label>
        <input 
          type="date" 
          id="tarikhDari" 
          name="tarikhDari" 
          [(ngModel)]="tarikhDari" 
          [disabled]="kategoriCarian !== 'tarikh'" />
      </div>

      <div class="field">
        <label for="tarikhHingga">Sehingga</label>
        <input 
          type="date" 
          id="tarikhHingga" 
          name="tarikhHingga" 
          [(ngModel)]="tarikhHingga"
          [disabled]="kategoriCarian !== 'tarikh'" />
      </div>

      <!-- Baris 2 -->
      <div class="field">
        <label for="inputCarian">
          {{ kategoriCarian === 'nomborRujukan' ? 'Nombor Rujukan Permohonan' : 'Nombor FID' }}
        </label>
        <input
          id="inputCarian"
          name="inputCarian"
          type="text"
          [(ngModel)]="nomborCarian"
          [placeholder]="kategoriCarian === 'nomborRujukan' ? 'cth: IM/T09/2509/00001' : 'cth: FID12345'"
          [disabled]="kategoriCarian !== 'nomborRujukan'" />
      </div>

      <div class="field">
        <label for="namaAgensi">Nama Agensi</label>
        <input
          id="namaAgensi"
          name="namaAgensi"
          type="text"
          [(ngModel)]="namaAgensi"
          placeholder="Masukkan nama agensi"
          [disabled]="kategoriCarian !== 'namaAgensi'" />
      </div>

      <div class="actions">
        <button class="btn-custom btn-search" type="submit">
          <i class="fas fa-search"></i> Cari
        </button>
        <button class="btn btn-ghost" type="button" (click)="permohonanBaru()">
          Permohonan Baharu
        </button>
      </div>
    </form>
  </section>

  <section class="card">
  <h2 class="card-title">Senarai Permohonan</h2>

  <!-- Rekod tidak dijumpai -->
  <div class="empty" *ngIf="sudahCari && hasil.length === 0">
    Rekod tidak dijumpai.
  </div>

  <div class="table-wrap" *ngIf="hasil.length > 0">
    <table class="table">
      <thead>
        <tr>
          <th style="width: 60px">No.</th>
          <th>Tarikh Permohonan</th>
          <th>No. Ruj Permohonan</th>
          <th>Agensi</th>
          <th>Status</th>
          <th style="width: 100px">Tindakan</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let p of hasil; index as i; trackBy: trackByRujakan">
          <td>{{ i + 1 }}.</td>
          <td>{{ p.tarikh }}</td>
          <td>
            <a
              class="link"
              href="javascript:void(0)"
              (click)="bukaDetail(p)"
              >{{ p.rujukan }}</a>
          </td>
          <td>{{ p.agensi }}</td>
          <td>
            <span [class]="getStatusClass(p.status)">{{ p.status }}</span>
          </td>
          <td class="actions-cell">
            <!-- Papar -->
            <button
              class="icon-btn"
              type="button"
              title="Papar"
              (click)="viewDetail(p)"
            >
              <i class="fas fa-eye"></i>
            </button>
            <!-- Edit -->
            <button
              class="icon-btn"
              type="button"
              title="Edit"
              (click)="editPermohonan(p)"
            >
              <i class="fas fa-edit"></i>
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</section>

  <!-- POPUPS -->
<div class="popup" *ngIf="showPopup && popupType === 'error'">
  <div class="popup-content">
    <div class="popup-icon error">!</div>
    <p>{{ popupMessage }}</p>
    <button type="button" (click)="closePopup()">OK</button>
  </div>
</div>

<div class="popup" *ngIf="showPopup && popupType === 'confirm'">
  <div class="popup-content">
    <div class="popup-icon warning">!</div>
    <p>{{ popupMessage }}</p>
    <div>
      <button type="button" class="btn-yes" (click)="onConfirmYes()">Ya</button>
      <button type="button" class="btn-no" (click)="onConfirmNo()">Tidak</button>
    </div>
  </div>
</div>

<div class="popup" *ngIf="showPopup && popupType === 'success'">
  <div class="popup-content">
    <div class="popup-icon success">✔</div>
    <p>{{ popupMessage }}</p>
    <button type="button" (click)="closePopup()">OK</button>
  </div>
</div>
