<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<div class="content-wrapper">

  <!-- TOP STEPPER -->
  <div class="horizontal-stepper">
    <ul class="stepper-list">
      <li *ngFor="let step of steps"
          [class.active]="isStepActive(step.number)"
          (click)="goToStep(step)">
        <button type="button" class="step-btn">
          <span class="step-number">{{ step.number }}</span>
          <span class="step-title">{{ step.title }}</span>
        </button>
      </li>
    </ul>
  </div>

  <!-- FORM -->
  <div class="form-section">
    <h5 class="section-title">Maklumat Individu</h5>
    <form #formRef="ngForm" (ngSubmit)="onSubmit(formRef)" id="permohonanForm">

      <!-- Passport / IC + Cari -->
      <div class="form-grid three-col">
        <div class="form-group">
          <label for="passport">No. Passport</label>
          <input type="text" id="passport" name="passport" placeholder="Masukkan No. Passport" ngModel disabled readonly>
        </div>
        <div class="form-group">
          <label for="ic">No. Kad Pengenalan</label>
          <input type="text" id="ic" name="ic" placeholder="Masukkan No. Kad Pengenalan" ngModel disabled readonly>
        </div>
        <div class="search-box form-group">
          <label>&nbsp;</label>
          <!-- <button type="button" class="btn-search" (click)="searchByIC()" disabled>
            <i class="fas fa-search"></i> Cari
          </button> -->
        </div>
      </div>

      <!-- Nama -->
      <div class="form-group full-width">
        <label for="nama">Nama</label>
        <input type="text" id="nama" name="nama" placeholder="Masukkan Nama" ngModel required disabled readonly>
      </div>

      <!-- Tarikh lahir + Jantina + Tempat Pasport + Tarikh Pasport -->
      <div class="form-grid two-col">
        <div class="form-group">
          <label for="tarikh_lahir">Tarikh Lahir</label>
          <input type="date" id="tarikh_lahir" name="tarikh_lahir" ngModel disabled readonly>
        </div>
        <div class="form-group">
          <label for="jantina">Jantina</label>
          <select id="jantina" name="jantina" ngModel disabled>
            <option value="">-- Pilih Jantina --</option>
            <option value="Lelaki">Lelaki</option>
            <option value="Perempuan">Perempuan</option>
          </select>
        </div>
        <div class="form-group">
          <label for="tempat_passport">Tempat Pasport Dikeluarkan</label>
          <input type="text" id="tempat_passport" name="tempat_passport" ngModel disabled readonly>
        </div>
        <div class="form-group">
          <label for="tarikh_passport">Tarikh Pasport Dikeluarkan</label>
          <input type="date" id="tarikh_passport" name="tarikh_passport" ngModel disabled readonly>
        </div>
      </div>

      <!-- Alamat + Poskod/Bandar/Negeri -->
      <div class="form-grid two-col">
        <div class="form-group">
          <label for="alamat">Alamat</label>
          <textarea id="alamat" name="alamat" rows="3" ngModel disabled readonly></textarea>
        </div>
        <div class="form-group">
          <label for="poskod">Poskod</label>
          <input type="text" id="poskod" name="poskod" ngModel disabled readonly>
          <label for="bandar">Bandar</label>
          <input type="text" id="bandar" name="bandar" ngModel disabled readonly>
          <label for="negeri">Negeri</label>
          <select id="negeri" name="negeri" ngModel disabled>
            <option value="">-- Pilih Negeri --</option>
            <option value="Selangor">Selangor</option>
            <option value="WP Kuala Lumpur">WP Kuala Lumpur</option>
          </select>
        </div>
      </div>

      <!-- Dokumen Sokongan -->
      <h5 class="section-title">Dokumen Sokongan</h5>
      <table class="doc-table">
        <thead>
          <tr>
            <th>Bil</th>
            <th>Keterangan</th>
            <th>Nama Dokumen</th>
            <th>Format</th>
            <th>Tindakan</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let doc of documents; let i = index">
            <td>{{ i + 1 }}</td>
            <td>{{ doc.keterangan }}</td>
            <td>{{ doc.nama || '-' }}</td>
            <td>{{ doc.format || '-' }}</td>
            <td>
              <button type="button" class="btn-upload" disabled>
                <i class="fas fa-upload"></i> Muat Naik
              </button>
              <input type="file" #fileInput style="display:none" disabled>
            </td>
          </tr>
        </tbody>
      </table>
      <p class="note">*Saiz fail maksimum: 10MB</p>

      <!-- Butang Tambah Pemohon -->
      <div class="form-actions-right">
        <button type="button" class="btn-primary" disabled>+ Tambah Pemohon</button>
      </div>
    </form>
  </div>
</div>

<!-- FOOTER NAVIGATION -->
<footer class="footer-actions">
  <!-- <button type="reset" class="btn-secondary" form="permohonanForm" disabled>
    <span>⟳</span> Set Semula
  </button>
  <button type="submit" class="btn-primary" disabled>Simpan</button> -->
  <div class="btn-group">
    <button type="button" class="btn-nav prev" (click)="prevStep()" *ngIf="currentStep > 1">
      <
    </button>
    <button type="button" class="btn-nav next" (click)="nextStep()" *ngIf="currentStep < totalSteps">
      >
    </button>
  </div>
</footer>

<!-- POPUPS -->
<div class="popup" *ngIf="showPopup && popupType === 'error'">
  <div class="popup-content">
    <div class="popup-icon error">!</div>
    <p>{{ popupMessage }}</p>
    <button type="button" (click)="closePopup()">OK</button>
  </div>
</div>

<div class="popup" *ngIf="showPopup && popupType === 'confirm'">
  <div class="popup-content">
    <div class="popup-icon warning">!</div>
    <p>{{ popupMessage }}</p>
    <div>
      <button type="button" class="btn-yes" (click)="onConfirmYes()">Ya</button>
      <button type="button" class="btn-no" (click)="onConfirmNo()">Tidak</button>
    </div>
  </div>
</div>

<div class="popup" *ngIf="showPopup && popupType === 'success'">
  <div class="popup-content">
    <div class="popup-icon success">✔</div>
    <p>{{ popupMessage }}</p>
    <button type="button" (click)="closePopup()">OK</button>
  </div>
</div>
