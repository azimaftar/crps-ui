<div class="content-wrapper">
  <div class="horizontal-stepper"> 
    <ul class="stepper-list">
      <li
        class="active"
        *ngFor="let step of steps"
        [class.active]="isStepActive(step.number)"
        (click)="goToStep(step)"
      >
        <button type="button" class="step-btn">
          <span class="step-number">{{ step.number }}</span>
          <span class="step-title">{{ step.title }}</span>
        </button>
      </li>
    </ul>
  </div>

  <!-- LEFT: FORM -->
  <div class="form-section">
    <h3 class="section-title">Keputusan Permohonan</h3>

    <form #formRef="ngForm" (ngSubmit)="onSubmit(formRef)" id="permohonanForm">
      <!-- Status -->
      <div class="form-group">
        <label for="status">Status <span class="required">*</span></label>
        <select id="status" [(ngModel)]="formData.status" name="status" required>
          <option value="">-- Pilih Status --</option>
          <option value="syor">Lulus</option>
          <option value="gagal">Gagal</option>
        </select>
      </div>

      <!-- Catatan -->
      <div class="form-group">
        <label for="catatan">Catatan (Jika tidak lulus)</label>
        <textarea
          id="catatan"
          [(ngModel)]="formData.catatan"
          name="catatan"
          rows="3"
        ></textarea>
      </div>

      <!-- Nama Pengguna -->
      <div class="form-group">
        <label for="nama">Nama Pengguna <span class="required">*</span></label>
        <input
          type="text"
          id="nama"
          [(ngModel)]="formData.nama"
          name="nama"
          placeholder="Masukkan Nama Pengguna"
          required
          disabled
          readonly
        />
      </div>

      <!-- ID Pengguna -->
      <div class="form-group half">
        <label for="idPengguna">ID Pengguna <span class="required">*</span></label>
        <input
          type="text"
          id="idPengguna"
          [(ngModel)]="formData.idPengguna"
          name="idPengguna"
          placeholder="Masukkan ID Pengguna"
          required
          disabled
          readonly
        />
      </div>

      <!-- Tarikh Semakan -->
      <div class="form-group half">
        <label for="tarikhSemakan">Tarikh Kelulusan Permohonan <span class="required">*</span></label>
        <input
          type="date"
          id="tarikhSemakan"
          [(ngModel)]="formData.tarikhSemakan"
          name="tarikhSemakan"
          required
        />
      </div>

      <!-- FORM ACTIONS -->
      <footer class="footer-actions">
        <button type="reset" class="btn-secondary" form="permohonanForm">
          <span>⟳</span>Set Semula
        </button>
        <button type="submit" class="btn-primary" form="permohonanForm">
          Hantar
        </button>
        <div class="btn-group">
    <button type="button" class="btn-nav prev" (click)="prev()" *ngIf="currentStep > 1">
      <
    </button>
    <button type="button" class="btn-nav next" (click)="next()" *ngIf="currentStep < totalSteps" disabled>
      >
    </button>
  </div>
      </footer>

      <!-- Popup Error -->
      <div class="popup" *ngIf="showPopup && popupType === 'error'">
        <div class="popup-content">
          <div class="popup-icon error">!</div>
          <p>{{ popupMessage }}</p>
          <button type="button" (click)="closePopup()">OK</button>
        </div>
      </div>

      <!-- Popup Confirmation -->
      <div class="popup" *ngIf="showPopup && popupType === 'confirm'">
        <div class="popup-content">
          <div class="popup-icon warning">!</div>
          <p>{{ popupMessage }}</p>
          <div>
            <button type="button" class="btn-yes" (click)="onConfirmYes()">Ya</button>
            <button type="button" class="btn-no" (click)="onConfirmNo()">Tidak</button>
          </div>
        </div>
      </div>

      <!-- Popup Success -->
      <div class="popup" *ngIf="showPopup && popupType === 'success'">
        <div class="popup-content">
          <div class="popup-icon success">✔</div>
          <p>{{ popupMessage }}</p>
          <button type="button" (click)="closePopup()">OK</button>
        </div>
      </div>
    </form>
  </div>
</div>
