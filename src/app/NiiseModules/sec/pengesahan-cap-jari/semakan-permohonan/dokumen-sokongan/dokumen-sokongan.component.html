
<div class="container-fluid">
    <div class="row g-0">
        <div class="col-md-9">
            <div class="form-section h-100">
                <h2 class="section-title">Dokumen Sokongan</h2>

                 <!-- NEW HORIZONTAL STEPPER -->
                <app-progress-flow [currentStep]="step" (stepChange)="onStepChange($event)" [steps]="[
                { number: 1, title: 'Carian Permohonan' },
                { number: 2, title: 'Maklumat Pemohon' },
                { number: 3, title: 'Dokumen Sokongan' },
                { number: 4, title: 'Keputusan Permohonan' }
                ]"
                ></app-progress-flow>
                
                <div class="d-flex justify-content-end">
                    <button class="btn btn-upload">
                        + Muat Naik
                    </button>
                </div>
                <div class="table-responsive mt-4">
                    <table cTable class="table table-hover">
                        <thead>
                            <tr>
                                <th>Bil.</th>
                                <th>Keterangan</th>
                                <th>Nama Dokumen</th>
                                <th>Format</th>
                                <th>Tindakan</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr *ngFor="let doc of documents; let i = index">
                                <td>{{ i + 1 }}</td>
                                <td>
                                    <input type="text" class="form-control doc-input" [(ngModel)]="doc.keterangan"
                                        [placeholder]="getPlaceholder(doc.type)">
                                </td>
                                <td class="filename-cell">
                                    <span *ngIf="doc.fileName" class="filename">{{ doc.fileName }}</span>
                                    <span *ngIf="!doc.fileName" class="no-file">Tiada fail dipilih</span>
                                </td>
                                <td class="format-cell">
                                    <span *ngIf="doc.format" class="format-badge">{{ doc.format }}</span>
                                </td>
                                <td>
                                    <button class="btn btn-upload">
                                        + Muat Naik
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                    <small class="text-muted">*Saiz fail maksimum: 10MB</small>
                </div>
            </div>
        </div>

    <!-- Navigation Footer -->
    <div class="bg-light border-top p-3">
        <div class="d-flex justify-content-end align-items-center flex-wrap gap-2">
            <button class="btn btn-back btn-dark" (click)="resetForm()">Set Semula</button>
            <button class="btn btn-back btn-dark" (click)="previousStep()">Kembali</button>
            <button class="btn btn-back btn-dark" (click)="previousStep()">&lt;</button>
            <button class="btn btn-back btn-dark    " (click)="nextStep()">&gt;</button>
        </div>
    </div>
</div>
