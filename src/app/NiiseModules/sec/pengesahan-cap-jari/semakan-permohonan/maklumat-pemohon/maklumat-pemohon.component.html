<c-container fluid>
  <div class="row g-0">
    <div class="col-md-9">
      <div class="form-section h-100">
        <h2 class="section-title">Maklumat Pemohon</h2>

        <!-- NEW HORIZONTAL STEPPER -->
                <app-progress-flow [currentStep]="step" (stepChange)="onStepChange($event)" [steps]="[
                { number: 1, title: 'Carian Permohonan' },
                { number: 2, title: 'Maklumat Pemohon' },
                { number: 3, title: 'Dokumen Sokongan' },
                { number: 4, title: 'Keputusan Permohonan' },
                ]"
                ></app-progress-flow>

        <form cForm [formGroup]="documentForm">
          <c-row class="mb-3">
            <c-col md="6">
              <label cFormLabel for="jenisPengesahan">Jenis Pengesahan</label>
              <select
                cFormSelect
                id="jenisPengesahan"
                formControlName="jenisPengesahan"
                class="form-control"
              >
                <option value="other">Sila Pilih</option>
                <option value="biometrik">Biometrik</option>
                <option value="iris">Iris</option>
                <option value="jari">Jari</option>
              </select>
            </c-col>
          </c-row>

          <c-row class="mb-3">
            <c-col md="6">
              <label cFormLabel for="nama">Nama</label>
              <input
                cFormControl
                type="text"
                id="nama"
                formControlName="nama"
                value="nama"
                class="form-control"
              />
            </c-col>
            <c-col md="6">
              <label cFormLabel for="noIc">No Kad Pengenalan</label>
              <input
                cFormControl
                type="text"
                id="noIc"
                formControlName="noIc"
                class="form-control"
              />
            </c-col>
          </c-row>

          <c-row class="mb-3">
            <c-col md="6">
              <label cFormLabel for="tarikhLahir">Tarikh Lahir</label>
              <div class="input-group">
                <input
                  cFormControl
                  type="date"
                  id="tarikhLahir"
                  formControlName="tarikhLahir"
                  class="form-control"
                />
              </div>
            </c-col>
            <c-col md="6">
              <label cFormLabel for="jantina">Jantina</label>
              <select
                cFormSelect
                id="jantina"
                formControlName="jantina"
                class="form-control"
              >
                <option value="other">Sila Pilih</option>
                <option value="perempuan">Perempuan</option>
                <option value="lelaki">Lelaki</option>
              </select>
            </c-col>
          </c-row>

          <c-row class="mb-3">
            <c-col md="6">
              <label cFormLabel for="alamat">Alamat</label>
              <div class="input-group">
                <input
                  cFormControl
                  type="text"
                  id="alamat"
                  formControlName="alamat"
                  class="form-control"
                />
              </div>
            </c-col>
            <c-col md="6">
              <label cFormLabel for="poskod">Poskod</label>
              <input
                cFormControl
                type="text"
                id="poskod"
                formControlName="poskod"
                class="form-control"
              />

              <label cFormLabel for="bandar">Bandar</label>
              <select
                cFormSelect
                id="bandar"
                formControlName="bandar"
                class="form-control"
              >
                <option value="other">Sila Pilih</option>
                <option value="putrajaya">Putrajaya</option>
                <option value="cyberjaya">Cyberjaya</option>
              </select>

              <label cFormLabel for="negeri">Negeri</label>
              <select
                cFormSelect
                id="negeri"
                formControlName="negeri"
                class="form-control"
              >
                <option value="other">Negeri</option>
                <option value="putrajaya">Putrajaya</option>
                <option value="cyberjaya">Cyberjaya</option>
              </select>
            </c-col>
          </c-row>

          <!--   Maklumat Surat -->
          <div>
            <h2 class="section-title">Maklumat Surat</h2>
              <c-row class="mb-3">
                <c-col md="6">
                  <label cFormLabel for="noRujukan">No Rujukan</label>
                  <input
                    cFormControl
                    type="text"
                    id="noRujukan"
                    formControlName="noRujukan"
                    value="noRUjukan"
                    class="form-control"
                  />
                </c-col>
              </c-row>

              <c-row class="mb-3">
                <c-col md="6">
                  <label cFormLabel for="tarikhSurat">Tarikh Surat</label>
                  <div class="input-group">
                    <input
                      cFormControl
                      type="date"
                      id="tarikhSurat"
                      formControlName="tarikhSurat"
                      class="form-control"
                    />
                  </div>
                </c-col>
              </c-row>
          </div>
        </form>
        </div>
        </div>

        <!-- Navigation Footer -->
        <div class="bg-light border-top p-3">
          <div
            class="d-flex justify-content-end align-items-center flex-wrap gap-2"
          >
            <button class="btn btn-back btn-dark" (click)="resetForm()">Set Semula</button>
                <button class="btn btn-back btn-dark" (click)="previousStep()">Kembali</button>
                <button class="btn btn-back btn-dark" (click)="previousStep()">Hantar</button>
                <button class="btn btn-back btn-dark" (click)="previousStep()">&lt;</button>
                <button class="btn btn-back btn-dark" (click)="nextStep()">&gt;</button>
          </div>
        </div>
  </div>
</c-container>
