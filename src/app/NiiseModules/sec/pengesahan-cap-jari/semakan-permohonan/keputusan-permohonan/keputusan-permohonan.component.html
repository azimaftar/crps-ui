<c-container fluid>
  <div class="row g-0">
    <div class="col-md-9">
      <div class="form-section h-100">
        <h2 class="section-title">Keputusan Permohonan</h2>

         <!-- NEW HORIZONTAL STEPPER -->
                <!-- NEW HORIZONTAL STEPPER -->
                <app-progress-flow [currentStep]="step" (stepChange)="onStepChange($event)" [steps]="[
                { number: 1, title: 'Carian Permohonan' },
                { number: 2, title: 'Maklumat Pemohon' },
                { number: 3, title: 'Dokumen Sokongan' },
                { number: 4, title: 'Keputusan Permohonan' }
                ]"
                ></app-progress-flow>

       <form cForm [formGroup]="documentForm">
        <c-row class="mb-3">
          <c-col md="6">
            <label cFormLabel for="catatan">Catatan</label>
            <input cFormControl type="text" id="catatan" formControlName="catatan" class="form-control" />
          </c-col>
        </c-row>

        <c-row class="mb-3">
          <c-col md="6">
            <label cFormLabel for="pengguna">Nama Pengguna</label>
            <input cFormControl type="text" id="pengguna" formControlName="pengguna" class="form-control" />
          </c-col>
        </c-row>

        <c-row class="mb-3">
          <c-col md="6">
            <label cFormLabel for="idPengguna">ID Pengguna</label>
            <input cFormControl type="text" id="idPengguna" formControlName="idPengguna" class="form-control" />
          </c-col>
          <c-col md="6">
            <label cFormLabel for="tarikhSemakan">Tarikh Semakan Permohonan</label>
            <div class="input-group">
            <input cFormControl type="date" id="tarikhSemakan" formControlName="tarikhSemakan" class="form-control" />
      </div>
    </c-col>
  </c-row>
</form>
      </div>
      </div>

        <!-- Right section - Steps -->
        <div class="col-md-3 ps-4 border-start">
          <div
            class="step"
            [class.active]="isStepActive(1)"
            [class.completed]="isStepCompleted(1)"
          >
            <div class="circle">1</div>
            <div class="label">Carian Permohonan</div>
          </div>
          <div
            class="step"
            [class.active]="isStepActive(2)"
            [class.completed]="isStepCompleted(2)"
          >
            <div class="circle">2</div>
            <div class="label">Maklumat Permohonan</div>
          </div>
          <div
            class="step"
            [class.active]="isStepActive(3)"
            [class.completed]="isStepCompleted(3)"
          >
            <div class="circle">3</div>
            <div class="label">Dokumen Sokongan</div>
          </div>
          <div
            class="step"
            [class.active]="isStepActive(4)"
            [class.completed]="isStepCompleted(4)"
          >
            <div class="circle">4</div>
            <div class="label">Keputusan Permohonan</div>
          </div>
        </div>

        <!-- Navigation Footer -->
        <div class="bg-light border-top p-3">
          <div
            class="d-flex justify-content-end align-items-center flex-wrap gap-2"
          >
            <button class="btn btn-back btn-dark" (click)="resetForm()" type="button">Set Semula</button>
            <button class="btn btn-back btn-dark" (click)="previousStep()" type="button">Simpan</button>
            <button class="btn btn-back btn-dark" (click)="onSubmit()" type="submit">Hantar</button>
            <button class="btn btn-back btn-dark" (click)="gotoMaklumatPemohon()">&lt;</button>
            <button class="btn btn-back btn-dark" (click)="goToDokumenSokongan()">&gt;</button>
          </div>
        </div>
    </div>
</c-container>
