<div class="container-fluid">
  <c-row>
    <!-- LEFT SIDE: Main Content (9 columns) -->
    <c-col md="9" class="pe-0">

      <!-- Section 1 -->
      <div *ngIf="currentSection === 2">
        <c-card>
          <c-card-header>
            <h5 class="card-title">Maklumat Kelulusan Permohonan</h5>
          </c-card-header>
          <c-card-body>
            <form>
              <c-row class="mb-2">
                <c-col>
                  <label class="form-label">Nama<span class="text-danger">*</span></label>
                  <input type="text" class="form-control" value="Aiman Bin Kasim" placeholder="Masukkan nama penuh"
                    disabled>
                </c-col>
              </c-row>
              <c-row class="mb-2">
                <c-col md="5">
                  <label class="form-label">Warganegara<span class="text-danger">*</span></label>
                  <select class="form-select" disabled>
                    <option value="malaysia">MYS</option>
                    <option value="singapore">SG</option>
                    <option value="indonesia">IDN</option>
                    <option value="thailand">THA</option>
                    <option value="other">Lain-lain</option>
                  </select>
                </c-col>
                <c-col md="2"></c-col>
              </c-row>
              <c-row class="mb-2">
                <c-col md="5">
                  <label class="form-label">No. Kad Pengenalan / No Passport<span class="text-danger">*</span></label>
                  <input type="text" class="form-control" value="890211049901" placeholder="Contoh: 123456789012"
                    disabled>
                </c-col>
                <c-col md="2"></c-col>
                <c-col md="3">
                  <label class="form-label">No Passport Lama<span class="text-danger">*</span></label>
                  <input type="text" class="form-control" value="A8032111" placeholder="Masukkan nombor dokumen"
                    disabled>
                </c-col>
              </c-row>
              <c-row class="mb-2">
                <c-col md="3">
                  <label class="form-label">Tarikh Lahir<span class="text-danger">*</span></label>
                  <input type="date" class="form-control" value="1980-02-11" disabled>
                </c-col>
              </c-row>
              <c-row>
                <c-col md="6">
                  <input type="radio" value="terima" class="form-check-input me-2 square-radio" />
                  <label class="form-label">Saya mengesahkan maklumat yang diberikan adalah benar dan sah</label>
                </c-col>
              </c-row>
            </form>
          </c-card-body>
        </c-card>
      </div>

      <!-- Section 2 -->
      <div *ngIf="currentSection === 3">
        <c-card>
          <c-card-header>
            <h5 class="card-title">Dokumen Sokongan</h5>
          </c-card-header>
          <c-card-body>
            <form>
              <div class="d-flex justify-content-end mb-2 me-1">
                <button class="btn btn-dark btn-search" (click)="null">Muat Naik +</button>
                <c-col md="1"></c-col>
              </div>
              <div class="table-container table-responsive p-3">
                <table class="subjects-table table table-bordered table-striped w-100">
                  <thead>
                    <tr>
                      <th class="col-2">Bil</th>
                      <th class="col-2">Keterangan</th>
                      <th class="col-2">Nama Dokumen</th>
                      <th class="col-2">Format</th>
                      <th class="col-2"></th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr>
                      <td>1</td>
                      <td>Salinan Gambar passport</td>
                      <td></td>
                      <td></td>
                      <td><button class="btn btn-dark btn-search" (click)="null">Muat Naik +</button></td>
                    </tr>
                  </tbody>
                </table>
                <a>*Saiz fail maksimum: 10MB</a>
              </div>
              <c-row class="p-2">
                <c-col md="8">
                  <label class="form-label">Catatan (Jika Tidak Lulus)<span class="text-danger">*</span></label>
                  <textarea class="form-control" style="height: 100px"></textarea>
                </c-col>
              </c-row>
              <c-row>
                <c-col>
                  <button class="btn btn-dark btn-search m-2 " disabled>Ambil Wajah & Iris</button>
                </c-col>
              </c-row>
              <c-row>
                <c-col>
                  <button class="btn btn-dark btn-search m-2" disabled>Ambil Cap Jari</button>
                </c-col>
              </c-row>
              <c-row>
                <c-col md="8">
                  <input type="radio" value="terima" class="form-check-input me-2 square-radio" />
                  <label class="form-label">Saya mengesahkan maklumat yang diberikan adalah benar dan sah</label>
                </c-col>
              </c-row>
            </form>
          </c-card-body>
        </c-card>
      </div>

      <!-- Section 3 -->
      <div *ngIf="currentSection === 4">
        <c-card>
          <c-card-header>
            <h5 class="card-title">Keputusan Permohonan JKRIM</h5>
          </c-card-header>
          <c-card-body>
            <form>
              <c-row class="p-2">
                <c-col md="8">
                  <label class="form-label">Status Permohonan<span class="text-danger">*</span></label>
                  <c-col class="col-2">
                    <input type="radio" class="form-check-input" name="kelulusan" 
                      value="lulus" />
                    Lulus
                  </c-col>
                  <c-col class="col-3">
                    <input type="radio" class="form-check-input" name="kelulusan"
                      value="tidakLulus" />
                    Tidak Lulus
                  </c-col>
                </c-col>
              </c-row>
              <c-row class="p-2">
                <c-col md="8">
                  <label class="form-label">Catatan (Jika Tidak Lulus)<span class="text-danger">*</span></label>
                  <textarea class="form-control" style="height: 100px"></textarea>
                </c-col>
              </c-row>
              <c-row class="p-2">
                <c-col md="9">
                  <label class="form-label">Nama Pengguna</label>
                  <input type="text" class="form-control">
                </c-col>
              </c-row>
              <c-row class="p-2">
                <c-col md="5">
                  <label class="form-label">ID Pengguna</label>
                  <input type="text" class="form-control">
                </c-col>
                <c-col md="2"></c-col>
                <c-col md="5">
                  <label class="form-label">Tarikh Kelulusan akan menjadi tarikh NAP/NAS</label>
                  <input type="date" class="form-control">
                </c-col>
              </c-row>
            </form>
          </c-card-body>
        </c-card>
      </div>
    </c-col>
    <c-col md="3" class="ps-0" style="border-left: 2px solid #ccc;">
      <c-card class="h-100 shadow-sm border-0 bg-white rounded-0">
        <c-card-body>
          <app-breadcrumb-keputusan [activeStep]="currentSection"></app-breadcrumb-keputusan>
        </c-card-body>
      </c-card>
    </c-col>

    <!-- Navigation/Footer Buttons -->

    <div class="bottom-navigation d-flex justify-content-between align-items-center p-3">
      <div>
        <button class="btn btn-next btn-dark m-2" (click)="goToNextSection()">Kembali</button>
      </div>
      <div class="d-flex align-items-center">
        <button class="btn btn-reset btn-dark m-2" (click)="null">Set Semula</button>

        <ng-container *ngIf="currentSection === 1 || currentSection === 2 || currentSection === 3">
          <button class="btn btn-back btn-dark m-2" (click)="null" disabled>Hantar</button>
        </ng-container>
        <ng-container *ngIf="currentSection === 4">
          <button class="btn btn-back btn-dark m-2" (click)="modelforhantar()">Hantar</button>
        </ng-container>

        <button class="btn btn-back btn-dark m-2" (click)="goToPreviousSection()">&lt;</button>
        <button class="btn btn-next btn-dark m-2" (click)="goToNextSection()">&gt;</button>
      </div>
    </div>



    <!-- Confirmation Modals -->
    <c-modal [visible]="Hantarmodel" (close)="closeModal()">
      <c-modal-body class="d-flex justify-content-center align-items-center" style="min-height: 150px;">
        <h5 class="text-center m-0">Adakah Anda Pasti</h5>
      </c-modal-body>
      <c-modal-footer class="d-flex justify-content-center">
        <button class="btn btn-secondary btn-dark" (click)="Pasti()">Ya</button>
        <button class="btn btn-secondary btn-dark" (click)="closeModal()">Tidak</button>
      </c-modal-footer>
    </c-modal>

    <c-modal [visible]="PastiyesPasti" (close)="closeModal()">
      <c-modal-body class="d-flex justify-content-center align-items-center" style="min-height: 150px;">
        <h5 class="text-center m-0">Permohonan Telah Berjaya Diluluskan</h5>
      </c-modal-body>
      <c-modal-footer class="d-flex justify-content-center">
        <button class="btn btn-secondary btn-dark" (click)="closePastiModal()">Ok</button>
      </c-modal-footer>
    </c-modal>
  </c-row>
</div>
