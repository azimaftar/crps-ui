                    disabled>

              </c-row>
              <c-row>
                <c-col md="5">
                  <label class="form-label">Tarikh Lahir<span class="text-danger">*</span></label>
                  <input type="date" class="form-control" value="1989-02-11" disabled>
                </c-col>
                <c-col md="2"></c-col>
                <c-col md="5">
                  <label class="form-label">Jantina</label>
                  <select class="form-select" disabled>
                    <option value="Lelaki">Lelaki</option>
                    <option value="Perempuan">Perempuan</option>
                  </select>
                </c-col>
              </c-row>
              <c-row>
                <c-col md="5">
                  <label class="form-label">Status Warganegara<span class="text-danger">*</span></label>
                  <select class="form-select" disabled>
                    <option value="malaysia">Malaysia</option>
                    <option value="singapore">Singapura</option>
                    <option value="indonesia">Indonesia</option>
                    <option value="thailand">Thailand</option>
                    <option value="other">Lain-lain</option>
                  </select>
                </c-col>
                <c-col md="2"></c-col>
                <c-col md="5">
                  <label class="form-label">Status Perkahwinan</label>
                  <select class="form-select" disabled>
                    <option value="Berkahwin">Berkahwin</option>
                    <option value="Bujang">Bujang</option>
                    <option value="duda">Duda</option>
                    <option value="janda">Janda</option>
                  </select>
                </c-col>
              </c-row>
              <c-row>
                <c-col md="6">
                  <label class="form-label">Alamat<span class="text-danger">*</span></label>
                  <input type="text" class="form-control mb-3" value="No 1, Jalan Mawar" disabled>
                  <input type="text" class="form-control mb-3" value="Taman Melati" disabled>
                  <input type="text" class="form-control" value="Setapak" disabled>
                </c-col>
                <c-col md="1"></c-col>
                <c-col md="5">
                  <label class="form-label">Poskod</label>
                  <input type="text" class="form-control" value="61590" disabled>
                  <label class="form-label">Bandar</label>
                  <input type="text" class="form-control" value="Putrajaya" disabled>
                  <label class="form-label">Negeri</label>
                  <input type="text" class="form-control" value="Putrajaya" disabled>
                </c-col>
              </c-row>
              <c-row>
                <c-col md="5">
                  <label class="form-label">No. Telefon Bimbit</label>
                  <input type="text" class="form-control" value="019-8900244" disabled>
                </c-col>
              </c-row>
              <c-row>
                <c-col md="7">
                  <label class="form-label">E-mel</label>
                  <input type="text" class="form-control" value="xxtionx@gmail.com" disabled>
                </c-col>
              </c-row>
              <c-row>
                <c-col md="3">
                  <label class="form-label">Status</label>
                  <input type="text" class="form-control" value="Baru" disabled>
                </c-col>
              </c-row>
            </form>
          </c-card-body>
        </c-card>
      </div>

      <!-- Section 3 -->
      <div *ngIf="currentSection === 2">
        <c-card>
          <c-card-header>
            <h5 class="card-title">Maklumat Terperinci</h5>
          </c-card-header>
          <c-card-body>
            <form>
              <c-row class="p-2">
                <c-col md="4">
                  <label class="form-label">Tarikh Masuk</label>
                  <input type="text" class="form-control" disabled>
                </c-col>
                <c-col md="4"></c-col>
                <c-col md="4">
                  <label class="form-label">Masa Masuk</label>
                  <input type="text" class="form-control" disabled>
                </c-col>
              </c-row>
              <c-row class="p-2">
                <c-col>
                  <label class="form-label">Pintu Masuk</label>
                  <select class="form-select " disabled>
                    <option value="Lelaki">pintu Masuk Hadapan</option>
                    <option value="Perempuan">Pintu Masuk Belakang</option>
                  </select>
                </c-col>
              </c-row>
              <c-row class="p-2">
                <c-col md="6">
                  <label class="form-label">Jenis Pas</label>
                  <input type="text" class="form-control" disabled>
                </c-col>
                <c-col md="2"></c-col>
                <c-col md="4">
                  <label class="form-label">Tarikh Tamat Pas</label>
                  <input type="Date" class="form-control" disabled>
                </c-col>
              </c-row>
              <c-row class="p-2">
                <c-col md="4">
                  <label class="form-label">Tarikh Tamat Dokumen</label>
                  <input type="date" class="form-control" disabled>
                </c-col>
              </c-row>
              <div class="table-container table-responsive">
                <table class="subjects-table table table-bordered table-striped w-100">
                  <thead>
                    <tr>
                      <th class="col-2">Bil</th>
                      <th class="col-2">Keterangan</th>
                      <th class="col-2">Nama Dokumen</th>
                      <th class="col-2">Format</th>
                      <th class="col-2"></th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr>
                      <td>1</td>
                      <td>Salinan Gambar passport</td>
                      <td></td>
                      <td></td>
                      <td><button class="btn btn-dark btn-search" (click)="null">Papar</button></td>
                    </tr>
                  </tbody>
                </table>
                <a>*Saiz fail maksimum: 10MB</a>
              </div>

      <!-- keputusan Permohonan -->
      <div *ngIf="currentSection === 3">
        <c-card>
          <c-card-header>
            <h5 class="card-title">Keputusan Permohonan</h5>
          </c-card-header>
          <c-card-body>
            <form>
              <c-row class="p-2">
                <c-col md="4">
                  <label class="form-label">Status Permohonan</label>
                  <div class="form-check">
                    <input class="form-check-input" type="radio" name="statusPermohonan" id="status1" value="accepted">
                    <label class="form-check-label" for="status1">
                      Lengkap
                    </label>
                  </div>
                  <div class="form-check">
                    <input class="form-check-input" type="radio" name="statusPermohonan" id="status2" value="rejected">
                    <label class="form-check-label" for="status2">
                      Tidak Lengkap
                    </label>
                  </div>
                </c-col>
                <c-col md="4"></c-col>
              </c-row>
              <c-row class="p-2">
                <c-col>
                  <label class="form-label">Catatan</label>
                  <c-col md="8">
                    <textarea class="form-control" rows="2"></textarea>
                  </c-col>
                </c-col>
              </c-row>
              <c-row class="p-2">
                <c-col md="10">
                  <label class="form-label">Nama Pengguna</label>
                    <input type="text" class="form-control">
                </c-col>
              </c-row>
              <c-row class="p-2">
                <c-col md="6">
                  <label class="form-label">ID Pengguna</label>
                  <input type="text" class="form-control">
                </c-col>
                <c-col md="2"></c-col>
                <c-col md="4">
                  <label class="form-label">Tarikh Semakan Permohonan</label>
                  <input type="Date" class="form-control">
                </c-col>
              </c-row>
              <!-- <div class="form-check mb-4">
                <input class="form-check-input" type="checkbox" id="confirmation">
                <label class="form-check-label" for="confirmation">
                  Saya mengesahkan maklumat yang diberikan adalah sah dan benar.
                </label>
              </div>
              <div class="mb-3">

                <textarea class="form-control" rows="2"></textarea>
              </div> -->
            </form>
          </c-card-body>
        </c-card>
      </div>
    </c-col>
    <c-col md="3" class="ps-0" style="border-left: 2px solid #ccc;">
      <c-card class="h-100 shadow-sm border-0 bg-white rounded-0">
        <c-card-body>
          <app-breadcrumb-BSS [activeStep]="currentSection"></app-breadcrumb-BSS>
        </c-card-body>
      </c-card>
    </c-col>

    <!-- Navigation/Footer Buttons -->
    <div class="bottom-navigation d-flex justify-content-end p-3">
      <div class="nav-buttons d-flex align-items-center">
        <button class="btn btn-reset btn-dark m-2" (click)="null">Set Semula</button>
        <div *ngIf="currentSection === 1 || currentSection === 2">
          <button class="btn btn-back btn-dark m-2" (click)="null" disabled>Hantar</button>
        </div>
        <div *ngIf="currentSection === 3">
          <button class="btn btn-back btn-dark m-2" (click)="modelforhantar()">Hantar</button>
        </div>
        <div class="right-buttons">
          <button class="btn btn-back btn-dark m-2" (click)="goToPreviousSection()">&lt;</button>
          <button class="btn btn-next btn-dark m-2" (click)="goToNextSection()">&gt;</button>
        </div>
      </div>
    </div>

    <!-- Confirmation Modals -->
    <c-modal [visible]="Hantarmodel" (close)="closeModal()">
      <c-modal-body class="d-flex justify-content-center align-items-center" style="min-height: 150px;">
        <h5 class="text-center m-0">Permohonan Telah Dipastikan</h5>
      </c-modal-body>
      <c-modal-footer class="d-flex justify-content-center">
        <button class="btn btn-secondary btn-dark" (click)="Pasti()">Ya</button>
        <button class="btn btn-secondary btn-dark" (click)="closeModal()">Tidak</button>
      </c-modal-footer>
    </c-modal>

    <c-modal [visible]="PastiyesPasti" (close)="closeModal()">
      <c-modal-body class="d-flex justify-content-center align-items-center" style="min-height: 150px;">
        <h5 class="text-center m-0">Transaksi Telah Berjaya</h5>
      </c-modal-body>
      <c-modal-footer class="d-flex justify-content-center">
        <button class="btn btn-secondary btn-dark" (click)="closePastiModal()">Ok</button>
      </c-modal-footer>
    </c-modal>


    <!-- RIGHT SIDE: Breadcrumb (3 columns) -->

  </c-row>
</div>
