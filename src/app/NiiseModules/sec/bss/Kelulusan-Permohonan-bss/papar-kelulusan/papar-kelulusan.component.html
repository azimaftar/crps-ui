              </c-row>

                    <option value="singapore">SG</option>
                    <option value="indonesia">IDN</option>
                    <option value="thailand">THA</option>
                    <option value="other">Lain-lain</option>
                  </select>
                </c-col>
                <c-col md="2"></c-col>
                <c-col md="5">
                  <label class="form-label">No. Kad Pengenalan / No Passport<span class="text-danger">*</span></label>
                  <input type="text" class="form-control" value="890211049901" placeholder="Contoh: 123456789012"

              </c-row>
              <c-row>
                <c-col md="3">
                  <label class="form-label">No Passport Lama<span class="text-danger">*</span></label>
                  <input type="text" class="form-control" value="A8032111" placeholder="Masukkan nombor dokumen"
                    disabled>
                </c-col>
                <c-col md="4"></c-col>
                <c-col md="3">
                  <label class="form-label">Tarikh Lahir<span class="text-danger">*</span></label>
                  <input type="date" class="form-control" value="1989-02-11" disabled>
                </c-col>
              </c-row>
              <c-row>
                 <c-col md="5">
                  <label class="form-label">Jenis Pas<span class="text-danger">*</span></label>
                  <input type="text" class="form-control" value="IC/PASSPORT" placeholder="Jenis Pas"
                    disabled>
                </c-col>
                <c-col md="2"></c-col>
                <c-col md="3">
                  <label class="form-label">Tarikh Tamat Pas<span class="text-danger">*</span></label>
                  <input type="date" class="form-control" value="2027-02-11" disabled>
                </c-col>
              </c-row>
              <c-row>
                <c-col md="3">
                  <label class="form-label">Tarikh Masuk<span class="text-danger">*</span></label>
                  <input type="date" class="form-control" value="1989-02-11" disabled>
                </c-col>
                <c-col md="4"></c-col>
                <c-col md="4">
                  <label class="form-label">Masa Masuk<span class="text-danger">*</span></label>
                  <input type="time" class="form-control" value="10:00:00" disabled>
                </c-col>
              </c-row>
              <c-row>
                 <c-col md="5">
                  <label class="form-label">Lokasi Masuk<span class="text-danger">*</span></label>
                  <input type="text" class="form-control" value="IC/PASSPORT" placeholder="Jenis Pas"
                    disabled>
                </c-col>
                <c-col md="2"></c-col>
                <c-col md="3">
                  <label class="form-label">Tarikh Tamat Dokumen<span class="text-danger">*</span></label>
                  <input type="date" class="form-control" value="2027-02-11" disabled>
                </c-col>
              </c-row>
              <c-row>
                <c-col md="3">
                  <label class="form-label">Status<span class="text-danger">*</span></label>
                  <input type="text" class="form-control" value="Aktif" disabled>
                </c-col>
                <c-col md="4"></c-col>
                <c-col md="4">
                  <label class="form-label">Nombor Rujukan<span class="text-danger">*</span></label>
                  <input type="text" class="form-control" value="A012313" disabled>
                </c-col>
              </c-row>
              <c-row>
                <c-col>
                  <label class="form-label">Catatan<span class="text-danger">*</span></label>
                  <textarea class="form-control" style="height: 100px" disabled></textarea>
                </c-col>
              </c-row>
              <div class="table-container table-responsive p-3">
                <h5 class="card-title">Maklumat Terperinci</h5>
                <table class="subjects-table table table-bordered table-striped w-100">
                  <thead>
                    <tr>
                      <th class="col-2">Bil</th>
                      <th class="col-2">Keterangan</th>
                      <th class="col-2">Nama Dokumen</th>
                      <th class="col-2">Format</th>
                      <th class="col-2"></th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr>
                      <td>1</td>
                      <td>Salinan Gambar passport</td>
                      <td></td>
                      <td></td>
                      <td><button class="btn btn-dark btn-search" (click)="null">Papar</button></td>
                    </tr>
                  </tbody>
                </table>
                <a>*Saiz fail maksimum: 10MB</a>
              </div>
            </form>
          </c-card-body>
        </c-card>
      </div>

      <!-- Section 3 -->
      <div *ngIf="currentSection === 3">
        <c-card>
          <c-card-header>
            <h5 class="card-title">Keputusan Permohonan</h5>
          </c-card-header>
          <c-card-body>
            <form>
              <c-row class="p-2">
                <c-col md="8">
                  <label class="form-label">Catatan (Jika Tidak Lulus)<span class="text-danger">*</span></label>
                  <textarea class="form-control" style="height: 100px"></textarea>
                </c-col>
              </c-row>
              <c-row class="p-2">
                <c-col md="9">
                  <label class="form-label">Nama Pengguna</label>
                  <input type="text" class="form-control">
                </c-col>
              </c-row>
              <c-row class="p-2">
                <c-col md="5">
                  <label class="form-label">ID Pengguna</label>
                  <input type="text" class="form-control">
                </c-col>
                <c-col md="2"></c-col>
                <c-col md="5">
                  <label class="form-label">Tarikh Kelulusan</label>
                  <input type="date" class="form-control">
                </c-col>
              </c-row>
            </form>
          </c-card-body>
        </c-card>
      </div>
    </c-col>
    <c-col md="3" class="ps-0" style="border-left: 2px solid #ccc;">
      <c-card class="h-100 shadow-sm border-0 bg-white rounded-0">
        <c-card-body>
          <app-breadcrumb-kelulusan [activeStep]="currentSection"></app-breadcrumb-kelulusan>
        </c-card-body>
      </c-card>
    </c-col>

    <!-- Navigation/Footer Buttons -->

    <div class="bottom-navigation d-flex justify-content-between align-items-center p-3">
      <div>
        <button class="btn btn-next btn-dark m-2" (click)="goToNextSection()">Kembali</button>
      </div>
      <div class="d-flex align-items-center">
        <button class="btn btn-reset btn-dark m-2" (click)="null">Set Semula</button>

        <ng-container *ngIf="currentSection === 1 || currentSection === 2">
          <button class="btn btn-back btn-dark m-2" (click)="null" disabled>Hantar</button>
        </ng-container>
        <ng-container *ngIf="currentSection === 3">
          <button class="btn btn-back btn-dark m-2" (click)="modelforhantar()">Hantar</button>
        </ng-container>

        <button class="btn btn-back btn-dark m-2" (click)="goToPreviousSection()">&lt;</button>
        <button class="btn btn-next btn-dark m-2" (click)="goToNextSection()">&gt;</button>
      </div>
    </div>



    <!-- Confirmation Modals -->
    <c-modal [visible]="Hantarmodel" (close)="closeModal()">
      <c-modal-body class="d-flex justify-content-center align-items-center" style="min-height: 150px;">
        <h5 class="text-center m-0">Adakah Anda Pasti</h5>
      </c-modal-body>
      <c-modal-footer class="d-flex justify-content-center">
        <button class="btn btn-secondary btn-dark" (click)="Pasti()">Ya</button>
        <button class="btn btn-secondary btn-dark" (click)="closeModal()">Tidak</button>
      </c-modal-footer>
    </c-modal>

    <c-modal [visible]="PastiyesPasti" (close)="closeModal()">
      <c-modal-body class="d-flex justify-content-center align-items-center" style="min-height: 150px;">
        <h5 class="text-center m-0">Permohonan Telah Berjaya Diluluskan</h5>
      </c-modal-body>
      <c-modal-footer class="d-flex justify-content-center">
        <button class="btn btn-secondary btn-dark" (click)="closePastiModal()">Ok</button>
      </c-modal-footer>
    </c-modal>
  </c-row>
