<div class="container-fluid">
  <c-row>
    <!-- LEFT SIDE: Main Content (9 columns) -->
    <c-col md="9" class="pe-0">

      <!-- Section 1 -->
      <div *ngIf="currentSection === 1">
        <c-card>
          <c-card-header>
            <h5 class="card-title">Maklumat Peribadi Bukan Sabjek Subjek</h5>
          </c-card-header>
          <c-card-body>
            <form>
              <c-row class="pt-3">
                <c-col>
                  <label class="form-label">Nama<span class="text-danger">*</span></label>
                  <input type="text" class="form-control" placeholder="Masukkan nama penuh">
                </c-col>
              </c-row>
              <c-row class="pt-3">
                <c-col md="6">
                  <label class="form-label">Warganegara<span class="text-danger">*</span></label>
                  <select id="" class="form-select form-select-sm" >
                    <option value="MY">MY</option>
                    <option value="IDN">IDN</option>
                    <option value="JPN">JPN</option>
                  </select>
                  <!-- <input type="text" class="form-control" placeholder="Masukkan nama penuh"> -->
                </c-col>
              </c-row>
              <c-row class="pt-3">
                <c-col md="5">
                  <label class="form-label">No. Kad Pengenalan / My PR<span class="text-danger">*</span></label>
                  <input type="text" class="form-control" placeholder="Contoh: 123456789012">
                </c-col>
                <c-col md="2"></c-col>
                <c-col md="5">
                  <label class="form-label">No Pasport Lama<span class="text-danger">*</span></label>
                  <input type="text" class="form-control" placeholder="Masukkan nombor dokumen">
                </c-col>
              </c-row>
              <c-row class="pt-3">
                <c-col md="5">
                  <label class="form-label">Tarikh Lahir<span class="text-danger">*</span></label>
                  <input type="date" class="form-control">
                </c-col>
              </c-row>
              <c-row class="pt-3">
                <c-col md="1">
                  <input type="checkbox" class="form-check-input">
                </c-col>
                <c-col md="11">
                  <label class="form-check-label">
                    Saya mengesahkan maklumat yang diberikan adalah sah dan benar
                    <span class="text-danger">*</span>
                  </label>
                </c-col>
              </c-row>

            </form>
          </c-card-body>
        </c-card>
      </div>

      <!-- Section 3 -->
      <div *ngIf="currentSection === 2">
        <c-card>
          <c-card-header>
            <h5 class="card-title">Dokumen Sokongan</h5>
          </c-card-header>
          <c-card-body>
            <form>
              <div class="text-end pb-3">
                <button class="btn btn-dark btn-search" (click)="null">+ Muat Naik</button>
              </div>
              <div class="table-container table-responsive">
                <table class="subjects-table table table-bordered table-striped w-100">
                  <thead>
                    <tr>
                      <th class="col-2">Bil</th>
                      <th class="col-2">Keterangan</th>
                      <th class="col-2">Nama Dokumen</th>
                      <th class="col-2">Format</th>
                      <th class="col-2"></th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr>
                      <td>1</td>
                      <td>Salinan Gambar passport</td>
                      <td></td>
                      <td></td>
                      <td><button class="btn btn-dark btn-search" (click)="null">+ Muat Naik</button></td>
                    </tr>
                  </tbody>
                </table>
                <a>*Saiz fail maksimum: 10MB</a>
              </div>
               <c-col class="pb-5 pt-5" >
                <button class="btn btn-dark btn-search" (click)="AmbilCapJari()">Ambil Cap Jari</button>
              </c-col>
              <c-col>
                <label class="form-label fw-bold">Catatan<span class="text-danger">*</span></label>
              </c-col>
              <c-col md="12">
                <textarea class="form-control" rows="5" style="width: 100%;" placeholder="Masukkan catatan"></textarea>
              </c-col>
              <c-row class="pt-3">
                <c-col md="1">
                  <input type="checkbox" class="form-check-input">
                </c-col>
                <c-col md="11">
                  <label class="form-check-label">
                    Saya mengesahkan maklumat yang diberikan adalah sah dan benar
                    <span class="text-danger">*</span>
                  </label>
                </c-col>
              </c-row>
            </form>
          </c-card-body>
        </c-card>
      </div>
    </c-col>
    <c-col md="3" class="ps-0" style="border-left: 2px solid #ccc;">
      <c-card class="h-100 shadow-sm border-0 bg-white rounded-0">
        <c-card-body>
          <app-breadcrumb-BSS [activeStep]="currentSection"></app-breadcrumb-BSS>
        </c-card-body>
      </c-card>
    </c-col>

    <!-- Navigation/Footer Buttons -->
    <div class="bottom-navigation d-flex justify-content-end p-3">
      <div class="nav-buttons d-flex align-items-center">
        <button class="btn btn-reset btn-dark m-2" (click)="null">Set Semula</button>
        <div *ngIf="currentSection === 1">
          <button class="btn btn-back btn-dark m-2" (click)="null" disabled>Hantar</button>
        </div>
        <div *ngIf="currentSection === 2">
          <button class="btn btn-back btn-dark m-2" (click)="modelforhantar()">Hantar</button>
        </div>
        <div class="right-buttons">
          <button class="btn btn-back btn-dark m-2" (click)="goToPreviousSection()">&lt;</button>
          <button class="btn btn-next btn-dark m-2" (click)="goToNextSection()">&gt;</button>
        </div>
      </div>
    </div>

    <!-- Confirmation Modals -->
    <c-modal [visible]="Hantarmodel" (close)="closeModal()">
      <c-modal-body class="d-flex justify-content-center align-items-center" style="min-height: 150px;">
        <h5 class="text-center m-0">Permohonan Telah Dipastikan</h5>
      </c-modal-body>
      <c-modal-footer class="d-flex justify-content-center">
        <button class="btn btn-secondary btn-dark" (click)="Pasti()">Ya</button>
        <button class="btn btn-secondary btn-dark" (click)="closeModal()">Tidak</button>
      </c-modal-footer>
    </c-modal>

    <c-modal [visible]="PastiyesPasti" (close)="closeModal()">
      <c-modal-body class="d-flex justify-content-center align-items-center" style="min-height: 150px;">
        <h5 class="text-center m-0">Transaksi Telah Berjaya</h5>
      </c-modal-body>
      <c-modal-footer class="d-flex justify-content-center">
        <button class="btn btn-secondary btn-dark" (click)="closePastiModal()">Ok</button>
      </c-modal-footer>
    </c-modal>


    <!-- RIGHT SIDE: Breadcrumb (3 columns) -->

  </c-row>
</div>
