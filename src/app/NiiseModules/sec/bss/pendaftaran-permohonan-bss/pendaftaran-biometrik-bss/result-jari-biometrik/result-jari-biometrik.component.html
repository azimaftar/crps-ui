<!-- Show this card only when button is clicked -->

<c-card-body>
    <c-row>
        <h5>Carian Biometrik</h5>
    </c-row>
    <c-row>
        <!-- Left: Fingerprint sections -->
        <c-col md="9">
            <c-row>
                <c-col>
                    <h4>Ibu Jari Kanan</h4>
                    <c-row>
                        <c-col class="d-flex justify-content-start">
                            <div
                                style="border: 1px solid #ccc; border-radius: 6px; padding:60px 30px; text-align: center; height: 200px;">
                                <img *ngIf="fingerprintImage" [src]="fingerprintImage" alt="Fingerprint Scan"
                                    class="img-fluid rounded shadow" style="height: 100%;" />
                                <video *ngIf="!fingerprintImage" #video autoplay muted playsinline
                                    class="img-fluid rounded shadow" style="height: 100%;"></video>
                            </div>
                        </c-col>
                    </c-row>
                </c-col>

                <c-col>
                    <h4>Ibu Jari Kiri</h4>
                    <c-row>
                        <c-col class="d-flex justify-content-start">
                            <div
                                style="border: 1px solid #ccc; border-radius: 6px; padding:60px 30px; text-align: center; height: 200px;">
                                <img *ngIf="fingerprintImage" [src]="fingerprintImage" alt="Fingerprint Scan"
                                    class="img-fluid rounded shadow" style="height: 100%;" />
                                <video *ngIf="!fingerprintImage" #video autoplay muted playsinline
                                    class="img-fluid rounded shadow" style="height: 100%;"></video>
                            </div>
                        </c-col>
                    </c-row>
                </c-col>
            </c-row>

            <c-row class="mt-3">
                <c-col>
                    <h4>Empat (4) Jari Kanan</h4>
                    <c-row>
                        <c-col class="d-flex justify-content-start">
                            <div
                                style="border: 1px solid #ccc; border-radius: 6px; padding:60px 30px; text-align: center; height: 200px;">
                                <img *ngIf="fingerprintImage" [src]="fingerprintImage" alt="Fingerprint Scan"
                                    class="img-fluid rounded shadow" style="height: 100%;" />
                                <video *ngIf="!fingerprintImage" #video autoplay muted playsinline
                                    class="img-fluid rounded shadow" style="height: 100%;"></video>
                            </div>
                        </c-col>
                    </c-row>
                </c-col>

                <c-col>
                    <h4>Empat (4) Jari Kiri</h4>
                    <c-row>
                        <c-col class="d-flex justify-content-start">
                            <div
                                style="border: 1px solid #ccc; border-radius: 6px; padding:60px 30px; text-align: center; height: 200px;">
                                <img *ngIf="fingerprintImage" [src]="fingerprintImage" alt="Fingerprint Scan"
                                    class="img-fluid rounded shadow" style="height: 100%;" />
                                <video *ngIf="!fingerprintImage" #video autoplay muted playsinline
                                    class="img-fluid rounded shadow" style="height: 100%;"></video>
                            </div>
                        </c-col>
                    </c-row>
                </c-col>
            </c-row>
        </c-col>

        <!-- Right: Input box -->
        <c-col md="3" class="d-flex align-items-center">
            <div class="w-100">
                <input type="text" class="form-control" placeholder="Lulus">
            </div>
        </c-col>
    </c-row>

    <c-row>
        <div class="bottom-navigation d-flex justify-content-start p-3">
            <button class="btn btn-back btn-dark m-2" (click)="null">Pengecualian Biometrik</button>
        </div>
        <div class="bottom-navigation d-flex justify-content-end p-3">
            <button class="btn btn-back btn-dark m-2" (click)="null">Hantar</button>
            <div class="right-buttons">
                <button class="btn btn-back btn-dark m-2" (click)="null">&lt;</button>
                <button class="btn btn-next btn-dark m-2" (click)="null">&gt;</button>
            </div>
        </div>
    </c-row>
</c-card-body>
