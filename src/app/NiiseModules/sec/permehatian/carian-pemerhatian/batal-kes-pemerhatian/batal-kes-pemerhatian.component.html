<div class="container-fluid">
    <c-row>
        <!--LEFT SIDE: Main Content (9 columns)-->
        <c-col d="9" class="pe-0">

            <!--Section 1-->
            <div *ngIf="currentSection === 2">
                <c-card>
                    <c-card-header>
                        <h5 class="class-title">Maklumat Peribadi</h5>
                    </c-card-header>
                    <c-card-body>
                        <form>
                            <c-row>
                                <c-col>
                                    <label class="form-table">Nama<span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" value="Aiman Bin Kasim" disabled>
                                </c-col>
                            </c-row>
                            <c-row>
                                <c-col md="4">
                                    <label class="form-label">No Kad Pengenalan<span class="text-danger">*</span></label>
                                    <select class="form-select" disabled>
                                        <option value="other">Sila Pilih</option>
                                        <option value="malaysia">MYKAD</option>
                                        <option value="mypr">MYPR</option>
                                        <option value="mykas">MYKAS</option>
                                        <option value="mytentera">MYTENTERA</option>
                                        <option value="pelarian">No. Pelarian atau No khas Imigresen</option>
                                    </select>
                                </c-col>
                            </c-row>
                            <c-row>
                                <c-col md="4">
                                    <label class="form-label">No. Dokumen<span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" value="8902211049901" placeholder="Contoh:123456789012"disabled>
                                </c-col>
                                <c-col md="2"></c-col>
                                <c-col md="6">
                                    <label class="form-label">Jenis Dokumen<span class="text-danger">*</span></label>
                                    <select class="form-select"disabled>
                                        <option value="other"> Sila Pilih</option>
                                        <option value="malaysia">Pasport Malaysia</option>
                                        <option value="antarabangsa">Pasport Antarabangsa</option>
                                    </select>
                                </c-col>
                            </c-row>
                            <c-row>
                                <c-col md="5">
                                    <label class="form-label">Warganegara<span class="text-danger">*</span> </label>
                                    <select class="form-select" disabled>
                                        <option value="other">Sila Pilih</option>
                                        <option value="malaysia">MYS</option>
                                        <option value="singapore">SG</option>
                                        <option value="indonesia">IDN</option>
                                    </select>
                                </c-col>
                                <c-col md="1"></c-col>
                                <c-col md="4">
                                    <label class="form-label">Bangsa<span class="text-danger">*</span> </label>
                                    <select class="form-select" disabled>
                                        <option value="other">Sila Pilih</option>
                                    </select>
                                </c-col>
                            </c-row>
                            <c-row>
                                <c-col md="3">
                                    <label class="form-label">Tarikh Lahir<span class="text-danger">*</span></label>
                                    <input type="date" class="form-control" value="1989-02-11" disabled>
                                </c-col>
                                <c-col md="3"></c-col>
                                <c-col md="4">
                                    <label class="form-label">Jantina<span class="text-danger">*</span> </label>
                                    <select class="form-select"disabled>
                                        <option value="lelaki">Lelaki</option>
                                        <option value="perempuan">Perempuan</option>
                                    </select>
                                </c-col>
                            </c-row>
                            <c-row>
                                <c-col md="4">
                                  <label class="form-label">Unik ID<span class="text-danger">*</span></label>
                                       <input type="text" class="form-control" value="1989-02-11" disabled>
                                </c-col>
                            <c-col md="2"></c-col>
                                <c-col md="3">
                                 <label class="form-label">Data Biometrik<span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" value="1989-02-11" disabled>
                                </c-col>
                            </c-row>
                            <c-row>
                                <c-col >
                                     <label class="form-label">Catatan Fizikal (jika ada)<span class="text-danger">*</span></label>
                                         <textarea class="form-control" style="height: 100px" disabled></textarea>
                                </c-col>
                            </c-row>
                            <c-row>
                                <c-col >
                                <label class="form-label">Catatan Tambahan<span class="text-danger">*</span></label>
                                    <textarea class="form-control" style="height: 100px" disabled></textarea>
                                </c-col>
                            </c-row>
                        </form>
                    </c-card-body>
                </c-card>
            </div>

            <!--Section 2-->
            <div *ngIf="currentSection===3">
                <c-card>
                    <c-card-header>
                        <h5 class="card-title">Maklumat Tindakan</h5>
                    </c-card-header>
                    <c-card-body>
                        <form>
                            <c-row>
                                <c-col md="4">
                                    <label class="form-label">Kod NAP/NAS<span class="text-danger">*</span> </label>
                                    <input type="text" class="form-control" disabled>
                                </c-col>
                                <c-col md="2"></c-col>
                                <c-col md="4">
                                    <label class="form-label">Nombor NAP/NAS<span class="text-danger">*</span> </label>
                                    <input type="text" class="form-control" disabled>
                                </c-col>
                            </c-row>
                            <c-row>
                                <c-col md="4">
                                    <label class="form-label">Kod Tindakan<span class="text-danger">*</span> </label>
                                    <input type="text" class="form-control" disabled>
                                </c-col>
                                <c-col md="2"></c-col>
                                <c-col md="4">
                                    <label class="form-label">Tarikh NAP/NAS<span class="text-danger">*</span> </label>
                                    <input type="date" class="form-control" disabled>
                                </c-col>
                            </c-row>
                             <c-row>
                                <c-col md="4">
                                    <label class="form-label">Tarikh Kuatkuasa<span class="text-danger">*</span></label>
                                    <input type="date" class="form-control" value="2025-05-15"disabled >
                                </c-col>
                                <c-col md="2"></c-col>
                                <c-col md="6">
                                    <label class="form-label">Tempat Kesalahan</label>
                                    <input type="text" class="form-control" disabled>
                                </c-col>
                            </c-row>
                            <c-row>
                                <c-col md="5">
                                    <label class="form-label">Pilih Tempoh<span class="text-danger">*</span></label>
                                    <input type="text" class="form-control"disabled >
                                </c-col>
                                <c-col md="1"></c-col>
                                <c-col md="3">
                                    <label class="form-label">Tarikh Tamat Kes</label>
                                    <input type="date" class="form-control" value="2025-05-25" disabled>
                                </c-col>
                            </c-row>
                            <c-row>
                                <c-col md="6">
                                    <label class="form-label">No. Fail Imigresen<span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" value="999" disabled>
                                </c-col>
                            </c-row>
                            <c-row>
                                <c-col md="6">
                                    <label class="form-label">No. Fail Agensi<span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" value="111" disabled>
                                </c-col>
                            </c-row>
                            <c-row>
                                <c-col md="6">
                                    <label class="form-label">Nombor Rujukan Agensi</label>
                                    <input type="text" class="form-control" value="111" disabled>
                                </c-col>
                                <c-col md="6">
                                    <label class="form-label">Agensi Pelapor<span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" disabled>
                                </c-col>
                            </c-row>
                            <c-row class="p-2">
                                <label class="form-label">Arahan Khusus (Jika Ada)</label>
                                <textarea class="form-control" rows="2" disabled></textarea>
                            </c-row>
                            <c-row>
                                <c-col md="6">
                                    <label class="form-label">Nama Pegawai untuk Dihubungi</label>
                                    <input type="text" class="form-control" disabled>
                                </c-col>
                            </c-row>
                            <c-row>
                                <label class="form-label">No Telefon Pegawai untuk Dihubungi</label>
                                <input type="text" class="form-control" disabled>
                            </c-row>
                            <c-row>
                                <label class="form-label">Maklumat Agensi</label>
                                <input type="text" class="form-control" disabled>
                            </c-row>
                            <c-row>
                                <c-col md="6">
                                    <label class="form-label">Emel Agensi</label>
                                    <input type="text" class="form-control" disabled>
                                </c-col>
                            </c-row>
                            <c-row class="p-2">
                                    <label class="form-label">Keterangan Kes</label>
                                    <textarea class="form-control" rows="2" disabled></textarea>
                            </c-row>
                            <c-row>
                                <c-col md="6">
                                    <label class="form-label">Cawangan</label>
                                    <input type="text" class="form-control"  value="Bahagian H" disabled>
                                </c-col>
                            </c-row>
                            <c-row>
                                <c-col md="6">
                                    <label class="form-label">Maklumat SL Pemerhatian (SLO)</label>
                                    <input type="text" class="form-control" disabled>
                                </c-col>
                            </c-row>
                        </form>
                    </c-card-body>
                </c-card>
            </div>
                 <!-- Section 3 -->
      <div *ngIf="currentSection === 4">
        <c-card>
          <c-card-header>
            <h5 class="card-title">Dokumen Sokongan</h5>
          </c-card-header>
          <c-card-body>
            <form>
              <c-row class="p-5">
                <c-col class="d-flex align-items-center justify-content-end ">
                  <button class="btn btn-dark btn-search" (click)="null">Papar</button>
                </c-col>
              </c-row>
             
              <div class="table-container table-responsive">
                <table class="subjects-table table table-bordered table-striped w-100">
                  <thead>
                    <tr>
                      <th class="col-2">Bil</th>
                      <th class="col-2">Keterangan</th>
                      <th class="col-2">Nama Dokumen</th>
                      <th class="col-2">Format</th>
                      <th class="col-2"></th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr>
                      <td>1</td>
                      <td>Permohonan SL</td>
                      <td></td>
                      <td></td>
                      <td><button class="btn btn-dark btn-search" (click)="null">Papar</button></td>
                    </tr>
                    <tr>
                      <td>2</td>
                      <td>Salinan Kad Pengenalan</td>
                      <td></td>
                      <td></td>
                      <td><button class="btn btn-dark btn-search" (click)="null">Papar</button></td>
                    </tr>
                  </tbody>
                </table>
                <a>*Saiz fail maksimum: 10MB</a>
                <c-col >
                  <label class="form-label">Catatan:<span class="text-danger">*</span></label>
                   <textarea class="form-control" style="height: 100px" ></textarea>
                </c-col>  
              </div>
           
            </form>
          </c-card-body>
        </c-card>
      </div>
        </c-col>

        
    
    <c-col md="3" class="ps-0" style="border-left: 2px solid #ccc;">
      <c-card class="h-100 shadow-sm border-0 bg-white rounded-0">
        <c-card-body>
          <app-breadcrumb-pemerhatian [activeStep]="currentSection"></app-breadcrumb-pemerhatian>
        </c-card-body>
      </c-card>
    </c-col>

    <!-- Navigation/Footer Buttons -->
     
   <div class="bottom-navigation d-flex justify-content-between align-items-center p-3">
  <div>
    <button class="btn btn-next btn-dark m-2" (click)="goToNextSection()">Kembali</button>
  </div>
  <div class="d-flex align-items-center">
    <button class="btn btn-reset btn-dark m-2" (click)="null" >Set Semula</button>

    <ng-container *ngIf="currentSection === 1 || currentSection === 2|| currentSection === 3">
      <button class="btn btn-back btn-dark m-2" (click)="null" disabled>Hantar</button>
    </ng-container>
    <ng-container *ngIf="currentSection === 4">
      <button class="btn btn-back btn-dark m-2" (click)="modelforhantar()">Hantar</button>
    </ng-container>

    <button class="btn btn-back btn-dark m-2" (click)="goToPreviousSection()">&lt;</button>
    <button class="btn btn-next btn-dark m-2" (click)="goToNextSection()">&gt;</button>
  </div>
</div>

    <!-- Dialog Box -->
    <c-modal [visible]="Hantarmodel" (close)="closeModal()">
      <c-modal-body class="d-flex justify-content-center align-items-center" style="min-height: 150px;">
        <h5 class="text-center m-0">Adakah anda pasti?</h5>
      </c-modal-body>
      <c-modal-footer class="d-flex justify-content-center">
        <button class="btn btn-secondary btn-dark" (click)="Pasti()">Ya</button>
        <button class="btn btn-secondary btn-dark" (click)="closeModal()">Tidak</button>
      </c-modal-footer>
    </c-modal>

    <!-- Modal SEC-S003 -->
    <c-modal [visible]="PastiyesPasti" (close)="closeModal()">
      <c-modal-body class="d-flex justify-content-center align-items-center" style="min-height: 150px;">
        <h5 class="text-center m-0">Permohonan telah berjaya dihantar untuk kelulusan</h5>
      </c-modal-body>
      <c-modal-footer class="d-flex justify-content-center">
        <button class="btn btn-secondary btn-dark" (click)="closePastiModal()">Ok</button>
      </c-modal-footer>
    </c-modal>


    <!-- RIGHT SIDE: Breadcrumb (3 columns) -->

  
    </c-row>
</div>
