<!-- User Tabs -->
<div class="user-tabs d-flex justify-content-center mb-4">
  <button class="btn"
          [ngClass]="{'btn-dark': activeUser === 'imigresen', 'btn-outline-dark': activeUser !== 'imigresen'}"
          (click)="Tambahimigresen()">
    Imigresen
  </button>

  <button class="btn ms-2"
          [ngClass]="{'btn-dark': activeUser === 'kastam', 'btn-outline-dark': activeUser !== 'kastam'}"
          (click)="Tambahkastam()">
    Kastam
  </button>

  <button class="btn ms-2"
          [ngClass]="{'btn-dark': activeUser === 'lhdn', 'btn-outline-dark': activeUser !== 'lhdn'}"
          (click)="Tambahlhdn()">
    LHDN
  </button>
</div>

<div *ngIf="currentSection === 4">
  <c-card>
    <c-card-header class="d-flex justify-content-between align-items-center">
      <h5 class="card-title m-0">📑 Dokumen Sokongan</h5>
      <small class="text-muted">*Saiz fail maksimum: 10MB</small>
    </c-card-header>

    <c-card-body>
      <form>

        <!-- Upload Rows -->
        <div class="table-container table-responsive mb-4">
          <table class="table table-hover align-middle text-center">
            <thead class="table-dark">
              <tr>
                <th style="width:5%">Bil</th>
                <th style="width:30%">Keterangan</th>
                <th style="width:30%">Nama Dokumen</th>
                <th style="width:15%">Format</th>
                <th style="width:20%">Tindakan</th>
              </tr>
            </thead>
            <tbody>
              <!-- Row 1 -->
              <tr>
                <td>1</td>
                <td class="text-start">Permohonan SL</td>
                <td class="text-muted">
                  <i class="bi bi-file-earmark-text me-1"></i>
                  {{ selectedFileName1 || '-' }}
                </td>
                <td><span class="badge bg-secondary">PDF / JPG</span></td>
                <td>
                  <button type="button" class="btn btn-sm btn-outline-dark me-2"
                          (click)="triggerFileInput('file1')">
                    <i class="bi bi-upload"></i> Muat Naik
                  </button>
                  <input type="file" id="file1" hidden (change)="onFileChange($event, 1)" />
                </td>
              </tr>

              <!-- Row 2 -->
              <tr>
                <td>2</td>
                <td class="text-start">Salinan Kad Pengenalan</td>
                <td class="text-muted">
                  <i class="bi bi-file-earmark-text me-1"></i>
                  {{ selectedFileName2 || '-' }}
                </td>
                <td><span class="badge bg-secondary">PDF / JPG</span></td>
                <td>
                  <button type="button" class="btn btn-sm btn-outline-dark me-2"
                          (click)="triggerFileInput('file2')">
                    <i class="bi bi-upload"></i> Muat Naik
                  </button>
                  <input type="file" id="file2" hidden (change)="onFileChange($event, 2)" />
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <!-- Confirmation Checkbox -->
        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" id="confirmation">
          <label class="form-check-label fw-semibold" for="confirmation">
          Saya mengesahkan maklumat yang diberikan adalah sah dan benar.
          </label>
        </div>

      </form>
    </c-card-body>
  </c-card>
</div>
