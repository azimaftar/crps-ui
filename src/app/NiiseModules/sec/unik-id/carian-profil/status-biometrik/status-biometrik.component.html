<div class="container-fluid">
  <div class="form-section">
    <div class="row">
      <!-- Left Side: Officer Info -->
      <div class="col-md-9 border-end pe-4">
        <h5>Carian Biometrik</h5>

        <form class="mt-3" > <!-- Optional if you handle submission -->
          <div class="row mb-3">
            <div class="row mb-3">
              <div class="col-md-4">
                <label class="form-label required d-block mb-2">Empat (4) Jari Kanan</label>
                <div class="photo-class">
                  <img src="assets/images/4rightfinger.jpg" class="finger-image" alt="4 Jari Kanan">
                </div>
              </div>

              <div class="col-md-4">
                <label class="form-label required d-block mb-2">Empat (4) Jari Kiri</label>
                <div class="photo-class">
                  <img src="assets/images/4leftfinger.jpg" class="finger-image" alt="4 Jari Kiri">
                </div>
              </div>
            </div>

            <div class="row mb-3">
              <div class="col-md-4">
                <label class="form-label required d-block mb-2">Ibu Jari Kanan</label>
                <div class="photo-class">
                <img src="assets/images/momfingerright.jpg" class="finger-image" alt="Ibu Jari Kanan">
                </div>
              </div>
              <div class="col-md-4 ">
                <label class="form-label required d-block mb-2">Ibu Jari Kiri</label>
                <div class="photo-class">
                <img src="assets/images/momfingerleft.jpg" class="finger-image" alt="Ibu Jari Kiri">
                </div>
              </div>
              <div class="col-md-4">
                <label class="form-label required">
                  Lulus / Gagal
                </label>
              </div>
            </div>

            <div class="col-md-6">
              <label class="form-label required">Pengecualian Biometrik</label>
              <select class="form-select" [(ngModel)]="selectedCategory" [ngModelOptions]="{ standalone: true }">
                <option value="facedenied">Imbasan Wajah Gagal</option>
                <option value="fingertissue">Tisu Jari Rosak</option>
                <option value="okufinger">OKU Tiada Jari</option>
                <option value="facenotperf">Wajah Tidak Sempurna</option>
                <option value="okueyes">OKU Tiada Penglihatan</option>
                <option value="vvip">VVIP</option>
              </select>
            </div>

            <!-- Submit Button -->
            <div class="row mb-3 justify-content-end">
              <div class="col-auto">
                <button type="button" class="btn btn-primary" style="width: 100px;" (click)="goToMaklumatProfilIndividu()">
                  Hantar
                </button>
              </div>
            </div>
          </div>
        </form>
      </div>

      <!-- Right Side: Steps with vertical line -->
      <div class="col-md-3 ps-4 border-start">
        <div
          class="step"
          [class.active]="isStepActive(1)"
          [class.completed]="isStepCompleted(1)"
        >
          <div class="circle">1</div>
          <div class="label">Carian Profil</div>
        </div>
        <div
          class="step"
          [class.active]="isStepActive(2)"
          [class.completed]="isStepCompleted(2)"
        >
          <div class="circle">2</div>
          <div class="label">Profil Individu</div>
        </div>
      </div>
    </div>

    <!-- Navigation Buttons -->
    <div class="d-flex justify-content-end mt-4">
      <button
        class="btn btn-secondary me-2"
        (click)="goToPreviousStep()"
        [disabled]="currentStep === 1"
      >
        &lt;
      </button>
      <button
        class="btn btn-dark"
        (click)="goToMaklumatPengganti()"
        [disabled]="currentStep === maxStep"
      >
        &gt;
      </button>
    </div>
  </div>
</div>
