<div class="container-fluid">
  <div class="form-section">
    <div class="row">
      <!-- Left Side: Officer Info -->
      <div class="col-md-9 border-end pe-4">
        <h5>Carian Profil</h5>

        <form class="mt-3">
           
                  <!-- row 1 -->
                  <div class="row mb-3">
                    <div class="col-md-6">
                      <label class="form-label required">Kategori Carian</label>
                      <select class="form-select" [(ngModel)]="selectedCategory" [ngModelOptions]="{ standalone: true }">
                        <option value="pengenalan">No. Pengenalan</option>
                        <option value="dokumen">No. Dokumen</option>
                        <option value="pas">No. Pas</option>
                        <option value="badan">No. Badan</option>
                      </select>
                    </div>
                  </div>
                  
                  <!-- row 2 -->
                  <div class="row mb-3">
                    <div class="col-md-6">
                      <label class="form-label required">
                        {{ categoryMap[selectedCategory] || 'papar nama jenis' }}
                      </label>
                      <input type="text"  class="form-control" [(ngModel)]="searchvalue.carian" name="carian"/>
                    </div>
                  </div>

                <div class="row mb-3 justify-content-end">
                  <div class="col-auto">
                    <button type="submit" class="btn btn-primary" style="width: 100px;" (click)="goToMaklumatProfil()">
                      Cari
                    </button>
                  </div>
                </div>

                <div class="row mb-3 justify-content-end">
                  <div class="col-auto">
                    <button class="btn btn-primary" style="width: 100px;" (click)="goToBiometrik()">
                      Cari Biometrik
                    </button>
                  </div>
                </div>
        </form>
      </div>

      <!-- Right Side: Steps with vertical line -->
      <div class="col-md-3 ps-4 border-start">
        <div
          class="step"
          [class.active]="isStepActive(1)"
          [class.completed]="isStepCompleted(1)"
        >
          <div class="circle">1</div>
          <div class="label">Carian Profil</div>
        </div>
        <div
          class="step"
          [class.active]="isStepActive(2)"
          [class.completed]="isStepCompleted(2)"
        >
          <div class="circle">2</div>
          <div class="label">Maklumat Profil Individu</div>
        </div>
        <div
          class="step"
          [class.active]="isStepActive(3)"
          [class.completed]="isStepCompleted(3)"
        >
          <div class="circle">2</div>
          <div class="label">Maklumat Profil Terperinci</div>
        </div>
      </div>
    </div>

    <!-- Navigation Buttons -->
    <div class="d-flex justify-content-end mt-4">
      <button
        class="btn btn-secondary me-2"
        (click)="goToPreviousStep()"
        [disabled]="currentStep === 1"
      >
        &lt;
      </button>
      <button
        class="btn btn-dark"
        (click)="goToNextStep()"
        [disabled]="currentStep === maxStep"
      >
        &gt;
      </button>
    </div>
  </div>
</div>
