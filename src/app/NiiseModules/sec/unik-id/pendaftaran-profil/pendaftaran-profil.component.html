<div class="container-fluid">
  <div class="form-section">
    <div class="row">
      <!-- Left Side: Officer Info -->
      <div class="col-md-9 border-end pe-4">
        <h5>Pendaftaran Profil</h5>

        <form class="mt-3">
           
          <div class="row mb-3">
              <label class="form-label required"> Nama </label>
              <input type="text"  class="form-control" />
          </div>

                  <!-- row 1 -->
                  <div class="row mb-3">
                    <div class="col-md-6">
                      <label class="form-label required">Jenis Dokumen</label>
                      <select class="form-select" [(ngModel)]="selectedCategory" [ngModelOptions]="{ standalone: true }">
                        <option value="passportM">Passport Malaysia Antarabangsa</option>
                        <option value="ic">No. Kad Pengenalan</option>
                      </select>
                    </div>
                    <div class="col-md-6">
                      <label class="form-label required"> No Dokumen </label>
                      <input type="text"  class="form-control" />
                    </div>
                  </div>

                  <div class="row mb-3">
                    <div class="col-md-6">
                      <label class="form-label required">Warganegara</label>
                      <select class="form-select" [(ngModel)]="selectedCategory" [ngModelOptions]="{ standalone: true }">
                        <option value="citizen">Warganegara</option>
                        <option value="noncitizen">Bukan Warganegara</option>
                      </select>
                    </div>
                    <div class="col-md-6">
                       <label class="form-label required">Tarikh Lahir</label>
                      <input type="date" class="form-control" name="tarikh" />
                    </div>
                  </div>

                  <div class="row mb-3">
                    <div class="col-md-6">
                      <label class="form-label required">Jantina</label>
                      <select class="form-select" [(ngModel)]="selectedCategory" [ngModelOptions]="{ standalone: true }">
                        <option value="m">Lelaki</option>
                        <option value="f">Perempuan</option>
                      </select>
                    </div>
                  </div>
                  
                  <div class="row mb-3">
                    <div class="col-md-6">
                      <label class="form-label required"> Alamat (Di Malaysia) </label>
                      <input type="text"  class="form-control" />
                    </div>
                  </div>

                  <div class="row mb-3">
                    <div class="col-md-6">
                      <label class="form-label required"> No Telefon </label>
                      <input type="text"  class="form-control" />
                    </div>
                    <div class="col-md-6">
                      <label class="form-label required"> E-Mel </label>
                      <input type="text"  class="form-control" />
                    </div>
                  </div>

                  <div class="row mb-3">
  <div class="col d-flex align-items-center">
    <input
      class="form-check-input big-square-radio me-2"
      type="checkbox"
      id="syarat"
    />
    <label class="form-check-label" for="syarat">
      Saya mengesahkan maklumat yang diberikan adalah sah dan benar
    </label>
  </div>
</div>


  <div class="row mb-3 align-items-center">
  <!-- Left: Dropdown -->
  <div class="col-md-6">
    <button type="button" class="btn btn-primary" style="width: 140px;" (click)="showPengecualian()">
                Pengecualian Biometrik
    </button>
  </div>

  <!-- Right: Buttons aligned to right -->
  <div class="col-md-6 d-flex justify-content-end gap-2">
    <button class="btn btn-primary" style="width: 140px;" (click)="goToBiometrik()">
      Ambil Cap Jari
    </button>
    <button class="btn btn-primary" style="width: 160px;" (click)="gotoFaceBiometrik()">
      Ambil Wajah & Iris
    </button>
  </div>
</div>


                <div class="row mb-3 justify-content-end">
                  <div class="col-auto">
                    <button type="submit" class="btn btn-primary" style="width: 100px;" >
                      Hantar
                    </button>
                  </div>
                </div>
        </form>
      </div>

      <!-- Right Side: Steps with vertical line -->
      <div class="col-md-3 ps-4 border-start">
        <div
          class="step"
          [class.active]="isStepActive(1)"
          [class.completed]="isStepCompleted(1)"
        >
          <div class="circle">1</div>
          <div class="label">Carian Profil</div>
        </div>
        <div
          class="step"
          [class.active]="isStepActive(2)"
          [class.completed]="isStepCompleted(2)"
        >
          <div class="circle">2</div>
          <div class="label">Profil Individu</div>
        </div>
      </div>
    </div>

    <!-- Navigation Buttons -->
    <div class="d-flex justify-content-end mt-4">
      <button
        class="btn btn-secondary me-2"
        (click)="goToPreviousStep()"
        [disabled]="currentStep === 1"
      >
        &lt;
      </button>
      <button
        class="btn btn-dark"
        (click)="goToMaklumatPengganti()"
        [disabled]="currentStep === maxStep"
      >
        &gt;
      </button>
    </div>
  </div>
</div>

<app-popup
  [HantarPengecualian]="PengecualianPopup"
  (close)="closeModal()">
</app-popup>
