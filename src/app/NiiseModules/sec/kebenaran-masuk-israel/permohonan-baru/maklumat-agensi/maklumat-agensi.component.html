<c-card class="mb-3">
    <c-card-body>
        <c-row>
            <h5 class="mb-4 custom-header">
                Maklumat Syarikat
            </h5>
        </c-row>
        <c-row>
            <!-- Horizontal Stepper -->
            <div class="horizontal-stepper">
                <ul class="stepper-list d-flex align-items-center justify-content-start flex-wrap">
                    <li class="stepper-item" *ngFor="let step of steps" [class.active]="isStepActive(step.number)">
                        <button type="button" class="step-btn" (click)="navigateTo(step)">
                            <span class="step-number">{{ step.number }}</span>
                            <span class="step-title">{{ step.title }}</span>
                        </button>
                    </li>
                </ul>
            </div>
        </c-row>
        <c-col class="md-12">
            <c-row class="mb-3 mt-4">
                <c-col class="col-md-6">
                    <div class="d-flex align-items-center">
                        <label class="form-label custom-form-label me-2 flex-shrink-0" style="min-width: 180px;">
                            No. Rujukan Permohonan
                        </label>
                        <input type="text" class="form-control flex-grow-1">
                    </div>
                </c-col>
            </c-row>



            <c-row class="mb-3">
                <c-col class="col-md-4">
                    <label class="form-label custom-form-label">No. Pendaftaran Syarikat</label>
                    <input type="text" class="form-control">
                </c-col>
                <c-col class="col-md-1 d-flex align-items-end">
                    <button cButton class="custom-btn w-100">
                        Cari
                    </button>
                </c-col>
            </c-row>
            <c-row class="mb-3">
                <c-col class="col-md-9">
                    <label class="form-label custom-form-label">Nama Syarikat</label>
                    <input type="text" class="form-control">
                </c-col>
                <c-col class="col-md-3 d-flex align-items-end">
                    <button cButton class="custom-btn w-100" (click)="goToSSMPage()">
                        Papar Maklumat SSM
                    </button>
                    
                </c-col>
            </c-row>
            <c-row class="mb-2">
                <c-col class="col-md-4">
                    <label class="form-label custom-form-label">Alamat Syarikat</label>
                    <input type="text" class="form-control">
                </c-col>

                <c-col class="col-md-4">
                    <label class="form-label custom-form-label">Poskod</label>
                    <input type="text" class="form-control">
                </c-col>
            </c-row>
            <c-row class="mb-2">
                <c-col class="col-md-4">
                    <label class="form-label custom-form-label"></label>
                    <input type="text" class="form-control">
                </c-col>

                <c-col class="col-md-4">
                    <label class="form-label custom-form-label">Bandar</label>
                    <input type="text" class="form-control">
                </c-col>
            </c-row>
            <c-row class="mb-3">
                <c-col class="col-md-4">
                    <label class="form-label custom-form-label"></label>
                    <input type="text" class="form-control">
                </c-col>

                <c-col class="col-md-4">
                    <label class="form-label custom-form-label">Negeri</label>
                    <input type="text" class="form-control">
                </c-col>
            </c-row>
            <c-row class="mb-3">
                <c-col class="col-md-4">
                    <label class="form-label custom-form-label">No. Telefon Syarikat</label>
                    <input type="text" class="form-control">
                </c-col>

                <c-col class="col-md-4">
                    <label class="form-label custom-form-label">Emel Syarikat</label>
                    <input type="text" class="form-control">
                </c-col>
            </c-row>
            <c-row class="mb-5">
                <c-col class="col-md-4">
                    <label class="form-label custom-form-label">No. Rujukan Surat Kelulusan KDN</label>
                    <input type="text" class="form-control">
                </c-col>

                <c-col class="col-md-4">
                    <label class="form-label custom-form-label">Tarikh Kelulusan Surat KDN Dikeluarkan</label>
                    <input type="date" class="form-control">
                </c-col>

            </c-row>
            <!-- Table -->
            <div class="table-responsive custom-table-container" style="margin-top: 20px;">
                <table class="custom-table">
                    <thead>
                        <tr>
                            <th style="width: 10%;">Bil.</th>
                            <th style="width: 30%;">Keterangan</th>
                            <th style="width: 30%;">Nama Dokumen
                            </th>
                            <th style="width: 15%;">Format</th>
                            <th style="width: 15%;">Tindakan</th>
                        </tr>
                        <tr>
                            <td>1</td>
                            <td>Surat Kelulusan KDN</td>
                            <td></td>
                            <td></td>
                            <td><button cButton class="action-btn">
                                </button></td>
                        </tr>
                    </thead>
                </table>
            </div>
            <p class="text-muted mt-2" style="font-size: 0.9rem;">
                <em>*Saiz fail maksimum: 10MB</em>
            </p>

        </c-col>
        <div class="action-footer d-flex justify-content-between align-items-center">
            <!-- Checkbox kiri, diganjakkan -->
            <div class="form-check mt-2 d-flex align-items-center" style="margin-left: 125px;">
                <input class="form-check-input custom-checkbox" type="checkbox" id="agreeUpload">
                <label class="form-check-label ms-2" for="agreeUpload">
                    Saya mengesahkan maklumat yang diberikan adalah sah dan benar
                </label>
            </div>

            <!-- Buttons kanan -->
            <div class="nav-buttons">
                <button type="button" class="action-btn">
                    <svg cIcon name="cil-check-circle" class="me-2"></svg>
                    Simpan
                </button>

                <button type="button" class="nav-btn prev-btn" (click)="goBack()">
                    <svg cIcon name="cil-chevron-circle-left-alt"></svg>
                </button>

                <button type="button" class="nav-btn next-btn" (click)="goToIndividuPage()">
                    <svg cIcon name="cil-chevron-circle-right-alt"></svg>
                </button>
            </div>
        </div>

    </c-card-body>
</c-card>
