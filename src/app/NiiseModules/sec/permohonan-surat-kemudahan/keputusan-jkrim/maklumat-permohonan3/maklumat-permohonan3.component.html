<c-card class="mb-3">  
    <!-- CONTENT CARD BODY -->
    <c-card-body>
        <c-row>
            <!-- FORMS -->
            <c-col md="9">
                <!-- FORMS START -->
                <!-- Form Title -->
                <h5 class="mb-4">Maklumat Pemohon</h5>

                <!-- Form Content -->
                <div class="mb-3 row">
                    <!-- No Pengenalan Field -->
                    <div class="col-md-6">
                        <label class="form-label">
                            {{ selectedCategory === 'warga_asing' ? 'No. Pasport*' : 'No. Kad Pengenalan*' }}
                        </label>
                        <input 
                            type="text" 
                            style="width: 85%;" 
                            class="form-control"
                            [value]="formData.noKP"
                            readonly>
                    </div>
                    
                    <!-- Warganegara Field -->
                    <div class="col-md-6">
                        <label class="form-label">Warganegara*</label>
                        <input 
                            type="text" 
                            style="width: 70%;" 
                            class="form-control"
                            [value]="formData.warganegara"
                            readonly>
                    </div>
                </div>
                
                <!-- Nama Field -->
                <div class="mb-3 row">
                    <div class="col-md-12">
                        <label class="form-label">Nama</label>
                        <input 
                            type="text" 
                            style="width: 85%;" 
                            class="form-control"
                            [value]="formData.nama"
                            readonly>
                    </div>
                </div>

                <!-- Address and Location Fields -->
                <div class="mb-3 row">
                    <div class="col-md-6">
                        <label class="form-label">Alamat</label>
                        <input 
                            type="text" 
                            style="width: 70%;" 
                            class="form-control"
                            [value]="formData.alamat[0]"
                            readonly>
                        <input 
                            type="text" 
                            style="width: 70%; margin-top: 10px;" 
                            class="form-control"
                            [value]="formData.alamat[1]"
                            readonly>
                        <input 
                            type="text" 
                            style="width: 70%; margin-top: 10px;" 
                            class="form-control"
                            [value]="formData.alamat[2]"
                            readonly>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Poskod</label>
                        <input 
                            type="text" 
                            style="width: 70%;" 
                            class="form-control"
                            [value]="formData.poskod"
                            readonly>

                        <label class="form-label" style="margin-top: 5px;">Bandar</label>
                        <input 
                            type="text" 
                            style="width: 70%;" 
                            class="form-control"
                            [value]="formData.bandar"
                            readonly>

                        <label class="form-label" style="margin-top: 5px;">Negeri</label>
                        <input 
                            type="text" 
                            style="width: 70%;" 
                            class="form-control"
                            [value]="formData.negeri"
                            readonly>
                    </div>
                </div>

                <!-- Tujuan Permohonan Field - Made readonly for Papar mode -->
                <div class="mb-3 row">
                    <div class="col-md-12">
                        <label class="form-label">Tujuan Permohonan*</label>
                        <textarea 
                            style="width: 85%; height: 100px; resize: vertical;" 
                            class="form-control"
                            [value]="formData.tujuanPermohonan"
                            readonly></textarea>
                    </div>
                </div>

                <!-- Email Field - Made readonly for Papar mode -->
                <div class="mb-3 row">
                    <div class="col-md-12">
                        <label class="form-label">E-mel*</label>
                        <input 
                            type="email" 
                            style="width: 85%;" 
                            class="form-control"
                            [value]="formData.email"
                            readonly>
                    </div>
                </div>
            </c-col>

            <!-- STEPPER -->
            <c-col md="3" class="px-4 py-3 mt-3 stepper-container">
                <ul class="stepper-list">
                    <li 
                        class="stepper-item"
                        [class.active]="currentStep === step.number"
                        *ngFor="let step of steps; let i = index">
                        <div class="stepper-content">
                            <span 
                                class="step-number"
                                [class.active]="currentStep === step.number">
                                {{ step.number }}
                            </span>
                            <span 
                                class="step-title"
                                [class.active]="currentStep === step.number">
                                {{ step.title }}
                            </span>
                        </div>
                    </li>
                </ul>
            </c-col>
        </c-row>
        <!-- END OF CONTENT -->

        <!-- DOKUMEN SOKONGAN SECTION -->
        <c-row>
            <!-- FORMS -->
            <c-col md="8">
                <!-- Form Title -->
                <h5 class="mb-4">Dokumen Sokongan</h5>

                <!-- Required Documents Table -->
                <div class="table-responsive">
    <table class="table table-bordered">
        <thead class="table-light">
            <tr>
                <th scope="col" style="width: 5%;">Bil.</th>
                <th scope="col" style="width: 60%;">Keterangan</th>
                <th scope="col" style="width: 25%;">Nama Dokumen</th>
                <th scope="col" style="width: 10%;">Format</th>
                <th scope="col" style="width: 10%;">Tindakan</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th scope="row">1</th>
                <td>Surat Pelepasan daripada Agensi</td>
                <td></td>
                <td></td>
                <td>
                    <button class="btn btn-dark btn-sm w-100">
                        Papar
                    </button>
                </td>
            </tr>
            <tr>
                <th scope="row">2</th>
                <td>Surat Keputusan JKRIM</td>
                <td></td>
                <td></td>
                <td>
                    <button class="btn btn-dark btn-sm w-100">
                        Papar
                    </button>
                </td>
            </tr>
        </tbody>
    </table>
</div>
            </c-col>
        </c-row>

        <!-- FOOTER CONTENT FOR BUTTONS -->
        <c-row class="mt-4 mb-3">
            <c-col class="d-flex justify-content-end align-items-center gap-2 flex-wrap">
    <!-- View Mode -->
    <div class="d-flex gap-2" *ngIf="isViewMode">
        <button type="button" 
                class="btn btn-primary text-white px-3 text-nowrap"
                (click)="goBack()">
            <i class="fas fa-chevron-left me-1"></i>
            <span class="d-none d-sm-inline">Kembali</span>
        </button>
        <button type="button" 
                class="btn btn-primary text-white px-3 text-nowrap"
                (click)="goNext()">
            <span class="d-none d-sm-inline">Seterusnya</span>
            <i class="fas fa-chevron-right ms-1"></i>
        </button>
    </div>
    
    <!-- Edit Mode -->
    <div class="d-flex gap-2" *ngIf="!isViewMode">
        <button type="button" 
                class="btn btn-primary text-white px-3 text-nowrap"
                (click)="goBack()">
            <i class="fas fa-chevron-left me-1"></i>
            <span class="d-none d-sm-inline">Kembali</span>
        </button>
        <button type="button" 
                class="btn btn-primary text-white px-3 text-nowrap"
                (click)="goNext()">
            <span class="d-none d-sm-inline">Seterusnya</span>
            <i class="fas fa-chevron-right ms-1"></i>
        </button>
    </div>
</c-col>
        </c-row>
    </c-card-body>
</c-card>

<!-- CoreUI Modal -->
<c-modal 
  [visible]="modalVisible" 
  (visibleChange)="modalVisible = $event"
  backdrop="static"
  keyboard="false">
  
  <c-modal-body class="text-center">
    <!-- Icon placeholder -->
    <div class="mb-3">
      <svg width="64" height="48" viewBox="0 0 64 48" fill="none">
        <rect x="8" y="8" width="48" height="32" stroke="#6c757d" stroke-width="2" fill="none"/>
        <line x1="16" y1="16" x2="48" y2="32" stroke="#6c757d" stroke-width="2"/>
        <line x1="48" y1="16" x2="16" y2="32" stroke="#6c757d" stroke-width="2"/>
      </svg>
    </div>
    
    <p>{{ modalMessage }}</p>
  </c-modal-body>
  
  <c-modal-footer>
    <button 
      type="button" 
      cButton 
      color="dark"
      (click)="onModalOk()"
      class="px-4"
      style="width: 20%;margin-right: 40%;">
      OK
    </button>
  </c-modal-footer>
</c-modal>
