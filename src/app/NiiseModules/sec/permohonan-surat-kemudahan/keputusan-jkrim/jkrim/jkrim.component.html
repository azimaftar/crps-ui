<c-card class="mb-3">
    <!-- CONTENT CARD BODY -->
    <c-card-body>
        <c-row>
            <!-- FORMS -->
            <c-col md="9">
                <!-- FORMS START -->
                <!-- Form Title -->
                <h5 class="mb-4">
                    Keputusan Permohonan JKRIM
                    <span class="badge bg-info ms-2" *ngIf="isViewMode"></span>
                </h5>
                <c-form-check style="margin-left: 10px;">
                    <input cFormCheckInput id="radioSyor" type="radio" name="syorOption" value="syor"
                        [checked]="selectedSyorOption === 'syor'" [disabled]="isViewMode"
                        (change)="onSyorOptionChange('syor')" />
                    <label cFormCheckLabel for="radioSyor">Lulus</label>
                </c-form-check>

                <c-form-check style="margin-left: 10px;">
                    <input cFormCheckInput id="radioTidakSyor" type="radio" name="syorOption" value="tidak_syor"
                        [checked]="selectedSyorOption === 'tidak_syor'" [disabled]="isViewMode"
                        (change)="onSyorOptionChange('tidak_syor')" />
                    <label cFormCheckLabel for="radioTidakSyor">Tidak Lulus</label>
                </c-form-check>

                <!-- Catatan textarea -->
                <div class="col-md-12">
                    <label class="form-label" style="margin-top: 30px;">
                        Catatan (Jika Tolak)
                    </label>
                    <textarea type="text" style="width: 70%;" class="form-control" [value]="catatan"
                        [readonly]="isViewMode" (input)="onCatatanChange($event)">
                    </textarea>
                </div>

                <div class="col-md-6" style="margin-top: 20px;">
                    <label class="form-label">Nama Pengguna</label>
                    <input type="text" style="width: 100%;" class="form-control" [value]="namaPelulus"
                        [readonly]="isViewMode" (input)="onNamaPelulusChange($event)">
                </div>

                <!-- Form inputs for Nama Pengesyor and Tarikh -->
                <div class="mb-3 row" style="margin-top: 20px;">

                    <div class="col-md-6">
                        <label class="form-label">ID Pengguna</label>
                        <input type="text" style="width: 85%;" class="form-control" [value]="idPengguna"
                            [readonly]="isViewMode" (input)="onIdPenggunaChange($event)">
                    </div>


                    <div class="col-md-6">
                        <label class="form-label">Tarikh Keputusan Permohonan JKRIM</label>
                        <input type="date" style="width: 90%;" class="form-control" [value]="tarikhKelulusan"
                            [readonly]="isViewMode" (input)="onTarikhKelulusanChange($event)">
                    </div>
                </div>
                <div style="width: 50%; margin-top: 20px;">
                    <label class="form-label">Tarikh NAP/ NAS</label>
                    <input type="date" style="width: 70%;" class="form-control" [value]="tarikhNapNas"
                        [readonly]="isViewMode" (input)="onTarikhNapNasChange($event)">
                </div>
            </c-col>

            <!-- STEPPER -->
            <c-col md="3" class="px-4 py-3 mt-3 stepper-container">
                <ul class="stepper-list">
                    <li class="stepper-item" [class.active]="currentStep === step.number"
                        *ngFor="let step of steps; let i = index">
                        <div class="stepper-content">
                            <span class="step-number" [class.active]="currentStep === step.number">
                                {{ step.number }}
                            </span>
                            <span class="step-title" [class.active]="currentStep === step.number">
                                {{ step.title }}
                            </span>
                        </div>
                    </li>
                </ul>
            </c-col>
        </c-row>
        <!-- END OF CONTENT -->

        <!-- FOOTER CONTENT FOR BUTTONS -->
        <c-row class="mt-4 mb-3">
            <c-col class="d-flex justify-content-end align-items-center gap-2">
                <!-- Show different buttons based on view mode -->
                <div class="d-flex gap-2" *ngIf="isViewMode">
                    <!-- View Mode: Only show navigation buttons -->
                    <button type="button" class="btn btn-primary text-white px-3" (click)="goBack()">
                        &lt;
                    </button>
                </div>

                <div class="d-flex gap-2" *ngIf="!isViewMode">
                    <!-- Edit Mode: Show all action buttons -->
                    <div class="d-flex gap-2 flex-wrap justify-content-end" *ngIf="!isViewMode">
                        <!-- Action Buttons -->
                        <div class="d-flex gap-2 flex-wrap">
                            <button cButton type="button" color="primary"
                                class="text-white px-3 px-md-4 reset-btn text-nowrap" (click)="resetForm()">
                                <i class="fas fa-undo me-1 me-md-2"></i>
                                <span>Set Semula</span>
                            </button>

                            <button cButton type="button" color="primary"
                                class="text-white px-3 px-md-4 submit-btn text-nowrap" (click)="onSubmit()">
                                <i class="fas fa-paper-plane me-1 me-md-2"></i>
                                <span>Hantar</span>
                            </button>
                        </div>

                        <!-- Navigation Buttons in separate container with margin-start -->
                        <div class="d-flex gap-2 ms-4">
                            <button cButton type="button" color="primary" class="text-white px-3 nav-btn"
                                (click)="goBack()">
                                &lt;
                            </button>
                        </div>
                    </div>
                    </div>
            </c-col>
        </c-row>
    </c-card-body>
</c-card>

<!-- CoreUI Modal -->
<c-modal [visible]="modalVisible" (visibleChange)="modalVisible = $event" backdrop="static" keyboard="false">

    <c-modal-body class="text-center">
        <!-- Icon placeholder -->
        <div class="mb-3">
            <svg width="64" height="48" viewBox="0 0 64 48" fill="none">
                <rect x="8" y="8" width="48" height="32" stroke="#6c757d" stroke-width="2" fill="none" />
                <line x1="16" y1="16" x2="48" y2="32" stroke="#6c757d" stroke-width="2" />
                <line x1="48" y1="16" x2="16" y2="32" stroke="#6c757d" stroke-width="2" />
            </svg>
        </div>

        <p>{{ modalMessage }}</p>
    </c-modal-body>

    <c-modal-footer>
        <button type="button" cButton color="dark" (click)="onModalOk()" class="px-4"
            style="width: 20%;margin-right: 40%;">
            OK
        </button>
    </c-modal-footer>
</c-modal>
