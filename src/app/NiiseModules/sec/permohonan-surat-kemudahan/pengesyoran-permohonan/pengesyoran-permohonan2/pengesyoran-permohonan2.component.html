<c-card class="mb-3">
    <!-- CONTENT CARD BODY -->
    <c-card-body>
        <c-row>
            <!-- FORMS -->
            <c-col md="9">
                <!-- FORMS START -->
                <!-- Form Title -->
                <h5 class="mb-4">
                    Pengesyoran Permohonan
                    <span class="badge bg-info ms-2" *ngIf="isViewMode"></span>
                </h5>

                <!-- Status Permohonan Section -->
                <div>
                    <h6 class="mb-3">Status Permohonan <span class="text-danger">*</span></h6>
                </div>

                <!-- Radio buttons for Syor/Tidak Syor -->
                <c-form-check style="margin-left: 10px;">
                    <input cFormCheckInput id="radioSyor" type="radio" name="syorOption" value="syor"
                        [checked]="selectedSyorOption === 'syor'" [disabled]="isViewMode"
                        (change)="onSyorOptionChange('syor')" />
                    <label cFormCheckLabel for="radioSyor">Syor</label>
                </c-form-check>

                <c-form-check style="margin-left: 10px;">
                    <input cFormCheckInput id="radioTidakSyor" type="radio" name="syorOption" value="tidak_syor"
                        [checked]="selectedSyorOption === 'tidak_syor'" [disabled]="isViewMode"
                        (change)="onSyorOptionChange('tidak_syor')" />
                    <label cFormCheckLabel for="radioTidakSyor">Tidak Syor</label>
                </c-form-check>

                <!-- Validation message for radio buttons -->
                <div class="text-danger small mt-1 ms-2"
                    *ngIf="!isFieldValid('syorOption') && showValidationErrors && !isViewMode">
                    Sila pilih status permohonan
                </div>

                <!-- Catatan textarea -->
                <div class="col-md-12">
                    <label class="form-label" style="margin-top: 30px;">
                        Catatan (Jika Tolak)
                    </label>
                    <textarea type="text" style="width: 70%;" class="form-control" [value]="catatan"
                        [readonly]="isViewMode" (input)="onCatatanChange($event)"
                        placeholder="Masukkan catatan jika permohonan ditolak...">
                    </textarea>
                </div>

                <!-- Form inputs for Nama Pengesyor and Tarikh -->
                <div class="mb-3 row" style="margin-top: 20px;">
                    <!-- Nama Pengesyor Field -->
                    <div class="col-md-6">
                        <label class="form-label">Nama Pengesyor <span class="text-danger">*</span></label>
                        <input type="text" style="width: 85%;" class="form-control"
                            [class.is-invalid]="!isFieldValid('namaPengesyor') && showValidationErrors && !isViewMode"
                            [value]="namaPengesyor" [readonly]="isViewMode" (input)="onNamaPengesyorChange($event)"
                            placeholder="Masukkan nama pengesyor">
                        <div class="invalid-feedback"
                            *ngIf="!isFieldValid('namaPengesyor') && showValidationErrors && !isViewMode">
                            Nama pengesyor diperlukan
                        </div>
                    </div>

                    <!-- Tarikh Pengesyoran Field -->
                    <div class="col-md-6">
                        <label class="form-label">Tarikh Pengesyoran <span class="text-danger">*</span></label>
                        <input type="date" style="width: 70%;" class="form-control"
                            [class.is-invalid]="!isFieldValid('tarikhPengesyoran') && showValidationErrors && !isViewMode"
                            [value]="tarikhPengesyoran" [readonly]="isViewMode"
                            (input)="onTarikhPengesyoranChange($event)">
                        <div class="invalid-feedback"
                            *ngIf="!isFieldValid('tarikhPengesyoran') && showValidationErrors && !isViewMode">
                            Tarikh pengesyoran diperlukan
                        </div>
                    </div>
                </div>
            </c-col>

            <!-- STEPPER -->
            <c-col md="3" class="px-4 py-3 mt-3 stepper-container">
                <ul class="stepper-list">
                    <li class="stepper-item" [class.active]="currentStep === step.number"
                        *ngFor="let step of steps; let i = index">
                        <div class="stepper-content">
                            <span class="step-number" [class.active]="currentStep === step.number">
                                {{ step.number }}
                            </span>
                            <span class="step-title" [class.active]="currentStep === step.number">
                                {{ step.title }}
                            </span>
                        </div>
                    </li>
                </ul>
            </c-col>
        </c-row>
        <!-- END OF CONTENT -->

        <!-- FOOTER CONTENT FOR BUTTONS -->
        <c-row class="mt-4 mb-3">
            <c-col class="d-flex flex-wrap justify-content-end align-items-center gap-2">
                <!-- View Mode -->
                <div class="d-flex flex-wrap gap-2" *ngIf="isViewMode">
                    <button type="button" class="btn btn-primary text-white px-3" (click)="goBack()">
                        <i class="fas fa-arrow-left me-1"></i>
                        <span>Kembali</span>
                    </button>
                </div>

                <!-- Edit Mode -->
                <div class="d-flex flex-wrap gap-2" *ngIf="!isViewMode">
                    <!-- Set Semula Button - Full text remains -->
                    <button cButton type="button" color="primary" class="text-white px-3 flex-grow-1 flex-md-grow-0"
                        (click)="resetForm()">
                        <i class="fas fa-undo me-1"></i>
                        <span>Set Semula</span>
                    </button>

                    <!-- Simpan Button - Full text remains -->
                    <button cButton type="button" color="primary" class="text-white px-3 flex-grow-1 flex-md-grow-0"
                        (click)="saveForm()">
                        <i class="fas fa-save me-1"></i>
                        <span>Simpan</span>
                    </button>

                    <!-- Hantar Button - Full text remains -->
                    <button cButton type="button" color="primary" class="text-white px-3 flex-grow-1 flex-md-grow-0"
                        (click)="onSubmit()">
                        <i class="fas fa-paper-plane me-1"></i>
                        <span>Hantar</span>
                    </button>

                    <!-- Kembali Button - Full text remains -->
                    <button cButton type="button" color="primary" class="text-white px-3 nav-btn" (click)="goBack()">
                        &lt;
                    </button>
                </div>
            </c-col>
        </c-row>
    </c-card-body>
</c-card>

<!-- CoreUI Modal -->
<c-modal [visible]="modalVisible" (visibleChange)="modalVisible = $event" backdrop="static" keyboard="false">

    <c-modal-body class="text-center">
        <!-- Success Icon -->
        <div class="mb-3" *ngIf="modalType === 'success'">
            <svg width="64" height="48" viewBox="0 0 64 48" fill="none">
                <circle cx="32" cy="24" r="20" stroke="#28a745" stroke-width="2" fill="none" />
                <path d="M22 24l8 8 16-16" stroke="#28a745" stroke-width="2" fill="none" />
            </svg>
        </div>

        <!-- Error Icon -->
        <div class="mb-3" *ngIf="modalType === 'error'">
            <svg width="64" height="48" viewBox="0 0 64 48" fill="none">
                <circle cx="32" cy="24" r="20" stroke="#dc3545" stroke-width="2" fill="none" />
                <line x1="22" y1="14" x2="42" y2="34" stroke="#dc3545" stroke-width="2" />
                <line x1="42" y1="14" x2="22" y2="34" stroke="#dc3545" stroke-width="2" />
            </svg>
        </div>

        <p>{{ modalMessage }}</p>
    </c-modal-body>

    <c-modal-footer>
        <button type="button" cButton color="dark" (click)="onModalOk()" class="px-4"
            style="width: 20%;margin-right: 40%;">
            OK
        </button>
    </c-modal-footer>
</c-modal>
