<c-card class="mb-3">
    <!-- CONTENT CARD BODY -->
    <c-card-body>
        <c-row>
            <!-- Horizontal Stepper -->
            <div class="horizontal-tabs">
                <div class="tabs-container">
                    <ng-container *ngFor="let step of steps; let i = index">
                        <div class="tab-item" [ngClass]="{
                   completed: step.number < currentStep,
                   active: step.number === currentStep
                 }">

                            <!-- Circle with number -->
                            <div class="step-circle">
                                <span class="tab-number">{{ step.number }}</span>
                            </div>

                            <!-- Title + Description -->
                            <div class="tab-content">
                                <div class="tab">{{ step.title }}</div>
                            </div>
                        </div>
                    </ng-container>
                </div>
            </div>
        </c-row>
        <c-row>
            <!-- FORMS -->
            <c-col>
                <!-- Form Title -->
                <h5 class="mb-4">Maklumat Pemohon</h5>

                <!-- Form Content -->
                <div class="mb-3 row">
                    <!-- No Pengenalan Field -->
                    <div class="col-md-6">
                        <label class="form-label">
                            {{ selectedCategory === 'warga_asing' ? 'No. Pasport*' : 'No. Kad Pengenalan*' }}
                        </label>
                        <input type="text" style="width: 85%;" class="form-control" [value]="formData.noKP" readonly>
                    </div>

                    <!-- Warganegara Field -->
                    <div class="col-md-6">
                        <label class="form-label">Warganegara</label>
                        <input type="text" style="width: 70%;" class="form-control" [value]="formData.warganegara"
                            readonly>
                    </div>
                </div>

                <!-- Nama Field -->
                <div class="mb-3 row">
                    <div class="col-md-12">
                        <label class="form-label">Nama</label>
                        <input type="text" style="width: 70%;" class="form-control" [value]="formData.name" readonly>
                    </div>
                </div>

                <!-- Address and Location Fields -->
                <div class="mb-3 row">
                    <div class="col-md-6">
                        <label class="form-label">Alamat</label>
                        <input type="text" style="width: 85%;" class="form-control" [value]="formData.address1 || ''"
                            readonly>
                        <input type="text" style="width: 85%; margin-top: 10px;" class="form-control"
                            [value]="formData.address2 || ''" readonly>
                        <input type="text" style="width: 85%; margin-top: 10px;" class="form-control"
                            [value]="formData.address3 || ''" readonly>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Poskod</label>
                        <input type="text" style="width: 70%;" class="form-control" [value]="formData.postcode || ''"
                            readonly>

                        <label class="form-label" style="margin-top: 15px;">Bandar</label>
                        <input type="text" style="width: 70%;" class="form-control" [value]="formData.city || ''"
                            readonly>

                        <label class="form-label" style="margin-top: 15px;">Negeri</label>
                        <input type="text" style="width: 70%;" class="form-control" [value]="formData.state || ''"
                            readonly>
                    </div>
                </div>

                <!-- Tujuan Permohonan Field -->
                <div class="mb-3 row">
                    <div class="col-md-12">
                        <label class="form-label">Tujuan Permohonan</label>
                        <textarea style="width: 85%; height: 100px; resize: none;" class="form-control"
                            [value]="formData.purpose || ''" readonly></textarea>
                    </div>
                </div>

                <!-- Email Field -->
                <div class="mb-3 row">
                    <div class="col-md-12">
                        <label class="form-label">E-mel</label>
                        <input type="email" style="width: 85%;" class="form-control" [value]="formData.email || ''"
                            readonly>
                    </div>
                </div>
            </c-col>


        </c-row>

        <!-- DOKUMEN SOKONGAN SECTION -->
        <c-row>
            <c-col md="8">
                <h5 class="mb-4">Dokumen Sokongan</h5>

                <table class="table table-bordered">
                    <thead class="table-light">
                        <tr>
                            <th scope="col" style="width: 5%;">Bil.</th>
                            <th scope="col" style="width: 60%;">Keterangan</th>
                            <th scope="col" style="width: 25%;">Nama Dokumen</th>
                            <th scope="col" style="width: 10%;">Format</th>
                            <th scope="col" style="width: 10%;"></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <th scope="row">1</th>
                            <td>Surat Pelepasan daripada Agensi</td>
                            <td>{{ getDocumentName(1) }}</td>
                            <td>{{ getDocumentFormat(1) }}</td>
                            <td>
                                <button class="btn btn-dark btn-sm" (click)="viewDocument(1)">
                                    Papar
                                </button>
                            </td>
                        </tr>
                        <tr>
                            <th scope="row">2</th>
                            <td>Surat Keputusan JKRIM</td>
                            <td>{{ getDocumentName(2) }}</td>
                            <td>{{ getDocumentFormat(2) }}</td>
                            <td>
                                <button class="btn btn-dark btn-sm" (click)="viewDocument(2)">
                                    Papar
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </c-col>
        </c-row>

        <!-- FOOTER BUTTONS -->
        <c-row class="mt-4 mb-3">
            <c-col class="d-flex justify-content-end align-items-center gap-2">
                <button type="button" class="btn btn-primary text-white px-3" (click)="goBack()">
                    &lt;
                </button>
            </c-col>
        </c-row>
    </c-card-body>
</c-card>
