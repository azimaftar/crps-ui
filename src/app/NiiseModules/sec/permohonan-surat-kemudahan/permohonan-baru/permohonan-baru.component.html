<c-card class="mb-3">
    <c-card-body>
        <c-row>
            <!-- Horizontal Stepper -->
            <div class="horizontal-tabs">
                <div class="tabs-container">
                    <ng-container *ngFor="let step of steps; let i = index">
                        <div class="tab-item" [ngClass]="{
                   completed: step.number < currentStep,
                   active: step.number === currentStep
                 }">

                            <!-- Circle with number -->
                            <div class="step-circle">
                                <span class="tab-number">{{ step.number }}</span>
                            </div>

                            <!-- Title + Description -->
                            <div class="tab-content">
                                <div class="tab">{{ step.title }}</div>
                            </div>
                        </div>
                    </ng-container>
                </div>
            </div>
        </c-row>

        <c-row>
            <c-col md="12">
                <!-- Form Title -->
                <h5 class="mb-4">Carian Senarai Syak</h5>

                <form (ngSubmit)="performUnifiedSearch()" #searchForm="ngForm">
                    <!-- Dropdown row -->
                    <c-row class="mb-3">
                        <c-col md="5" sm="6">
                            <label class="form-label">Kategori</label>
                            <select class="form-select" [(ngModel)]="selectedCategory" name="kategori">
                                <option value="">-Sila Pilih-</option>
                                <option value="warganegara">Warganegara / Penduduk Tetap</option>
                                <option value="warga_asing">Warga Asing</option>
                            </select>
                        </c-col>
                    </c-row>

                    <!-- Search row -->
                    <c-row class="align-items-end g-2">
                        <!-- Search Input -->
                        <c-col md="5" sm="6">
                            <label for="noKP" class="form-label">No Pengenalan</label>
                            <input type="text" class="form-control" id="noKP" name="noKP" [(ngModel)]="searchNoKP"
                                required>
                        </c-col>

                        <!-- Cari Button -->
                        <c-col md="2" sm="3" class="d-flex">
                            <button type="submit" class="btn btn-primary px-3" [disabled]="!searchForm.form.valid">
                                Cari
                            </button>
                        </c-col>
                    </c-row>
                </form>



                <!-- Table Header -->
                <div class="d-flex justify-content-between align-items-center" style="margin-top: 20px;">
                    <p class="mb-0">Senarai Subjek</p>
                    <button cButton color="dark" size="sm" class="me-4" (click)="navigateToMaklumat()">
                        Surat Kemudahan
                    </button>
                </div>



                <!-- Table Results -->
                <div class="table-responsive" style="margin-top: 20px;">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>No K/P.</th>
                                <th>No Dokumen</th>
                                <th>Warganegara</th>
                                <th>Nama</th>
                                <th>Status</th>
                                <th class="text-nowrap">Tindakan</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Show results if available -->
                            <tr *ngFor="let item of searchResults">
                                <td>{{ item.noKP }}</td>
                                <td>{{ item.noDokumen }}</td>
                                <td>{{ item.warganegara }}</td>
                                <td>{{ item.nama }}</td>
                                <td>
                                    <span class="badge"
                                        [ngClass]="item.status === 'aktif' ? 'bg-success' : 'bg-secondary'">
                                        {{ item.status }}
                                    </span>
                                </td>
                                <td>
                                    <div class="d-flex flex-wrap gap-2">
                                        <button class="btn btn-sm btn-outline-primary"
                                            (click)="paparDetails(item, 'papar')" title="Papar butiran lengkap">
                                            <i class="fas fa-eye me-1"></i>Papar
                                        </button>
                                        <button class="btn btn-sm btn-outline-primary"
                                            (click)="paparDetails(item, 'kemaskini')" title="Kemaskini butiran">
                                            <i class="fas fa-edit me-1"></i>Kemaskini
                                        </button>
                                    </div>
                                </td>
                            </tr>

                            <!-- If no results, show placeholder row -->
                            <tr *ngIf="searchResults.length === 0">
                                <td colspan="6" class="text-center text-muted">
                                    Tiada rekod untuk dipaparkan
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

            </c-col>
        </c-row>

        <!-- Footer Buttons -->
        <c-row class="mt-4 mb-3">
            <c-col class="d-flex justify-content-end align-items-center gap-2">
                <button cButton type="button" color="primary" class="text-white px-4 reset-btn me-4"
                    (click)="resetForm()">
                    Set Semula
                </button>
            </c-col>
        </c-row>
    </c-card-body>
</c-card>

<!-- Modal -->
<c-modal [visible]="modalVisible" (visibleChange)="modalVisible = $event" backdrop="static" keyboard="false">
    <c-modal-body class="text-center">
        <div class="mb-3">
            <svg width="64" height="48" viewBox="0 0 64 48" fill="none">
                <rect x="8" y="8" width="48" height="32" stroke="#6c757d" stroke-width="2" fill="none" />
                <line x1="16" y1="16" x2="48" y2="32" stroke="#6c757d" stroke-width="2" />
                <line x1="48" y1="16" x2="16" y2="32" stroke="#6c757d" stroke-width="2" />
            </svg>
        </div>
        <p>{{ modalMessage }}</p>
    </c-modal-body>
    <c-modal-footer>
        <button type="button" cButton color="dark" (click)="onModalOk()" class="px-4"
            style="width: 20%; margin-right: 40%;">
            OK
        </button>
    </c-modal-footer>
</c-modal>
