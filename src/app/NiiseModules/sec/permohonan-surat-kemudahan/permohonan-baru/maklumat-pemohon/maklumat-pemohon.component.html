<c-card class="mb-3">

  <!-- CONTENT CARD BODY -->
  <c-card-body>
    <!-- Stepper -->
    <c-row>
      <div class="horizontal-tabs">
        <div class="tabs-container">
          <ng-container *ngFor="let step of steps; let i = index">
            <div class="tab-item"
                 [ngClass]="{
                   completed: step.number < currentStep,
                   active: step.number === currentStep
                 }">

              <!-- Circle with number -->
              <div class="step-circle">
                <span class="tab-number">{{ step.number }}</span>
              </div>

              <!-- Title + Description -->
              <div class="tab-content">
                <div class="tab">{{ step.title }}</div>
              </div>
            </div>
          </ng-container>
        </div>
      </div>
    </c-row>

    <!-- Applicant Form -->
    <c-row>
      <c-col md="11" lg="10">
        <h5 class="mb-4">Maklumat Pemohon</h5>

        <!-- No. KP + Warganegara -->
    <div class="mb-3 row">
      <div class="col-md-6">
        <label class="form-label">No. Kad Pengenalan*</label>
        <input type="text"
               class="form-control"
               [(ngModel)]="searchNoKP"
               name="noKP"
               #noKP="ngModel"
               required
               [ngClass]="{'is-invalid': submitted && noKP.invalid}">
      </div>

      <div class="col-md-6">
        <label class="form-label">Warganegara*</label>
        <select class="form-select"
                [(ngModel)]="selectedCategory"
                name="warganegara"
                #warganegara="ngModel"
                required
                [ngClass]="{'is-invalid': submitted && warganegara.invalid}">
          <option value="">-Sila Pilih-</option>
          <option value="Malaysia">Malaysia</option>
        </select>
      </div>
    </div>

    <!-- Nama -->
    <div class="mb-3">
      <label class="form-label">Nama</label>
      <input type="text" class="form-control" [(ngModel)]="formData.nama" disabled>
    </div>

    <!-- Alamat + Poskod/Bandar/Negeri -->
    <div class="mb-3 row">
      <div class="col-md-6">
        <label class="form-label">Alamat</label>
        <input type="text" class="form-control mb-2" [(ngModel)]="formData.alamat[0]" disabled>
        <input type="text" class="form-control mb-2" [(ngModel)]="formData.alamat[1]" disabled>
        <input type="text" class="form-control" [(ngModel)]="formData.alamat[2]" disabled>
      </div>

      <div class="col-md-6">
        <label class="form-label">Poskod</label>
        <input type="text" class="form-control mb-2" [(ngModel)]="formData.poskod" disabled>

        <label class="form-label">Bandar</label>
        <input type="text" class="form-control mb-2" [(ngModel)]="formData.bandar" disabled>

        <label class="form-label">Negeri</label>
        <input type="text" class="form-control" [(ngModel)]="formData.negeri" disabled>
      </div>
    </div>

    <!-- Tujuan -->
    <div class="mb-3">
      <label class="form-label">Tujuan Permohonan</label>
      <textarea class="form-control"
                [(ngModel)]="formData.tujuanPermohonan"
                placeholder="Sila masukkan tujuan permohonan"></textarea>
    </div>

    <!-- Email -->
    <div class="mb-3">
      <label class="form-label">E-mel</label>
      <input type="email" class="form-control" [(ngModel)]="formData.emel" placeholder="contoh@email.com">
    </div>
  </c-col>
</c-row>

    <!-- FOOTER BUTTONS -->
    <c-row class="mt-4 mb-3">
      <c-col class="d-flex justify-content-end align-items-center gap-2" style="padding-right: 6%;">
        
        <!-- Action Buttons -->
        <div class="d-flex flex-wrap gap-3 my-3">
          <button cButton type="button" color="primary"
                  class="text-white px-5 py-2"
                  (click)="saveForm()">
            <i class="fas fa-save me-2"></i>
            Simpan
          </button>
          <button cButton type="button" color="secondary"
                  class="text-white px-5 py-2"
                  (click)="resetForm()">
            <i class="fas fa-undo me-2"></i>
            Set Semula
          </button>
        </div>

        <!-- Navigation Buttons -->
        <div class="d-flex gap-2 ms-4">
          <button cButton type="button" color="primary"
                  class="text-white px-3 nav-btn" (click)="goBack()">
            &lt;
          </button>
          <button cButton type="button" color="primary"
                  class="text-white px-3 nav-btn" (click)="goNext()">
            &gt;
          </button>
        </div>
      </c-col>
    </c-row>
  </c-card-body>
</c-card>

<!-- CoreUI Modal -->
<c-modal [visible]="modalVisible"
         (visibleChange)="modalVisible = $event"
         backdrop="static"
         keyboard="false">

  <c-modal-body class="text-center">
    <div class="mb-3">
      <svg width="64" height="48" viewBox="0 0 64 48" fill="none">
        <rect x="8" y="8" width="48" height="32"
              stroke="#6c757d" stroke-width="2" fill="none" />
        <line x1="16" y1="16" x2="48" y2="32"
              stroke="#6c757d" stroke-width="2" />
        <line x1="48" y1="16" x2="16" y2="32"
              stroke="#6c757d" stroke-width="2" />
      </svg>
    </div>
    <p>{{ modalMessage }}</p>
  </c-modal-body>

  <c-modal-footer>
    <button type="button" cButton color="dark"
            (click)="onModalOk()" class="px-4"
            style="width: 20%; margin-right: 40%;">
      OK
    </button>
  </c-modal-footer>
</c-modal>
