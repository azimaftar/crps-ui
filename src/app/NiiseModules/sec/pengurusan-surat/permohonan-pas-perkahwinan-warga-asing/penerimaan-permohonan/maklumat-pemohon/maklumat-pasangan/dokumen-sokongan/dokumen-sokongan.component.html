<c-card class="mb-3">
  <c-card-body>
    <div class="p-2">
      <c-card class="mb-3 shadow-sm">
        <c-card-body>
          <c-row class="h-100">
            <c-col>
              <h5 class="mb-4">{{ pageTitle }}</h5>

              <!-- Horizontal Stepper -->
              <div class="horizontal-stepper">
                <ul class="stepper-list d-flex align-items-center justify-content-start flex-wrap">
                  <li class="stepper-item" *ngFor="let step of steps" [class.active]="isStepActive(step.number)">
                    <button type="button" class="step-btn">
                      <span class="step-number">{{ step.number }}</span>
                      <span class="step-title">{{ step.title }}</span>
                    </button>
                  </li>
                </ul>
              </div>

              <div *ngFor="let txnCD of groupedDocuments | keyvalue">
                <ng-container *ngIf="txnCD.key === 'T02'">
                  <div
                    class="d-flex justify-content-end align-items-center mt-3" style="margin-right: 10px;"
                  >
                    <button
                      mat-button
                      cButton
                      color="primary"
                      (click)="openUploadModal(txnCD)"
                    >
                      + Muat Naik
                    </button>
                  </div>

                  <table
                    mat-table
                    [dataSource]="txnCD.value"
                    class="mat-elevation-z8"
                    style="width: 100%"
                  >
                    <!-- Bil Column -->
                    <ng-container matColumnDef="Bil">
                      <th
                        mat-header-cell
                        *matHeaderCellDef
                        style="width: 1px; text-align: center"
                      >
                        Bil.
                      </th>
                      <td
                        mat-cell
                        *matCellDef="let element"
                        style="width: 1px; text-align: center"
                      >
                        {{ element.Bil }}
                      </td>
                    </ng-container>

                    <!-- Keterangan Column -->
                    <ng-container matColumnDef="Keterangan">
                      <th
                        mat-header-cell
                        *matHeaderCellDef
                        style="width: 150px; text-align: center"
                      >
                        Keterangan
                      </th>
                      <td
                        mat-cell
                        *matCellDef="let element"
                        style="width: 150px; padding-left: 30px"
                      >
                        {{ element.Keterangan }}
                      </td>
                    </ng-container>

                    <!-- Nama Dokumen Column -->
                    <ng-container matColumnDef="fileName">
                      <th
                        mat-header-cell
                        *matHeaderCellDef
                        style="width: 150px; text-align: center"
                      >
                        Nama Dokumen
                      </th>
                      <td
                        mat-cell
                        *matCellDef="let element"
                        style="width: 150px"
                      >
                        {{ element.fileName }}
                      </td>
                    </ng-container>

                    <!-- Format Column -->
                    <ng-container matColumnDef="Format">
                      <th
                        mat-header-cell
                        *matHeaderCellDef
                        style="width: 150px; text-align: center"
                      >
                        Format
                      </th>
                      <td
                        mat-cell
                        *matCellDef="let element"
                        style="width: 150px"
                      >
                        {{ element.Format }}
                      </td>
                    </ng-container>

                    <!-- Tindakan Column -->
                    <ng-container matColumnDef="tindakan">
                      <th
                        mat-header-cell
                        *matHeaderCellDef
                        style="width: 150px; text-align: center"
                      >
                        Tindakan
                      </th>
                      <td
                        mat-cell
                        *matCellDef="let element"
                        style="width: 150px; text-align: center"
                      >
                        <button
                          mat-button
                          cButton
                          color="primary"
                          (click)="fileInput.click()"
                        >
                          + Muat Naik
                        </button>
                        <input
                          type="file"
                          #fileInput
                          (change)="onFileSelected($event, element)"
                          hidden
                        />
                      </td>
                    </ng-container>

                    <!-- Rows -->
                    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                    <tr
                      mat-row
                      *matRowDef="let row; columns: displayedColumns"
                    ></tr>
                  </table>
                </ng-container>
              </div>

              <div class="form-check mt-4">
                <c-row>
                  <c-col>
                    <input
                      class="form-check-input"
                      type="checkbox"
                      id="sahkanCheckbox"
                      [(ngModel)]="sahkanChecked"
                    />
                    <label class="form-check-label" for="sahkanCheckbox">
                      Saya mengesahkan maklumat yang diberikan adalah sah dan
                      benar.
                    </label>
                  </c-col>
                </c-row>
              </div>
            </c-col>
          </c-row>
        </c-card-body>
      </c-card>
    </div>

    <!-- Action Buttons -->
    <div class="mt-4">
      <c-row class="align-items-center">
        <!-- Left: Kembali Button -->
        <c-col>
          <div class="d-flex justify-content-start">
            <button cButton color="primary" class="ms-2" (click)="goBack()">
              Kembali
            </button>
          </div>
        </c-col>

        <!-- Right: Set Semula, Hantar, Arrow -->
        <c-col>
          <div class="d-flex justify-content-end gap-2 pe-md-5">
            <button
              cButton
              color="primary"
              class="btn-search"
              (click)="goBack()"
            >
              <svg cIcon name="cilCaretLeft" size="sm"></svg>
            </button>
          </div>
        </c-col>
      </c-row>
    </div>
  </c-card-body>
</c-card>

<app-shared-modal
  [visible]="modalVisible"
  [message]="modalMessage"
  [mode]="modalMode"
  (confirm)="handleConfirmSubmit()"
  (cancel)="handleCancelModal()"
>
</app-shared-modal>

<!-- Upload Modal -->
<c-modal [(visible)]="uploadModalVisible" backdrop="static" size="lg">
  <c-modal-header>
    <h5 class="modal-title">Muat Naik Dokumen</h5>
    <button
      type="button"
      class="btn-close"
      (click)="uploadModalVisible = false"
    ></button>
  </c-modal-header>

  <c-modal-body>
    <div class="mb-3">
      <label class="form-label">Keterangan</label>
      <input
        type="text"
        class="form-control"
        [(ngModel)]="uploadKeterangan"
        required
      />
    </div>

    <div class="mb-3">
      <label class="form-label">Pilih Fail</label>
      <input
        type="file"
        class="form-control"
        (change)="handleUploadFileSelected($event)"
      />
      <small class="text-muted">Saiz maksima: 10MB</small>
    </div>
  </c-modal-body>

  <c-modal-footer>
    <button cButton color="secondary" (click)="uploadModalVisible = false">
      Batal
    </button>
    <button
      cButton
      color="primary"
      [disabled]="!uploadKeterangan || !uploadFileObj"
      (click)="confirmUpload()"
    >
      Muat Naik
    </button>
  </c-modal-footer>
</c-modal>
