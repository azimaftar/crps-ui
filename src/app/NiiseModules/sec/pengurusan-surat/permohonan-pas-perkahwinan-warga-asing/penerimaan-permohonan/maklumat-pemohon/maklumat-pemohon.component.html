<c-card class="mb-3">
  <c-card-body>
    <!-- ✅ Notification Modal -->
    <c-modal [(visible)]="notificationType" alignment="center" size="lg">
      <c-modal-header>
        <h5 class="modal-title">
          <ng-container *ngIf="notificationType === 'confirm'"
            >Pengesahan</ng-container
          >
          <ng-container *ngIf="notificationType === 'success'"
            >Berjaya</ng-container
          >
          <ng-container *ngIf="notificationType === 'fail'">Ralat</ng-container>
        </h5>
        <button
          type="button"
          class="btn-close"
          aria-label="Close"
          (click)="clearNotification()"
        ></button>
      </c-modal-header>

      <c-modal-body>
        <div class="text-center">
          <ng-container *ngIf="notificationType === 'confirm'">
            ❓ {{ message }}
          </ng-container>
          <ng-container *ngIf="notificationType === 'success'">
            ✅ {{ message }}
          </ng-container>
          <ng-container *ngIf="notificationType === 'fail'">
            ❌ {{ message }}
          </ng-container>
        </div>
      </c-modal-body>

      <c-modal-footer *ngIf="notificationType === 'confirm'">
        <button cButton color="primary" (click)="onConfirm()">Ya</button>
        <button cButton color="secondary" (click)="clearNotification()">
          Tidak
        </button>
      </c-modal-footer>

      <c-modal-footer
        *ngIf="notificationType === 'success' || notificationType === 'fail'"
      >
        <button cButton color="primary" (click)="clearNotification()">
          OK
        </button>
      </c-modal-footer>
    </c-modal>

    <!-- ================= FORM START ================= -->
    <div class="p-2">
      <c-card class="mb-3 shadow-sm">
        <c-card-body>
          <c-row>
            <c-col md="12">
              <h5 class="mb-4">{{ pageTitle }}</h5>

              <!-- Horizontal Stepper -->
              <div class="horizontal-stepper">
                <ul
                  class="stepper-list d-flex align-items-center justify-content-start flex-wrap"
                >
                  <li
                    class="stepper-item"
                    *ngFor="let step of steps"
                    [class.active]="isStepActive(step.number)"
                  >
                    <button type="button" class="step-btn">
                      <span class="step-number">{{ step.number }}</span>
                      <span class="step-title">{{ step.title }}</span>
                    </button>
                  </li>
                </ul>
              </div>

              <!-- Kategori, Pejabat Negeri, Dokumen -->
              <div class="form-group mb-4">
                <c-row class="align-items-start">
                  <c-col md="3">
                    <label for="category"
                      >Kategori Permohonan Perkahwinan</label
                    >
                    <select
                      id="category"
                      class="form-select"
                      [(ngModel)]="selectedCategory"
                    >
                      <option value="" disabled selected>Sila Pilih</option>
                      <option
                        *ngFor="let category of categories"
                        [value]="category"
                      >
                        {{ category }}
                      </option>
                    </select>
                  </c-col>

                  <c-col md="3">
                    <label for="regionOffice"
                      >Pejabat Negeri / Cawangan Imigresen</label
                    >
                    <select
                      id="regionOffice"
                      class="form-select"
                      [(ngModel)]="selectedregionOffice"
                      name="regionOffice"
                    >
                      <option value="" disabled selected>Sila Pilih</option>
                      <option
                        *ngFor="let regionOffice of jimListOptions"
                        [value]="regionOffice.brchCode"
                      >
                        {{ regionOffice.brchShortName }}
                      </option>
                    </select>
                  </c-col>

                  <c-col md="3">
                    <label for="noDokumen"
                      >No. Dokumen (Jika Warga Asing)</label
                    >
                    <input
                      id="noDokumen"
                      type="text"
                      maxlength="12"
                      [(ngModel)]="noDokumen"
                      class="form-control"
                      [disabled]="
                        selectedCategory === 'Warganegara / Penduduk Tetap'
                      "
                    />
                  </c-col>

                  <c-col md="3">
                    <label for="noKp">No. Kad Pengenalan</label>
                    <input
                      id="noKp"
                      type="text"
                      maxlength="12"
                      class="form-control w-100"
                      [(ngModel)]="noKp"
                      (blur)="onIcChange()"
                      placeholder="800211040991"
                      [disabled]="selectedCategory === 'Warga Asing'"
                    />
                  </c-col>
                </c-row>
              </div>

              <!-- Nama -->
              <div class="form-group mb-4">
                <c-row>
                  <c-col md="12">
                    <label for="nama">Nama</label>
                    <input
                      id="nama"
                      type="text"
                      class="form-control w-100"
                      [(ngModel)]="nama"
                      placeholder="Aiman Bin Kasim"
                    />
                  </c-col>
                </c-row>
              </div>

              <!-- Kad Pengenalan, Warganegara, Jantina -->
              <div class="form-group mb-4">
                <c-row class="align-items-start">
                  <c-col md="4">
                    <label for="CitizenshipCategory">Warganegara</label>
                    <select
                      id="CitizenshipCategory"
                      class="form-select"
                      [(ngModel)]="selectedCitizenCategory"
                      (change)="onCategoryChange()"
                    >
                      <option value="" disabled selected>Sila Pilih</option>
                      <option
                        *ngFor="let c of countryOptions"
                        [value]="c.wrldSTACode"
                      >
                        {{ c.wrldSTADesc }}
                      </option>
                    </select>
                  </c-col>

                  <c-col md="4">
                    <label for="gender">Jantina</label>
                    <select class="form-select" [(ngModel)]="gender">
                      <option value="" disabled selected>Sila Pilih</option>
                      <option *ngFor="let g of genderOptions" [value]="g.sexCD">
                        {{ g.sexBMDesc }}
                      </option>
                    </select>
                  </c-col>
                </c-row>
              </div>

              <!-- DOB, Umur, Status -->
              <div class="form-group mb-4">
                <c-row>
                  <c-col md="4">
                    <label>Tarikh Lahir</label>
                    <input
                      *ngIf="
                        selectedCategory === 'Warganegara / Penduduk Tetap'
                      "
                      type="date"
                      class="form-control w-100"
                      [ngModel]="tarikhLahir | date : 'yyyy-MM-dd'"
                      readonly
                    />
                    <input
                      *ngIf="selectedCategory === 'Warga Asing'"
                      type="date"
                      class="form-control w-100"
                      [ngModel]="tarikhLahir | date : 'yyyy-MM-dd'"
                      (ngModelChange)="tarikhLahir = $event; onDobChange()"
                    />
                    <input
                      *ngIf="!selectedCategory"
                      type="text"
                      class="form-control w-100"
                      readonly
                    />
                  </c-col>

                  <c-col md="4">
                    <label>Umur</label>
                    <input
                      type="number"
                      class="form-control"
                      [(ngModel)]="umur"
                      readonly
                    />
                  </c-col>

                  <c-col md="4">
                    <label for="maritalStatus">Status Perkahwinan</label>
                    <select
                      name="maritalStatus"
                      id="maritalStatus"
                      class="form-select"
                      [(ngModel)]="maritalStatus"
                    >
                      <option value="" disabled selected>Sila Pilih</option>
                      <option
                        *ngFor="let item of maritalStatusOption"
                        [value]="item.mrgCode"
                      >
                        {{ item.mrgBmDesc }}
                      </option>
                    </select>
                  </c-col>
                </c-row>
              </div>

              <!-- Telefon & Pekerjaan -->
              <div class="form-group mb-4">
                <c-row>
                  <c-col md="6">
                    <label for="phoneNumber">No Telefon</label>
                    <input
                      id="phoneNumber"
                      type="text"
                      class="form-control w-100"
                      maxlength="11"
                      [(ngModel)]="phoneNumber"
                      (keypress)="allowOnlyNumbers($event)"
                      (paste)="blockInvalidPaste($event)"
                      (blur)="trimPhoneNumber()"
                    />
                  </c-col>

                  <c-col md="6">
                    <label for="jobInfo">Pekerjaan</label>
                    <input
                      id="jobInfo"
                      name="jobInfo"
                      type="text"
                      class="form-control w-100"
                      [(ngModel)]="jobInfo"
                    />
                  </c-col>
                </c-row>
              </div>

              <!-- Alamat -->
              <div class="form-group mb-4">
                <c-row>
                  <c-col md="12">
                    <c-row>
                      <c-col md="4">
                        <label for="alamat1">Alamat</label>
                        <input
                          id="alamat1"
                          type="text"
                          class="form-control w-100"
                          [(ngModel)]="alamat1"
                        />
                      </c-col>

                      <c-col md="4">
                        <label for="alamat2" class="invisible">Alamat 2</label>
                        <input
                          id="alamat2"
                          type="text"
                          class="form-control w-100"
                          [(ngModel)]="alamat2"
                        />
                      </c-col>

                      <c-col md="4">
                        <label for="alamat3" class="invisible">Alamat 3</label>
                        <input
                          id="alamat3"
                          type="text"
                          class="form-control w-100"
                          [(ngModel)]="alamat3"
                        />
                      </c-col>
                    </c-row>
                  </c-col>
                </c-row>

                <c-row>
                  <c-col md="4">
                    <label for="poskod">Poskod</label>
                    <input
                      id="poskod"
                      type="text"
                      class="form-control w-100"
                      [(ngModel)]="poskod"
                    />
                  </c-col>

                  <c-col md="4">
                    <label for="city">Bandar</label>
                    <input
                      id="city"
                      type="text"
                      class="form-control w-100"
                      [(ngModel)]="city"
                    />
                  </c-col>

                  <c-col md="4">
                    <label for="negeri">Negeri</label>
                    <select
                      id="negeri"
                      type="text"
                      class="form-control w-100"
                      [(ngModel)]="negeri"
                    >
                      <option value="" disabled selected>Sila Pilih</option>
                      <option
                        *ngFor="let item of stateOptions"
                        [value]="item.stateCode"
                        [hidden]="
                          ['38', '39', '49', '59', '69', '79'].includes(
                            item.stateCode
                          )
                        "
                      >
                        {{ item.stateBM }}
                      </option>
                    </select>
                  </c-col>
                </c-row>
              </div>

              <!-- Jika Warga Asing -->
              <hr class="my-4" />
              <label for="">Jika Warga Asing</label>
              <div class="form-group mb-4">
                <c-row>
                  <c-col md="4">
                    <label for="employername">Majikan</label>
                    <input
                      id="employername"
                      type="text"
                      class="form-control w-100"
                      [(ngModel)]="employername"
                      [disabled]="
                        selectedCategory === 'Warganegara / Penduduk Tetap'
                      "
                    />
                  </c-col>

                  <c-col md="4">
                    <label for="entryDate">Tarikh Masuk</label>
                    <input
                      type="date"
                      id="entryDate"
                      class="form-control"
                      [(ngModel)]="entryDate"
                      [disabled]="
                        selectedCategory === 'Warganegara / Penduduk Tetap'
                      "
                    />
                  </c-col>

                  <c-col md="4">
                    <label for="expiryDate">Tarikh Tamat Pas</label>
                    <input
                      type="date"
                      id="expiryDate"
                      class="form-control"
                      [(ngModel)]="expiryDate"
                      [disabled]="
                        selectedCategory === 'Warganegara / Penduduk Tetap'
                      "
                    />
                  </c-col>
                </c-row>
              </div>
            </c-col>
          </c-row>
        </c-card-body>
      </c-card>
    </div>

    <!-- Action Buttons -->
    <c-row>
      <c-col md="3" class="offset-md-7">
        <button cButton color="primary" class="me-2" (click)="resetForm()">
          Set Semula
        </button>
        <button cButton color="primary" (click)="saveSubmitForm()">
          Simpan
        </button>
      </c-col>
      <c-col>
        <div class="d-flex justify-content-end gap-2 pe-md-5">
          <button
            cButton
            color="primary"
            class="btn-search"
            (click)="nextStep()"
          >
            <svg cIcon name="cilCaretRight" size="sm"></svg>
          </button>
        </div>
      </c-col>
    </c-row>
  </c-card-body>
</c-card>
