<c-card class="mb-3">
  <c-card-body>
    <!-- ✅ Unified Notifications at top center -->
    <div class="d-flex justify-content-center mb-3" *ngIf="notificationType">
      <div class="w-75">
        <!-- Confirmation -->
        <c-alert color="info" *ngIf="notificationType === 'confirm'">
          ❓ {{ message }}
          <div class="mt-2 d-flex justify-content-end gap-2">
            <button cButton color="primary" (click)="onConfirm()">Ya</button>
            <button cButton color="secondary" (click)="clearNotification()">
              Tidak
            </button>
          </div>
        </c-alert>

        <!-- Success -->
        <c-alert color="success" *ngIf="notificationType === 'success'">
          ✅ {{ message }}
        </c-alert>

        <!-- Failure -->
        <c-alert color="danger" *ngIf="notificationType === 'fail'">
          ❌ {{ message }}
        </c-alert>
      </div>
    </div>

    <!-- ✅ Unified Notifications at top center -->
    <div class="d-flex justify-content-center mb-3" *ngIf="notificationType">
      <div class="w-75">
        <!-- Confirmation -->
        <c-alert color="info" *ngIf="notificationType === 'confirm'">
          ❓ {{ message }}
          <div class="mt-2 d-flex justify-content-end gap-2">
            <button cButton color="primary" (click)="onConfirm()">Ya</button>
            <button cButton color="secondary" (click)="clearNotification()">
              Tidak
            </button>
          </div>
        </c-alert>

        <!-- Success -->
        <c-alert color="success" *ngIf="notificationType === 'success'">
          ✅ {{ message }}
        </c-alert>

        <!-- Failure -->
        <c-alert color="danger" *ngIf="notificationType === 'fail'">
          ❌ {{ message }}
        </c-alert>
      </div>
    </div>
    <div class="p-2">
      <c-card class="mb-3 shadow-sm">
        <c-card-body>
          <c-row class="h-100">
            <router-outlet></router-outlet>
            <c-col>
              <h5>{{ pageTitle }}</h5>

              <div class="horizontal-stepper">
                <ul
                  class="stepper-list d-flex align-items-center justify-content-start flex-wrap"
                >
                  <li
                    class="stepper-item"
                    *ngFor="let step of steps"
                    [class.active]="isStepActive(step.number)"
                  >
                    <button type="button" class="step-btn">
                      <span class="step-number">{{ step.number }}</span>
                      <span class="step-title">{{ step.title }}</span>
                    </button>
                  </li>
                </ul>
              </div>

              <!-- Nama Input: Full Width -->

              <!-- Jenis Dokumen Row -->
              <div class="form-group mb-4">
                <c-row>
                  <c-col md="12">
                    <label class="form-label">Nama</label>
                    <input
                      [(ngModel)]="nama"
                      type="text"
                      class="form-control"
                      maxLength="100"
                      placeholder="Nama"
                      maxlength="1000"
                    />
                  </c-col>
                </c-row>
              </div>

              <div class="mb-3">
                <c-row>
                  <c-col md="4">
                    <!-- Warganegara Column -->
                    <label class="form-label">Warganegara</label>
                    <select
                      id="warganegara"
                      class="form-select"
                      [(ngModel)]="warganegara"
                    >
                      <option value="" disabled>Sila Pilih</option>
                      <option
                        *ngFor="let jenisWarganegara of warganegaraList"
                        [value]="jenisWarganegara"
                      >
                        {{ jenisWarganegara }}
                      </option>
                    </select>
                  </c-col>

                  <!-- <c-col> // Phone Number Column
                    <label class="form-label">Nombor Telefon</label>
                    <input type="text" class="form-control" [(ngModel)]="nomborTelefon" placeholder="Nombor Telefon" />
                  </c-col> -->

                  <c-col md="4">
                    <!-- Jantina Column -->
                    <label class="form-label">Jantina</label>
                    <select
                      id="jantina"
                      class="form-select"
                      [(ngModel)]="jantina"
                    >
                      <option value="" disabled hidden>Sila Pilih</option>
                      <option
                        *ngFor="let jenis of jenisJantinaList"
                        [value]="jenis"
                      >
                        {{ jenis }}
                      </option>
                    </select>
                  </c-col>
                  <c-col md="4">
                    <div class="mb-3">
                      <label class="form-label">Nombor Dokumen</label>
                      <input
                        [(ngModel)]="noDokumen"
                        type="text"
                        class="form-control"
                        placeholder="Nombor Dokumen"
                        maxlength="20"
                      />
                    </div>
                  </c-col>
                </c-row>
              </div>

              <div class="mb-3">
                <c-row>
                  <c-col md="4">
                    <label class="form-label">Tarikh Lahir</label>
                    <input
                      type="date"
                      class="form-control"
                      [(ngModel)]="tarikhlahir"
                      (change)="calculateAgeFromDob()"
                    />
                  </c-col>
                  <c-col md="4">
                    <label class="form-label">Umur</label>
                    <input
                      type="number"
                      class="form-control"
                      [(ngModel)]="umur"
                      readonly
                    />
                  </c-col>
                  <c-col md="4">
                    <label class="form-label">Status Perkahwinan</label>
                    <select
                      name="maritalStatus"
                      id="maritalStatus"
                      class="form-select"
                      [(ngModel)]="maritalStatus"
                    >
                      <option value="" disabled selected>Sila Pilih</option>
                      <option
                        *ngFor="let item of maritalStatusOption"
                        [value]="item.mrgCode"
                      >
                        {{ item.mrgBmDesc }}
                      </option>
                    </select>
                  </c-col>
                </c-row>
              </div>

              <div class="mb-3">
                <c-row>
                  <c-col md="3">
                    <!-- Warganegara Column -->
                    <label class="form-label">E-Mel</label>
                    <input
                      type="email"
                      name="email"
                      id=""
                      class="form-control"
                      [(ngModel)]="email"
                      placeholder="E-Mel"
                      value="email"
                    />
                  </c-col>

                  <!-- <c-col> // Phone Number Column
                    <label class="form-label">Nombor Telefon</label>
                    <input type="text" class="form-control" [(ngModel)]="nomborTelefon" placeholder="Nombor Telefon" />
                  </c-col> -->

                  <c-col md="3" xs="4">
                    <!-- Jantina Column -->
                    <label class="form-label">Nombor Telefon</label>
                    <input
                      type="text"
                      class="form-control"
                      [(ngModel)]="phoneNumber"
                      (keydown)="preventDash($event)"
                    />
                  </c-col>
                </c-row>
              </div>

              <div class="form-group mb-3">
                <c-row>
                  <!-- Alamat Column -->
                  <c-col md="4">
                    <label class="alamat1">Alamat</label>
                    <input
                      type="text"
                      class="form-control w-100"
                      [(ngModel)]="alamat1"
                    />
                  </c-col>

                  <c-col md="4">
                    <label for="alamat2" class="invisible">Alamat 2</label>
                    <input
                      type="text"
                      class="form-control w-100"
                      [(ngModel)]="alamat2"
                    />
                  </c-col>

                  <c-col md="4">
                    <label for="alamat3" class="invisible">Alamat 3</label>
                    <input
                      type="text"
                      class="form-control w-100"
                      [(ngModel)]="alamat3"
                    />
                  </c-col>

                  <!-- Right Column: Poskod + Bandar + Negeri -->
                  <c-row>
                    <c-col md="4">
                      <label class="form-label">Poskod</label>
                      <input
                        type="text"
                        class="form-control w-100"
                        [(ngModel)]="poskod"
                        placeholder="Poskod"
                      />
                    </c-col>

                    <c-col md="4">
                      <label for="city">Bandar</label>
                      <input
                        id="city"
                        type="text"
                        class="form-control w-100"
                        [(ngModel)]="city"
                      />
                    </c-col>

                    <c-col md="4">
                      <label class="form-label">Negeri</label>
                      <select
                        id="negeri"
                        class="form-control w-100"
                        [(ngModel)]="negeri"
                      >
                        <option value="" disabled hidden>Sila Pilih</option>
                        <option
                          *ngFor="let negeri of jenisNegeriList"
                          [value]="negeri"
                        >
                          {{ negeri }}
                        </option>
                      </select>
                    </c-col>
                  </c-row>
                </c-row>
              </div>

              <div class="mb-3">
                <c-row>
                  <c-col md="6">
                    <label class="form-label">Pekerjaan</label>
                    <input
                      type="text"
                      class="form-control"
                      [(ngModel)]="kerja"
                      placeholder="Pekerjaan"
                    />
                  </c-col>
                </c-row>
              </div>

              <div class="mb-3">
                <c-row>
                  <c-col md="4">
                    <label class="form-label">Majikan</label>
                    <input
                      type="text"
                      id="employername"
                      name="employername"
                      class="form-control"
                      [(ngModel)]="employername"
                      placeholder="Majikan"
                    />
                  </c-col>
                  <c-col md="4">
                    <label class="form-label">Tarikh Masuk</label>
                    <input
                      type="date"
                      id="entryDate"
                      name="entryDate"
                      class="form-control"
                      [(ngModel)]="entryDate"
                    />
                  </c-col>
                  <c-col md="4">
                    <label class="form-label">Tarikh Tamat Pas</label>
                    <input
                      type="date"
                      id="expiryDate"
                      name="expiryDate"
                      class="form-control"
                      [(ngModel)]="expiryDate"
                    />
                  </c-col>
                </c-row>
              </div>
            </c-col>
          </c-row>
        </c-card-body>
      </c-card>
    </div>
    <!-- Action Buttons -->
    <c-row>
      <c-col md="3" class="offset-md-7">
        <button cButton color="primary" class="me-2" (click)="resetForm()">
          Set Semula
        </button>
        <button cButton color="primary" (click)="saveData()">Simpan</button>
      </c-col>
      <c-col>
        <div class="d-flex justify-content-end gap-2 pe-md-5">
          <button
            cButton
            color="primary"
            class="btn-search"
            (click)="prevPage()"
          >
            <svg cIcon name="cilCaretLeft" size="sm"></svg>
          </button>

          <button
            cButton
            color="primary"
            class="btn-search"
            (click)="nextPage()"
          >
            <svg cIcon name="cilCaretRight" size="sm"></svg>
          </button>
        </div>
      </c-col>
    </c-row>
  </c-card-body>
</c-card>
