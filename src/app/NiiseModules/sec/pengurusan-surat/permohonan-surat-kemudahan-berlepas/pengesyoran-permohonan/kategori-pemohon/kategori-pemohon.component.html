<c-card class="mb-3">
  <c-card-body>
    <div class="p-2">
      <c-card class="mb-3 shadow-sm">
        <c-card-body>
          <c-row>
            <c-col md="9">
              <h5 class="mb-4">{{ pageTitle }}</h5>

              <div class="form-group mb-4">
                <c-row class="align-items-start">
                  <!-- Left Column -->
                  <c-col md="6">
                    <!-- negeriBerlepas (Radio Buttons) -->
                    <label class="form-label">Negeri</label>

                    <c-form-check class="mb-2 ms-2">
                    <input
                        cFormCheckInput
                        type="radio"
                        value="Sabah"
                        name="negeriRadio"
                        id="radioSabah"
                        [(ngModel)]="negeriBerlepas"
                        disabled
                    />
                    <label 
                        cFormCheckLabel 
                        for="radioSabah" 
                        class="text-dark"
                    >
                        Sabah
                    </label>
                    </c-form-check>
                    <c-form-check class="mb-2 ms-2">
                    <input
                        cFormCheckInput
                        type="radio"
                        value="Sarawak"
                        name="negeriRadio"
                        id="radioSarawak"
                        [(ngModel)]="negeriBerlepas"
                        disabled
                    />
                    <label 
                        cFormCheckLabel 
                        for="radioSabah" 
                        class="text-dark"
                    >
                        Sarawak
                    </label>
                    </c-form-check>

                    <!-- Dropdown -->
                    <div class="d-flex align-items-end gap-2 mt-2">
                      <div class="flex-grow-1">
                        <label for="category">Kategori Pemohon</label>
                        <select
                        id="category"
                        class="form-select"
                        [(ngModel)]="selectedCategory"
                        disabled
                        >
                        <option [value]="selectedCategory">{{ selectedCategory }}</option>
                        </select>
                      </div>
                    </div>
                  </c-col>
                </c-row>
              </div>
            </c-col>

            <!-- Right Stepper Column -->
            <c-col md="3" class="px-4 py-3 mt-3 stepper-container">
              <ul class="stepper-list">
                <li
                  class="stepper-item"
                  *ngFor="let step of steps; let i = index"
                  [class.active]="isStepActive(step.number)"
                >
                  <div class="stepper-content">
                    <ng-container *ngIf="step.number === 1; else nonClickableStep">
                      <span
                        (click)="navigateToStep1()"
                        class="step-number step-link"
                        [class.active]="isStepActive(step.number)"
                      >
                        {{ step.number }}
                      </span>
                      <span
                        (click)="navigateToStep1()"
                        class="step-title step-link"
                        [class.active]="isStepActive(step.number)"
                      >
                        {{ step.title }}
                      </span>
                    </ng-container>

                    <ng-template #nonClickableStep>
                      <span
                        class="step-number"
                        [class.active]="isStepActive(step.number)"
                      >
                        {{ step.number }}
                      </span>
                      <span
                        class="step-title"
                        [class.active]="isStepActive(step.number)"
                      >
                        {{ step.title }}
                      </span>
                    </ng-template>
                  </div>

                  <div *ngIf="i < steps.length - 1" class="stepper-line"></div>
                </li>
              </ul>
            </c-col>
          </c-row>
        </c-card-body>
      </c-card>
    </div>

    <!-- Action Buttons -->
    <c-row>
      <c-col md="3" class="offset-md-7"></c-col>
      <c-col>
        <div class="d-flex justify-content-end gap-2 pe-md-5">
          <button cButton color="primary" class="btn-search" (click)="prevPage()">
            <svg cIcon name="cilCaretLeft" size="sm"></svg>
          </button>

          <button
            cButton
            color="primary"
            class="btn-search"
            [disabled]="!isFormValid()"
            (click)="nextPage()"
          >
            <svg cIcon name="cilCaretRight" size="sm"></svg>
          </button>
        </div>
      </c-col>
    </c-row>
  </c-card-body>
</c-card>
