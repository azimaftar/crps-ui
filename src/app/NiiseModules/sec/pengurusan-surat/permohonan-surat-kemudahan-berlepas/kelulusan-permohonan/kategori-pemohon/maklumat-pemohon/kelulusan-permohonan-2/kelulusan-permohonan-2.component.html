<c-card class="mb-3">
    <c-card-body>
        <div class="p-2">
            <c-card class="mb-3 shadow-sm">
                <c-card-body>
                    <c-row>
                        <c-col md="9">
                            <h5 class="mb-4">
                                {{pageTitle}}
                            </h5>
                            <div class="form-group mb-4">
                                <c-row class="align-items-start">
                                    <c-col md="6">
                                        <label class="form-label">
                                            Status Permohonan
                                        </label>
                                        <c-form-check class="mb-2 ms-2">
                                            <input
                                            cFromCheckInput
                                            type="radio"
                                            value="Lulus"
                                            name="flexRadioDefault"
                                            id="radioLulus"
                                            [(ngModel)]="statusKelulusan">
                                            <label cFormCheckLabel for="radioLulus">
                                                Lulus
                                            </label>
                                        </c-form-check>
                                        <!-- Tidak Lulus Radio Button -->
                                        <c-form-check class="mb-2 ms-2">
                                            <input
                                            cFromCheckInput
                                            type="radio"
                                            value="tidakLulus"
                                            name="flexRadioDefault"
                                            id="radioTidakLulus"
                                            [(ngModel)]="statusKelulusan">
                                            <label cFormCheckLabel for="radioTidakLulus">
                                                Tidak Lulus
                                            </label>
                                        </c-form-check>                                         
                                    </c-col>
                                </c-row>

                                <c-row class="mb-3">
                                <c-col>
                                    <label class="form-label">Catatan (Jika tidak Lulus)</label>
                                    <textarea
                                    class="form-control"
                                    rows="3"
                                    [(ngModel)]="catatanKelulusan"
                                    placeholder="Catatan (Jika tidak Lulus)"
                                    [disabled]="statusKelulusan !== 'tidakLulus'">
                                    </textarea>
                                </c-col>
                                </c-row>

                                <c-row class="mb-3">
                                <c-col>
                                    <label class="form-label">Nama</label>
                                    <input 
                                    type="text"
                                    class="form-control"
                                    [(ngModel)]="nama"
                                    disabled>
                                </c-col>
                                </c-row>

                                <c-row>
                                <c-col>
                                    <label class="form-label">ID Pengguna</label>
                                    <input 
                                    type="text"
                                    class="form-control"
                                    [(ngModel)]="idPengguna"
                                    disabled>
                                </c-col>

                                <c-col>
                                    <label class="form-label">Tarikh Kelulusan Permohonan</label>
                                    <input 
                                    type="text"
                                    class="form-control"
                                    [(ngModel)]="tarikhKelulusanPermohonan"
                                    disabled>
                                </c-col>
                                </c-row>

                            </div>
                        </c-col>
                        <!-- Right Stepper Column -->
                        <c-col md="3" class="px-4 py-3 mt-3 stepper-container">
                        <ul class="stepper-list">
                            <li
                            class="stepper-item"
                            *ngFor="let step of steps; let i = index"
                            [class.active]="isStepActive(step.number)"
                            >
                            <div class="stepper-content">
                                <ng-container *ngIf="step.number === 1; else nonClickableStep">
                                <span
                                    class="step-number"
                                    [class.active]="isStepActive(step.number)"
                                >
                                    {{ step.number }}
                                </span>
                                <span
                                    class="step-title"
                                    [class.active]="isStepActive(step.number)"
                                >
                                    {{ step.title }}
                                </span>
                                </ng-container>

                                <ng-template #nonClickableStep>
                                <span
                                    class="step-number"
                                    [class.active]="isStepActive(step.number)"
                                >
                                    {{ step.number }}
                                </span>
                                <span
                                    class="step-title"
                                    [class.active]="isStepActive(step.number)"
                                >
                                    {{ step.title }}
                                </span>
                                </ng-template>
                            </div>

                            <div *ngIf="i < steps.length - 1" class="stepper-line"></div>
                            </li>
                        </ul>
                        </c-col>                         
                    </c-row>
                </c-card-body>
            </c-card>
        </div>

        <!-- Action Buttons -->
        <div>
        <c-row class="align-items-center">
            <!-- Left: Kembali Button -->
            <c-col>
            <div class="d-flex justify-content-start">
                <button 
                cButton 
                color="primary" 
                class="ms-2" 
                (click)="goBack()">
                Kembali
                </button>
            </div>
            </c-col>

            <!-- Right: Set Semula, Hantar, Arrow -->
            <c-col>
            <div class="d-flex justify-content-end gap-2 pe-md-5">
                <button 
                cButton 
                color="primary"
                (click)="setSemula()">
                Set Semula
                </button>

                <button 
                cButton 
                color="primary"
                (click)="openSubmitModal()">
                Hantar
                </button>            

                <button
                cButton
                color="primary"
                class="btn-search"
                (click)="goBack()">
                <svg cIcon name="cilCaretLeft" size="sm"></svg>
                </button>
            </div>
            </c-col>
        </c-row>
        </div>

    </c-card-body>
</c-card>

<app-shared-modal
  [visible]="modalVisible"
  [message]="modalMessage"
  [mode]="modalMode" 
  (confirm)="handleConfirmSubmit()"
  (cancel)="handleCancelModal()">
</app-shared-modal>
