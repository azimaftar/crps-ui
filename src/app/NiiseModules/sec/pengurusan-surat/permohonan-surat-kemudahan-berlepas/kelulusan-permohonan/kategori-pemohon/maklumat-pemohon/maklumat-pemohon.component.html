<c-card>
  <c-card-body>
    <c-card>
      <c-card-body>
        <c-row>
          <c-col>
            <h5>{{ pageTitle }}</h5>

            <!-- Nama Input: Full Width -->
            <div class="mb-3">
              <label class="form-label">Nama</label>
              <input [(ngModel)]="nama" type="text" class="form-control" disabled placeholder="Nama" />
            </div>

            <!-- Jenis Dokumen Row -->
            <div class="mb-3">
            <c-row>
              <c-col md="6">
                <label class="form-label">Jenis Dokumen</label>
                <input
                  type="text"
                  class="form-control"
                  [value]="jenisDokumen"
                  disabled
                />
              </c-col>   
              <c-col>
                <label class="form-label">Nombor Dokumen</label>
                <input [(ngModel)]="noDokumen" type="text" class="form-control" disabled placeholder="Nombor Dokumen" />
              </c-col>         
            </c-row>
            </div>

            <div class="mb-3">
            <c-row>
              <c-col md="6">
                <label class="form-label">Jantina</label>
                <input
                  type="text"
                  class="form-control"
                  [value]="jantina"
                  disabled
                />
              </c-col>    
              <c-col>
                <label class="form-label">Nombor Telefon</label>
                    <input
                        type="text"
                        class="form-control"
                        [(ngModel)]="nomborTelefon"
                        disabled
                        placeholder="Nombor Telefon"
                    />
              </c-col>        
            </c-row>  
            </div>

            <div class="mb-3">
            <c-row>
                <!-- Alamat Column -->
                <c-col md="6">
                <label class="form-label">Alamat</label>
                <input type="text" class="form-control mb-2" [(ngModel)]="alamat1" disabled placeholder="Alamat 1" />
                <input type="text" class="form-control mb-2" [(ngModel)]="alamat2" disabled placeholder="Alamat 2" />
                <input type="text" class="form-control" [(ngModel)]="alamat3" disabled placeholder="Alamat 3" />
                </c-col>

                <!-- Right Column: Poskod + Bandar + Negeri -->
                <c-col md="6">
                <div class="mb-3">
                    <label class="form-label">Poskod</label>
                    <input type="text" class="form-control" [(ngModel)]="poskod" disabled placeholder="Poskod" />
                </div>

                <div class="mb-3">
                    <label class="form-label">Bandar</label>
                    <input
                      type="text"
                      class="form-control"
                      [value]="bandar"
                      disabled
                    />                   
                </div>

                <div>
                    <label class="form-label">Negeri</label>
                    <input
                      type="text"
                      class="form-control"
                      [value]="negeri"
                      disabled
                    />
                </div>
                </c-col>
            </c-row>
            </div>

            <div class="mb-3">
                <c-row>
                    <c-col>
                        <label class="form-label">Tujuan Permohonan</label>
                        <textarea
                        class="form-control"
                        rows="3"
                        [(ngModel)]="tujuanPermohonan"
                        disabled
                        placeholder="Tujuan Permohonan"
                        ></textarea>
                    </c-col>
                </c-row>
            </div>

            <div class="form-check mt-4">
                <c-row>
                    <c-col>
                        <input
                        class="form-check-input"
                        type="checkbox"
                        id="sahkanCheckbox"
                        [(ngModel)]="sahkanChecked"
                        disabled
                        />
                        <label class="form-check-label" for="sahkanCheckbox">
                        Saya mengesahkan maklumat yang diberikan adalah sah dan benar.
                        </label>
                    </c-col>
                </c-row>
            </div>

          </c-col>

            <!-- Right Stepper Column -->
            <c-col md="3" class="px-4 py-3 mt-3 stepper-container">
            <ul class="stepper-list">
                <li
                class="stepper-item"
                *ngFor="let step of steps; let i = index"
                [class.active]="isStepActive(step.number)"
                >
                <div class="stepper-content">
                    <ng-container *ngIf="step.number === 1; else nonClickableStep">
                    <span
                        (click)="navigateToStep1()"
                        class="step-number step-link"
                        [class.active]="isStepActive(step.number)"
                    >
                        {{ step.number }}
                    </span>
                    <span
                        (click)="navigateToStep1()"
                        class="step-title step-link"
                        [class.active]="isStepActive(step.number)"
                    >
                        {{ step.title }}
                    </span>
                    </ng-container>

                    <ng-template #nonClickableStep>
                    <span
                        class="step-number"
                        [class.active]="isStepActive(step.number)"
                    >
                        {{ step.number }}
                    </span>
                    <span
                        class="step-title"
                        [class.active]="isStepActive(step.number)"
                    >
                        {{ step.title }}
                    </span>
                    </ng-template>
                </div>

                <div *ngIf="i < steps.length - 1" class="stepper-line"></div>
                </li>
            </ul>
            </c-col>          
        </c-row>
      </c-card-body>
    </c-card>

    
    <!-- Action Buttons -->
    <div class="mt-4">
      <c-row class="align-items-center">
        <!-- Left: Kembali Button -->
        <c-col>
          <div class="d-flex justify-content-start">
            <button 
              cButton 
              color="primary" 
              class="ms-2" 
              (click)="goBack()">
              Kembali
            </button>
          </div>
        </c-col>

        <!-- Right: Set Semula, Hantar, Arrow -->
        <c-col>
          <div class="d-flex justify-content-end gap-2 pe-md-5">
            <button 
              cButton 
              color="primary" 
              disabled>
              Set Semula
            </button>

            <button 
              cButton 
              color="primary" 
              disabled>
              Hantar
            </button>            

            <button
              cButton
              color="primary"
              class="btn-search"
              (click)="goBack()">
              <svg cIcon name="cilCaretLeft" size="sm"></svg>
            </button>

            <button
              cButton
              color="primary"
              class="btn-search"
              (click)="nextPage()">
              <svg cIcon name="cilCaretRight" size="sm"></svg>
            </button>            

          </div>
        </c-col>
      </c-row>
    </div>
  
  </c-card-body>
</c-card>
