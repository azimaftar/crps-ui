<c-row class="page-layout d-flex align-items-start">
  <!-- Main Content -->
  <c-col md="9" class="main-content white-box p-4">

    <!-- ✅ Horizontal Stepper -->
    <div class="horizontal-stepper mt-3 mb-4">
      <ul class="stepper-list d-flex align-items-center justify-content-start flex-wrap">

        <!-- Step 1 -->
        <li
          class="stepper-item"
          [class.active]="currentStep === 1"
          [class.completed]="currentStep > 1">
          <button type="button" class="step-btn" (click)="goToStep(1)">
            <span class="step-number">
              <ng-container *ngIf="currentStep > 1">✓</ng-container>
              <ng-container *ngIf="currentStep <= 1">1</ng-container>
            </span>
            <span class="step-title">Carian Permohonan</span>
          </button>
        </li>

        <!-- Step 2 -->
        <li
          class="stepper-item"
          [class.active]="currentStep === 2"
          [class.completed]="currentStep > 2">
          <button type="button" class="step-btn" (click)="goToStep(2)">
            <span class="step-number">
              <ng-container *ngIf="currentStep > 2">✓</ng-container>
              <ng-container *ngIf="currentStep <= 2">2</ng-container>
            </span>
            <span class="step-title">Maklumat Permohonan</span>
          </button>
        </li>

        <!-- Step 3 -->
        <li
          class="stepper-item"
          [class.active]="currentStep === 3"
          [class.completed]="currentStep > 3">
          <button type="button" class="step-btn" (click)="goToStep(3)">
            <span class="step-number">
              <ng-container *ngIf="currentStep > 3">✓</ng-container>
              <ng-container *ngIf="currentStep <= 3">3</ng-container>
            </span>
            <span class="step-title">Keputusan Permohonan</span>
          </button>
        </li>
      </ul>
    </div>

    <!-- 🔹 Step 1: Carian Permohonan -->
<div *ngIf="currentStep === 1" class="step-content mt-4">
  <h5><b>Carian Permohonan</b></h5>

  <!-- Jenis Carian -->
  <div class="form-group col-6 mt-3">
    <label for="kategoriCarian"><b>Jenis Carian</b></label>
    <select id="kategoriCarian" class="form-select" [(ngModel)]="kategoriCarian">
      <option value="" disabled hidden>-- Sila Pilih --</option>
      <option value="dokumen">Nombor Dokumen</option>
      <option value="ic">No. Kad Pengenalan</option>
      <option value="rujukan">No. Rujukan</option>
    </select>
  </div>

  <!-- Input bila pilih "ic" -->
<div *ngIf="kategoriCarian === 'ic'">
  <div class="form-group col-6 mt-3">
    <label for="noIC"><b>No. Kad Pengenalan</b></label>
    <input id="noIC" type="text" class="form-control" [(ngModel)]="noCarian">
  </div>
</div>

  <!-- Input tambahan bila pilih "dokumen" -->
  <div *ngIf="kategoriCarian === 'dokumen'">
    <div class="form-group col-6 mt-3">
      <label for="noCarian"><b>Nombor Dokumen</b></label>
      <input id="noCarian" type="text" class="form-control" [(ngModel)]="noCarian">
    </div>

    <div class="form-group col-6 mt-3">
      <label for="nama"><b>Nama</b></label>
      <input id="nama" type="text" class="form-control" [(ngModel)]="nama">
    </div>

    <div class="form-group col-6 mt-3">
      <label for="warganegara"><b>Warganegara</b></label>
      <select id="warganegara" class="form-select" [(ngModel)]="warganegara">
        <option value="" disabled hidden>-- Pilih Warganegara --</option>
        <option *ngFor="let negara of senaraiNegara" [value]="negara">{{ negara }}</option>
      </select>
    </div>

    <div class="form-group col-6 mt-3">
      <label for="tarikhLahir"><b>Tarikh Lahir</b></label>
      <input id="tarikhLahir" type="date" class="form-control" [(ngModel)]="tarikhLahir">
    </div>
  </div>

  <!-- Butang Cari -->
  <div class="mt-3">
    <button class="btn btn-dark" (click)="cariPermohonan()">Cari</button>
  </div>

  <!-- Senarai Permohonan -->
  <div class="mt-4">
    <h6><b>Senarai Permohonan</b></h6>
    <div class="border p-3" *ngIf="!senaraiPermohonan || senaraiPermohonan.length === 0">
      Tiada rekod ditemui.
    </div>
    <table *ngIf="senaraiPermohonan && senaraiPermohonan.length > 0" class="table table-bordered">
      <thead>
        <tr>
          <th>Bil</th>
          <th>No Dokumen</th>
          <th>Nama</th>
          <th>Warganegara</th>
          <th>Tarikh Lahir</th>
          <th>Status</th>
          <th>Tindakan</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let permohonan of senaraiPermohonan; let i = index">
          <td>{{ i + 1 }}</td>
          <td>{{ permohonan.noDokumen }}</td>
          <td>{{ permohonan.nama }}</td>
          <td>{{ permohonan.warganegara }}</td>
          <td>{{ permohonan.tarikhLahir }}</td>
          <td>{{ permohonan.status }}</td>
          <td>
            <button class="btn btn-sm btn-dark" (click)="pilihPermohonan(permohonan)">Lihat</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>


  </c-col>
</c-row>
