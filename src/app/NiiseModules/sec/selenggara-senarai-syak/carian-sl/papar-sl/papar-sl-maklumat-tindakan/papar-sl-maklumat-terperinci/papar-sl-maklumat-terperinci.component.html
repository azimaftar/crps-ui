<div class="container-fluid">
    <c-row>
        <c-col>
            <c-card class="mb-3 mt-3 ms-1">
                <c-card-body>
                    <form>
                        <h3 class="mb-4">{{ pageTitle }}</h3>

                        <!-- Horizontal Stepper -->
                        <div class="horizontal-stepper">
                            <ul class="stepper-list d-flex align-items-center justify-content-start flex-wrap">
                            <li
                                class="stepper-item"
                                *ngFor="let step of steps"
                                [class.active]="isStepActive(step.number)">
                                <button 
                                    type="button" 
                                    class="step-btn"
                                    (click)="navigateTo(step)">
                                    <span class="step-number">{{ step.number }}</span>
                                    <span class="step-title">{{ step.title }}</span>
                                </button>
                            </li>
                            </ul>
                        </div>

                        <c-row class="mb-3 mt-3 ms-1">
                            <c-col class="col-md-6">
                            <label class="form-label required">Tarikh Masuk</label>
                            <input type="text" class="form-control" disabled readonly [value]="tarikhMasuk | date:'dd/MM/yyyy'"/>
                            </c-col>
                            <c-col class="col-md-6">
                            <label class="form-label">Masa Masuk</label>
                            <input type="text" class="form-control" disabled readonly [value]="masaMasuk | date:'dd/MM/yyyy, h:mm a'"/>
                            </c-col>
                        </c-row>

                        <c-row class="mb-3 mt-3 ms-1">
                            <c-col class="col-md-12">
                            <label class="form-label required">Pintu Masuk</label>
                            <input type="text" class="form-control" disabled readonly [value]="pintuMasuk"/>
                            </c-col>
                        </c-row>

                        <c-row class="mb-3 mt-3 ms-1">
                            <c-col class="col-md-6">
                            <label class="form-label required">Jenis Pas</label>
                            <input type="text" class="form-control" disabled readonly [value]="jenisPas"/>
                            </c-col>
                            <c-col class="col-md-6">
                            <label class="form-label">Tarikh Tamat Pas</label>
                            <input type="text" class="form-control" disabled readonly [value]="tarikhTamatPas | date:'dd/MM/yyyy'"/>
                            </c-col>
                        </c-row>

                        <c-row class="mb-3 mt-3 ms-1">
                            <c-col class="col-md-6">
                            <label class="form-label required">Tarikh Tamat Dokumen</label>
                            <input type="text" class="form-control" disabled readonly [value]="tarikhTamatDokumen | date:'dd/MM/yyyy'"/>
                            </c-col>
                        </c-row>
                    </form>

                    <!-- Footer Buttons -->
                    <div class="border-top p-3 d-flex justify-content-end gap-2">
                    <button type="button" cButton color="primary" (click)="prevPage()">
                        <svg cIcon name="cilCaretLeft" size="sm"></svg>
                    </button>
                    </div>
                </c-card-body>
            </c-card>
        </c-col>
    </c-row>
</div>
