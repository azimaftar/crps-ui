<c-card class="mb-3">
    <c-card-body>
        <c-col md="18">
        <h3 class="mb-4"> Carian Dokumen </h3>

        <!-- Horizontal Stepper -->
        <div class="horizontal-stepper">
            <ul class="stepper-list d-flex align-items-center justify-content-start flex-wrap">
            <li
                class="stepper-item"
                *ngFor="let step of steps"
                [class.active]="isStepActive(step.number)">
                <button type="button" class="step-btn">
                <span class="step-number">{{ step.number }}</span>
                <span class="step-title">{{ step.title }}</span>
                </button>
            </li>
            </ul>
        </div>

        <div class="form-group mt-4">
            <c-row class="mb-3 mt-3 ms-1">
                <c-col class="col-md-6">
                    <label class="form-label fw-semibold">No Dokumen</label>
                    <input type="text" class="form-control" [(ngModel)]="noDokumen" name="noDokumen" required maxlength="60" placeholder="Contoh: A230398">
                </c-col>
                <c-col class="col-md-6">
                    <label class="form-label fw-semibold">Jenis Dokumen</label>
                    <select class="form-select" [(ngModel)]="jenisDokumen" name="jenisDokumen">
                        <option value="" disabled selected>Sila pilih jenis dokumen</option>
                        <option *ngFor="let dokumen of jenisDokumenList">{{ dokumen }}</option>
                    </select>
                </c-col>
            </c-row>
        </div>

        <!-- Senarai Dokumen -->
        <c-row class="align-items-center mb-2 mt-4 ms-1">
        <c-col>
            <h5 class="mb-0">Senarai Dokumen</h5>
        </c-col>
        </c-row>
        <!-- Table Always Visible -->
        <div class="table-responsive mt-3 ms-2" style="max-width: 100%; overflow-x: auto;">
            <table
                cTable
                class="table search-results-table mb-0"
                style="min-width: 1000px;">
                <thead>
                <tr>
                    <th>No.</th>
                    <th>No Dokumen</th>
                    <th>Negara Pengeluar</th>
                    <th>Tarikh Tamat</th>
                    <th>Jenis Dokumen</th>
                    <th>Nama</th>
                    <th>Tarikh Lahir</th>
                    <th>No Pengenalan</th>
                    <th>Tindakan</th>
                </tr>
                </thead>
                <tbody>
                <tr *ngFor="let item of searchResults; let i = index">
                    <th scope="row">{{ i + 1 }}</th>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td>
                    <button cButton color="primary" size="sm" class="me-2" (click)="tindakan(item)">
                        <svg cIcon name="cilPencil" size="sm"></svg>
                    </button>
                    </td>
                </tr>
                <tr *ngIf="!searchResults?.length">
                    <td colspan="9" class="text-center text-muted py-4">
                    Tiada data untuk dipaparkan.
                    </td>
                </tr>
                </tbody>
            </table>
            </div>
        </c-col>
    </c-card-body>
</c-card>
