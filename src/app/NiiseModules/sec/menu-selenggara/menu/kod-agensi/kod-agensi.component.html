<c-card class="mb-3">

    <!-- CONTENT CARD BODY -->
    <c-card-body>

        <c-row>
            <h5 class="mb-4">Kod Agensi</h5>
        </c-row>

        <!-- Horizontal Stepper -->
        <div class="horizontal-stepper">
            <ul class="stepper-list d-flex align-items-center justify-content-start flex-wrap">
                <li class="stepper-item" *ngFor="let step of steps" [class.active]="isStepActive(step.number)">
                    <button type="button" class="step-btn" (click)="navigateTo(step)">
                        <span class="step-number">{{ step.number }}</span>
                        <span class="step-title">{{ step.title }}</span>
                    </button>
                </li>
            </ul>
        </div>

        <!-- Applicant Form -->
        <c-row class="ms-3">

            <!-- Kod -->
<c-row class="mb-3">
  <c-col md="6">
    <label class="form-label">Kod</label>
    <input type="text" class="form-control" style="width: 45%;" [(ngModel)]="kod" name="kod"
           [ngClass]="{ 'is-invalid': submitted && !kod }">
  </c-col>
</c-row>

<!-- Kategori Agensi -->
<c-row class="mb-3">
  <c-col md="6">
    <label class="form-label">Agensi</label>
    <select class="form-select" style="width: 65%;" [(ngModel)]="agensi" name="agensi"
            [ngClass]="{ 'is-invalid': submitted && !agensi }">
      <option value="">-Sila Pilih-</option>
      <option value="PDRM">PDRM</option>
    </select>
  </c-col>
</c-row>


        </c-row>




        <!-- FOOTER BUTTONS -->
        <c-row class="mt-4 mb-3">
            <c-col class="d-flex justify-content-end align-items-center gap-2" style="padding-right: 6%;">

                <!-- Action Buttons -->
                <div class="d-flex flex-wrap gap-3 my-3">
                    <button cButton type="button" color="primary" class="text-white px-5 py-2" (click)="saveForm()">
                        <i class="fas fa-save me-2"></i>
                        Simpan
                    </button>
                </div>

                <!-- Navigation Buttons  -->
                <div class="d-flex gap-2 ms-4">
                    <button cButton type="button" color="primary" class="text-white px-3 nav-btn" (click)="goBack()">
                        &lt;
                    </button>
                    <button cButton type="button" color="primary" class="text-white px-3 nav-btn" disabled>
                        &gt;
                    </button>
                </div>
            </c-col>
        </c-row>


        <!-- CoreUI Modal -->
        <c-modal [visible]="modalVisible" (visibleChange)="modalVisible = $event" backdrop="static" keyboard="false">

            <c-modal-body class="text-center">
                <div class="mb-3">
                    <svg width="64" height="48" viewBox="0 0 64 48" fill="none">
                        <rect x="8" y="8" width="48" height="32" stroke="#6c757d" stroke-width="2" fill="none" />
                        <line x1="16" y1="16" x2="48" y2="32" stroke="#6c757d" stroke-width="2" />
                        <line x1="48" y1="16" x2="16" y2="32" stroke="#6c757d" stroke-width="2" />
                    </svg>
                </div>
                <p>{{ modalMessage }}</p>
            </c-modal-body>

            <c-modal-footer>
                <button type="button" cButton color="dark" (click)="onModalOk()" class="px-4"
                    style="width: 20%; margin-right: 40%;">
                    OK
                </button>
            </c-modal-footer>
        </c-modal>
