<!-- Main Content -->
<c-row class="carian-subjek-container page-layout">
  <c-col md="12">
    <!-- White box container -->
    <div class="white-box p-4">
      <!-- Title -->
      <h3 class="mb-4">Tolak / Lucut warganegara</h3>

      <!-- Search Section -->
      <div class="search-section mb-4 p-3 rounded bg-light">
        <h5 class="mb-3">Carian Permohonan</h5>

        <!-- Row 1 -->
        <c-row class="mb-3">
          

          <c-col md="3" class="form-group">
            <label>Nama</label>
            <input type="text" class="form-control" [(ngModel)]="nama" placeholder="Masukkan nama">
          </c-col>

          <c-col md="3" class="form-group">
            <label>No Kad Pengenalan</label>
            <input type="text" class="form-control" [(ngModel)]="noKadPengenalan" placeholder="Masukkan nombor Kad Pengenalan">
          </c-col>

          
        </c-row>

        <!-- Reset Button -->
        <c-row>
          <c-col class="d-flex justify-content-end">
            <button class="btn btn-outline-dark" (click)="onSetSemula()">Set Semula</button>
          </c-col>
        </c-row>
      </div>

      <!-- Subject List Section -->
      <div class="subject-list-section">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h5>Senarai Permohonan</h5>
          <button class="btn btn-primary" (click)="permohonanBaru()">+ Permohonan Baru</button>
        </div>

        <!-- Table -->
        <div class="table-responsive">
          <table class="table table-bordered align-middle">
            <thead class="table-light">
              <tr>
                <th>No K/P</th>
                <th>Nama</th>
                <th>Status</th>
                <th>Tindakan</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let subject of subjects">
                <td>{{ subject.noKP }}</td>                
                <td>{{ subject.nama }}</td>
                <td>
                  <span [ngClass]="{'badge bg-success': subject.status === 'Aktif',
                                    'badge bg-secondary': subject.status !== 'Aktif'}">
                    {{ subject.status }}
                  </span>
                </td>
                <td>
                  <div class="d-flex gap-2">
                    <button class="btn btn-outline-dark btn-sm" (click)="Edit()">Edit</button>
                    <button class="btn btn-outline-dark btn-sm" (click)="Papar()">Papar</button>
                  </div>
                </td>
              </tr>
              <tr *ngIf="subjects.length === 0">
                <td colspan="8" class="text-center text-muted">Tiada data untuk dipaparkan</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </c-col>
</c-row>
