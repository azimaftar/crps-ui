<!-- STEPPER -->
<c-row class="stepper-container px-4 py-3 mb-4">
  <c-col md="12">
    <div class="horizontal-stepper">
      <ul class="stepper-list d-flex align-items-center justify-content-start flex-wrap">
        <li
          class="stepper-item"
          *ngFor="let step of steps"
          [class.active]="isStepActive(step.number)">
          <button type="button" class="step-btn">
            <span class="step-number">{{ step.number }}</span>
            <span class="step-title">{{ step.title }}</span>
          </button>
        </li>
      </ul>
    </div>
  </c-col>
</c-row>

<!-- FORM -->
<div class="container-fluid">
  <c-row>
    <c-col>
      <c-card>
        <c-card-header>
          <h5 class="card-title">Maklumat Tindakan</h5>
        </c-card-header>
        <c-card-body>
          <form>

          <c-row>
            <c-col md="6">
              <label class="form-label label-required">Kod NAP</label>
              <select class="form-select"
                [ngClass]="{'input-error': isSubmit && !tindakanData.kodNAP}"
                [(ngModel)]="tindakanData.kodNAP" name="kodNAP">
                <option value="">Sila Pilih</option>
                <option value="nap1">NAP 1</option>
                <option value="nap2">NAP 2</option>
              </select>
              <div *ngIf="isSubmit && !tindakanData.kodNAP" class="text-danger">
                Kod NAP perlu diisi.
              </div>
            </c-col>

            <c-col md="6">
              <label class="form-label label-required">Nombor NAP</label>
              <input type="text" class="form-control"
                [ngClass]="{'input-error': isSubmit && !tindakanData.noNAP}"
                [(ngModel)]="tindakanData.noNAP" name="noNAP">
              <div *ngIf="isSubmit && !tindakanData.noNAP" class="text-danger">
                Nombor NAP perlu diisi.
              </div>
            </c-col>
          </c-row>

          <c-row>
            <c-col md="6">
              <label class="form-label label-required">Kod Tindakan</label>
              <select class="form-select"
                [ngClass]="{'input-error': isSubmit && !tindakanData.kodTindakan}"
                [(ngModel)]="tindakanData.kodTindakan" name="kodTindakan">
                <option value="">Sila Pilih</option>
                <option value="tindakan1">Tindakan 1</option>
                <option value="tindakan2">Tindakan 2</option>
              </select>
              <div *ngIf="isSubmit && !tindakanData.kodTindakan" class="text-danger">
                Kod Tindakan perlu diisi.
              </div>
            </c-col>

            <c-col md="6">
              <label class="form-label label-required">Tarikh NAP</label>
              <input type="date" class="form-control"
                [ngClass]="{'input-error': isSubmit && !tindakanData.tarikhNAP}"
                [(ngModel)]="tindakanData.tarikhNAP" name="tarikhNAP">
              <div *ngIf="isSubmit && !tindakanData.tarikhNAP" class="text-danger">
                Tarikh NAP perlu diisi.
              </div>
            </c-col>
          </c-row>

          <c-row>
            <c-col md="6">
              <label class="form-label">Tarikh Tamat Kes</label>
              <input type="date" class="form-control"
                [(ngModel)]="tindakanData.tarikhTamatKes" name="tarikhTamatKes">
            </c-col>

            <c-col md="6">
              <label class="form-label label-required">Nombor Rujukan Agensi</label>
              <input type="text" class="form-control"
                [ngClass]="{'input-error': isSubmit && !tindakanData.noRujukanAgensi}"
                [(ngModel)]="tindakanData.noRujukanAgensi" name="noRujukanAgensi">
              <div *ngIf="isSubmit && !tindakanData.noRujukanAgensi" class="text-danger">
                Nombor Rujukan Agensi perlu diisi.
              </div>
            </c-col>
          </c-row>

          <c-row>
            <c-col md="6">
              <label class="form-label">Tarikh Kuat Kuasa</label>
              <input type="date" class="form-control"
                [(ngModel)]="tindakanData.tarikhKuatKuasa" name="tarikhKuatKuasa">
            </c-col>
          </c-row>

          <c-row>
            <c-col>
              <label class="form-label">Keterangan Kes</label>
              <textarea class="form-control" rows="3"
                [(ngModel)]="tindakanData.keteranganKes" name="keteranganKes"></textarea>
            </c-col>
          </c-row>


          </form>
        </c-card-body>
      </c-card>
    </c-col>
  </c-row>
</div>

<!-- MODAL -->
<c-modal [(visible)]="showModal" alignment="center" size="sm">
  <c-modal-body class="text-center">
    <div *ngIf="modalType === 'success'" class="mb-3">
      <div style="font-size: 48px; color: #28a745;">✔️</div>
    </div>
    <div *ngIf="modalType === 'error'" class="mb-3">
      <div style="font-size: 48px; color: #dc3545;">❗</div>
    </div>
    <p>{{ modalMessage }}</p>
  </c-modal-body>
  <c-modal-footer class="justify-content-center">
    <button cButton color="primary" (click)="closeModal()">OK</button>
  </c-modal-footer>
</c-modal>

<!-- BUTTONS -->
<div class="button-container mt-3 d-flex justify-content-end">
  <button class="btn btn-outline-light btn-reset me-2" (click)="setSemula()">Set Semula</button>
  <button class="btn btn-primary me-2" (click)="simpan()">Simpan</button>
  <button class="btn btn-success me-2" (click)="hantar()" >Hantar</button>
  <div class="arrow-group">
    <button class="btn btn-arrow btn-arrow-left me-1" (click)="previousStep()" title="Previous"></button>
    <button class="btn btn-arrow btn-arrow-right" (click)="nextStep()" title="Next"></button>
  </div>
</div>
