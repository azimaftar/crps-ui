<!-- STEPPER -->
<c-row class="stepper-container px-4 py-3 mb-4">
  <c-col md="12">
    <div class="horizontal-stepper">
      <ul class="stepper-list d-flex align-items-center justify-content-start flex-wrap">
        <li *ngFor="let step of steps" class="stepper-item" [class.active]="isStepActive(step.number)">
          <button type="button" class="step-btn">
            <span class="step-number">{{ step.number }}</span>
            <span class="step-title">{{ step.title }}</span>
          </button>
        </li>
      </ul>
    </div>
  </c-col>
</c-row>

<div class="container-fluid">
  <c-row>
    <c-col>
      <c-card>
        <c-card-header>
          <h5 class="card-title">Maklumat Sabjek</h5>
        </c-card-header>
        <c-card-body>
          <form>

       <!-- Jenis Pengenalan -->
            <c-row>
              <c-col md="6">
                <label class="form-label label-required">Jenis Pengenalan</label>
                <select class="form-select" 
                        [ngClass]="{'input-error': isSubmit && !sabjekData.idType}"
                        [(ngModel)]="sabjekData.idType" name="idType">
                  <option value="">Sila Pilih</option>
                  <option value="mykad">MyKad</option>
                  <option value="passport">Passport</option>
                </select>
                <div *ngIf="isSubmit && !sabjekData.idType" class="text-danger">Jenis pengenalan perlu diisi.</div>
              </c-col>
            </c-row>

            <!-- No Kad Pengenalan -->
            <c-row>
              <c-col md="6">
                <label class="form-label label-required">No Kad Pengenalan</label>
                <input type="text" class="form-control"
                       [ngClass]="{'input-error': isSubmit && !sabjekData.noKadPengenalan}"
                       [(ngModel)]="sabjekData.noKadPengenalan" name="noKadPengenalan">
                <div *ngIf="isSubmit && !sabjekData.noKadPengenalan" class="text-danger">No Kad Pengenalan perlu diisi.</div>
              </c-col>
              <c-col md="6">
                <label class="form-label">No. Dokumen (jika ada)</label>
                <input type="text" class="form-control" [(ngModel)]="sabjekData.docNo" name="docNo">
              </c-col>
            </c-row>

            <!-- Nama -->
            <c-row>
              <c-col>
                <label class="form-label label-required">Nama</label>
                <input type="text" class="form-control"
                       [ngClass]="{'input-error': isSubmit && !sabjekData.name}" 
                       [(ngModel)]="sabjekData.name" name="name">
                <div *ngIf="isSubmit && !sabjekData.name" class="text-danger">Nama perlu diisi.</div>
              </c-col>
            </c-row>

            <!-- Warganegara & Bangsa -->
            <c-row>
              <c-col md="6">
                <label class="form-label label-required">Warganegara</label>
                <select class="form-select" 
                        [ngClass]="{'input-error': isSubmit && !sabjekData.nationality}"
                        [(ngModel)]="sabjekData.nationality" name="nationality">
                  <option value="">Sila Pilih</option>
                  <option value="malaysia">Malaysia</option>
                  <option value="singapore">Singapore</option>
                </select>
                <div *ngIf="isSubmit && !sabjekData.nationality" class="text-danger">Warganegara perlu diisi.</div>
              </c-col>
              <c-col md="6">
                <label class="form-label label-required">Bangsa</label>
                <select class="form-select"
                        [ngClass]="{'input-error': isSubmit && !sabjekData.race}"
                        [(ngModel)]="sabjekData.race" name="race">
                  <option value="">Sila Pilih</option>
                  <option value="melayu">Melayu</option>
                  <option value="cina">Cina</option>
                  <option value="india">India</option>
                  <option value="lain">Lain-lain</option>
                </select>
                <div *ngIf="isSubmit && !sabjekData.race" class="text-danger">Bangsa perlu diisi.</div>
              </c-col>
            </c-row>

            <!-- Tarikh Lahir & Jantina -->
            <c-row>
              <c-col md="6">
                <label class="form-label label-required">Tarikh Lahir</label>
                <input type="date" class="form-control"
                       [ngClass]="{'input-error': isSubmit && !sabjekData.dob}"
                       [(ngModel)]="sabjekData.dob" name="dob">
                <div *ngIf="isSubmit && !sabjekData.dob" class="text-danger">Tarikh Lahir perlu diisi.</div>
              </c-col>
              <c-col md="6">
                <label class="form-label label-required">Jantina</label>
                <select class="form-select" 
                        [ngClass]="{'input-error': isSubmit && !sabjekData.gender}"
                        [(ngModel)]="sabjekData.gender" name="gender">
                  <option value="">Sila Pilih</option>
                  <option value="lelaki">Lelaki</option>
                  <option value="perempuan">Perempuan</option>
                </select>
                <div *ngIf="isSubmit && !sabjekData.gender" class="text-danger">Jantina perlu diisi.</div>
              </c-col>
            </c-row>

            <!-- Negara Lahir & Wilayah -->
            <c-row>
              <c-col md="6">
                <label class="form-label label-required">Negara Lahir</label>
                <input type="text" class="form-control"
                       [ngClass]="{'input-error': isSubmit && !sabjekData.countryOfBirth}"
                       [(ngModel)]="sabjekData.countryOfBirth" name="countryOfBirth">
                <div *ngIf="isSubmit && !sabjekData.countryOfBirth" class="text-danger">Negara Lahir perlu diisi.</div>
              </c-col>
              <c-col md="6">
                <label class="form-label">Wilayah Lahir</label>
                <select class="form-select" [(ngModel)]="sabjekData.regionOfBirth" name="regionOfBirth">
                  <option value="">Sila Pilih</option>
                  <option value="selangor">Selangor</option>
                  <option value="kuala-lumpur">Kuala Lumpur</option>
                  <option value="johor">Johor</option>
                </select>
              </c-col>
            </c-row>

            <!-- Tempat Lahir -->
            <c-row>
              <c-col>
                <label class="form-label">Tempat Lahir</label>
                <input type="text" class="form-control" [(ngModel)]="sabjekData.placeOfBirth" name="placeOfBirth">
              </c-col>
            </c-row>

            <!-- Nama Baharu -->
            <c-row>
              <c-col>
                <label class="form-label">Nama Baharu</label>
                <input type="text" class="form-control" [(ngModel)]="sabjekData.newName" name="newName">
              </c-col>
            </c-row>

            <!-- Warganegara Baharu & Passport -->
            <c-row>
              <c-col md="6">
                <label class="form-label">Warganegara Baharu</label>
                <select class="form-select" [(ngModel)]="sabjekData.newNationality" name="newNationality">
                  <option value="">Sila Pilih</option>
                  <option value="malaysia">Malaysia</option>
                  <option value="singapore">Singapore</option>
                </select>
              </c-col>
              <c-col md="6">
                <label class="form-label">No. Passport Baharu</label>
                <input type="text" class="form-control" [(ngModel)]="sabjekData.newPassport" name="newPassport">
              </c-col>
            </c-row>

            <!-- Data Biometrik -->
            <c-row>
              <c-col md="6">
                <label class="form-label">Data Biometrik</label>
                <input type="text" class="form-control" [(ngModel)]="sabjekData.biometricData" name="biometricData">
              </c-col>
            </c-row>

            <!-- Perkara -->
            <c-row>
              <c-col md="6">
                <label class="form-label label-required">Perkara</label>
                <select class="form-select"
                        [ngClass]="{'input-error': isSubmit && !sabjekData.perkara}"
                        [(ngModel)]="sabjekData.perkara" name="perkara">
                  <option value="">Sila Pilih</option>
                  <option value="penolakan">Penolakan Warganegara</option>
                  <option value="lucut">Pengelucutan Warganegara</option>
                </select>
                <div *ngIf="isSubmit && !sabjekData.perkara" class="text-danger">Perkara perlu diisi.</div>
              </c-col>
            </c-row>

            <!-- Tarikh Masuk & Tarikh Tamat Passport -->
            <c-row>
              <c-col md="6">
                <label class="form-label">Tarikh Masuk</label>
                <input type="date" class="form-control" [(ngModel)]="sabjekData.startDate" name="startDate">
              </c-col>
              <c-col md="6">
                <label class="form-label">Tarikh Tamat Passport</label>
                <input type="date" class="form-control" [(ngModel)]="sabjekData.endPassportDate" name="endPassportDate">
              </c-col>
            </c-row>


            <!-- Tempat Lahir -->
            <c-row>
              <c-col>
                <label class="form-label">Tempat Lahir</label>
                <input type="text" class="form-control" [(ngModel)]="sabjekData.placeOfBirth" name="placeOfBirth">
              </c-col>
            </c-row>

            <!-- Nama Baharu -->
            <c-row>
              <c-col>
                <label class="form-label">Nama Baharu</label>
                <input type="text" class="form-control" [(ngModel)]="sabjekData.newName" name="newName">
              </c-col>
            </c-row>

            <!-- Warganegara Baharu & Passport -->
            <c-row>
              <c-col md="6">
                <label class="form-label">Warganegara Baharu</label>
                <select class="form-select" [(ngModel)]="sabjekData.newNationality" name="newNationality">
                  <option value="">Sila Pilih</option>
                  <option value="malaysia">Malaysia</option>
                  <option value="singapore">Singapore</option>
                </select>
              </c-col>
              <c-col md="6">
                <label class="form-label">No. Passport Baharu</label>
                <input type="text" class="form-control" [(ngModel)]="sabjekData.newPassport" name="newPassport">
              </c-col>
            </c-row>

            <!-- Data Biometrik -->
            <c-row>
              <c-col md="6">
                <label class="form-label">Data Biometrik</label>
                <input type="text" class="form-control" [(ngModel)]="sabjekData.biometricData" name="biometricData">
              </c-col>
            </c-row>

            <!-- Perkara -->
            <c-row>
              <c-col md="6">
                <label class="form-label">Perkara</label>
                <select class="form-select" [(ngModel)]="sabjekData.perkara" name="perkara">
                  <option value="">Sila Pilih</option>
                  <option value="penolakan">Penolakan Warganegara</option>
                  <option value="lucut">Pengelucutan Warganegara</option>
                </select>
                <div *ngIf="isSubmit && !sabjekData.perkara" class="text-danger">Perkara perlu diisi.</div>
              </c-col>
            </c-row>

            <!-- Tarikh Masuk & Tarikh Tamat Passport -->
            <c-row>
              <c-col md="6">
                <label class="form-label">Tarikh Masuk</label>
                <input type="date" class="form-control" [(ngModel)]="sabjekData.startDate" name="startDate">
              </c-col>
              <c-col md="6">
                <label class="form-label">Tarikh Tamat Passport</label>
                <input type="date" class="form-control" [(ngModel)]="sabjekData.endPassportDate" name="endPassportDate">
              </c-col>
            </c-row>

          </form>
        </c-card-body>
      </c-card>
    </c-col>
  </c-row>
</div>

<!-- Modal -->
<c-modal [(visible)]="showModal" alignment="center" size="sm">
  <c-modal-body class="text-center">
    <div *ngIf="modalType === 'success'" class="mb-3">
      <div style="font-size: 48px; color: #28a745;">✔️</div>
    </div>
    <div *ngIf="modalType === 'error'" class="mb-3">
      <div style="font-size: 48px; color: #dc3545;">❗</div>
    </div>
    <p>{{ modalMessage }}</p>
  </c-modal-body>
  <c-modal-footer class="justify-content-center">
    <button cButton color="primary" (click)="closeModal()">OK</button>
  </c-modal-footer>
</c-modal>

<!-- Buttons -->
<div class="button-container mt-3 d-flex justify-content-end">
  <button class="btn btn-outline-light btn-reset me-2" (click)="setSemula()">Set Semula</button>
  <button class="btn btn-primary me-2" (click)="simpan()">Simpan</button>
  <button class="btn btn-success me-2" (click)="hantar()" >Hantar</button>
  <!-- Arrow navigation buttons -->
  <div class="arrow-group">
    <button class="btn btn-arrow btn-arrow-left me-1" (click)="previousStep()" title="Previous"></button>
    <button class="btn btn-arrow btn-arrow-right" (click)="nextStep()" title="Next"></button>
  </div>
</div>
