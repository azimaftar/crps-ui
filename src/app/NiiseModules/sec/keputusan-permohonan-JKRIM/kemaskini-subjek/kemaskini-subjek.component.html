<div *ngIf="currentSection === 1">

    <body>

                                        <label class="form-label">Jenis Pengenalan<span

                                    <div class="col-md-6">
                                        <label class="form-label">Jenis Dokumen</label>

                                <div class="row mb-3">
                                    <div class="col-md-5">
                                        <label class="form-label">Warganegara<span class="text-danger">*</span></label>
                                        <select class="form-select">
                                            <option value="malaysia">Malaysia</option>
                                            <option value="singapore">Singapura</option>
                                            <option value="indonesia">Indonesia</option>
                                            <option value="thailand">Thailand</option>
                                            <option value="other">Lain-lain</option>
                                        </select>
                                    </div>
                                    <div class="col-md-1"></div>
                                    <div class="col-md-3">
                                        <label class="form-label">Bangsa</label>
                                        <select class="form-select">
                                            <option value="melayu">Melayu</option>
                                            <option value="cina">Cina</option>
                                            <option value="india">India</option>
                                            <option value="kadazan">Kadazan</option>
                                            <option value="iban">Iban</option>
                                            <option value="other">Lain-lain</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="row mb-3">
                                    <div class="col-md-3">
                                        <label class="form-label">Tarikh Lahir<span class="text-danger">*</span></label>
                                        <input type="date" class="form-control" value="1989-02-11">
                                    </div>
                                    <div class="col-md-3"></div>
                                    <div class="col-md-3">
                                        <label class="form-label">Jantina</label>
                                        <select class="form-select">
                                            <option value="lelaki">Lelaki</option>
                                            <option value="perempuan">Perempuan</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <label class="form-label">Negara Lahir</label>
                                        <select class="form-select">
                                            <option value="malaysia">Malaysia</option>
                                            <option value="singapore">Singapura</option>
                                            <option value="indonesia">Indonesia</option>
                                            <option value="thailand">Thailand</option>
                                            <option value="other">Lain-lain</option>
                                        </select>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">Tempat Lahir<span class="text-danger">*</span></label>
                                        <input type="text" class="form-control" value="Pahang"
                                            placeholder="Masukkan tempat lahir">
                                    </div>
                                </div>

                                <div class="row mb-3">
                                    <div class="col-md-4">
                                        <label class="form-label">Unik ID</label>
                                        <input type="text" class="form-control">
                                    </div>
                                    <div class="col-md-2"></div>
                                    <div class="col-md-4">
                                        <label class="form-label">Data Biometrik</label>
                                        <input type="text" class="form-control">
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Catatan Fizikal (Jika Ada)</label>
                                    <textarea class="form-control" rows="4"></textarea>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Catatan Tambahan</label>
                                    <textarea class="form-control" rows="4"></textarea>
                                </div>

                                <div class="form-check mb-4">
                                    <input class="form-check-input" type="checkbox" id="confirmation">
                                    <label class="form-check-label" for="confirmation">
                                        Saya mengesahkan maklumat yang diberikan adalah sah dan benar.
                                    </label>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</div>

<!-- footer -->
<div class="bottom-navigation d-flex justify-content-end p-3">
    <div class="nav-buttons d-flex align-items-center">
        <button class="btn btn-reset btn-dark m-2" (click)="null">Set Semula</button>
        <div *ngIf="currentSection === 1 || currentSection === 2">
            <button class="btn btn-back btn-dark m-2" (click)="null" disabled>Hantar</button>
        </div>
        <div *ngIf="currentSection === 3">
            <button class="btn btn-back btn-dark m-2" (click)="modelforhantar()">Hantar</button>
        </div>
        <div class="right-buttons">
            <button class="btn btn-back btn-dark m-2" (click)="goToPreviousSection()">
                &lt;
            </button>
            <button class="btn btn-next btn-dark m-2" (click)="goToNextSection()">
                &gt;
            </button>
        </div>
    </div>
</div>

    <c-modal-body class="d-flex justify-content-center align-items-center" style="min-height: 150px;">
        <h5 class="text-center m-0">Adakah Anda Pasti</h5>
    </c-modal-body>
    <c-modal-footer class="d-flex justify-content-center">
        <button class="btn btn-secondary btn-dark" (click)="Pasti()">Ya</button>
         <button class="btn btn-secondary btn-dark " (click)="closeModal()">Tidak</button>
    </c-modal-footer>
</c-modal>

        <h5 class="text-center m-0">Rekod Telah berjaya Dikemaskini</h5>
    </c-modal-body>
    <c-modal-footer class="d-flex justify-content-center">
         <button class="btn btn-secondary btn-dark" (click)="closePastiModal()">Ok</button>
    </c-modal-footer>
</c-modal>
