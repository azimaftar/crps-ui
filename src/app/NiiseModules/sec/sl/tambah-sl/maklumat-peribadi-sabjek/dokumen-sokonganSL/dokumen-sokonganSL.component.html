<div class="container-fluid">
  <c-card class="mb-3 border-0">
    <c-card-body>
      <form>
        <c-row>
          <!-- Left Section -->
          <c-col md="9">
            <h5 class="mb-4">Dokumen Sokongan</h5>

            <div class="table-responsive">
              <table cTable hover class="table align-middle">
                <thead>
                  <tr>
                    <th>Bil.</th>
                    <th>Keterangan</th>
                    <th>Nama Dokumen</th>
                    <th>Format</th>
                    <th>Tindakan</th>
                  </tr>
                </thead>
                <tbody>
                  <tr *ngFor="let doc of documents; let i = index">
                    <td>{{ i + 1 }}</td>

                    <!-- Keterangan -->
                    <td class="align-middle">
                      {{ doc.keterangan }}
                    </td>

                    <!-- Nama Dokumen -->
                    <td>
                      <span *ngIf="doc.fileName" class="text-dark fw-semibold">
                        {{ doc.fileName }}
                      </span>
                      <span *ngIf="!doc.fileName" class="text-muted">
                        Tiada fail dipilih
                      </span>
                    </td>

                    <!-- Format -->
                    <td>
                      <span *ngIf="doc.format" class="badge text-bg-secondary">
                        {{ doc.format }}
                      </span>
                    </td>

                    <!-- Tindakan -->
                    <td>
                      <button type="button" cButton color="primary" (click)="uploadFile(i)">
                        + Muat Naik
                      </button>
                    </td>
                  </tr>
                </tbody>
              </table>
              <small class="text-muted">*Saiz fail maksimum: 10MB</small>
            </div>
          </c-col>

          <!-- Right Column: Stepper -->
          <c-col md="3" class="px-4 py-3 mt-2 stepper-container">
            <ul class="stepper-list">
              <li
                class="stepper-item"
                *ngFor="let step of steps; let i = index"
                [class.active]="isStepActive(step.number)">
                <div class="stepper-content">
                  <span class="step-number" [class.active]="isStepActive(step.number)">
                    {{ step.number }}
                  </span>
                  <span class="step-title" [class.active]="isStepActive(step.number)">
                    {{ step.title }}
                  </span>
                </div>

                <!-- Step Line -->
                <div *ngIf="i < steps.length - 1" class="stepper-line"></div>
              </li>
            </ul>
          </c-col>
        </c-row>
      </form>
    </c-card-body>

    <!-- Footer Navigation -->
    <div class="border-top p-3 d-flex justify-content-end gap-2">
      <button type="button" cButton color="primary" (click)="resetForm()">Set Semula</button>
      <button type="button" cButton color="primary" (click)="submitForm()">Hantar</button>
      <button type="button" cButton color="primary" (click)="previousStep()">
        <svg cIcon name="cilCaretLeft" size="sm"></svg>
      </button>
    </div>
  </c-card>
</div>
