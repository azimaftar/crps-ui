<c-modal [visible]="true" (close)="onCancel()" size="lg">
  <c-modal-header>
    <h5 class="modal-title">Takwim - {{ newEvent.title }}</h5>
    <button type="button" class="btn-close" aria-label="Close" (click)="onCancel()"></button>
  </c-modal-header>

  <c-modal-body>
    <!-- New Holiday Form -->
    <div class="row mt-3">
      <div class="col">
        <input class="form-control" placeholder="Negeri" [(ngModel)]="newHoliday.state" />
      </div>
      <div class="col">
        <input class="form-control" placeholder="Negara" [(ngModel)]="newHoliday.ctry" />
      </div>
      <div class="col">
        <input class="form-control" placeholder="Tarikh" [(ngModel)]="newHoliday.date" />
      </div>
      <div class="col">
        <input class="form-control" placeholder="Jenis Cuti" [(ngModel)]="newHoliday.holidayType" />
      </div>
      <div class="col">
        <input class="form-control" placeholder="Perincian Cuti" [(ngModel)]="newHoliday.holidayDetail" />
      </div>
      <div class="col-auto">
        <button class="btn btn-sm btn-outline-primary" (click)="addHoliday()">TAMBAH</button>
      </div>
    </div>

    <!-- Holiday List -->
    <div *ngIf="holidayDetails.length === 0" class="mt-3">
      <p>Tiada cuti umum pada tarikh ini.</p>
    </div>

    <div *ngIf="holidayDetails.length > 0" class="mt-3">
      <table class="table table-bordered">
        <thead>
          <tr>
            <th>No.</th>
            <th>Negeri</th>
            <th>Negara</th>
            <th>Tarikh</th>
            <th>Jenis Cuti</th>
            <th>Perincian Cuti</th>
            <th style="width: 150px;">Tindakan</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let holiday of holidayDetails; let i = index">
            <td>{{ i + 1 }}</td>
            <td>{{ holiday.state }}</td>
            <td>{{ holiday.ctry }}</td>
            <td>{{ holiday.date }}</td>
            <td>{{ holiday.holidayType || '—' }}</td>
            <td>{{ holiday.holidayDetail || '—' }}</td>
            <td>
              <button class="btn btn-sm btn-outline-primary" (click)="openEditModal(holiday.uuid)">
                KEMASKINI
              </button>
              <button class="btn btn-sm btn-outline-danger ms-1" (click)="removeHoliday(i)">
                NYAHAKTIF
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </c-modal-body>

  <c-modal-footer>
    <button type="button" class="btn btn-secondary" (click)="onCancel()">Tutup</button>
    <button
      type="button"
      class="btn btn-primary"
      [disabled]="!newEvent.eventName?.trim()"
      (click)="onSave()"
    >
      Simpan
    </button>
  </c-modal-footer>
</c-modal>

<!-- Edit Modal -->
<edit-holiday-modal
  *ngIf="selectedHoliday"
  [holiday]="selectedHoliday"
  (updated)="onHolidayUpdated($event)"
  (close)="selectedHoliday = null"
></edit-holiday-modal>
