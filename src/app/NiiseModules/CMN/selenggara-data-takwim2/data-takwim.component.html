    <div class="d-flex flex-wrap align-items-center gap-2">
      <label class="me-2">Negeri/Pejabat Atase:</label>
      <select [(ngModel)]="selectedRegion" class="form-select w-auto">
        <option value="">Wilayah Persekutuan Putrajaya, Malaysia</option>
        <option value="selangor">Selangor, Malaysia</option>
        <option value="jakarta">Jakarta, Indonesia</option>
      </select>

      <label class="ms-3 me-2">Bulan:</label>
      <select [(ngModel)]="selectedMonth" class="form-select w-auto">
        <option *ngFor="let m of months; index as i" [value]="i + 1">{{ m }}</option>
      </select>

      <label class="ms-3 me-2">Tahun:</label>
      <select [(ngModel)]="selectedYear" class="form-select w-auto">
        <option *ngFor="let y of years" [value]="y">{{ y }}</option>
      </select>

      <button class="btn btn-dark ms-2" (click)="search()">CARI</button>
    </div>
  </c-card-body>
    <c-card-body>


    <div class="calendar-controls d-flex justify-content-between align-items-center mb-3">
      <button class="btn btn-outline-primary" (click)="previousMonth()">◄</button>
      <h5 class="mb-0">{{ viewDate | date: 'MMMM yyyy' : '' : 'ms' | uppercase }}</h5>
      <button class="btn btn-outline-primary" (click)="nextMonth()">►</button>

    </div>
</c-card-body>
    <c-card-body>
    <div class="calendar-wrapper">
      <div style="height: 600px;">
        <mwl-calendar-month-view [viewDate]="viewDate" [events]="events" [locale]="'ms'" [weekStartsOn]="1"
          [activeDayIsOpen]="false" (dayClicked)="dayClicked($event)" [cellTemplate]="monthCellTemplate">
        </mwl-calendar-month-view>

        <ng-template #monthCellTemplate let-day="day">
          <div class="cal-cell-date">{{ day.date | date: 'd' }}</div>

          <div class="cal-holidays">
            <div *ngFor="let event of day.events" class="cal-holiday" [style.backgroundColor]="event.color?.primary">
              {{ event.title }}
            </div>
          </div>
        </ng-template>
      </div>
    </div>
    <!-- 
    <div class="mt-3">
      <h6>Maklumat Cuti</h6>
      <p>{{ getHolidayDetails() }}</p>
    </div> -->
  </c-card-body>
</c-card>


<app-holiday-modal *ngIf="showModal" [holidayDetails]="modalHolidayDetails" [newEvent]="newEvent"
  (save)="saveEventHandler($event)" (cancel)="cancelEventHandler()">
</app-holiday-modal>
