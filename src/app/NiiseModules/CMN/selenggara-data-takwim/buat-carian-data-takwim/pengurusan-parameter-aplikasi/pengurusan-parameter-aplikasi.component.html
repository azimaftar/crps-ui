<c-card>
    <c-card-body class="pb-6">
        <c-row>
            <c-col md="8">
                <c-row class="mb-4">
                    <c-col md="6" class="mb-3 mb-md-0">
                        <c-widget-stat-b [title]="'Widget title'" class="mb-4" text="Lorem ipsum dolor sit amet enim."
                            [value]="valuePercent()">
                            <br><br><br>
                            <c-progress class="my-2" thin [value]="value()" color="success" />
                        </c-widget-stat-b>
                    </c-col>
                    <c-col md="6">
                        <c-widget-stat-b #widgetStatB1inv="cWidgetStatB" [title]="'Widget title'" class="mb-4"
                            color="primary" inverse text="Lorem ipsum dolor sit amet enim." [value]="valuePercent()">
                            <br><br><br>
                            <c-progress [white]="widgetStatB1inv.inverse" class="my-2" thin [value]="value()" />
                        </c-widget-stat-b>
                    </c-col>
                </c-row>

                <c-row>
                    <c-col md="6" class="mb-3 mb-md-0">
                        <c-widget-stat-c [title]="'Widget Title'" class="mb-4" value="28%">
                            <ng-template cTemplateId="widgetIconTemplate">
                                <svg cIcon height="36" name="cilChartPie"></svg>
                            </ng-template>
                            <ng-template cTemplateId="widgetProgressTemplate">
                                <c-progress class="mt-3 mb-0" thin [value]="28" color="primary" />
                            </ng-template>
                        </c-widget-stat-c>
                    </c-col>
                    <c-col md="6">
                        <c-widget-stat-c [title]="'Widget Title'" class="mb-4" color="primary" inverse value="28%">
                            <ng-template cTemplateId="widgetIconTemplate">
                                <svg cIcon height="36" name="cilChartPie"></svg>
                            </ng-template>
                            <ng-template cTemplateId="widgetProgressTemplate">
                                <c-progress class="mt-3 mb-0" thin white [value]="28" />
                            </ng-template>
                        </c-widget-stat-c>
                    </c-col>
                </c-row>
            </c-col>

            <c-col md="4">
                <c-card class="h-100">
                    <c-card-body class="pb-4">
                        <h5 class="mb-3">Announcements</h5>
                        <c-carousel [interval]="0">
                            <c-carousel-inner>
                                @for (slide of slides; track slide.src) {
                                <c-carousel-item>
                                    <img [src]="slide.src" alt="{{slide.title}}" class="d-block w-100" loading="lazy" />
                                </c-carousel-item>
                                }
                            </c-carousel-inner>
                            <c-carousel-control [routerLink] caption="Previous" direction="prev" />
                            <c-carousel-control [routerLink] caption="Next" direction="next" />
                        </c-carousel>
                    </c-card-body>
                </c-card>
            </c-col>
        </c-row>
    </c-card-body>
</c-card>
