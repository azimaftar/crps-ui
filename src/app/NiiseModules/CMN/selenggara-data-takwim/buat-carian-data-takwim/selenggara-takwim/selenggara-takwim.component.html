<c-card>
    <c-card-header class="bg-primary text-white">
        <h5 class="mb-0">KALENDAR TAKWIMff</h5>
    </c-card-header>
    <c-card-body class="p-0">

        <div class="search-section bg-light p-3">
            <div class="d-flex flex-wrap align-items-center gap-2">
                <div class="d-flex align-items-center flex-nowrap gap-3">
                    <label for="negeri-pejabat" class="mb-0 flex-shrink-0">Negeri/Pejabat Atase:</label>
                    <select id="negeri-pejabat" name="negeri-pejabat" [(ngModel)]="selectedRegion"
                        class="form-select flex-grow-1">
                        <option value="">Wilayah Persekutuan Putrajaya, Malaysia</option>
                        <option value="selangor">Selangor, Malaysia</option>
                        <option value="jakarta">Jakarta, Indonesia</option>
                    </select>
                </div>
                <button class="btn btn-dark" (click)="search()">CARI</button>
            </div>
        </div>

        <div class="calendar-container">
            <div class="header">
                <button (click)="previousMonth()">◄</button>
                <h1>{{ getMonthName() }}</h1>
                <button (click)="nextMonth()">►</button>
                <button (click)="eLibrary()">e-LIBRARY</button>
            </div>
            <div class="calendar-grid">
                <div class="day-header" *ngFor="let day of daysOfWeek">{{ day }}</div>
                <div class="day" *ngFor="let day of daysInMonth" [ngClass]="{
        'empty': day.date.getMonth() !== currentDate.getMonth(),
        'holiday': day.isHoliday,
        'selected': selectedDate === day.date,
        'has-event': day.events && day.events.length > 0,
        'view-only': isViewOnly
      }" (click)="!isViewOnly && openModal(day)">
                    <span *ngIf="day.date.getMonth() === currentDate.getMonth()">{{ day.date.getDate() }}</span>
                    <span *ngIf="day.isHoliday" class="holiday-name">{{ day.holidayName }}</span>
                    <span *ngIf="day.events && day.events.length > 0" class="event-name">
                        {{ day.events[0].eventName }}
                    </span>
                </div>
            </div>
            <div class="details">
                <h3>Holiday Details</h3>
                <p>{{ getHolidayDetails() }}</p>
            </div>
        </div>
    </c-card-body>
</c-card>

<!-- Modal for Adding/Updating Events -->
<c-modal [visible]="showModal" (visibleChange)="showModal = $event">
    <c-modal-header>
        <h5>Tambah/ Kemaskini Cuti</h5>
    </c-modal-header>
    <c-modal-body>
        <div class="form-group">
            <label for="startDate">Tarikh Mula:</label>
            <input type="date" id="startDate" [(ngModel)]="newEvent.startDate" />
        </div>
        <div class="form-group">
            <label for="endDate">Tarikh Tamat:</label>
            <input type="date" id="endDate" [(ngModel)]="newEvent.endDate" />
        </div>
        <div class="form-group">
            <label for="eventName">Nama Cuti:</label>
            <input type="text" id="eventName" [(ngModel)]="newEvent.eventName" placeholder="Masukkan Nama Cuti" />
        </div>
    </c-modal-body>
    <c-modal-footer>
        <button cButton color="secondary" (click)="cancelEvent()">BATAL</button>
        <button cButton color="primary" (click)="saveEvent()">SIMPAN</button>
    </c-modal-footer>
</c-modal>
