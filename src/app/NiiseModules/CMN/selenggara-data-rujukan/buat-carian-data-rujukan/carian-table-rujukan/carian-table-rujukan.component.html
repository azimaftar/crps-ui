<c-card class="border-0 shadow-none">
  <c-card-header class="rujukan-data-header">
    <h5 class="rujukan-data-title">SELENGGARA DATA RUJUKAN</h5>
  </c-card-header>

  <c-card-body class="ps-lg-4">
    <div class="search-container">
      <div class="table-title">
        CARIAN RUJUKAN
      </div>
      <!-- Search input + CARI button -->
      <c-row class="mt-3 mb-3 align-items-center">
        <c-col xs="12" lg="8">
          <div class="d-flex flex-column">
            <label class="form-label kod-rujukan-label mb-2">Rujukan:</label>
            <div class="d-flex align-items-center flex-wrap gap-2">
              <input type="text" class="form-control kod-rujukan-input"
                style="min-width: 200px; width: 100%; max-width: 300px;" placeholder="Data Rujukan"
                [(ngModel)]="searchText">
              <button class="btn-cari" [disabled]="!searchText" (click)="onSearch()">
                <span class="btn-cari-icon">
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="21" viewBox="0 0 20 21" fill="none">
                    <path
                      d="M17.5 17.8335L13.9167 14.2502M15.8333 9.50016C15.8333 13.1821 12.8486 16.1668 9.16667 16.1668C5.48477 16.1668 2.5 13.1821 2.5 9.50016C2.5 5.81826 5.48477 2.8335 9.16667 2.8335C12.8486 2.8335 15.8333 5.81826 15.8333 9.50016Z"
                      stroke="fill" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                  </svg>
                </span>
                <span class="btn-cari-text">Cari</span>
              </button>
            </div>
          </div>
        </c-col>
      </c-row>
    </div>
  </c-card-body>

  <c-card-body>
    <div class="table-title">
      SENARAI RUJUKAN
    </div>
    <div class="custom-table-container table">
      <table class="custom-table">
        <thead class="custom-table-header">
          <tr>
            <th class="header-cell">No.</th>
            <th class="header-cell">Table Rujukan</th>
            <th class="header-cell">Keterangan Rujukan</th>
            <th class="header-cell">Tindakan</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let record of currentPageData">
            <td class="body-cell">{{ record.No }}</td>
            <td class="body-cell">{{ record.Rujukan }}</td>
            <td class="body-cell">{{ record.Keterangan }}</td>
            <td class="body-cell">
              <button class="btn btn-icon" (click)="navigateToDetail(record.Rujukan)" title="Papar">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 576 512" width="16" height="16"
                  fill="currentColor">
                  <path
                    d="M288 32c-80.8 0-145.5 36.8-192.6 80.6C48.6 156 17.3 208 2.5 243.7c-3.3 7.9-3.3 16.7 0 24.6C17.3 304 48.6 356 95.4 399.4C142.5 443.2 207.2 480 288 480s145.5-36.8 192.6-80.6c46.8-43.5 78.1-95.4 93-131.1c3.3-7.9 3.3-16.7 0-24.6c-14.9-35.7-46.2-87.7-93-131.1C433.5 68.8 368.8 32 288 32zM144 256a144 144 0 1 1 288 0 144 144 0 1 1 -288 0zm144-64c0 35.3-28.7 64-64 64c-7.1 0-13.9-1.2-20.3-3.3c-5.5-1.8-11.9 1.6-11.7 7.4c.3 6.9 1.3 13.8 3.2 20.7c13.7 51.2 66.4 81.6 117.6 67.9s81.6-66.4 67.9-117.6c-11.1-41.5-47.8-69.4-88.6-71.1c-5.8-.2-9.2 6.1-7.4 11.7c2.1 6.4 3.3 13.2 3.3 20.3z" />
                </svg>
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </c-card-body>

  <c-card-footer>
    <div class="d-flex justify-content-between align-items-center">
      <!-- Left: Items per Page with new label -->
      <div class="d-flex align-items-center">
        <small class="pagination-label me-2">
          Sedang memaparkan
        </small>
        <select id="itemsPerPage" class="form-select form-select-sm w-auto me-2" [(ngModel)]="itemsPerPage"
          (change)="onItemsPerPageChange()">
          <option [value]="10">10</option>
          <option [value]="20">20</option>
          <option [value]="30">30</option>
          <option [value]="40">40</option>
          <option [value]="50">50</option>
        </select>
        <small class="pagination-label">
          daripada jumlah {{ totalItems }} rekod
        </small>
      </div>

      <!-- Right: Pagination Controls (unchanged) -->
      <div class="pagination-controls">
        <div class="pagination-button-group">
          <!-- Previous Button -->
          <button class="pagination-button prev-button" [disabled]="currentPage === 1" (click)="goToPreviousPage()">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20" fill="none">
              <path d="M10.0001 15.8332L4.16675 9.99984M4.16675 9.99984L10.0001 4.1665M4.16675 9.99984H15.8334"
                stroke="#1D293D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </button>

          <!-- Page Numbers -->
          <ng-container *ngFor="let pageNum of getVisiblePages()">
            <div *ngIf="pageNum !== -1" class="page-number-button" [class.active]="currentPage === pageNum"
              (click)="goToPage(pageNum)">
              {{ pageNum }}
            </div>
            <div *ngIf="pageNum === -1" class="page-number-ellipsis">
              ...
            </div>
          </ng-container>

          <!-- Next Button -->
          <button class="pagination-button next-button" [disabled]="currentPage === totalPages"
            (click)="goToNextPage()">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20" fill="none">
              <path d="M4.16675 9.99984H15.8334M15.8334 9.99984L10.0001 4.1665M15.8334 9.99984L10.0001 15.8332"
                stroke="#1D293D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </button>
        </div>
      </div>
    </div>
  </c-card-footer>
</c-card>

<c-modal [(visible)]="showModal" alignment="center" backdrop="static" class="text-center" size="sm">
  <c-modal-header class="justify-content-center border-0 pb-0">
    <h5 class="modal-title text-center w-100">
      <div class="d-flex justify-content-center mb-3">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="#DC2626" viewBox="0 0 512 512">
          <path
            d="M256 32c14.2 0 27.3 7.5 34.5 19.8l216 368c7.3 12.4 7.3 27.7 .2 40.1S486.3 480 472 480L40 480c-14.3 0-27.6-7.7-34.7-20.1s-7-27.8 .2-40.1l216-368C228.7 39.5 241.8 32 256 32zm0 128c-13.3 0-24 10.7-24 24l0 112c0 13.3 10.7 24 24 24s24-10.7 24-24l0-112c0-13.3-10.7-24-24-24zm32 224a32 32 0 1 0 -64 0 32 32 0 1 0 64 0z" />
        </svg>
      </div>
    </h5>
  </c-modal-header>
  <c-modal-body class="text-center py-3">
    <p class="mb-0 fw-bold">Data tidak wujud.</p>
  </c-modal-body>
  <c-modal-footer class="justify-content-center border-0 pt-0">
    <button class="btn-ok-gradient" (click)="closeModal()" style="min-width: 80px;">OK</button>
  </c-modal-footer>
</c-modal>
