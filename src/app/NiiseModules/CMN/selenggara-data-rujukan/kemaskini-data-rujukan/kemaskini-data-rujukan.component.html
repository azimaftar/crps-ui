<c-card class="border-0 shadow-none">
  <c-card-header class="rujukan-data-header mx-2">
    <h5 class="rujukan-data-title">SELENGGARA DATA RUJUKAN</h5>
  </c-card-header>

  <!-- <c-card-body>
    <div class="p-3 mb-4 rounded bg-body-secondary">
      <div class="d-flex flex-wrap align-items-center gap-2">
        <label class="form-label fw-bold mb-0 me-2">Table Rujukan :</label>
        <input type="text" class="form-control w-auto" style="min-width: 250px;" [value]="tableName" readonly />
      </div>
    </div> -->

  <c-card-body class="bg-light-subtle ps-lg-3 rounded mx-4">
    <!-- <div class="table-title ms-2">
      CARIAN SABJEK
    </div> -->
    <c-row class="mt-3 mb-3 align-items-center">
      <c-col xs="12" lg="6">
        <div class="d-flex align-items-center flex-wrap">
          <label class="form-label kod-rujukan-label mb-2" style="margin-right: 0.430rem;">Table Rujukan:</label>
          <input type="text" class="form-control kod-rujukan-input" style="min-width: 80%; max-width: 100%;"
            [value]="tableName" readonly />
        </div>
      </c-col>
    </c-row>
  </c-card-body>

  <c-card-body>
    <!-- <div class="table-title">
      SENARAI SABJEK
    </div> -->
    <c-row>
      <!-- Left Column -->
      <c-col md="6">
        <div class="mb-4" *ngFor="let field of fieldMappings | slice:0:fieldMappings.length / 2">
          <label class="form-label field-label fw-bold">{{ field.label }}</label>

          <ng-container *ngIf="field.key.toUpperCase() === 'RECSTS'; else notRecSts">
            <input type="text" class="form-control field-input" [value]="getRecStsDisplayValue(detailData[field.key])"
              disabled />
          </ng-container>

          <ng-template #notRecSts>
            <ng-container
              *ngIf="field.key.toUpperCase() === 'CREATEDATE' || field.key.toUpperCase() === 'UPDATEDATE'; else notDateField">
              <input type="text" class="form-control field-input" [value]="detailData[field.key] | date:'medium'"
                disabled />
            </ng-container>

            <ng-template #notDateField>
              <input *ngIf="field.isEditable; else readOnlyLeft" type="text" class="form-control field-input"
                [(ngModel)]="detailData[field.key]" [name]="field.key" />

              <ng-template #readOnlyLeft>
                <input type="text" class="form-control field-input" [value]="detailData[field.key]" disabled />
              </ng-template>
            </ng-template>
          </ng-template>
        </div>
      </c-col>

      <!-- Right Column -->
      <c-col md="6">
        <div class="mb-4" *ngFor="let field of fieldMappings | slice:fieldMappings.length / 2">
          <label class="form-label field-label fw-bold">{{ field.label }}</label>

          <ng-container *ngIf="field.key.toUpperCase() === 'RECSTS'; else notRecStsRight">
            <input type="text" class="form-control field-input" [value]="getRecStsDisplayValue(detailData[field.key])"
              disabled />
          </ng-container>

          <ng-template #notRecStsRight>
            <!-- Special handling for date fields -->
            <ng-container
              *ngIf="field.key.toUpperCase() === 'CREATEDATE' || field.key.toUpperCase() === 'UPDATEDATE'; else notDateFieldRight">
              <input type="text" class="form-control field-input" [value]="detailData[field.key] | date:'medium'"
                disabled />
            </ng-container>

            <ng-template #notDateFieldRight>
              <input *ngIf="field.isEditable; else readOnlyRight" type="text" class="form-control field-input"
                [(ngModel)]="detailData[field.key]" [name]="field.key" />

              <ng-template #readOnlyRight>
                <input type="text" class="form-control field-input" [value]="detailData[field.key]" disabled />
              </ng-template>
            </ng-template>
          </ng-template>
        </div>
      </c-col>
    </c-row>

    <div class="d-flex justify-content-end gap-2 mt-4">
      <button class="btn btn-cancel mt-2 mt-lg-0" type="button" (click)="goBack()">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 512 512"
          class="me-2">
          <path
            d="M256 48a208 208 0 1 1 0 416 208 208 0 1 1 0-416zm0 464A256 256 0 1 0 256 0a256 256 0 1 0 0 512zM175 175c-9.4 9.4-9.4 24.6 0 33.9l47 47-47 47c-9.4 9.4-9.4 24.6 0 33.9s24.6 9.4 33.9 0l47-47 47 47c9.4 9.4 24.6 9.4 33.9 0s9.4-24.6 0-33.9l-47-47 47-47c9.4-9.4 9.4-24.6 0-33.9s-24.6-9.4-33.9 0l-47 47-47-47c-9.4-9.4-24.6-9.4-33.9 0z" />
        </svg>
        <span class="btn-custom2-text">Batal</span>
      </button>
      <button class="btn btn-simpan mt-2 mt-lg-0" type="button" (click)="onSubmit()">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 512 512"
          class="me-2">
          <path
            d="M256 48a208 208 0 1 1 0 416 208 208 0 1 1 0-416zm0 464A256 256 0 1 0 256 0a256 256 0 1 0 0 512zM369 209c9.4-9.4 9.4-24.6 0-33.9s-24.6-9.4-33.9 0l-111 111-47-47c-9.4-9.4-24.6-9.4-33.9 0s-9.4 24.6 0 33.9l64 64c9.4 9.4 24.6 9.4 33.9 0L369 209z" />
        </svg>
        <span class="btn-custom-text">Simpan</span>
      </button>
    </div>
  </c-card-body>
</c-card>

<c-modal [(visible)]="showModal" alignment="center" backdrop="static" class="text-center" size="sm">
  <c-modal-header class="justify-content-center border-0 pb-0">
    <h5 class="modal-title text-center w-100">
      <div *ngIf="modalMessage.includes('berjaya')" class="d-flex justify-content-center mb-3">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="#10B981" viewBox="0 0 512 512">
          <path
            d="M256 512A256 256 0 1 0 256 0a256 256 0 1 0 0 512zM369 209L241 337c-9.4 9.4-24.6 9.4-33.9 0l-64-64c-9.4-9.4-9.4-24.6 0-33.9s24.6-9.4 33.9 0l47 47L335 175c9.4-9.4 24.6-9.4 33.9 0s9.4 24.6 0 33.9z" />
        </svg>
      </div>
      <div *ngIf="!modalMessage.includes('berjaya')" class="d-flex justify-content-center mb-3">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="#DC2626" viewBox="0 0 512 512">
          <path
            d="M256 32c14.2 0 27.3 7.5 34.5 19.8l216 368c7.3 12.4 7.3 27.7 .2 40.1S486.3 480 472 480L40 480c-14.3 0-27.6-7.7-34.7-20.1s-7-27.8 .2-40.1l216-368C228.7 39.5 241.8 32 256 32zm0 128c-13.3 0-24 10.7-24 24l0 112c0 13.3 10.7 24 24 24s24-10.7 24-24l0-112c0-13.3-10.7-24-24-24zm32 224a32 32 0 1 0 -64 0 32 32 0 1 0 64 0z" />
        </svg>
      </div>
    </h5>
  </c-modal-header>
  <c-modal-body class="text-center py-3">
    <p class="mb-0 fw-bold">{{ modalMessage }}</p>
  </c-modal-body>
  <c-modal-footer class="justify-content-center border-0 pt-0">
    <button class="btn-ok-gradientt" (click)="closeModal()" style="min-width: 80px;">OK</button>
  </c-modal-footer>
</c-modal>
