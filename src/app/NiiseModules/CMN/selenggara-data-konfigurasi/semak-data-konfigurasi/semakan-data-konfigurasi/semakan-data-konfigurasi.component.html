<c-card class="border-0 shadow-none">
  <c-card-header class="config-data-header">
    <h5 class="config-data-title">SELENGGARA DATA KONFIGURASI</h5>
  </c-card-header>

  <c-card-body>
    <div class="d-flex justify-content-end">
      <button class="btn-custom">
        <span class="btn-custom-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="21" fill="currentColor" viewBox="0 0 640 640"
            class="me-1">
            <path
              d="M480 576L192 576C139 576 96 533 96 480L96 160C96 107 139 64 192 64L496 64C522.5 64 544 85.5 544 112L544 400C544 420.9 530.6 438.7 512 445.3L512 512C529.7 512 544 526.3 544 544C544 561.7 529.7 576 512 576L480 576zM192 448C174.3 448 160 462.3 160 480C160 497.7 174.3 512 192 512L448 512L448 448L192 448zM224 216C224 229.3 234.7 240 248 240L424 240C437.3 240 448 229.3 448 216C448 202.7 437.3 192 424 192L248 192C234.7 192 224 202.7 224 216zM248 288C234.7 288 224 298.7 224 312C224 325.3 234.7 336 248 336L424 336C437.3 336 448 325.3 448 312C448 298.7 437.3 288 424 288L248 288z" />
          </svg>
        </span>
        <span class="btn-custom-text">e-Library</span>
      </button>
    </div>
    <!-- Two Column Layout -->
    <c-row>
      <!-- Left Column -->
      <c-col md="6">
        <div class="mb-4">
          <label class="form-label field-label fw-bold">Kod Konfigurasi</label>
          <input type="text" class="form-control field-input" [ngModel]="recordData?.KodKonfigurasi" disabled>
        </div>
        <div class="mb-4">
          <label class="form-label field-label fw-bold">Keterangan Data Konfigurasi</label>
          <input type="text" class="form-control field-input" [ngModel]="recordData?.Keterangan" disabled>
        </div>
        <div class="mb-4 keputusan-select-wrapper">
          <label class="form-label field-label fw-bold">Keputusan</label>
          <select class="form-select field-input" [(ngModel)]="keputusan" (change)="onKeputusanChange()">
            <option *ngIf="!keputusan" value="" disabled selected>- Sila Pilih -</option>
            <option value="Lulus">Lulus</option>
            <option value="Tidak Lulus">Tidak Lulus</option>
          </select>
        </div>
      </c-col>

      <!-- Right Column -->
      <c-col md="6">
        <div class="mb-4">
          <label class="form-label  field-label fw-bold">Data Konfigurasi</label>
          <input type="text" class="form-control field-input" [ngModel]="recordData?.DataKonfigurasi" disabled>
        </div>
        <div class="mb-4">
          <label class="form-label field-label fw-bold">Nilai Data Konfigurasi</label>
          <input type="text" class="form-control field-input" [ngModel]="recordData?.Nilai" disabled>
        </div>
        <div class="mb-4" *ngIf="showCatatanPembetulan">
          <label class="form-label field-label fw-bold">Catatan Pembetulan</label>
          <input type="text" class="form-control field-input" [(ngModel)]="catatanPembetulan">
        </div>
      </c-col>
    </c-row>

    <!-- Action Buttons -->
    <div class="d-flex justify-content-end gap-2 mt-4">
      <button class="btn btn-cancel mt-2 mt-lg-0" (click)="goBack()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="16" height="16" fill="currentColor"
          class="me-2">
          <path
            d="M256 48a208 208 0 1 1 0 416 208 208 0 1 1 0-416zm0 464A256 256 0 1 0 256 0a256 256 0 1 0 0 512zM175 175c-9.4 9.4-9.4 24.6 0 33.9l47 47-47 47c-9.4 9.4-9.4 24.6 0 33.9s24.6 9.4 33.9 0l47-47 47 47c9.4 9.4 24.6 9.4 33.9 0s9.4-24.6 0-33.9l-47-47 47-47c9.4-9.4 9.4-24.6 0-33.9s-24.6-9.4-33.9 0l-47 47-47-47c-9.4-9.4-24.6-9.4-33.9 0z" />
        </svg>
        <span class="btn-custom2-text">Batal</span>
      </button>
      <button class="btn btn-save mt-2 mt-lg-0" (click)="onSimpan()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="16" height="16" fill="currentColor"
          class="me-2">
          <path
            d="M256 48a208 208 0 1 1 0 416 208 208 0 1 1 0-416zm0 464A256 256 0 1 0 256 0a256 256 0 1 0 0 512zM369 209c9.4-9.4 9.4-24.6 0-33.9s-24.6-9.4-33.9 0l-111 111-47-47c-9.4-9.4-24.6-9.4-33.9 0s-9.4 24.6 0 33.9l64 64c9.4 9.4 24.6 9.4 33.9 0L369 209z" />
        </svg>
        <span class="btn-custom-text">Simpan</span>
      </button>
    </div>
  </c-card-body>
</c-card>

<c-modal [(visible)]="showModal" alignment="center" backdrop="static" class="text-center" size="sm">
  <c-modal-header class="justify-content-center border-0 pb-0">
    <h5 class="modal-title text-center w-100">
      <div *ngIf="modalMessage.includes('berjaya')" class="d-flex justify-content-center mb-3">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="#10B981" viewBox="0 0 512 512">
          <path
            d="M256 512A256 256 0 1 0 256 0a256 256 0 1 0 0 512zM369 209L241 337c-9.4 9.4-24.6 9.4-33.9 0l-64-64c-9.4-9.4-9.4-24.6 0-33.9s24.6-9.4 33.9 0l47 47L335 175c9.4-9.4 24.6-9.4 33.9 0s9.4 24.6 0 33.9z" />
        </svg>
      </div>
      <div *ngIf="!modalMessage.includes('berjaya')" class="d-flex justify-content-center mb-3">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="#DC2626" viewBox="0 0 512 512">
          <path
            d="M256 32c14.2 0 27.3 7.5 34.5 19.8l216 368c7.3 12.4 7.3 27.7 .2 40.1S486.3 480 472 480L40 480c-14.3 0-27.6-7.7-34.7-20.1s-7-27.8 .2-40.1l216-368C228.7 39.5 241.8 32 256 32zm0 128c-13.3 0-24 10.7-24 24l0 112c0 13.3 10.7 24 24 24s24-10.7 24-24l0-112c0-13.3-10.7-24-24-24zm32 224a32 32 0 1 0 -64 0 32 32 0 1 0 64 0z" />
        </svg>
      </div>
    </h5>
  </c-modal-header>
  <c-modal-body class="text-center py-3">
    <p class="mb-0 fw-bold">{{ modalMessage }}</p>
  </c-modal-body>
  <c-modal-footer class="justify-content-center border-0 pt-0">
    <button class="btn-ok-gradient" (click)="closeModal()" style="min-width: 80px;">OK</button>
  </c-modal-footer>
</c-modal>
