<c-modal class="modalStyling" [(visible)]="visible" [backdrop]="true" size="sm">

    <c-modal-body>
        <c-row class="modal-message-container">
            <span class="icon-noti" [ngClass]="iconClass"></span>
            <label class="modal-message">{{ message }}</label>

        </c-row>
        <div class="text-center mt-3">
            <button class="btn btn-primary fixed-size-btn" (click)="close()">OK</button>
        </div>
    </c-modal-body>


</c-modal>
