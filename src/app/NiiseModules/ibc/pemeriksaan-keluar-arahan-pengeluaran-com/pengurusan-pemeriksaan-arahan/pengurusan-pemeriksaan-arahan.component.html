<c-card class="mb-3">  
  <!-- HEADER -->
  <c-card-header class="card-header">
    <h3 class="card-header-title"><b>Rekod Pengembara</b></h3>
  </c-card-header>  

  <!-- BODY -->
  <c-card-body>
    <!-- ✅ SATU FORM SAHAJA -->
  <form [formGroup]="profilForm" class="form d-flex flex-column align-items-center" (ngSubmit)="CarianMaklumatPengembara()">

<!-- Passport (atas gambar) + Butang SEMAK & HANTAR (centered) -->
<c-row class="g-3 mb-3 w-100 justify-content-center align-items-end">
  <!-- Passport Input -->
  <c-col md="3">
    <label cLabel for="visitorPassport" class="mb-2">No. Pasport*</label>
    <input
      cFormControl
      id="visitorPassport"
      type="text"
      formControlName="visitorPassport"
      class="form-control"
    />
  </c-col>

  <!-- Butang SEMAK & HANTAR -->
  <c-col md="3" class="d-flex gap-2">
    <button class="semak-btn" 
      (click)="CarianMaklumatPengembara()" 
      type="submit">
      <span class="icon-circle">🔎</span>
      <span>Cari</span>
    </button>

    <button class="hantar-btn" 
      (click)="HantarMaklumatPengembara()" 
      type="submit">
      <span class="icon-circle">📤</span>
      <span>Imbas Pasport</span>
    </button>
  </c-col>
</c-row>

<!-- GAMBAR -->
<div class="mb-4 mt-5 d-flex justify-content-start">
  <div class="photo-placeholder" style="width: 260px; height: 260px;">
    <img
      src="assets/figma/userimg.png"
      alt="image user"
      style="max-height: 100%; max-width: 100%; object-fit: contain; display: block;"
    />
  </div>
</div>

    <!-- Jenis Pelawat -->
    <c-row class="g-3 mb-3 w-100 justify-content-center">
      <c-col md="3">
        <label cLabel for="visitorType" class="mb-2">Jenis Pelawat</label>
        <input
          cFormControl
          id="visitorType"
          type="text"
          formControlName="visitorType"
          class="form-control"
        />
      </c-col>
      <c-col md="3">
      </c-col>
    </c-row>

    <!-- Jenis Pemeriksaan dan Jenis Perjalanan -->
    <c-row class="g-3 mb-3 w-100 justify-content-center">
      <c-col md="3">
        <label cLabel for="examType" class="mb-2">Jenis Pemeriksaan</label>
        <input
          cFormControl
          id="examType"
          type="text"
          formControlName="examType"
          class="form-control"
        />
      </c-col>
      <c-col md="3">
        <label cLabel for="desttype" class="mb-2">Jenis Perjalanan</label>
        <input
          cFormControl
          id="desttype"
          type="text"
          formControlName="desttype"
          class="form-control"
        />
      </c-col>
    </c-row>

    <!-- Jenis Dokumen dan No Dokumen -->
    <c-row class="g-3 mb-3 w-100 justify-content-center">
      <c-col md="3">
        <label cLabel for="docType" class="mb-2">Jenis Dokumen</label>
        <input
          cFormControl
          id="docType"
          type="text"
          formControlName="docType"
          class="form-control"
        />
      </c-col>
      <c-col md="3">
        <label cLabel for="docNo" class="mb-2">No. Dokumen</label>
        <input
          cFormControl
          id="docNo"
          type="text"
          formControlName="docNo"
          class="form-control"
        />
      </c-col>
    </c-row>

    <!-- No. Pengenalan dan Warganegara -->
    <c-row class="g-3 mb-3 w-100 justify-content-center">
      <c-col md="3">
        <label cLabel for="kpNo" class="mb-2">No. Pengenalan</label>
        <input
          cFormControl
          id="kpNo"
          type="text"
          formControlName="kpNo"
          class="form-control"
        />
      </c-col>
      <c-col md="3">
        <label cLabel for="nationality" class="mb-2">Warganegara</label>
        <input
          cFormControl
          id="nationality"
          type="text"
          formControlName="nationality"
          class="form-control"
        />
      </c-col>
    </c-row>

    <!-- Tarikh Tamat dan Negara Pengeluar -->
    <c-row class="g-3 mb-3 w-100 justify-content-center">
      <c-col md="3">
        <label cLabel for="expiryDate" class="mb-2">Tarikh Tamat</label>
        <input
          cFormControl
          id="expiryDate"
          type="text"
          formControlName="expiryDate"
          class="form-control"
        />
      </c-col>
      <c-col md="3">
        <label cLabel for="countryIssue" class="mb-2">Negara Pengeluar</label>
        <input
          cFormControl
          id="countryIssue"
          type="text"
          formControlName="countryIssue"
          class="form-control"
        />
      </c-col>
    </c-row>

    <!-- Nama -->
    <c-row class="g-3 mb-3 w-100 justify-content-center">
      <c-col md="6">
        <label cLabel for="name" class="mb-2">Nama</label>
        <input
          cFormControl
          id="name"
          type="text"
          formControlName="name"
          class="form-control"
        />
      </c-col>
    </c-row>

    <!-- Nama Dicetak-->
    <c-row class="g-3 mb-3 w-100 justify-content-center">
      <c-col md="6">
        <label cLabel for="name" class="mb-2">Nama Dicetak</label>
        <input
          cFormControl
          id="name"
          type="text"
          formControlName="name"
          class="form-control"
        />
      </c-col>
    </c-row>

    <!-- Tarikh Lahir -->
    <c-row class="g-3 mb-4 w-100 justify-content-center">
      <c-col md="3">
        <label cLabel for="dob" class="mb-2">Tarikh Lahir</label>
        <input
          cFormControl
          id="dob"
          type="text"
          formControlName="dob"
          class="form-control"
        />
      </c-col>
      <c-col md="3">
      </c-col>
    </c-row>

<!-- Butang SEMAK & HANTAR -->
<div class="button-row d-flex justify-content-end w-100 gap-2">
    <button type="button" class="reset-btn" (click)="resetForm()">
    <span class="icon-circle">⟳</span>
    <span>SET SEMULA</span>
    </button>


  <button class="hantar-btn" 
    (click)="HantarMaklumatPengembara()" 
    type="submit">
    <span class="icon-circle">📤</span>
    <span>Hantar</span>
  </button>
</div>

  </form>
</c-card-body>

<!-- DEVELOPMENT TEST BUTTONS -->
<div class="mt-4 p-3 border rounded" style="background-color: #f8f9fa;">
  <h6>Testing Error Popups (Dev Only):</h6>
  <div class="d-flex gap-2">
    <button cButton color="warning" size="sm" (click)="testError('IBC-S030')">Test S030</button>
    <button cButton color="danger" size="sm" (click)="testError('IBC-W009')">Test W009</button>
  </div>
</div>

<!-- STANDARD MODAL -->
<c-modal
  #modalStandard
  [visible]="modalStandard?.visible"
  [backdrop]="'static'"
  [keyboard]="false"
  id="modalStandard"
>
  <!-- BODY -->
  <c-modal-body class="text-start p-4">
    <div class="mb-3 text-center">
      <div
        class="d-inline-flex align-items-center justify-content-center"
        style="width: 60px; height: 60px; border: 2px solid #000;"
      >
        <span style="font-size: 24px; font-weight: bold;">✕</span>
      </div>
    </div>
    <div class="text-center">
      <p *ngFor="let line of modalMessage.split('\n')" class="mb-1">{{ line }}</p>
    </div>
  </c-modal-body>

  <!-- FOOTER -->
  <c-modal-footer class="text-center justify-content-center">
    <button
      cButton
      color="dark"
      (click)="modalStandardClick()"
      style="background-color: #6c757d; color: white; border: none; padding: 8px 30px; border-radius: 4px;"
    >
      {{ modalButtonText }}
    </button>
  </c-modal-footer>
</c-modal>
