<!-- CoreUI Modal -->
<c-modal 
  [visible]="isVisible"
  (visibleChange)="onVisibleChange($event)"
  alignment="center"
  backdrop="static">
  <br><br>
  <c-modal-body class="px-4">
    <!-- Photo Section -->
    <div class="text-center mb-3">
      <div class="photo-placeholder mx-auto border rounded" 
           style="width: 120px; height: 120px; background-color: #f8f9fa;">
        <div class="d-flex align-items-center justify-content-center h-100">
          <i class="fa fa-image fa-2x text-muted"></i>
        </div>
      </div>
    </div><br>
    <p class="text-center mb-3" style="font-size: 0.9rem; color: var(--cui-body-color);">
      Dokumen Gagal Imbasan
    </p>
  </c-modal-body>
  
  <c-modal-footer class="px-4 d-flex justify-content-center border-top-0">
    
  <button 
    type="button"
    cButton
    color="dark"
    (click)="onOkClick()">
    OK
  </button>
</c-modal-footer>
</c-modal>
