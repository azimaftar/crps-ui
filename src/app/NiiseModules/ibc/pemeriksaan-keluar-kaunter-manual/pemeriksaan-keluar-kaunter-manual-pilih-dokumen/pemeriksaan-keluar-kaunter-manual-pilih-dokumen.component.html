<!-- pemeriksaan-keluar-kaunter-manual-pilih-dokumen.component.html -->
<div class="text-center mb-4">
    <img src="assets/logo/niise_logo.png"> 
</div> 

<form cForm style="border: 2px solid #000000; padding: 16px; border-radius: 6px;">
    <fieldset>
        <div class="text-center mb-4">
            <img src="assets/logo/niise_logo.png">
        </div>
        <h5>PENGURUSAN PEMERIKSAAN KELUAR - PEMERIKSAAN KELUAR (KAUNTER MANUAL)</h5>
        
        <!-- Jenis Dokumen with vertical layout like your image -->
        <div class="mb-4">
            <label cLabel for="docType" class="d-block mb-2" style="font-size: 1rem; color: #333;">Jenis Dokumen</label>
            <select id="docType" 
                    name="docType" 
                    cSelect 
                    [(ngModel)]="selectedDocumentType" 
                    (change)="onDocumentTypeChange($event)" 
                    style="width: 300px; padding: 8px 12px; font-size: 1rem; border: 1px solid #ccc; border-radius: 4px;"
                    required>
                <option value="" selected disabled>-Sila Pilih-</option>
                <option value="pasport">Pasport</option>
                <option value="kad-abtc">Kad ABTC</option>
                <option value="kod-qr">Kod QR</option>
                <option value="lain-lain">Lain-lain</option>               
            </select>
        </div>
        <br><br><br>
        <!-- Submit button aligned right - Only shows when selection is made -->
        <div class="text-end mt-2" *ngIf="selectedDocumentType && selectedDocumentType !== ''">
            <button class="under" 
                    cButton 
                    (click)="openModalAction()"
                    style="background-color: #6f42c1; color: white; border: none; padding: 10px 20px; border-radius: 4px; font-size: 1rem;">
                {{ getButtonText() }}
            </button>
        </div>
    </fieldset>
</form>

<!-- Standard Modal (following senior dev pattern) -->
<c-modal 
  #modalStandard
  [visible]="modalStandard?.visible"
  [backdrop]="'static'"
  [keyboard]="false"
  id="modalStandard">
  
  <c-modal-body class="text-center p-4">
    <!-- X Icon -->
    <div class="mb-3">
      <div class="d-inline-flex align-items-center justify-content-center" 
           style="width: 60px; height: 60px; border: 2px solid #000; position: relative;">
        <span style="font-size: 24px; font-weight: bold; line-height: 1;">✕</span>
      </div>
    </div>
    
    <!-- Error Message -->
    <h5 class="mb-4" [innerHTML]="modalMessage"></h5>
  </c-modal-body>
  
  <c-modal-footer class="text-center justify-content-center">
    <button cButton 
            color="dark" 
            (click)="modalStandardClick()"
            style="background-color: #6c757d; color: white; border: none; padding: 8px 30px; border-radius: 4px;">
      {{ modalButtonText }}
    </button>
  </c-modal-footer>
</c-modal>

<!-- Your existing popup modal component -->
