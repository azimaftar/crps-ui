<c-container fluid class="p-4">
  <c-card class="mx-auto border shadow" style="max-width: 1000px; border-radius: 8px;">
    <!-- Header -->
    <c-card-header class=" border-bottom-2" 
                   style="background-color: var(--cui-card-cap-bg, #f8f9fa); padding: 1.25rem;">
      <h5 class="mb-0 fw-bold text-uppercase text-body" 
          style="font-size: 1rem; letter-spacing: 0.5px; line-height: 1.2;">
        PROFIL
      </h5>
    </c-card-header>
    
    <!-- Body -->
    <c-card-body class="p-4" style="padding: 2rem;">
      <!-- Profile Photo Section -->
      <div class="mb-4">
        <label class="d-block mb-3 text-uppercase fw-semibold" 
               style="font-size: 0.9rem; letter-spacing: 0.5px; opacity: 0.9; color: var(--cui-body-color);">
          Maklumat Profil Pengembara
        </label>
        <div class="d-flex justify-content-start">
          <div class="border rounded shadow-sm overflow-hidden position-relative d-flex align-items-center justify-content-center" 
               style="width: 200px; height: 200px; background-color: var(--cui-card-bg); background-size: cover; background-position: center; background-repeat: no-repeat; transition: all 0.3s ease;"
               [style.background-image]="formData.photoUrl ? 'url(' + formData.photoUrl + ')' : 'none'"
               onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 6px 16px rgba(0, 0, 0, 0.15)'"
               onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 12px rgba(0, 0, 0, 0.1)'">
            <div *ngIf="!formData.photoUrl" class="text-center text-muted">
              <i class="fa fa-user fa-3x" style="opacity: 0.6;"></i>
              <small class="d-block mt-2 fw-medium" style="letter-spacing: 0.5px;">Photo</small>
            </div>
          </div>
        </div>
      </div>

      <!-- Form Fields Section -->
      <c-row>
        <c-col md="8">
          <!-- ENABLED FIELDS (User can input these) -->
          <c-row class="mb-4">
            <c-col md="6">
              <label class="form-label fw-semibold" 
                     style="font-size: 0.8rem; letter-spacing: 0.5px; opacity: 0.9; margin-bottom: 0.5rem; color: var(--cui-body-color);">
                Jenis Pelawat <span style="color: red;">*</span>
              </label>
              <input 
                type="text" 
                class="form-control form-control-sm"
                [(ngModel)]="formData.jenisPelawat"
                placeholder="Masukkan jenis pelawat">
            </c-col>
            <c-col md="6">
              <label class="form-label fw-semibold" 
                     style="font-size: 0.8rem; letter-spacing: 0.5px; opacity: 0.9; margin-bottom: 0.5rem; color: var(--cui-body-color);">
                No.Dokumen <span style="color: red;">*</span>
              </label>
              <input 
                type="text" 
                class="form-control form-control-sm"
                [(ngModel)]="formData.noInputDokumen"
                placeholder="Masukkan no dokumen">
            </c-col>
          </c-row>
          <c-row class="mb-3">
            <c-col md="6">
              <label class="form-label fw-semibold" 
                     style="font-size: 0.8rem; letter-spacing: 0.5px; opacity: 0.9; margin-bottom: 0.5rem; color: var(--cui-body-color);">
                Warganegara <span style="color: red;">*</span>
              </label>
              <input 
                type="text" 
                class="form-control form-control-sm"
                [(ngModel)]="formData.warganegara"
                placeholder="Masukkan warganegara">
            </c-col>
            <c-col md="6">
              <label class="form-label fw-semibold" 
                     style="font-size: 0.8rem; letter-spacing: 0.5px; opacity: 0.9; margin-bottom: 0.5rem; color: var(--cui-body-color);">
                Tarikh Tamat Dokumen Perjalanan <span style="color: red;">*</span>
              </label>
              <input 
                type="date" 
                class="form-control form-control-sm"
                [(ngModel)]="formData.tarikhTamat">
            </c-col>
          </c-row>
          <c-row class="mb-3 justify-content-end">
            <c-col md="5"></c-col>
            <c-col md="3"> <!-- Wider column for better button fit -->
              <button 
                cButton 
                color="primary" (click)="onSemak()"
                class="w-100">
                Semak
              </button>
            </c-col>
          </c-row>

          <!-- DISABLED FIELDS (Pre-filled data) -->
          <!-- Jenis Pelawat -->
          <c-row class="mb-3">
            <c-col>
              <label class="form-label fw-semibold" 
                     style="font-size: 0.8rem; letter-spacing: 0.5px; opacity: 0.9; margin-bottom: 0.5rem; color: var(--cui-body-color);">
                Jenis Pelawat
              </label>
              <input disabled
                type="text" 
                class="form-control form-control-sm" 
                value="Warganegara"
                readonly>
            </c-col>
          </c-row>

          <!-- Jenis Dokumen & Jantina -->
          <c-row class="mb-3">
            <c-col md="6">
              <label class="form-label fw-semibold" 
                     style="font-size: 0.8rem; letter-spacing: 0.5px; opacity: 0.9; margin-bottom: 0.5rem; color: var(--cui-body-color);">
                Jenis Dokumen
              </label>
              <input disabled
                type="text" 
                class="form-control form-control-sm" 
                value="P - Passport"
                readonly>
            </c-col>
            <c-col md="6">
              <label class="form-label fw-semibold" 
                     style="font-size: 0.8rem; letter-spacing: 0.5px; opacity: 0.9; margin-bottom: 0.5rem; color: var(--cui-body-color);">
                Jantina
              </label>
              <input disabled
                type="text" 
                class="form-control form-control-sm" 
                value="M - Male"
                readonly>
            </c-col>
          </c-row>

          <!-- No Dokumen & No Pengenalan -->
          <c-row class="mb-3">
            <c-col md="6">
              <label class="form-label fw-semibold" 
                     style="font-size: 0.8rem; letter-spacing: 0.5px; opacity: 0.9; margin-bottom: 0.5rem; color: var(--cui-body-color);">
                No Dokumen
              </label>
              <input disabled
                type="text" 
                class="form-control form-control-sm" 
                [value]="formData.noDocument"
                readonly>
            </c-col>
            <c-col md="6">
              <label class="form-label fw-semibold" 
                     style="font-size: 0.8rem; letter-spacing: 0.5px; opacity: 0.9; margin-bottom: 0.5rem; color: var(--cui-body-color);">
                No. Pengenalan
              </label>
              <input disabled
                type="text" 
                class="form-control form-control-sm" 
                [value]="formData.noIdentification"
                readonly>
            </c-col>
          </c-row>

          <!-- Nama -->
          <c-row class="mb-3">
            <c-col>
              <label class="form-label fw-semibold" 
                     style="font-size: 0.8rem; letter-spacing: 0.5px; opacity: 0.9; margin-bottom: 0.5rem; color: var(--cui-body-color);">
                Nama
              </label>
              <input disabled
                type="text" 
                class="form-control form-control-sm" 
                [value]="formData.name"
                readonly>
            </c-col>
          </c-row>

          
          <c-row class="mb-3">
            <c-col md="6">
              <label class="form-label fw-semibold" 
                     style="font-size: 0.8rem; letter-spacing: 0.5px; opacity: 0.9; margin-bottom: 0.5rem; color: var(--cui-body-color);">
                Tarikh Dikeluarkan
              </label>
              <input disabled
                type="text" 
                class="form-control form-control-sm" 
                [value]="formData.dateIssued"
                readonly>
            </c-col>
            <c-col md="6">
              <label class="form-label fw-semibold" 
                     style="font-size: 0.8rem; letter-spacing: 0.5px; opacity: 0.9; margin-bottom: 0.5rem; color: var(--cui-body-color);">
                Warganegara
              </label>
              <input disabled
                type="text" 
                class="form-control form-control-sm" 
                [value]="formData.nationality"
                readonly>
            </c-col>
            
          </c-row>

         
          <c-row class="mb-3">
            <c-col md="6">
              <label class="form-label fw-semibold" 
                     style="font-size: 0.8rem; letter-spacing: 0.5px; opacity: 0.9; margin-bottom: 0.5rem; color: var(--cui-body-color);">
                Umur
              </label>
              <input disabled
                type="text" 
                class="form-control form-control-sm" 
                [value]="formData.age"
                readonly>
            </c-col>
            
            <c-col md="6">
              <label class="form-label fw-semibold" 
                     style="font-size: 0.8rem; letter-spacing: 0.5px; opacity: 0.9; margin-bottom: 0.5rem; color: var(--cui-body-color);">
                Negara Pengeluar
              </label>
              <input disabled
                type="text" 
                class="form-control form-control-sm" 
                [value]="formData.issuingCountry"
                readonly>
            </c-col>
          </c-row>

          
          <c-row class="mb-3">
            <c-col md="6">
              <label class="form-label fw-semibold" 
                     style="font-size: 0.8rem; letter-spacing: 0.5px; opacity: 0.9; margin-bottom: 0.5rem; color: var(--cui-body-color);">
                Tarikh Tamat
              </label>
              <input disabled
                type="text" 
                class="form-control form-control-sm" 
                [value]="formData.expiryDate"
                readonly>
            </c-col>
            
          </c-row>

          <!-- Test Button for Development (can be hidden in production) -->
          <c-row class="mb-3" style="border-top: 1px dashed #ccc; padding-top: 1rem; margin-top: 2rem;">
            <c-col>
              <small class="text-muted">Development Test Button:</small><br>
              <button cButton color="warning" size="sm" (click)="testError('IBC-E009')" class="me-2">
                Test IBC-E009
              </button>
            </c-col>
          </c-row>
        </c-col>
      </c-row>
    </c-card-body>
  </c-card>
</c-container>

<!-- Standard Modal for Error Messages -->
<c-modal #modalStandard [visible]="false" backdrop="static">
  <c-modal-body class="text-center p-4">
    <div class="mb-3">
      <svg width="80" height="80" viewBox="0 0 100 100" style="margin-bottom: 1rem;">
        <rect x="10" y="10" width="80" height="80" fill="none" stroke="#000" stroke-width="2"/>
        <line x1="20" y1="20" x2="80" y2="80" stroke="#000" stroke-width="2"/>
        <line x1="80" y1="20" x2="20" y2="80" stroke="#000" stroke-width="2"/>
      </svg>
    </div>
    <h6 class="mb-3">{{ modalMessage }}</h6>
  </c-modal-body>
  <c-modal-footer class="text-center">
    <button cButton color="secondary" (click)="modalStandardClick()">
      {{ modalButtonText }}
    </button>
  </c-modal-footer>
</c-modal>
