<c-container fluid class="p-4">
  <c-card class="mx-auto border shadow" style="max-width: 1000px; border-radius: 8px;">
    <!-- Header -->
    <c-card-header class=" border-bottom-2" 
                   style="background-color: var(--cui-card-cap-bg, #f8f9fa); padding: 1.25rem;">
      <h5 class="mb-0 fw-bold text-uppercase text-body" 
          style="font-size: 1rem; letter-spacing: 0.5px; line-height: 1.2;">
        PROFIL
      </h5>
    </c-card-header>
    
    <!-- Body -->
    <c-card-body class="p-4" style="padding: 2rem;">
      <!-- Profile Photo Section -->
      <div class="mb-4">
        <label class="d-block mb-3 text-uppercase fw-semibold" 
               style="font-size: 0.9rem; letter-spacing: 0.5px; opacity: 0.9; color: var(--cui-body-color);">
          Maklumat Profil Pengembara
        </label>
        <div class="d-flex justify-content-start">
          <div class="border rounded shadow-sm overflow-hidden position-relative d-flex align-items-center justify-content-center" 
               style="width: 200px; height: 200px; background-color: var(--cui-card-bg); background-size: cover; background-position: center; background-repeat: no-repeat; transition: all 0.3s ease;"
               [style.background-image]="formData.photoUrl ? 'url(' + formData.photoUrl + ')' : 'none'"
               onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 6px 16px rgba(0, 0, 0, 0.15)'"
               onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 12px rgba(0, 0, 0, 0.1)'">
            <div *ngIf="!formData.photoUrl" class="text-center text-muted">
              <i class="fa fa-user fa-3x" style="opacity: 0.6;"></i>
              <small class="d-block mt-2 fw-medium" style="letter-spacing: 0.5px;">Photo</small>
            </div>
          </div>
        </div>
      </div>

      <!-- Form Fields Section -->
      <c-row>
        <c-col md="6">
          <!-- Jenis Pelawat -->
          <c-row class="mb-3">
            <c-col md="6">
              <label class="form-label fw-semibold" 
                     style="font-size: 0.8rem; letter-spacing: 0.5px; opacity: 0.9; margin-bottom: 0.5rem; color: var(--cui-body-color);">
                Jenis Pelawat
              </label>
              <input disabled
                type="text" 
                class="form-control form-control-sm" 
                value="P - Passport"
                readonly>
            </c-col>
            <c-col md="6">
              <label class="form-label fw-semibold" 
                     style="font-size: 0.8rem; letter-spacing: 0.5px; opacity: 0.9; margin-bottom: 0.5rem; color: var(--cui-body-color);">
                Awalan Dokumen
              </label>
              <input disabled
                type="text" 
                class="form-control form-control-sm" 
                value="M - Male"
                readonly>
            </c-col>
          </c-row>
          <c-row class="mb-3">
            <c-col md="6">
              <label class="form-label fw-semibold" 
                     style="font-size: 0.8rem; letter-spacing: 0.5px; opacity: 0.9; margin-bottom: 0.5rem; color: var(--cui-body-color);">
                Jenis Pemeriksaan
              </label>
              <input disabled
                type="text" 
                class="form-control form-control-sm" 
                value="P - Passport"
                readonly>
            </c-col>
            <c-col md="6">
              <label class="form-label fw-semibold" 
                     style="font-size: 0.8rem; letter-spacing: 0.5px; opacity: 0.9; margin-bottom: 0.5rem; color: var(--cui-body-color);">
                Jenis Perjalanan
              </label>
              <input disabled
                type="text" 
                class="form-control form-control-sm" 
                value="M - Male"
                readonly>
            </c-col>
          </c-row>

          <!-- Jenis Dokumen & Jantina -->
          <c-row class="mb-3">
            <c-col md="6">
              <label class="form-label fw-semibold" 
                     style="font-size: 0.8rem; letter-spacing: 0.5px; opacity: 0.9; margin-bottom: 0.5rem; color: var(--cui-body-color);">
                Jenis Dokumen
              </label>
              <input disabled
                type="text" 
                class="form-control form-control-sm" 
                value="P - Passport"
                readonly>
            </c-col>
            <c-col md="6">
              <label class="form-label fw-semibold" 
                     style="font-size: 0.8rem; letter-spacing: 0.5px; opacity: 0.9; margin-bottom: 0.5rem; color: var(--cui-body-color);">
                Jantina
              </label>
              <input disabled
                type="text" 
                class="form-control form-control-sm" 
                value="M - Male"
                readonly>
            </c-col>
          </c-row>

          <!-- No Dokumen & No Pengenalan -->
          <c-row class="mb-3">
            <c-col md="6">
              <label class="form-label fw-semibold" 
                     style="font-size: 0.8rem; letter-spacing: 0.5px; opacity: 0.9; margin-bottom: 0.5rem; color: var(--cui-body-color);">
                No Dokumen
              </label>
              <input disabled
                type="text" 
                class="form-control form-control-sm" 
                [value]="formData.noDocument"
                readonly>
            </c-col>
            <c-col md="6">
              <label class="form-label fw-semibold" 
                     style="font-size: 0.8rem; letter-spacing: 0.5px; opacity: 0.9; margin-bottom: 0.5rem; color: var(--cui-body-color);">
                No. Pengenalan
              </label>
              <input disabled
                type="text" 
                class="form-control form-control-sm" 
                [value]="formData.noIdentification"
                readonly>
            </c-col>
          </c-row>

          <!-- Nama -->
          <c-row class="mb-3">
            <c-col>
              <label class="form-label fw-semibold" 
                     style="font-size: 0.8rem; letter-spacing: 0.5px; opacity: 0.9; margin-bottom: 0.5rem; color: var(--cui-body-color);">
                Nama
              </label>
              <input disabled
                type="text" 
                class="form-control form-control-sm" 
                [value]="formData.name"
                readonly>
            </c-col>
          </c-row>

          <!-- Tarikh Dikeluarkan & Tamat Tempoh -->
          <c-row class="mb-3">
            <c-col md="6">
              <label class="form-label fw-semibold" 
                     style="font-size: 0.8rem; letter-spacing: 0.5px; opacity: 0.9; margin-bottom: 0.5rem; color: var(--cui-body-color);">
                Tarikh Dikeluarkan
              </label>
              <input disabled
                type="text" 
                class="form-control form-control-sm" 
                [value]="formData.dateIssued"
                readonly>
            </c-col>
            <c-col md="6">
              <label class="form-label fw-semibold" 
                     style="font-size: 0.8rem; letter-spacing: 0.5px; opacity: 0.9; margin-bottom: 0.5rem; color: var(--cui-body-color);">
                Tarikh Tamat
              </label>
              <input disabled
                type="text" 
                class="form-control form-control-sm" 
                [value]="formData.expiryDate"
                readonly>
            </c-col>
          </c-row>

          <!-- Umur & Warganegara -->
          <c-row class="mb-3">
            <c-col md="6">
              <label class="form-label fw-semibold" 
                     style="font-size: 0.8rem; letter-spacing: 0.5px; opacity: 0.9; margin-bottom: 0.5rem; color: var(--cui-body-color);">
                Umur
              </label>
              <input disabled
                type="text" 
                class="form-control form-control-sm" 
                [value]="formData.age"
                readonly>
            </c-col>
            <c-col md="6">
              <label class="form-label fw-semibold" 
                     style="font-size: 0.8rem; letter-spacing: 0.5px; opacity: 0.9; margin-bottom: 0.5rem; color: var(--cui-body-color);">
                Warganegara
              </label>
              <input disabled
                type="text" 
                class="form-control form-control-sm" 
                [value]="formData.nationality"
                readonly>
            </c-col>
          </c-row>

          <!-- Negara Pengeluar -->
          <c-row class="mb-3">
            <c-col md="6">
              <label class="form-label fw-semibold" 
                     style="font-size: 0.8rem; letter-spacing: 0.5px; opacity: 0.9; margin-bottom: 0.5rem; color: var(--cui-body-color);">
                Negara Pengeluar
              </label>
              <input disabled
                type="text" 
                class="form-control form-control-sm" 
                [value]="formData.issuingCountry"
                readonly>
            </c-col>
          </c-row>
        </c-col>
      </c-row>
      
<div class="text-end p-3" style="background: #f8f9fa;">
  <button cButton
          color="dark" disabled
          class="px-4 text-uppercase fw-semibold shadow-sm"
          style="font-size: 0.875rem; letter-spacing: 0.5px; border-radius: 0.375rem; transition: all 0.2s ease-in-out; white-space: nowrap; min-width: 220px;"
          onmouseover="this.style.transform='translateY(-1px)'; this.style.boxShadow='0 4px 12px rgba(33, 37, 41, 0.3)'"
          onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow=''">
    <i class="fa fa-camera me-2"></i>
    Ambil Wajah & Iris
  </button>
</div>

<div class="text-end p-3" style="background: #f8f9fa;">
  <button cButton
          color="dark" disabled
          class="px-4 text-uppercase fw-semibold shadow-sm"
          style="font-size: 0.875rem; letter-spacing: 0.5px; border-radius: 0.375rem; transition: all 0.2s ease-in-out; white-space: nowrap; min-width: 220px;"
          onmouseover="this.style.transform='translateY(-1px)'; this.style.boxShadow='0 4px 12px rgba(33, 37, 41, 0.3)'"
          onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow=''">
    <i class="fa fa-fingerprint me-2"></i>
    Ambil Cap Jari
  </button>
</div>
    </c-card-body>

    <!-- Footer -->
    <c-card-footer class="d-flex justify-content-end border-top-2"
               style="background-color: transparent; padding: 1.5rem; border-top: none !important;">
  <button cButton
          color="dark"
          class="px-4 text-uppercase fw-semibold shadow-sm"
          style="font-size: 0.875rem; letter-spacing: 0.5px; border-radius: 0.375rem; transition: all 0.2s ease-in-out;"
          (click)="NextPage()"
          onmouseover="this.style.transform='translateY(-1px)'; this.style.boxShadow='0 4px 12px rgba(33, 37, 41, 0.3)'"
          onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow=''">
    <i class="fa fa-question-circle me-2"></i>
    SET SEMULA
  </button>
  
  <button cButton
          color="dark"
          class="px-4 text-uppercase fw-semibold shadow-sm ms-3"
          style="font-size: 0.875rem; letter-spacing: 0.5px; border-radius: 0.375rem; transition: all 0.2s ease-in-out;"
          (click)="showSuccessModal()"
          onmouseover="this.style.transform='translateY(-1px)'; this.style.boxShadow='0 4px 12px rgba(33, 37, 41, 0.3)'"
          onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow=''">
    <i class="fa fa-question-circle me-2"></i>
    SIMPAN
  </button>
</c-card-footer>
  </c-card>
</c-container>

<!-- Success Modal for IBC-S004 -->
<c-modal 
  #successModal
  [visible]="showSuccessNotification"
  alignment="center"
  backdrop="static"
  keyboard="false"
  (visibleChange)="showSuccessNotification = $event">
  
  <c-modal-body class="text-center p-5" style="min-height: 250px; background: white; border-radius: 8px;">
    
    <!-- Success Icon (Square with X) -->
    <div class="mb-4 d-flex justify-content-center">
      <div class="d-flex align-items-center justify-content-center"
           style="width: 60px; height: 60px; border: 2px solid #000; background: transparent;">
        <i class="fas fa-times" style="font-size: 24px; color: #000;"></i>
      </div>
    </div>

    <h5 class="mb-4 fw-normal text-dark" style="line-height: 1.4; white-space: pre-line;">
      Rekod Berjaya Disimpan!
    </h5>

    <!-- OK Button -->
    <button 
      type="button"
      class="btn px-4 py-2 fw-bold text-white"
      style="min-width: 100px; background-color: #6c757d; border: none; border-radius: 4px;"
      (click)="proceedToNextPage()">
      OK
    </button>
    
  </c-modal-body>
</c-modal>
