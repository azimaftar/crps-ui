<div class="text-center mb-4">
    <img src="assets/logo/niise_logo.png">
</div>

<form cForm style="border: 2px solid #000000; padding: 16px; border-radius: 6px; margin-bottom: 20px;">
    <fieldset>
        <div class="text-center mb-4">
            <img src="assets/logo/niise_logo.png">
        </div>
        <h6>Maklumat Dokumen</h6>
        <div style="display: flex; flex-wrap: wrap; gap: 1rem; margin: 2rem 2rem 1rem 2rem;">
            <div style="flex: 1 1 30%;">
                <label for="jenisDokumen">Jenis Dokumen</label><br />
                <input type="text" id="jenisDokumen" style="width: 100%;" disabled />
            </div>
            <div style="flex: 1 1 30%;">
                <label for="jantina">Jantina</label><br />
                <input type="text" id="jantina" style="width: 100%;" disabled />
            </div>
            <div style="flex: 1 1 30%;">
                <label for="umur">Umur</label><br />
                <input type="text" id="umur" style="width: 100%;" disabled />
            </div>
        </div>

        <!-- Row 2 -->
        <div style="display: flex; flex-wrap: wrap; gap: 1rem; margin: 0 2rem 1rem 2rem;">
            <div style="flex: 1 1 30%;">
                <label for="noDokumen">No Dokumen</label><br />
                <input type="text" id="noDokumen" style="width: 100%;" disabled />
            </div>
            <div style="flex: 1 1 30%;">
                <label for="noPengenalan">No Pengenalan</label><br />
                <input type="text" id="noPengenalan" style="width: 100%;" disabled />
            </div>
            <div style="flex: 1 1 30%;">
                <label for="tarikhTamat">Tarikh Tamat</label><br />
                <input type="text" id="tarikhTamat" style="width: 100%;" disabled />
            </div>
        </div>

        <!-- Row 3: 2/3 + 1/3 split -->
        <div style="display: flex; flex-wrap: wrap; gap: 1rem; margin: 0 2rem 1rem 2rem;">
            <div style="flex: 2 1 60%;">
                <label for="nama">Nama</label><br />
                <input type="text" id="nama" style="width: 100%;" disabled />
            </div>  
            
            <!-- Invisible placeholder for Field 5 spacing -->
            <div style="flex: 1 1 30%; visibility: hidden;">
                <label>&nbsp;</label><br />
                <input type="text" style="width: 100%;" />
            </div>
        </div>

        <!-- Row 4: skip middle field (field 5) -->
        <div style="display: flex; flex-wrap: wrap; gap: 1rem; margin: 0 2rem 1rem 2rem;">
            <div style="flex: 1 1 30%;">
                <label for="tarikhDikeluarkan">Tarikh Dikeluarkan</label><br />
                <input type="text" id="tarikhDikeluarkan" style="width: 100%;" disabled />
            </div>

            <div style="flex: 1 1 30%;">
                <label for="negaraPengeluar">Negara Pengeluar</label><br />
                <input type="text" id="negaraPengeluar" style="width: 100%;" disabled />
            </div>

            <!-- Invisible placeholder for Field 5 spacing -->
            <div style="flex: 1 1 30%; visibility: hidden;">
                <label>&nbsp;</label><br />
                <input type="text" style="width: 100%;" />
            </div>
        </div>

        <!-- Submit button aligned right -->
        <div class="text-end mt-2">
            <button type="button" (click)="openPage()" class="under" style="margin-top: 20px;">TUTUP</button>
        </div>
    </fieldset>
</form>
