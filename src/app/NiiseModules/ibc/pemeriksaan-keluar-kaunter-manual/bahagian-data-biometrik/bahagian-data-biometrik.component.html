<form class="border border-dark m-0">
  <!-- Header -->
  <div class="py-3 px-4 border-bottom border-dark">
    <h6 class="m-0">PEMERIKSAAN KELUAR (KAUNTER MANUAL) - BAHAGIAN DATA BIOMETRIK [WAJAH & IRIS]</h6>
  </div>

  <!-- Main Sections -->
  <div class="row g-0 border-top border-bottom border-dark">
    <!-- Partition 1: Widgets -->
    <div class="col-12 col-md-2 border-end border-dark p-3 d-flex flex-column align-items-center">
      <c-col class="mt-4 w-100">
        <c-widget-stat-a class="mb-3" color="primary" [title]="'Widget 1'" style="height: 100px;"></c-widget-stat-a>
        <c-widget-stat-a class="mb-3" color="primary" [title]="'Widget 2'" style="height: 100px;"></c-widget-stat-a>
        <c-widget-stat-a class="mb-3" color="primary" [title]="'Widget 3'" style="height: 100px;"></c-widget-stat-a>
      </c-col>
    </div>

    <!-- Partition 2: Face & Iris -->
    <div class="col-12 col-md-6 border-end border-dark p-4">
      <!-- Wajah Section -->
      <div class="d-flex flex-wrap gap-4 align-items-start mb-5">
        <div class="border rounded p-2" style="width: 200px;">
          <div class="border rounded p-5 text-center">
            <img src="" alt="WAJAH" class="img-fluid" />
          </div>
        </div>
        <div class="flex-grow-1 mt-4">
          <label for="wajah" class="form-label">% Pengecaman Wajah</label>
          <input type="text" id="wajah" class="form-control" placeholder="Field 1" />
        </div>
      </div>

      <!-- Iris Section -->
      <div class="d-flex flex-wrap gap-4 align-items-start mb-4">
        <div class="border rounded p-2" style="width: 200px;">
          <div class="border rounded p-5 text-center">
            <img src="" alt="IRIS" class="img-fluid" />
          </div>
        </div>
        <div class="flex-grow-1 mt-4">
          <label for="iris" class="form-label">% Pengecaman Iris</label>
          <input type="text" id="iris" class="form-control" placeholder="Field 1" />
        </div>
      </div>
    </div>

    <!-- Partition 3: Status - DYNAMIC STATUS DISPLAY -->
    <div class="col-12 col-md-4 p-4 d-flex justify-content-center align-items-center">
      <input type="text"
             class="form-control text-center fs-5"
             style="width: 70%; height: 100px;"
             [value]="statusImbas === 'gagal' ? 'GAGAL' : 
                     statusImbas === 'sah' || statusImbas === 'simpan' ? 'LULUS' : 
                     statusImbas === 'imbas' ? 'DALAM IMBASAN' : 
                     'STATUS IMBASAN'"
             [class]="'form-control text-center fs-5 ' + 
                     (statusImbas === 'gagal' ? 'text-danger' : 
                      statusImbas === 'sah' || statusImbas === 'simpan' ? 'text-success' : 
                      'text-dark')"
             disabled />
    </div>
  </div>

  <!-- Action Buttons -->
  <div class="text-end py-3 px-4">
    <!-- PENGECUALIAN BIOMETRIK - Always show, enabled based on status -->
    <button class="btn btn-secondary me-2" style="margin: 10px 0;"
            (click)="openPengecualianBiometrik()"
            [disabled]="statusImbas !== '' && statusImbas !== 'imbas' && statusImbas !== 'gagal'">
      PENGECUALIAN BIOMETRIK
    </button>
    
    <!-- SAH BIOMETRIK - Show when not first visit, enabled only when 'sah' -->
    <button class="btn btn-success me-2" style="margin: 10px 0;"
            (click)="openCapJari()"
            *ngIf="statusImbas !== ''"
            [disabled]="statusImbas !== 'sah'">
      SAH BIOMETRIK
    </button>
    
    <!-- SIMPAN - Show when not first visit, enabled only when 'simpan' -->
    <button class="btn btn-primary me-2" style="margin: 10px 0;"
            (click)="openCapJari()"
            *ngIf="statusImbas !== ''"
            [disabled]="statusImbas !== 'simpan'">
      SIMPAN
    </button>
    
    <!-- IMBAS - Show ONLY on first visit or when 'imbas' (HIDDEN when gagal/sah/simpan) -->
    <button type="button" class="btn btn-dark me-2" 
            (click)="openKeputusanImbasanLulusSimpan()" 
            *ngIf="statusImbas === '' || statusImbas === 'imbas'"
            style="margin: 10px 0;">
      IMBAS
    </button>
  </div>
</form>

<app-modal-pengecualian-biometrik></app-modal-pengecualian-biometrik>

<!-- Error Modal for statusImbas = "gagal" -->
<c-modal 
  [visible]="isErrorModalVisible"
  alignment="center"
  backdrop="static"
  keyboard="false"
  (visibleChange)="isErrorModalVisible = $event">
  
  <c-modal-body class="text-center p-5" style="min-height: 250px; background: white; border-radius: 8px;">
    
    <!-- Error Icon (Square with X) -->
    <div class="mb-4 d-flex justify-content-center">
      <div class="d-flex align-items-center justify-content-center"
           style="width: 60px; height: 60px; border: 2px solid #000; background: transparent;">
        <i class="fas fa-times" style="font-size: 24px; color: #000;"></i>
      </div>
    </div>

    <h5 class="mb-4 fw-normal text-dark" style="line-height: 1.4; white-space: pre-line;">
      {{ errorMessage }}
    </h5>

    <!-- OK Button -->
    <button 
      type="button"
      class="btn px-4 py-2 fw-bold text-white"
      style="min-width: 100px; background-color: #6c757d; border: none; border-radius: 4px;"
      (click)="closeErrorModal()">
      {{ errorModalButtonText }}
    </button>
    
  </c-modal-body>
</c-modal>
