<div class="container-fluid">
  <div class="card">
    <div class="ms-4 me-4">
      <div class="mt-2 mb-2">
        <h3 class="mb-2 mt-4"><b>Kemasukan Kelompok - Maklumat Perjalanan dan Ketua Pemohon</b></h3>
      </div>
      <div class="mt-4">
        <!-- Left Side: Step Info -->
        <reusable-tab [currentStep]="currentStep" [steps]="steps"></reusable-tab>
        <div class="col-md-6 mb-4">
          <p class="mb-0">{{ currentStep }}. {{ steps[currentStep - 1] }}</p>
          <small class="text-muted">Langkah {{ currentStep }} daripada {{ steps.length }}</small>
        </div>

        <!-- Main Content Area -->
        <div class="row flex-column flex-lg-row">
          <div class="col-10">
            <!-- Profile Image Section -->
            <!-- <h6 class="mb-3">Kemasukan Kelompok - Maklumat Perjalanan dan Ketua Kelompok</h6> -->
            <!-- Form Fields -->
            <!-- My Kad -->
            <div class="row ps-3">
              <div class="col-md-6">
                <div class="mb-3">
                  <label for="arrivalDateToMalaysia" class="form-label">Tarikh Ketibaan ke Malaysia*</label>
                  <input id="arrivalDateToMalaysia" type="date" class="form-control"
                        [(ngModel)]="formData.arrivalDateToMalaysia" name="arrivalDateToMalaysia" placeholder="20 Januari 2028" required>
                </div>
              </div>
              <div class="col-md-6">
                <div class="mb-3">
                  <label for="departureDateFromMalaysia" class="form-label">Tarikh Perlepasan dari Malaysia*</label>
                  <input id="departureDateFromMalaysia" type="date" class="form-control"
                        [(ngModel)]="formData.departureDateFromMalaysia" name="departureDateFromMalaysia" placeholder="20 Februari 2028" required>
                </div>
              </div>
            </div>

            <!-- Jawatan -->
            <div class="row ps-3">
              <div class="col-md-6">
                <div class="mb-3">
                  <label for="periodOfDaysInMalaysia" class="form-label">Tempoh Hari di Malaysia</label>
                  <input id="periodOfDaysInMalaysia" type="number" class="form-control"
                        [(ngModel)]="formData.periodOfDaysInMalaysia" name="periodOfDaysInMalaysia" placeholder="28">

                </div>
              </div>
            </div>

            <div class="row ps-3">
              <div class="col-md-6">
                <div class="mb-3">
                  <label for="purpose" class="form-label">Tujuan Kemasukan*</label>
                  <select id="purpose" class="form-control"
                          [(ngModel)]="formData.purpose" 
                          name="purpose" required>
                    <option value="social">Lawatan Sosial</option>
                    <option value="education">Pendidikan</option>
                    <option value="official">Lawatan Rasmi</option>
                    <option value="business">Urusan Perniagaan</option>
                    <option value="transit">Transit</option>
                    <option value="other">Lain-Lain (Nyatakan)</option>
                  </select>
                </div>
              </div>
            </div>

            <!-- Show "others" only if purpose == 'other' -->
            <div class="row ps-3" *ngIf="formData.purpose === 'other'">
              <div class="col-md-12">
                <div class="mb-3">
                  <label for="others" class="form-label">Lain-lain (Nyatakan)*</label>
                  <input id="others" type="text" class="form-control"
                        [(ngModel)]="formData.others" 
                        name="others" 
                        placeholder="e.g. Medical, Employment" required>
                </div>
              </div>
            </div>

          <div class="row ps-3">
            <div class="col-md-12">
                <div class="mb-3">
                  <label for="agencyName" class="form-label">Nama Agensi</label>
                  <input id="agencyName" type="text" class="form-control"
                        [(ngModel)]="formData.agencyName" name="agencyName" >

                </div>
              </div>
          </div>
            
            <div class="row ps-3">
              <div class="col-md-12">
                <div class="mb-3">
                  <label for="eventName" class="form-label">Nama Acara</label>
                  <input id="eventName" type="text" class="form-control"
                        [(ngModel)]="formData.eventName" name="eventName">

                </div>
              </div>
            </div>

            <!-- Maklumat Ketua Pemohon -->
            <h6 class=" row ps-3 mt-4 mb-3">Maklumat Ketua Pemohon</h6>
            <div class="col-md-6">
            </div>

            <div class="row ps-3">
                <div class="col-md-12">
                    <div class="mb-3">
                    <label for="name" class="form-label">Nama*</label>
                    <input id="name" type="text" class="form-control"
                          [(ngModel)]="formData.name" name="name" placeholder="Mohd Russaini Bin Idrus" required>

                    </div>
                </div>
            </div>
            
            <div class="row ps-3">
              <div class="col-md-6">
                <div class="mb-3">
                  <label for="nationality" class="form-label">Warganegara*</label>
                  <input id="nationality" type="text" class="form-control"
                        [(ngModel)]="formData.nationality" name="nationality" placeholder="MYS - Malaysia" required >

                </div>
              </div>
              <div class="col-md-6">
                <div class="mb-3">
                  <label for="passportNo" class="form-label">No. Passport*</label>
                  <input id="passportNo" type="text" class="form-control"
                        [(ngModel)]="formData.passportNo" name="passportNo" placeholder="A24252521" required>

                </div>
              </div>
            </div>

            <div class="row ps-3">
              <div class="col-md-6">
                <div class="mb-3">
                  <label for="issuedCountry" class="form-label">Negara Pengeluar*</label>
                  <input id="issuedCountry" type="text" class="form-control"
                        [(ngModel)]="formData.issuedCountry" name="issuedCountry" placeholder="MYS - Malaysia" required>

                </div>
              </div>
              <div class="col-md-6">
                <div class="mb-3">
                  <label for="validDate" class="form-label">Tarikh Sah Laku Passport*</label>
                  <input id="validDate" type="date" class="form-control"
                        [(ngModel)]="formData.validDate" name="validDate" placeholder="20 Januari 1992" required>

                </div>
              </div>
            </div>

            <div class="row ps-3">
              <div class="col-md-6">
                <div class="mb-3">
                  <label for="dob" class="form-label">Tarikh Lahir*</label>
                  <input id="dob" type="date" class="form-control"
                        [(ngModel)]="formData.dob" name="dob" placeholder="20 Januari 1992" required>

                </div>
              </div>
              <div class="col-md-6">
                <div class="mb-3">
                  <label for="gender" class="form-label">Jantina*</label>
                  <select id="gender" type="text" class="form-control"
                        [(ngModel)]="formData.gender" name="gender" placeholder="L-Lelaki" required>
                    <option value="male">L - Lelaki</option>
                    <option value="female">P - Perempuan</option></select>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="row mt-4">
          <div class="col-12">
            <div class="d-flex justify-content-end gap-2 mb-4">
              <!-- Save Button -->
              <button class="btn btn-submit d-flex align-items-center gap-1" 
                (click)="saveForm()">
                <i class="bi bi-check-circle"></i>
                Simpan
              </button>

              <!-- Reset Button -->
              <button class="btn btn-outline-secondary d-flex align-items-center gap-1" type="reset"
                (click)="resetForm()">
                <i class="bi bi-arrow-clockwise"></i>
                Set Semula
              </button>
              <button class="btn btn-all" (click)="goToPrevious()" disabled>
                &lt;
              </button>
              <button class="btn btn-all" (click)="goToNext()">
                &gt;
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
