<c-card class="mb-3">  
  <!-- HEADER PROFIL -->
  <c-card-header class="card-header">
    <h3 class="card-header-title"><b>Rekod Pengembara</b></h3>
  </c-card-header>

  <!-- STEPPER -->
  <div class="px-4 py-3 mb-4 stepper-container">
    <ul class="stepper-list d-flex justify-content-between">
      <li 
        class="stepper-item text-center flex-fill"
        *ngFor="let step of steps">
        
        <div 
          class="stepper-content"
          [class.active-box]="currentStep === step.number">
          
          <span 
            class="step-number"
            [class.active]="currentStep === step.number">
            {{ step.number }}
          </span>

          <span 
            class="step-title"
            [class.active]="currentStep === step.number">
            {{ step.title }}
          </span>

        </div>
      </li>
    </ul>
  </div>

  <!-- CARD BODY -->
  <c-card-body>
    <c-row class="align-items-start">
      <!-- KIRI: GAMBAR + BUTTON -->
      <c-col md="4">
        <div style="width: 260px; margin-left: 82px;">

          <!-- GAMBAR -->
          <div class="photo-placeholder mb-3" style="width: 100%; height: 260px;">
            <img [src]="photoUrl || 'assets/figma/userimg.png'" alt="image user"
                style="max-height: 100%; max-width: 100%; object-fit: contain;">
          </div>

          <!-- BUTTONS -->
          <button
            #ambilWajahIrisButton
            class="custom-blue-btn w-100"
            style="box-sizing: border-box; padding: 10px 0;"
            [disabled]="dariCapJariEmpatPost"
            (click)="captureFaceAndIris()">
            Ambil Wajah & Iris
          </button>

          <button
            class="custom-blue-btn w-100 mt-2"
            style="box-sizing: border-box; padding: 10px 0;"
            [disabled]="dariCapJariEmpatPost"
            (click)="captureFingerprint()">
            Ambil Cap Jari
          </button>
        </div>
      </c-col>

      <!-- KANAN: FORM -->
      <c-col md="8">
        <!-- FORMS START -->
        <form [formGroup]="visaForm" class="form" (ngSubmit)="onSubmit()">

          <!-- No Visa dan No QR -->
          <c-row class="g-3 mb-3">
            <c-col>
              <label cLabel for="visaNo" class="mb-2">No Visa</label>
              <input cFormControl id="visaNo" type="text" formControlName="visaNo" class="form-control" />
            </c-col>
            <c-col>
              <label cLabel for="visaQrDvs" class="mb-2">No Rujukan QR VDS</label>
              <input cFormControl id="visaQrDvs" type="text" formControlName="visaQrDvs" class="form-control" />
            </c-col>
          </c-row>

          <!-- Jenis  -->
          <c-row class="g-3 mb-3">
            <c-col>
              <label cLabel for="visaType" class="mb-2">Jenis Visa</label>
              <input cFormControl id="visaType" type="text" formControlName="visaType" class="form-control" />
            </c-col>
            <c-col></c-col>
          </c-row>

          <!-- Tarikh Dikeluarkan dan Tarikh Tamat Visa -->
          <c-row class="g-3 mb-3">
            <c-col>
              <label cLabel for="visaIssueDate" class="mb-2">Tarikh Dikeluarkan</label>
              <input cFormControl id="visaIssueDate" type="text" formControlName="visaIssueDate" class="form-control" />
            </c-col>
            <c-col>
              <label cLabel for="visaExpiryDate" class="mb-2">Tarikh Tamat Visa</label>
              <input cFormControl id="visaExpiryDate" type="text" formControlName="visaExpiryDate" class="form-control" />
            </c-col>
          </c-row>

          <!-- Nama Visa -->
          <c-row class="g-3 mb-3">
            <c-col md="12">
              <label cLabel for="visaName" class="mb-2">Nama</label>
              <input cFormControl id="visaName" type="text" formControlName="visaName" class="form-control" />
            </c-col>
          </c-row>

          <!-- Tarikh Lahir dan Jantina -->
          <c-row class="g-3 mb-3">
            <c-col>
              <label cLabel for="visaDob" class="mb-2">Tarikh Lahir</label>
              <input cFormControl id="visaDob" type="text" formControlName="visaDob" class="form-control" />
            </c-col>
            <c-col>
              <label cLabel for="visaGender" class="mb-2">Jantina</label>
              <input cFormControl id="visaGender" type="text" formControlName="visaGender" class="form-control" />
            </c-col>
          </c-row>

          <!-- Warganegara Visa -->
          <c-row class="g-3 mb-3">
            <c-col>
              <label cLabel for="visaNationality" class="mb-2">Warganegara</label>
              <input cFormControl id="visaNationality" type="text" formControlName="visaNationality" class="form-control" />
            </c-col>
            <c-col></c-col>
          </c-row>

          <!-- No Dokumen -->
          <c-row class="g-3 mb-3">
            <c-col>
              <label cLabel for="docNo" class="mb-2">No Dokumen</label>
              <input cFormControl id="docNo" type="text" formControlName="docNo" class="form-control" />
            </c-col>
            <c-col></c-col>
          </c-row>
        </form>
      </c-col>
    </c-row>

    <!-- FOOTER CONTENT FOR BUTTONS -->
    <c-row class="mt-4 mb-3">
      <c-col class="d-flex justify-content-end align-items-center gap-2">
          <!-- Action Buttons -->
              <div class="button-row single-button">
          <button class="reset-btn" (click)="resetForm()">
            <span class="icon-circle">⟳</span>
            <span>SET SEMULA</span>
          </button>

          <button class="simpan-btn" (click)="onSubmit()" [disabled]="true">
            <span class="icon-circle">✓</span>
            <span>SIMPAN</span>
          </button>
        </div>
        <div class="d-flex ms-4">
          <button cButton type="button" class="nav-btn rounded-end-0" (click)="goBack()">
            &lt;
          </button>
          <button cButton type="button" class="nav-btn rounded-start-0" (click)="goNext()">
            &gt;
          </button>
        </div>
      </c-col>
    </c-row>
  </c-card-body>
</c-card>

<!-- DEVELOPMENT TEST BUTTONS -->
<div class="mt-4 p-3 border rounded" style="background-color: #f8f9fa;">
  <h6>Testing Error Popups (Dev Only):</h6>
  <div class="d-flex gap-2">
    <button cButton color="danger" size="sm" (click)="testError('IBC-S022')">Test S022</button>
    <button cButton color="danger" size="sm" (click)="testError('IBC-S016')">Test S016</button>
    <button cButton color="danger" size="sm" (click)="testError('IBC-S023')">Test S023</button>
  </div>
</div>

<!-- STANDARD MODAL -->
<c-modal 
  #modalStandard
  [visible]="modalStandard?.visible"
  [backdrop]="'static'"
  [keyboard]="false"
  id="modalStandard">

  <!-- BODY -->
  <c-modal-body class="text-start p-4">
    <div class="mb-3 text-center">
      <div class="d-inline-flex align-items-center justify-content-center" 
           style="width: 60px; height: 60px; border: 2px solid #000;">
        <span style="font-size: 24px; font-weight: bold;">✕</span>
      </div>
    </div>
    <div class="text-center">
      <p *ngFor="let line of modalMessage.split('\n')" class="mb-1">{{ line }}</p>
    </div>
  </c-modal-body>

  <!-- FOOTER -->
  <c-modal-footer class="text-center justify-content-center">
    <button cButton 
            color="dark" 
            (click)="modalStandardClick()"
            style="background-color: #6c757d; color: white; border: none; padding: 8px 30px; border-radius: 4px;">
      {{ modalButtonText }}
    </button>
  </c-modal-footer>
</c-modal>

<!-- Modal Rujuk Penyelia -->
<app-modal-rujuk-penyelia></app-modal-rujuk-penyelia>
