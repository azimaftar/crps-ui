<div class="d-flex flex-column" style="min-height: 50vh;">
  <!-- Kandungan utama -->
  <div class="d-flex flex-grow-1" style="margin-left: 3px; border-radius: 8px;">
    
<!-- KIRI: Widgets dalam satu kotak berbingkai -->
<div class="d-flex flex-column gap-5 p-3"
     style="width: 200px; margin-right: 4px; border-radius: 8px;">
  
  <!-- Widget 1 -->
  <c-widget-stat-e [title]="'Widget 1'" [value]="'1,123'" style="width: 100%;">
    <c-chart [data]="data[0]" [options]="barOptions" class="mx-auto" height="40" width="80" />
  </c-widget-stat-e>

  <!-- Widget 2 -->
  <c-widget-stat-e [title]="'Widget 2'" [value]="'456'" style="width: 100%;">
    <c-chart [data]="data[1]" [options]="barOptions" class="mx-auto" height="40" width="80" />
  </c-widget-stat-e>

</div>

    <!-- KANAN: Gambar dan bar nilai -->
<div class="d-flex flex-column justify-content-center align-items-center flex-grow-1 p-4" style="background-color: white;">
<div class="mb-3 w-50 text-start">
  <label class="form-label"><b>{{ labelJari }}</b></label>
</div>




<div class="d-flex flex-row align-items-center gap-3">
        <img 
          [src]="photoUrl || 'assets/placeholder-image.png'" 
          alt="Cap Jari" 
          style="width: 200px; height: 200px; object-fit: cover; border: 1px solid #000; border-radius: 8px;" 
        />

        <div style="width: 250px;">
          <label style="font-weight: bold; font-size: 1rem; display: block; margin-bottom: 0.5rem;">
            % Nilai Jari Hidup
          </label>
          <div style="height: 24px; background-color: #e9ecef; border-radius: 4px; overflow: hidden;">
            <div 
              [style.width]="getPercentage(irisValue)"
              style="background-color: #0d6efd; height: 100%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 0.85rem; transition: width 0.3s ease;">
              {{ WajahValue }}
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

<!-- FOOTER -->
<div class="d-flex justify-content-end align-items-center px-4 py-3"
     style="background-color: #ffffff; border-top: 2px solid #dee2e6;">
  <div class="d-flex gap-2">
    
    <button class="btn btn-dark"
            style="width: 150px;"
            (click)="tukarLabelJari()"
            id="okbutton">
      OK
    </button>

    <button class="btn btn-dark"
            style="width: 150px;"
            (click)="onReset()"
            id="resetbutton">
      RESET
    </button>

  </div>
</div>


  <!-- Modal -->
  <app-notification-modal
    [modalTitle]="modalTitle"
    [visible]="showModal"
    [showBiometricModal]="showBiometricModal"
    [showModalAlert]="showModalAlert"
    (close)="closeModal()"
  ></app-notification-modal>
</div>
