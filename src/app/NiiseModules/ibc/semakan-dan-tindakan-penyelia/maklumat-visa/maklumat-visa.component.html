<div class="custom-content-wrapper">
    <div class="container-fluid">
        <div class="card p-4">
            <h3 class="mb-4"><b>PROFIL</b></h3>

            <!-- Step Tabs -->
            <reusable-tab [currentStep]="currentStep" [steps]="steps"></reusable-tab>

            <!-- Section 1: Travel Info -->
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Jenis Perjalanan</label>
                    <input type="text" class="form-control" [(ngModel)]="formData.journeyType" name="journeyType" disabled>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Jenis Pelawat</label>
                    <input type="text" class="form-control" [(ngModel)]="formData.visitorType" name="visitorType" disabled>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Jenis Dokumen</label>
                    <input type="text" class="form-control" [(ngModel)]="formData.docType" name="docType" disabled>
                </div>
                <div class="col-md-6">
                    <label class="form-label">No. Dokumen</label>
                    <input type="text" class="form-control" [(ngModel)]="formData.docNo" name="docNo" disabled>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Jenis Pengenalan</label>
                    <input type="text" class="form-control" [(ngModel)]="formData.passportType" name="passportType" disabled>
                </div>
                <div class="col-md-6">
                    <label class="form-label">No. Pengenalan</label>
                    <input type="text" class="form-control" [(ngModel)]="formData.kpNo" name="kpNo" disabled>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Tarikh Tamat</label>
                    <input type="text" class="form-control" [(ngModel)]="formData.expiryDate" name="expiryDate" disabled>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Negara Pengeluar</label>
                    <input type="text" class="form-control" [(ngModel)]="formData.countryIssue" name="countryIssue" disabled>
                </div>
            </div>

            <!-- Section 2: Visa / Pass Info -->
            <h6 class="mt-5 mb-3">Maklumat Visa / Pas Pengembara</h6>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">No Visa / Pas</label>
                    <input type="text" class="form-control" [(ngModel)]="formData.visaNo" name="visaNo" disabled>
                </div>
                <div class="col-md-6">
                    <label class="form-label">No Rujukan OR VDS</label>
                    <input type="text" class="form-control" [(ngModel)]="formData.visaQrVds" name="visaQrVds" disabled>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Jenis Visa / Pas</label>
                    <input type="text" class="form-control" [(ngModel)]="formData.visaType" name="visaType" disabled>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Tarikh Tamat Visa / Pas</label>
                    <input type="text" class="form-control" [(ngModel)]="formData.visaExpiryDate" name="visaExpiryDate" disabled>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Tarikh Dikeluarkan</label>
                    <input type="text" class="form-control" [(ngModel)]="formData.issueDatePassport" disabled
                        name="issueDatePassport">
                </div>
            </div>

            <!-- Section 3: Traveler Profile -->
            <h6 class="mt-5 mb-3">Maklumat Peribadi</h6>
            <div class="row g-3">
                <div class="col-12">
                    <label class="form-label">Nama</label>
                    <input type="text" class="form-control" [(ngModel)]="formData.name" name="name" disabled>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Tarikh Lahir</label>
                    <input type="text" class="form-control" [(ngModel)]="formData.dob" name="dob" disabled>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Jantina</label>
                    <input type="text" class="form-control" [(ngModel)]="formData.gender" name="gender" disabled>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Warganegara</label>
                    <input type="text" class="form-control" [(ngModel)]="formData.nationality" name="nationality" disabled>
                </div>
                <div class="col-md-6">
                    <label class="form-label">No Dokumen</label>
                    <input type="text" class="form-control" [(ngModel)]="formData.docNoPersonal" name="docNoPersonal" disabled>
                </div>
            </div>
            <!-- Section 4: Bottom Buttons -->
            <!-- <div class="d-flex justify-content-end gap-2 mt-5">
                <button class="btn btn-outline-secondary d-flex align-items-center gap-1" type="reset"
                    (click)="resetForm()">
                    <i class="bi bi-arrow-clockwise"></i> Set Semula
                </button>
                <button 
                    type="button"
                    cButton
                    color="dark"
                    (click)="openKeputusanModal()">
                    Keputusan Penyelia
                </button>
                <button class="btn btn-submit d-flex align-items-center gap-1" [disabled]="!isFormValid"
                    (click)="saveForm()">
                    <i class="bi bi-check-circle"></i> Kemaskini
                </button>
                <button class="btn btn-all" (click)="goToPrevious(formData?.uid)">&lt;</button>
                <button class="btn btn-all" (click)="goToNext(formData?.uid)">&gt;</button>
            </div> -->
            <div class="page-footer">
            <div class="footer-actions d-flex justify-content-end gap-2 p-3">
                <button class="btn btn-outline-secondary d-flex align-items-center gap-1" type="reset" (click)="resetForm()">
                <i class="bi bi-arrow-clockwise"></i> Set Semula
                </button>

                <button type="button" cButton color="dark" (click)="openKeputusanModal()">
                Keputusan Penyelia
                </button>

                <button class="btn btn-submit d-flex align-items-center gap-1" [disabled]="!isFormValid" (click)="saveForm()">
                <i class="bi bi-check-circle"></i> Kemaskini
                </button>

                <button class="btn btn-all" (click)="goToPrevious(formData?.uid)">&lt;</button>
                <button class="btn btn-all" (click)="goToNext(formData?.uid)">&gt;</button>
            </div>
            </div>

        </div>
    </div>
</div>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<!-- Child Modal Component -->
<app-modal-keputusan-ntl 
  (onSimpan)="onKeputusanSimpan($event)"
  (onClose)="onKeputusanClose()">
</app-modal-keputusan-ntl>
