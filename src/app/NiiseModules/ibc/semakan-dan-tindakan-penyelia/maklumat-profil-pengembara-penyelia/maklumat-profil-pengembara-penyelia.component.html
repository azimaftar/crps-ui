<c-container fluid class="p-4">
  <c-card class="mx-auto border shadow" style="max-width: 1000px; border-radius: 8px;">
    <!-- Header -->
    <c-card-header class="text-center border-bottom-2" 
                   style="background-color: var(--cui-card-cap-bg, #f8f9fa); padding: 1.25rem;">
      <h5 class="mb-0 fw-bold text-uppercase text-body" 
          style="font-size: 1rem; letter-spacing: 0.5px; line-height: 1.2;">
        SEMAKAN & TINDAKAN PENYELIA
      </h5>
    </c-card-header>
    
    <!-- Body -->
    <c-card-body class="p-4" style="padding: 2rem;">
      <!-- Profile Photo Section -->
      <div class="mb-4">
        <label class="d-block mb-3 text-uppercase fw-semibold" 
               style="font-size: 0.9rem; letter-spacing: 0.5px; opacity: 0.9; color: var(--cui-body-color);">
          Maklumat Profil Pengembara
        </label>
        <div class="d-flex justify-content-start">
      <div class="border rounded shadow-sm overflow-hidden position-relative d-flex align-items-center justify-content-center" 
       style="width: 200px; height: 200px; background-color: var(--cui-card-bg); transition: all 0.3s ease;"
       onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 6px 16px rgba(0, 0, 0, 0.15)'"
       onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 12px rgba(0, 0, 0, 0.1)'">
    
    <!-- Image element when photo exists -->
    <img *ngIf="formData?.DPImg" 
         [src]="getImageFromBase64(formData.DPImg, 'jpeg')" 
         alt="Photo" 
         class="passport-img"
         style="width: 100%; height: 100%; object-fit: cover;" />
    
    <!-- Placeholder when no photo -->
    <div *ngIf="!formData?.DPImg" class="text-center text-muted">
      <i class="fa fa-user fa-3x" style="opacity: 0.6;"></i>
      <small class="d-block mt-2 fw-medium" style="letter-spacing: 0.5px;">Photo</small>
    </div>
  </div>
</div>
      </div>

      <!-- Form Fields Section -->
      <c-row>
        <c-col md="6">
          <!-- Jenis Pelawat -->
          <c-row class="mb-3">
            <c-col>
              <label class="form-label text-uppercase fw-semibold" 
                     style="font-size: 0.8rem; letter-spacing: 0.5px; opacity: 0.9; margin-bottom: 0.5rem; color: var(--cui-body-color);">
                Jenis Pelawat
              </label>
              <input disabled
                type="text" 
                class="form-control form-control-sm" 
                [value]="formData.Type"
                readonly>
            </c-col>
          </c-row>

          <!-- Jenis Dokumen & Jantina -->
          <c-row class="mb-3">
            <c-col md="6">
              <label class="form-label text-uppercase fw-semibold" 
                     style="font-size: 0.8rem; letter-spacing: 0.5px; opacity: 0.9; margin-bottom: 0.5rem; color: var(--cui-body-color);">
                Jenis Dokumen
              </label>
              <input disabled
                type="text" 
                class="form-control form-control-sm" 
                [value]="formData.Type"
                readonly>
            </c-col>
            <c-col md="6">
              <label class="form-label text-uppercase fw-semibold" 
                     style="font-size: 0.8rem; letter-spacing: 0.5px; opacity: 0.9; margin-bottom: 0.5rem; color: var(--cui-body-color);">
                Jantina
              </label>
              <input disabled
                type="text" 
                class="form-control form-control-sm" 
                [value]="formData.Gender"
                readonly>
            </c-col>
          </c-row>

          <!-- No Dokumen & No Pengenalan -->
          <c-row class="mb-3">
            <c-col md="6">
              <label class="form-label text-uppercase fw-semibold" 
                     style="font-size: 0.8rem; letter-spacing: 0.5px; opacity: 0.9; margin-bottom: 0.5rem; color: var(--cui-body-color);">
                No Dokumen
              </label>
              <input disabled
                type="text" 
                class="form-control form-control-sm" 
                [value]="formData.DocNo"
                readonly>
            </c-col>
            <c-col md="6">
              <label class="form-label text-uppercase fw-semibold" 
                     style="font-size: 0.8rem; letter-spacing: 0.5px; opacity: 0.9; margin-bottom: 0.5rem; color: var(--cui-body-color);">
                No. Pengenalan
              </label>
              <input disabled
                type="text" 
                class="form-control form-control-sm" 
                [value]="formData.PersonalNo"
                readonly>
            </c-col>
          </c-row>

          <!-- Nama -->
          <c-row class="mb-3">
            <c-col>
              <label class="form-label text-uppercase fw-semibold" 
                     style="font-size: 0.8rem; letter-spacing: 0.5px; opacity: 0.9; margin-bottom: 0.5rem; color: var(--cui-body-color);">
                Nama
              </label>
              <input disabled
                type="text" 
                class="form-control form-control-sm" 
                [value]="formData.Name"
                readonly>
            </c-col>
          </c-row>

          <!-- Tarikh Dikeluarkan & Tamat Tempoh -->
          <c-row class="mb-3">
            <c-col md="6">
              <label class="form-label text-uppercase fw-semibold" 
                     style="font-size: 0.8rem; letter-spacing: 0.5px; opacity: 0.9; margin-bottom: 0.5rem; color: var(--cui-body-color);">
                Tarikh Dikeluarkan
              </label>
              <input disabled
                type="text" 
                class="form-control form-control-sm" 
                [value]="formData.DateIssue"
                readonly>
            </c-col>
            <c-col md="6">
              <label class="form-label text-uppercase fw-semibold" 
                     style="font-size: 0.8rem; letter-spacing: 0.5px; opacity: 0.9; margin-bottom: 0.5rem; color: var(--cui-body-color);">
                Tarikh Tamat
              </label>
              <input disabled
                type="text" 
                class="form-control form-control-sm" 
                [value]="formData.DateExpiry"
                readonly>
            </c-col>
          </c-row>

          <!-- Umur & Warganegara -->
          <c-row class="mb-3">
            <c-col md="6">
              <label class="form-label text-uppercase fw-semibold" 
                     style="font-size: 0.8rem; letter-spacing: 0.5px; opacity: 0.9; margin-bottom: 0.5rem; color: var(--cui-body-color);">
                Umur
              </label>
              <input disabled
                type="text" 
                class="form-control form-control-sm" 
                [value]="formData.Age"
                readonly>
            </c-col>
            <c-col md="6">
              <label class="form-label text-uppercase fw-semibold" 
                     style="font-size: 0.8rem; letter-spacing: 0.5px; opacity: 0.9; margin-bottom: 0.5rem; color: var(--cui-body-color);">
                Warganegara
              </label>
              <input disabled
                type="text" 
                class="form-control form-control-sm" 
                [value]="formData.Nationality"
                readonly>
            </c-col>
          </c-row>

          <!-- Negara Pengeluar -->
          <c-row class="mb-3">
            <c-col md="6">
              <label class="form-label text-uppercase fw-semibold" 
                     style="font-size: 0.8rem; letter-spacing: 0.5px; opacity: 0.9; margin-bottom: 0.5rem; color: var(--cui-body-color);">
                Negara Pengeluar
              </label>
              <input disabled
                type="text" 
                class="form-control form-control-sm" 
                [value]="formData.IssueState"
                readonly>
            </c-col>
          </c-row>
        </c-col>
      </c-row>
    </c-card-body>

    <!-- Footer -->
    <c-card-footer class="d-flex justify-content-end border-top-2" 
                   style="background-color: transparent; padding: 1.5rem;">
      <button cButton
              color="dark"
              class="px-4 text-uppercase fw-semibold shadow-sm"
              style="font-size: 0.875rem; letter-spacing: 0.5px; border-radius: 0.375rem; transition: all 0.2s ease-in-out;"
              (click)="openDetails()"
              onmouseover="this.style.transform='translateY(-1px)'; this.style.boxShadow='0 4px 12px rgba(33, 37, 41, 0.3)'"
              onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow=''">
        <i class="fa fa-question-circle me-2"></i>
        PERTANYAAN
      </button>
    </c-card-footer>
  </c-card>
</c-container>

<!-- Modal Component -->
<app-modal-rujuk-penyelia (onDecision)="handleDecision($event)"></app-modal-rujuk-penyelia>
