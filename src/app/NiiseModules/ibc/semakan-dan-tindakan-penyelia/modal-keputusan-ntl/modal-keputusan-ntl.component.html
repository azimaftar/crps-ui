<!-- CoreUI Keputusan Modal -->
<c-modal 
  [visible]="isVisible"
  (visibleChange)="onVisibleChange($event)"
  alignment="center"
  backdrop="static">
  
  <c-modal-header>
    <h5 cModalTitle>Keputusan Penyelia</h5>
    <button 
      type="button"
      cButtonClose
      (click)="closeModal()"
      aria-label="Close">
    </button>
  </c-modal-header>
  
  <c-modal-body class="px-4">
    <!-- Photo Section -->
    <div class="text-center mb-3">
      <div class="photo-placeholder mx-auto border" 
           style="width: 120px; height: 120px; background-color: #f8f9fa;">
        <!-- Photo content can go here -->
      </div>
    </div>
    
    <!-- Form Section using CoreUI -->
    <form cForm>
      <!-- Tindakan Penyelia -->
      <c-row class="mb-3">
        <c-col xs="12">
          <label cLabel for="tindakanPenyelia" class="form-label">Tindakan Penyelia</label>
          <select 
            id="tindakanPenyelia"
            cFormControl
            class="form-select"
            [(ngModel)]="selectedTindakan"
            name="selectedTindakan"
            (change)="onTindakanChange()">
            <option value="" selected disabled>-Sila Pilih-</option>
            <option value="1">Sebab Tidak Dibenarkan Masuk (NTL)</option>
            <option value="2">Bukan Subjek Sebenar (BSS)</option>
            <option value="3">Subjek Sebenar (SS)</option>
          </select>
        </c-col>
      </c-row>

      <!-- Kategori NTL - Only show when NTL is selected -->
      <c-row class="mb-3" *ngIf="selectedTindakan === '1'">
        <c-col xs="12">
          <label cLabel for="kategoriNTL" class="form-label">Kategori NTL</label>
          <select 
            id="kategoriNTL"
            cFormControl
            class="form-select"
            [(ngModel)]="selectedKategori"
            name="selectedKategori">
            <option value="" selected disabled>-Sila Pilih-</option>
            <option value="1">Invalid Passport - Validity less than 6 months</option>
            <option value="2">Invalid Passport - Defected Passport</option>
            <option value="3">Invalid Passport - Passport retract by source country</option>
            <option value="4">Invalid Passport - Passport page is full</option>
            <option value="5">Invalid Visa - Visa expired</option>
            <option value="6">Invalid Visa - Defected Visa</option>
            <option value="7">Invalid Visa - Visa had cancel</option>
            <option value="8">Imigran Yang Dilarang Seksyen 8(3)</option>
            <option value="9">Tiada Hak Masuk Sarawak Seksyen 66(1)</option>
            <option value="10">Permit atau Pas Tidak Dapat Dikeluarkan</option>
            <option value="11">Notis Penolakan Masuk - Sarawak</option>
          </select>
        </c-col>
      </c-row>

      <!-- Catatan -->
      <c-row class="mb-3">
        <c-col xs="12">
          <label cLabel for="catatan" class="form-label">Catatan</label>
          <input 
            id="catatan"
            type="text"
            cFormControl
            class="form-control"
            [(ngModel)]="catatan"
            name="catatan"
            placeholder="Catatan"
            required>
        </c-col>
      </c-row>
    </form>
  </c-modal-body>
  
  <c-modal-footer class="px-4">
    <button 
      type="button"
      cButton
      color="dark"
      (click)="simpanKeputusan()">
      SIMPAN
    </button>
  </c-modal-footer>
</c-modal>
