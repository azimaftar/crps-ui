<c-card [style.border]="'1px solid #000'" [style.margin]="'0'">
  <!-- Header Section -->
  <c-card-header>
    <h6 [style.margin]="'18px 0 10px 30px'">
      PEMERIKSAAN MASUK (EGATE) - BAHAGIAN DATA BIOMETRIK [WAJAH & IRIS]
    </h6>
  </c-card-header>

  <!-- Main Content Section -->
  <c-card-body style="border-top: 1px solid #000; border-bottom: 1px solid #000; display: flex;padding: 0;">
    
    <!-- Left Partition - Face & Iris Recognition -->
    <div style="flex: 3; padding: 1rem; border-right: 1px solid #000;" >
      <!-- Face Recognition Section -->
      <c-row style="width: 100%;gap: 1rem; display:flex; margin: 5rem 0 0 1rem;justify-content: center; align-items: center;" >
            <c-col md="auto">
                <c-card>
                    <c-card-body style="text-align: center; padding: 60px 30px;" >
                    <img src="" alt="WAJAH" cImg>
                    </c-card-body>
                </c-card>
            </c-col>
            <c-col md="auto">
                <label cLabel for="faceRecognition">% Pengecaman Wajah</label>
                <c-row></c-row>
                <input 
                    cFormControl 
                    type="text" 
                    id="faceRecognition" 
                    style="width: 10rem;"
                    placeholder="%"
                    disabled>
            </c-col>
        </c-row>

      <!-- Iris Recognition Section -->
      <c-row style="width: 100%;gap: 1rem;text-align: center; display:flex; margin: 3rem 0 5rem 1rem;justify-content: center; align-items: center;" >
        <c-col md="auto">
          <c-card>
            <c-card-body style="text-align: center; padding: 60px 30px;" >
              <img src="" alt="IRIS" cImg>
            </c-card-body>
          </c-card>
        </c-col>
        <c-col md="auto">
          <label cLabel for="irisRecognition">% Pengecaman Iris</label>
          <c-row></c-row>
          <input 
            cFormControl 
            type="text" 
            id="irisRecognition" 
            [style.width]="'10rem'"
            placeholder="%"
            disabled>
        </c-col>
      </c-row>
    </div>

    <!-- Right Partition - Scan Status -->
    <div style="flex: 2;margin: 5rem 0 0 1rem; padding: 1rem; display: flex; align-items: center;">
      <input 
        cFormControl
        type="text" 
        [value]="'STATUS IMBASAN'"
        [disabled]="true"
        style="width: 70%;height: 100px;margin: 0 auto;text-align: center;font-size: larger;">
    </div>
  </c-card-body>
</c-card>
