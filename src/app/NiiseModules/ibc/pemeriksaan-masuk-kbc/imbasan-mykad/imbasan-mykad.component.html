<div class="text-center mb-4">
    <img src="assets/logo/niise_logo.png" alt="Logo">
</div>

        <h6>Maklumat Dokumen</h6>

                <input id="jPerjalanan" class="form-control" disabled>
            </c-col>
            <c-col xs="12" md="3" class="d-none d-md-block">

            </c-col>
            <c-col xs="12" md="3" class="d-none d-md-block">
                
            </c-col>
        </c-row>

        <!-- Row 2 -->
        <c-row class="g-3 my-3">
            <c-col xs="12" md="3">
                <label for="noDokumen" class="form-label">Jenis Dokumen</label>
                <input id="noDokumen" class="form-control" disabled>
            </c-col>
            <c-col xs="12" md="3">
                <label for="jantina" class="form-label">Jantina</label>
                <input id="jantina" class="form-control" disabled>

        </c-row>

                <input id="bangsa" class="form-control" disabled>
            </c-col>
        </c-row>

        <!-- Row 4: Nama full-width on mobile, 2/3 on md+ -->

            <c-col xs="12" md="6">
                <label for="nama" class="form-label">Nama</label>
                <input id="nama" class="form-control" disabled>
            </c-col>
            <c-col xs="12" md="6" class="d-none d-md-block">
                <!-- spacer only on md+ -->
            </c-col>
        </c-row>

        <!-- Row 5 -->
        <c-row class="g-3 my-3">
            <c-col xs="12" md="3">

        <c-row class="g-3 my-3">
            <c-col xs="12" md="3">

                <!-- spacer only on md+ -->

                <label for="tarikh" class="form-label">Tarikh Masuk</label>
                <input id="tarikh" class="form-control" disabled>

        </c-row>

        <!-- Button -->
        <div class="text-end mt-4">
            <button type="button" cButton color="secondary" (click)="openProfilPengembara()">TUTUP</button>
        </div>
    </fieldset>
</form>
