<form class="border mb-4 p-3">
  <!-- Header -->
  <div>
    <h6 class="mt-2 ms-2 mb-3 text-center text-md-start">
      PEMERIKSAAN MASUK (KAUNTER MANUAL) - BAHAGIAN DATA BIOMETRIK [CAP JARI]
    </h6>
  </div>

  <!-- Main Section -->
  <div class="row border-top border-bottom my-4">
    <!-- Partition 1: Left Column -->
    <div class="col-12 col-md-3 border-end mb-4 mb-md-0">
      <c-col class="mt-4">
        <c-widget-stat-a class="mb-3" color="primary" [title]="'Widget 1'" style="height: 120px;">
          ...
        </c-widget-stat-a>
        <c-widget-stat-a class="mb-3" color="primary" [title]="'Widget 2'" style="height: 120px;">
          ...
        </c-widget-stat-a>
      </c-col>
    </div>

    <!-- Partition 2: Right Column -->
    <div class="col-12 col-md-9">
      <p class="mt-4 mb-2" *ngIf="jari === 'kanan'">Empat (4) Jari Kanan</p>
      <p class="mt-4 mb-2" *ngIf="jari === 'kiri'">Empat (4) Jari Kiri</p>

      <div class="d-flex flex-column flex-md-row gap-4">
        <!-- Fingerprint Box -->
        <c-card class="mb-3 w-auto">
          <c-card-body class="text-center" style="padding: 60px 30px; height: 200px;">
            <img src="assets/logo/niise_logo.png" alt="CAP JARI" class="img-fluid" style="width: 200px;"/>
          </c-card-body>
        </c-card>

        <!-- Input Field -->
        <div class="mt-3 mt-md-5 w-auto">
          <label for="jenisDokumen">% Nilai Jari Hidup</label>
          <input type="text" id="jenisDokumen" class="form-control" placeholder="Field 1" style="margin-bottom: 10px;"/>
        </div>
      </div>
    </div>
  </div>

  <!-- Buttons -->
  <div class="text-end">
    <button cButton color="primary" class="me-3 mb-2" (click)="openCapJariKiri()" *ngIf="jari === 'kanan'">OK</button>
    <button cButton color="secondary" class="me-3 mb-2" (click)="openWajahIris()" *ngIf="jari === 'kanan'">RESET</button>

    <button cButton color="primary" class="me-3 mb-2" (click)="openCapJariBoth()" *ngIf="jari === 'kiri'">OK</button>
    <button cButton color="secondary" class="me-3 mb-2" (click)="openCapJariKanan()" *ngIf="jari === 'kiri'">RESET</button>
  </div>
</form>
