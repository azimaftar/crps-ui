<!-- HEADER PROFIL -->
<div class="container border rounded-3 shadow-sm mt-4 mb-4">
    <div class="header p-3 border-bottom bg-body-tertiary">
        <h2 class="h5 mb-0">PROFIL</h2>
    </div>

    <!-- REACTIVE FORM START-->
    <form class="px-4 py-3">
        <div class="row g-4">
            <!-- LEFT SECTION: FORM INPUTS -->
            <div class="col-md-8">
                <h5 class="mb-4">Maklumat Profil Pengembara</h5>

                <!-- Profile Photo & Jenis Dokumen -->
                <div class="row mb-3 align-items-start">
                    <div class="col-12 col-md-6 d-flex justify-content-center">
                        <div class="photo-placeholder border rounded-3 d-flex align-items-center justify-content-center bg-light"
                            style="width: 120px; height: 150px;">
                            <i class="bi bi-person fs-1 text-muted"></i>
                        </div>
                    </div>
                    <div class="col-12 col-md-6 margin-top-custom">
                        <label for="jDokumen" class="form-label">Jenis Dokumen*</label>
                        <select id="jPelawat" name="jPelawat" cSelect
                            required>
                            <option value="passport">Passport</option>
                            <option value="kadpengenalan">Kad Pengenalan</option>
                        </select>
                    </div>
                </div>

                <!-- Row 1 -->
                <div class="row mb-3">
                    <div class="col-12 col-md-6">
                        <label for="jPelawat" class="form-label">Jenis Pelawat*</label>
                        <select id="jPelawat" name="jPelawat" cSelect
                            required>
                            <option value="warganegara">Warganegara</option>
                            <option value="xwarganegara">Bukan Warganegara</option>
                        </select>
                    </div>
                    <div class="col-12 col-md-6">
                        <label for="noDokumen" class="form-label">No Dokumen*</label>
                        <input type="text" id="noDokumen" class="form-control" placeholder="Field 1" required />
                    </div>
                </div>

                <!-- Row 2 -->
                <div class="row mb-3">
                    <div class="col-12 col-md-6">
                        <label for="warganegara" class="form-label">Warganegara*</label>
                        <select cSelect>
                            <option value="malaysia">Malaysia</option>
                            <option value="xmalaysia">Bukan Malaysia</option>
                        </select>
                    </div>
                    <div class="col-12 col-md-6">
                        <label for="tarikhTamat" class="form-label">Tarikh Tamat Sah Laku*</label>
                        <input type="date" id="tarikhTamat" class="form-control" required />
                    </div>
                </div>

                <!-- BIOMETRIC BUTTON -->
                <div class="d-flex justify-content-end mb-3">
                    <button type="button" class="btn text-white" style="background-color: black;"
                        (click)="openProfilPengembara()">SEMAK</button>
                </div>

                <!-- Row 3 -->
                <div class="row mb-3">
                    <div class="col-12 col-md-6">
                        <label class="form-label">Jenis Dokumen</label>
                        <input type="text" class="form-control" placeholder="Field 1" disabled />
                    </div>
                    <div class="col-12 col-md-6">
                        <label class="form-label">Jantina</label>
                        <input type="text" class="form-control" placeholder="Field 1" disabled />
                    </div>
                </div>

                <!-- Row 4 -->
                <div class="row mb-3">
                    <div class="col-12 col-md-6">
                        <label class="form-label">No Dokumen</label>
                        <input type="text" class="form-control" placeholder="Field 1" disabled />
                    </div>
                    <div class="col-12 col-md-6">
                        <label class="form-label">No Pengenalan</label>
                        <input type="text" class="form-control" placeholder="Field 1" disabled />
                    </div>
                </div>

                <!-- Row 5 (Full Width Nama) -->
                <div class="row mb-3">
                    <div class="col-12">
                        <label for="nama" class="form-label">Nama</label>
                        <input type="text" id="nama" class="form-control" placeholder="Combined Field (1+2)" disabled />
                    </div>
                </div>

                <!-- Row 6 -->
                <div class="row mb-3">
                    <div class="col-12 col-md-6">
                        <label class="form-label">Tarikh Dikeluarkan</label>
                        <input type="text" class="form-control" placeholder="Field 1" disabled />
                    </div>
                    <div class="col-12 col-md-6">
                        <label class="form-label">Warganegara</label>
                        <input type="text" class="form-control" placeholder="Field 1" disabled />
                    </div>
                </div>

                <!-- Row 7 -->
                <div class="row mb-3">
                    <div class="col-12 col-md-6">
                        <label class="form-label">Umur</label>
                        <input type="text" class="form-control" placeholder="Field 1" disabled />
                    </div>
                    <div class="col-12 col-md-6">
                        <label class="form-label">Negara Pengeluar</label>
                        <input type="text" class="form-control" placeholder="Field 1" disabled />
                    </div>
                </div>

                <!-- Row 8 -->
                <div class="row mb-3">
                    <div class="col-12 col-md-6">
                        <label class="form-label">Tarikh Tamat</label>
                        <input type="text" class="form-control" placeholder="Field 1" disabled />
                    </div>
                    <div class="col-12 col-md-6 d-none d-md-block"><!-- placeholder for spacing --></div>
                </div>
            </div>
