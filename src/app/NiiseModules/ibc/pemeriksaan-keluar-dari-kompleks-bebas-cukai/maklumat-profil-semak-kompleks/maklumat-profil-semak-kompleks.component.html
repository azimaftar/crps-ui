<!-- CARD CONTENT -->
<c-card class="mb-3">  
  <!-- HEADER PROFIL -->
  <c-card-header class="card-header">
    <h3 class="card-header-title"><b>Rekod Pengembara</b></h3>
  </c-card-header>

 <!-- STEPPER -->
  <div class="px-4 py-3 mb-4 stepper-container">
    <ul class="stepper-list d-flex justify-content-start">
      <ng-container *ngFor="let step of steps">
        <li 
          class="stepper-item text-center"
          *ngIf="step.title">


          <div 
            class="stepper-content"
            [class.active-box]="currentStep === step.number">
            
            <span 
              class="step-number"
              [class.active]="currentStep === step.number">
              {{ step.number }}
            </span>

            <span 
              class="step-title"
              [class.active]="currentStep === step.number">
              {{ step.title }}
            </span>

          </div>
        </li>
      </ng-container>
    </ul>
  </div>

  <!-- CARD BODY -->
  <c-card-body>
    <c-row class="align-items-start">
      
      <!-- KIRI: GAMBAR -->
      <c-col md="4">
        <div class="photo-placeholder mb-4" style="width: 260px; height: 260px; margin-left: 82px;">
          <img src="assets/figma/userimg.png" alt="image user" style="max-height: 100%; max-width: 100%; object-fit: contain;">
        </div>
      </c-col>

      <!-- KOLUM BORANG -->
      <c-col md="8">
        <form [formGroup]="profilForm" class="form" (ngSubmit)="semakMaklumatPengembara()">

          <!-- Jenis Pelawat -->
          <c-row class="g-3 mb-3">
            <c-col>
              <label cLabel for="visitorType" class="mb-2">Jenis Pelawat</label>
              <input cFormControl id="visitorType" type="text" formControlName="visitorType" class="form-control" />
            </c-col>
            <c-col></c-col>
          </c-row>

          <!-- Jenis Dokumen dan Jantina -->
          <c-row class="g-3 mb-3">
            <c-col>
              <label cLabel for="docType" class="mb-2">Jenis Dokumen</label>
              <input cFormControl id="docType" type="text" formControlName="docType" class="form-control" />
            </c-col>
            <c-col>
              <label cLabel for="gender" class="mb-2">Jantina</label>
              <input cFormControl id="gender" type="text" formControlName="gender" class="form-control" />
            </c-col>
          </c-row>

          <!-- No Dokumen dan No Kad Pengenalan -->
          <c-row class="g-3 mb-3">
            <c-col>
              <label cLabel for="docNo" class="mb-2">No. Dokumen</label>
              <input cFormControl id="docNo" type="text" formControlName="docNo" class="form-control" />
            </c-col>
            <c-col>
              <label cLabel for="kpNo" class="mb-2">No. Pengenalan</label>
              <input cFormControl id="kpNo" type="text" formControlName="kpNo" class="form-control" />
            </c-col>
          </c-row>

          <!-- Nama -->
          <c-row class="g-3 mb-3">
            <c-col md="12">
              <label cLabel for="name" class="mb-2">Nama</label>
              <input cFormControl id="name" type="text" formControlName="name" class="form-control" />
            </c-col>
          </c-row>

          <!-- Tarikh Dikeluarkan dan Tamat -->
          <c-row class="g-3 mb-3">
            <c-col>
              <label cLabel for="issueDatePassport" class="mb-2">Tarikh Dikeluarkan</label>
              <input cFormControl id="issueDatePassport" type="text" formControlName="issueDatePassport" class="form-control" />
            </c-col>
            <c-col>
              <label cLabel for="expiryDate" class="mb-2">Tarikh Tamat</label>
              <input cFormControl id="expiryDate" type="text" formControlName="expiryDate" class="form-control" />
            </c-col>
          </c-row>

          <!-- Umur dan Warganegara -->
          <c-row class="g-3 mb-3">
            <c-col>
              <label cLabel for="age" class="mb-2">Umur</label>
              <input cFormControl id="age" type="text" formControlName="age" class="form-control" />
            </c-col>
            <c-col>
              <label cLabel for="nationality" class="mb-2">Warganegara</label>
              <input cFormControl id="nationality" type="text" formControlName="nationality" class="form-control" />
            </c-col>
          </c-row>

          <!-- Negara Pengeluar -->
          <c-row class="g-3 mb-3">
            <c-col>
              <label cLabel for="countryIssue" class="mb-2">Negara Pengeluar</label>
              <input cFormControl id="countryIssue" type="text" formControlName="countryIssue" class="form-control" />
            </c-col>
            <c-col></c-col>
          </c-row>

                      <!-- Butang SEMAK -->
          <div class="button-row single-button">
          <button class="semak-btn" (click)="semakMaklumatPengembara()">
            <span class="icon-circle">✓</span>
            <span>Semak</span>
          </button>
        </div>
        </form>
      </c-col>
    </c-row>
  </c-card-body>
</c-card>

<!-- DEVELOPMENT TEST BUTTONS -->
<div class="mt-4 p-3 border rounded" style="background-color: #f8f9fa;">
  <h6>Testing Error Popups (Dev Only):</h6>
  <div class="d-flex gap-2">
    <button cButton color="warning" size="sm" (click)="testError('IBC-S030')">Test S030</button>
    <button cButton color="danger" size="sm" (click)="testError('IBC-W009')">Test W009</button>
  </div>
</div>

<!-- STANDARD MODAL -->
<c-modal 
  #modalStandard
  [visible]="modalStandard?.visible"
  [backdrop]="'static'"
  [keyboard]="false"
  id="modalStandard">

  <!-- BODY -->
  <c-modal-body class="text-start p-4">
    <div class="mb-3 text-center">
      <div class="d-inline-flex align-items-center justify-content-center" 
           style="width: 60px; height: 60px; border: 2px solid #000;">
        <span style="font-size: 24px; font-weight: bold;">✕</span>
      </div>
    </div>
    <div class="text-center">
      <p *ngFor="let line of modalMessage.split('\n')" class="mb-1">{{ line }}</p>
    </div>
  </c-modal-body>

  <!-- FOOTER -->
  <c-modal-footer class="text-center justify-content-center">
    <button cButton 
            color="dark" 
            (click)="modalStandardClick()"
            style="background-color: #6c757d; color: white; border: none; padding: 8px 30px; border-radius: 4px;">
      {{ modalButtonText }}
    </button>
  </c-modal-footer>
</c-modal>
