<div class="custom-content-wrapper">
    <c-card>
        <c-card-body>
            <!-- PAGE TITLE -->
            <c-row>
                <h3>Rekod Pengembara</h3>
            </c-row>

            <!-- STEPPER -->
            <c-row>
                <reusable-tab [currentStep]="currentStep" [steps]="steps"></reusable-tab>
            </c-row>

            <!-- FORM -->
            <c-row>
                <form [formGroup]="maklumatPengembaraForm">
                    <c-row>
                        <!-- LEFT -->
                        <c-col xs="12" md="3" class="d-flex flex-column align-items-center">
                            <!-- PHOTO -->
                            <img src="assets/images/avatars/9.jpg" alt="Profile Image" class="img-fluid mb-3"
                                style="width: 200px; height: 200px; object-fit: cover; border-radius: 10px;" />

                            <!-- <p>isMaklumatLengkap: {{ isMaklumatLengkap }}</p> -->

                            <!-- ACTION BUTTONS -->
                            <div style="width: 200px;">
                                <button cButton type="button" class="action-button mb-2 w-100"
                                    (click)="captureFaceAndIris()" [disabled]="isMaklumatLengkap">
                                    <i class="bi bi-check-circle" [class.d-none]="!isMaklumatLengkap"></i> Ambil Wajah &
                                    Iris
                                </button>

                                <button cButton type="button" class="action-button mb-2  w-100"
                                    (click)="captureFingerprint()" [disabled]="isMaklumatLengkap">
                                    <i class="bi bi-check-circle" [class.d-none]="!isMaklumatLengkap"></i> Ambil Cap
                                    Jari
                                </button>
                            </div>
                        </c-col>

                        <!-- RIGHT -->
                        <c-col xs="12" md="9">
                            <!-- <div style="max-height: 80vh; overflow-y: auto; padding-right: 1rem;"> -->

                            <!-- Jenis Pelawat DONE-->
                            <c-row class="mb-3">
                                <c-col md="12">
                                    <label cLabel for="visitorTyp" class="mb-2">Jenis Pelawat</label>
                                    <input cFormControl id="visitorTyp" type="text" formControlName="visitorType"
                                        class="form-control" />
                                </c-col>
                            </c-row>

                            <!-- Jenis Pemeriksaan dan Jenis Perjalanan DONE -->
                            <c-row class="g-3 mb-3">
                                <!-- Jenis Pemeriksaan -->
                                <c-col xs="12" md="6">
                                    <label cLabel for="jenisPemeriksaan" class="mb-2">Jenis Pemeriksaan</label>
                                    <input cFormControl id="jenisPemeriksaan" type="text"
                                        formControlName="jenisPemeriksaan" class="form-control" />
                                </c-col>
                                <!-- Jenis Perjalanan -->
                                <c-col xs="12" md="6">
                                    <label cLabel for="journeyTyp" class="mb-2">Jenis Perjalanan</label>
                                    <input cFormControl id="journeyTyp" type="text" formControlName="journeyTyp"
                                        class="form-control" />
                                </c-col>
                            </c-row>

                            <!-- Jenis Dokumen dan No Dokumen -->
                            <c-row class="g-3 mb-3">
                                <!-- Jenis Dokumen -->
                                <c-col xs="12" md="6">
                                    <label cLabel for="docType" class="mb-2">Jenis Dokumen</label>
                                    <input cFormControl id="docType" type="text" formControlName="docType"
                                        class="form-control" />
                                </c-col>
                                <!-- No Dokumen -->
                                <c-col xs="12" md="6">
                                    <label cLabel for="docNo" class="mb-2">No. Dokumen</label>
                                    <input cFormControl id="docNo" type="text" formControlName="docNo"
                                        class="form-control" />
                                </c-col>
                            </c-row>

                            <!-- Warganegara dan Negara Pengeluar -->
                            <c-row class="g-3 mb-3">
                                <!-- Warganegara -->
                                <c-col xs="12" md="6">
                                    <label cLabel for="nationality" class="mb-2">Warganegara</label>
                                    <input cFormControl id="nationality" type="text" formControlName="nationality"
                                        class="form-control" />
                                </c-col>
                                <!-- Negara Pengeluar -->
                                <c-col xs="12" md="6">
                                    <label cLabel for="countryIssue" class="mb-2">Negara Pengeluar</label>
                                    <input cFormControl id="countryIssue" type="text" formControlName="countryIssue"
                                        class="form-control" />
                                </c-col>
                            </c-row>

                            <!-- No Kad Pengenalan dan Awalan Dokumen -->
                            <c-row class="g-3 mb-3">
                                <!-- No Pengenalan -->
                                <c-col xs="12" md="6">
                                    <label cLabel for="kpNo" class="mb-2">No. Pengenalan</label>
                                    <input cFormControl id="kpNo" type="text" formControlName="kpNo"
                                        class="form-control" />
                                </c-col>
                                <!-- Awalan Dokumen -->
                                <c-col xs="12" md="6">
                                    <label cLabel for="docInd" class="mb-2">Awalan Dokumen</label>
                                    <input cFormControl id="docInd" type="text" formControlName="docInd"
                                        class="form-control" />
                                </c-col>
                            </c-row>

                            <!-- Tarikh Tamat dan Negara Pengeluar -->
                            <c-row class="g-3 mb-3">
                                <!-- Tarikh Tamat -->
                                <c-col xs="12" md="6">
                                    <label cLabel for="expiryDate" class="mb-2">Tarikh Tamat</label>
                                    <input cFormControl id="expiryDate" type="date" formControlName="expiryDate"
                                        class="form-control" />
                                </c-col>
                            </c-row>

                            <!-- Nama -->
                            <c-row class="g-3 mb-3">
                                <c-col xs="12" md="12">
                                    <label cLabel for="name" class="mb-2">Nama</label>
                                    <input cFormControl id="name" type="text" formControlName="name"
                                        class="form-control" />
                                </c-col>
                            </c-row>

                            <!-- Nama Dicetak -->
                            <c-row class="g-3 mb-3">
                                <c-col xs="12" md="12">
                                    <label cLabel for="printedName" class="mb-2">Nama Dicetak</label>
                                    <input cFormControl id="printedName" type="text" formControlName="printedName"
                                        class="form-control" />
                                </c-col>
                            </c-row>

                            <!-- Tarikh Lahir dan Jantina -->
                            <c-row class="g-3 mb-3">
                                <!-- Tarikh Lahir -->
                                <c-col xs="12" md="6">
                                    <label cLabel for="dob" class="mb-2">Tarikh Lahir</label>
                                    <input cFormControl id="dob" type="date" formControlName="dob"
                                        class="form-control" />
                                </c-col>
                                <!-- Jantina -->
                                <c-col xs="12" md="6">
                                    <label cLabel for="gender" class="mb-2">Jantina</label>
                                    <input cFormControl id="gender" type="text" formControlName="gender"
                                        class="form-control" />
                                </c-col>
                            </c-row>

                            <!-- Jenis Pas dan Tarikh Tamat Pas -->
                            <c-row class="g-3 mb-3">
                                <!-- Jenis Pas -->
                                <c-col xs="12" md="6">
                                    <label cLabel for="pasType" class="mb-2">Jenis Pas</label>
                                    <select cFormSelect id="pasType" formControlName="pasType" class="form-control"
                                        aria-label="Jenis Pas">
                                        <option value="" disabled selected>Pilih Jenis Pas</option>
                                        <option value="1">Pas Sosial</option>
                                        <option value="2">Pas Pelajar</option>
                                        <option value="3">Pas Pekerja</option>
                                    </select>
                                </c-col>
                                <!-- Tarikh Tamat Pas -->
                                <c-col xs="12" md="6">
                                    <label cLabel for="pasExpiryDate" class="mb-2">Tarikh Tamat Pas</label>
                                    <input cFormControl id="pasExpiryDate" type="date" formControlName="pasExpiryDate"
                                        class="form-control" />
                                </c-col>
                            </c-row>

                            <!-- No Vessel/Kenderaan dan Jenis Pergerakan -->
                            <c-row class="g-3 mb-3">
                                <!-- No Vessel/Kenderaan -->
                                <c-col xs="12" md="6">
                                    <label cLabel for="vesselNo" class="mb-2">No Vessel/Kenderaan</label>
                                    <input cFormControl id="vesselNo" type="text" formControlName="vesselNo"
                                        class="form-control" />
                                </c-col>
                                <!-- Jenis Pergerakan -->
                                <c-col xs="12" md="6">
                                    <label cLabel for="movementType" class="mb-2">Jenis Pergerakan</label>
                                    <input cFormControl id="movementType" type="text" formControlName="movementType"
                                        class="form-control" />
                                </c-col>
                            </c-row>

                            <!-- Pintu Masuk -->
                            <c-row class="g-3 mb-3">
                                <c-col xs="12" md="6">
                                    <label cLabel for="entryBranch" class="mb-2">Pintu Masuk</label>
                                    <input cFormControl id="entryBranch" type="text" formControlName="entryBranch"
                                        class="form-control" />
                                </c-col>
                                <c-col>
                                    <!-- Empty right column -->
                                </c-col>
                            </c-row>

                            <!-- Tarikh Masuk dan Masa Masuk -->
                            <c-row class="g-3 mb-3">
                                <!-- Tarikh Masuk -->
                                <c-col xs="12" md="6">
                                    <label cLabel for="entryDate" class="mb-2">Tarikh Masuk</label>
                                    <input cFormControl id="entryDate" type="date" formControlName="entryDate"
                                        class="form-control" />
                                </c-col>
                                <!-- Masa Masuk -->
                                <c-col xs="12" md="6">
                                    <label cLabel for="entryTime" class="mb-2">Masa Masuk</label>
                                    <input cFormControl id="entryTime" type="time" formControlName="entryTime"
                                        class="form-control" />
                                </c-col>
                            </c-row>

                            <!-- </div> -->
                        </c-col>
                    </c-row>

                    <c-row>
                        <!-- Bottom Navigation -->
                        <div class="row mt-4">
                            <div class="col-12">
                                <div class="d-flex justify-content-end gap-2 mb-4">
                                    <!-- Reset Button -->
                                    <button class="btn btn-outline-secondary d-flex align-items-center gap-1"
                                        type="reset" (click)="resetForm()">
                                        <i class="bi bi-arrow-clockwise"></i>
                                        Set Semula
                                    </button>

                                    <!-- Save Button -->
                                    <button class="btn btn-submit d-flex align-items-center gap-1 me-4"
                                        (click)="saveForm()" [disabled]="!canSave">
                                        <i class="bi bi-check-circle"></i>
                                        Simpan
                                    </button>

                                    <!-- Navigation Button -->
                                    <c-button-group aria-label="navigation buttons" role="group">
                                        <button cButton variant="outline" color="secondary" (click)="goToPrevious()"  disabled>
                                            &lt;
                                        </button>
                                        <button cButton variant="outline" color="secondary" (click)="goToNext()">
                                            &gt;
                                        </button>
                                    </c-button-group>
                                </div>
                            </div>
                        </div>
                    </c-row>
                </form>
            </c-row>
        </c-card-body>
    </c-card>

</div>

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
