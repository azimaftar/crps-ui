<!-- Trigger Buttons -->

<button
  (click)="openModalWithMessage('Tiada Surat Kemudahan')"
  [cModalToggle]="verticallyCenteredModal.id"
  cButton
  color="primary"
  class="me-2"
>
  Here IBC W005
</button>

<button
  (click)="openModalWithMessage('Sekatan SLTD')"
  [cModalToggle]="verticallyCenteredModal.id"
  cButton
  color="primary"
  class="me-2"
>
  Here IBC W006
</button>

<button
  (click)="openModalWithMessage('RAE Julat Skor Risiko Sederhana/Tinggi')"
  [cModalToggle]="verticallyCenteredModal.id"
  cButton
  color="primary"
  class="me-2"
>
  Here IBC S056
</button>

<button
  (click)="openModalWithMessage('Sila ke Kaunter Manual')"
  [cModalToggle]="verticallyCenteredModal.id"
  cButton
  color="primary"
>
  Here IBC N006
</button>

<!-- Modal -->
<c-modal #verticallyCenteredModal alignment="center" id="verticallyCenteredModal">
  <c-modal-header>
    <h5 cModalTitle>Makluman</h5>
    <button [cModalToggle]="verticallyCenteredModal.id" cButtonClose></button>
  </c-modal-header>
  <c-modal-body>
    <div class="text-center fs-5 d-flex flex-column align-items-center">
      <div class="display-4 mb-2">⚠️</div>
      <div>{{ popupMessage }}</div>
    </div>

  </c-modal-body>
  <c-modal-footer>
    <button [cModalToggle]="verticallyCenteredModal.id" cButton color="secondary">
      OK
    </button>
    <!-- <button cButton color="primary">Understood</button> -->
  </c-modal-footer>
</c-modal>
