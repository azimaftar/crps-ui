<!-- Header -->
<div class="border bg-dark text-white px-3 py-2">
    <h6 class="mb-0">New Message</h6>
</div>

<!-- Form Section -->
<form class="border border-top-0 bg-light">
    <fieldset class="p-3">
        <!-- To Field -->
        <div class="row mb-3 align-items-center">
            <label for="to" class="col-sm-1 col-form-label text-end">To:</label>
            <div class="col-sm-8">
                <input type="text" id="to" class="form-control" />
            </div>
            <div class="col-sm-3">
                <button type="button" class="btn btn-outline-secondary">Cc Bcc</button>
            </div>
        </div>

        <!-- Subject Field -->
        <div class="row mb-3 align-items-center">
            <label for="subject" class="col-sm-1 col-form-label text-end">Subject:</label>
            <div class="col-sm-11">
                <input type="text" id="subject" class="form-control" />
            </div>
        </div>
    </fieldset>
</form>

<!-- Message Body -->
<div class="border border-top-0 p-4 bg-white">
    <p>Assalamualaikum / Salam Sejahtera</p>
</div>
