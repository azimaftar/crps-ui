<form class="border mb-4 p-3">
    <c-row>
        <!-- Left Column: Widgets -->
        <c-col xs="12" md="2" class="mb-4">
            <c-widget-stat-a class="mb-3" color="primary" [title]="'Widget 1'" style="height: 120px;"></c-widget-stat-a>
            <c-widget-stat-a class="mb-3" color="primary" [title]="'Widget 2'"
                style="height: 120px; margin-top: 5rem;"></c-widget-stat-a>
            <c-widget-stat-a class="mb-3" color="primary" [title]="'Widget 3'"
                style="height: 120px; margin-top: 5rem;"></c-widget-stat-a>
            <c-widget-stat-a class="mb-3" color="primary" [title]="'Widget 4'"
                style="height: 120px; margin-top: 5rem;"></c-widget-stat-a>
        </c-col>

        <!-- Center Column: Tabs -->
        <c-col xs="12" md="4" class="mb-4">
            <c-card>
                <c-card-body>
                    <c-tabs [activeItemKey]="'white'" (activeItemKeyChange)="handleChange($event)">
                        <c-tabs-list variant="tabs" class="mb-3">
                            <button cTab itemKey="white">WHITE</button>
                            <button cTab itemKey="ir">IR</button>
                            <button cTab itemKey="uv">UV</button>
                        </c-tabs-list>
                        <c-tabs-content>
                            <c-tab-panel class="p-3" itemKey="white">
                                <div class="border rounded p-4 text-center">Passport Image WHITE</div>
                            </c-tab-panel>
                            <c-tab-panel class="p-3" itemKey="ir">
                                <div class="border rounded p-4 text-center">Passport Image IR</div>
                            </c-tab-panel>
                            <c-tab-panel class="p-3" itemKey="uv">
                                <div class="border rounded p-4 text-center">Passport Image UV</div>
                            </c-tab-panel>
                        </c-tabs-content>
                    </c-tabs>
                </c-card-body>
            </c-card>
        </c-col>


        <!-- Right Column: Form and Images -->
        <c-col xs="12" md="6">
            <!-- Image Flex -->
            <div class="d-flex flex-column flex-md-row gap-4 mb-4">
                <div class="border rounded p-3 text-center flex-fill">
                    <div class="border rounded p-4" style="height: 150px;">Passport Image</div>
                </div>
                <div class="border rounded p-3 text-center flex-fill">
                    <div class="border rounded p-4" style="height: 150px;">Passport Image</div>
                </div>
            </div>

            <!-- Input Fields -->
            <div class="row g-3">
                <div class="col-md-4">
                    <label for="jenisDokumen" class="form-label">Jenis Dokumen</label>
                    <input type="text" id="jenisDokumen" class="form-control" disabled>
                </div>
                <div class="col-md-4">
                    <label for="jantina" class="form-label">Jantina</label>
                    <input type="text" id="jantina" class="form-control" disabled>
                </div>
                <div class="col-md-4">
                    <label for="umur" class="form-label">Umur</label>
                    <input type="text" id="umur" class="form-control" disabled>
                </div>

                <div class="col-md-4">
                    <label for="noDokumen" class="form-label">No Dokumen</label>
                    <input type="text" id="noDokumen" class="form-control" disabled>
                </div>
                <div class="col-md-4">
                    <label for="noPengenalan" class="form-label">No Pengenalan</label>
                    <input type="text" id="noPengenalan" class="form-control" disabled>
                </div>
                <div class="col-md-4">
                    <label for="tarikhTamat" class="form-label">Tarikh Tamat</label>
                    <input type="text" id="tarikhTamat" class="form-control" disabled>
                </div>

                <div class="col-md-8">
                    <label for="nama" class="form-label">Nama</label>
                    <input type="text" id="nama" class="form-control" disabled>
                </div>
                <div class="col-md-4">
                    <label for="warganegara" class="form-label">Warganegara</label>
                    <input type="text" id="warganegara" class="form-control" disabled>
                </div>

                <div class="col-md-4">
                    <label for="tarikhDikeluarkan" class="form-label">Tarikh Dikeluarkan</label>
                    <input type="text" id="tarikhDikeluarkan" class="form-control" disabled>
                </div>
                <div class="col-md-4 d-none d-md-block"></div>
                <div class="col-md-4">
                    <label for="negaraPengeluar" class="form-label">Negara Pengeluar</label>
                    <input type="text" id="negaraPengeluar" class="form-control" disabled>
                </div>
            </div>

            <!-- Widget Below Form -->
            <c-widget-stat-a class="mt-4" color="primary" [title]="'Widget 5'" style="height: 150px;"></c-widget-stat-a>
        </c-col>
    </c-row>

    <!-- Divider and Button Row -->
    <hr class="my-4" />
    <div class="d-flex justify-content-end gap-3">
        <button *ngIf="docType.toLowerCase() === 'passport'" class="btn btn-outline-danger"
            (click)="openSharedModal()">DISYAKI PALSU</button>
        <button class="btn btn-outline-secondary" [cModalToggle]="verticallyCenteredModal.id"
            (click)="onTutupClick()">TUTUP</button>
    </div>

    <!-- Modal -->
    <c-modal #verticallyCenteredModal alignment="center" id="verticallyCenteredModal">
        <div class="text-center p-4">
            <div class="border mb-4" style="height: 90px;"></div>
            <h5 *ngIf="modalTitle">{{ modalTitle }}</h5>
            <button *ngIf="docType.toLowerCase() === 'passport'" cButton color="primary" class="mt-4 px-5"
                (click)="openSharedModal()">OK</button>
            <button *ngIf="docType === 'kadABTC'" cButton color="primary" class="mt-4 px-5"
                (click)="openProfilPengembara()">OK</button>
        </div>
    </c-modal>
</form>

<!-- Modal Component -->
<app-rujuk-penyelia [onTindakanPenyeliaForm]="tindakanPenyeliaForm"></app-rujuk-penyelia>
