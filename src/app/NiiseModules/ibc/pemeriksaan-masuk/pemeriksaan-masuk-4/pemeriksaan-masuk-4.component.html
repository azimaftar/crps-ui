<div class="text-center mb-4">
    <img src="assets/logo/niise_logo.png" alt="Logo">
</div>

<form cForm class="border p-3 rounded mb-4">
    <fieldset>
        <div class="text-center mb-4">
            <img src="assets/logo/niise_logo.png" alt="Logo">
        </div>

        <h6>Maklumat Dokumen</h6>

        <!-- Row 1 -->
        <c-row class="g-3 my-3">
            <c-col xs="12" md="4">
                <label for="jenisDokumen" class="form-label">Jenis Dokumen</label>
                <input id="jenisDokumen" class="form-control" disabled>
            </c-col>
            <c-col xs="12" md="4">
                <label for="jantina" class="form-label">Jantina</label>
                <input id="jantina" class="form-control" disabled>
            </c-col>
            <c-col xs="12" md="1" class="d-none d-md-block">
                <!-- spacer only on md+ -->
            </c-col>
            <c-col xs="12" md="3">
                <label for="umur" class="form-label">Umur</label>
                <input id="umur" class="form-control" disabled>
            </c-col>
        </c-row>

        <!-- Row 2 -->
        <c-row class="g-3 my-3">
            <c-col xs="12" md="4">
                <label for="noDokumen" class="form-label">No Dokumen</label>
                <input id="noDokumen" class="form-control" disabled>
            </c-col>
            <c-col xs="12" md="4">
                <label for="noPengenalan" class="form-label">No Pengenalan</label>
                <input id="noPengenalan" class="form-control" disabled>
            </c-col>
            <c-col xs="12" md="1" class="d-none d-md-block">
                <!-- spacer only on md+ -->
            </c-col>
            <c-col xs="12" md="3">
                <label for="tarikhTamat" class="form-label">Tarikh Tamat</label>
                <input id="tarikhTamat" class="form-control" disabled>
            </c-col>
        </c-row>

        <!-- Row 3: Nama full-width on mobile, 2/3 on md+ -->
        <c-row class="g-3 my-3">
            <c-col xs="12" md="8">
                <label for="nama" class="form-label">Nama</label>
                <input id="nama" class="form-control" disabled>
            </c-col>
            <c-col xs="12" md="4" class="d-none d-md-block">
                <!-- spacer only on md+ -->
            </c-col>
        </c-row>

        <!-- Row 4 -->
        <c-row class="g-3 my-3">
            <c-col xs="12" md="4">
                <label for="tarikhDikeluarkan" class="form-label">Tarikh Dikeluarkan</label>
                <input id="tarikhDikeluarkan" class="form-control" disabled>
            </c-col>
            <c-col xs="12" md="4">
                <label for="negaraPengeluar" class="form-label">Negara Pengeluar</label>
                <input id="negaraPengeluar" class="form-control" disabled>
            </c-col>
            <c-col xs="12" md="4" class="d-none d-md-block">
                <!-- spacer only on md+ -->
            </c-col>
        </c-row>

        <!-- Button -->
        <div class="text-end mt-4">
            <button type="button" cButton color="secondary" (click)="openProfilPengembara()">TUTUP</button>
        </div>
    </fieldset>
</form>
