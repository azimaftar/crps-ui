<c-row>
  <!-- Left Column: Widgets 1, 3 and 2, 4 stacked in two rows -->
  <c-col xl="7">
    <c-row>
      <!-- Widget 1 -->
      <c-col md="6">
        <c-widget-stat-a
          class="mb-4"
          color="primary"
          [title]="'Widget 1'"
          style="height: 240px;"
        >
          <ng-template cTemplateId="widgetActionTemplate">
            <c-dropdown alignment="end" variant="btn-group">
              <button [caret]="false" cButton cDropdownToggle class="p-0" color="transparent">
                <svg [cIcon]="icons.cilOptions" class="text-high-emphasis-inverse"></svg>
              </button>
              <div cDropdownMenu>
                <a [routerLink]="[]" cDropdownItem>Action One</a>
                <a [routerLink]="[]" cDropdownItem>Action Two</a>
                <a [routerLink]="[]" cDropdownItem>Action Three</a>
              </div>
            </c-dropdown>
          </ng-template>
        </c-widget-stat-a>
      </c-col>

      <!-- Widget 2 -->
      <c-col md="6">
        <c-widget-stat-a
          class="mb-4"
          color="primary"
          [title]="'Widget 2'"
          style="height: 240px;"
        >
          <ng-template cTemplateId="widgetActionTemplate">
            <c-dropdown alignment="end" variant="btn-group">
              <button [caret]="false" cButton cDropdownToggle class="p-0" color="transparent">
                <svg [cIcon]="icons.cilOptions" class="text-high-emphasis-inverse"></svg>
              </button>
              <div cDropdownMenu>
                <a [routerLink]="[]" cDropdownItem>Action One</a>
                <a [routerLink]="[]" cDropdownItem>Action Two</a>
                <a [routerLink]="[]" cDropdownItem>Action Three</a>
              </div>
            </c-dropdown>
          </ng-template>
        </c-widget-stat-a>
      </c-col>
    </c-row>

    <c-row>
      <!-- Widget 3 -->
      <c-col md="6">
        <c-widget-stat-a
          class="mb-4"
          color="primary"
          [title]="'Widget 3'"
          style="height: 240px;"
        >
          <ng-template cTemplateId="widgetActionTemplate">
            <c-dropdown alignment="end" variant="btn-group">
              <button [caret]="false" cButton cDropdownToggle class="p-0" color="transparent">
                <svg [cIcon]="icons.cilOptions" class="text-high-emphasis-inverse"></svg>
              </button>
              <div cDropdownMenu>
                <a [routerLink]="[]" cDropdownItem>Action One</a>
                <a [routerLink]="[]" cDropdownItem>Action Two</a>
                <a [routerLink]="[]" cDropdownItem>Action Three</a>
              </div>
            </c-dropdown>
          </ng-template>
        </c-widget-stat-a>
      </c-col>

      <!-- Widget 4 -->
      <c-col md="6">
        <c-widget-stat-a
          class="mb-4"
          color="primary"
          [title]="'Widget 4'"
          style="height: 240px;"
        >
          <ng-template cTemplateId="widgetActionTemplate">
            <c-dropdown alignment="end" variant="btn-group">
              <button [caret]="false" cButton cDropdownToggle class="p-0" color="transparent">
                <svg [cIcon]="icons.cilOptions" class="text-high-emphasis-inverse"></svg>
              </button>
              <div cDropdownMenu>
                <a [routerLink]="[]" cDropdownItem>Action One</a>
                <a [routerLink]="[]" cDropdownItem>Action Two</a>
                <a [routerLink]="[]" cDropdownItem>Action Three</a>
              </div>
            </c-dropdown>
          </ng-template>
        </c-widget-stat-a>
      </c-col>
    </c-row>
  </c-col>

  <!-- Right Column: Tall Widget -->
  <c-col xl="5">
    <c-widget-stat-a
      class="mb-4"
      color="info"
      [title]="'Big Widget'"
      style="height: 500px;"  
    >

          <button [caret]="false" cButton cDropdownToggle class="p-0" color="transparent">

          <div cDropdownMenu>
            <a [routerLink]="[]" cDropdownItem>Action One</a>
            <a [routerLink]="[]" cDropdownItem>Action Two</a>
            <a [routerLink]="[]" cDropdownItem>Action Three</a>
          </div>
        </c-dropdown>
      </ng-template>
    </c-widget-stat-a>
  </c-col>
</c-row>
