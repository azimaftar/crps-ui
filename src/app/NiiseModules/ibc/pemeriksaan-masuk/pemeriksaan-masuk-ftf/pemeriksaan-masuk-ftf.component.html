<div class="header-stepper">
    <!-- PAGE TITLE -->
    <c-row>
        <h6>B020021 - PEMERIKSAAN MASUK (KAUNTER MANUAL)</h6>
    </c-row>

    <!-- STEPPER -->
    <c-row>
        <reusable-tab [currentStep]="currentStep" [steps]="steps"></reusable-tab>
    </c-row>
</div>
<div class="custom-content-wrapper">
    <c-card>
        <c-card-body>
            <!-- FORM -->
            <c-row>
                <form [formGroup]="maklumatPengembaraForm">
                    <c-row>
                        <!-- LEFT -->
                        <c-col xs="12" md="3" class="d-flex flex-column align-items-center">
                            <div class="header-box">
                                <div class="color-box"></div>
                                <label class="header-label">Maklumat Ketulenan Pasport</label>
                            </div>
                            <div class="photo-row">
                                <!-- LEFT SIDE -->
                                <div class="photo-actions">
                                    <img src="assets/images/avatars/9.jpg" alt="Profile Image" class="profile-img" />
                                    <label style="margin-bottom: 10px;">Live Capture</label>
                                </div>

                                <!-- RIGHT SIDE -->
                                <div class="photo-only">
                                    <img [src]="getImageFromBase64(formData.DPImg)" alt="Profile Image"
                                        class="profile-img mb-2" />
                                    <label>Gambar Pasport</label>
                                </div>
                            </div>

                            <!-- ✅ Move buttons OUTSIDE the row so they can sit below both -->
                            <div class="button-input-container">
                                <div class="button-group">
                                    <button cButton type="button" class="action-button mb-2 mt-3"
                                        (click)="captureFaceAndIris()" [disabled]="isMaklumatLengkap">
                                        <i class="bi bi-check-circle" [class.d-none]="!isMaklumatLengkap"></i>
                                        Ambil Wajah & Iris
                                    </button>

                                    <button cButton type="button" class="action-button" (click)="captureFingerprint()"
                                        [disabled]="isMaklumatLengkap">
                                        <i class="bi bi-check-circle" [class.d-none]="!isMaklumatLengkap"></i>
                                        Ambil Cap Jari
                                    </button>
                                </div>

                                <!-- Input group directly under the buttons -->
                                <div class="input-group">
                                    <label style="margin:10px 0 5px 0;">Pengecualian Biometrik</label>
                                    <input cFormControl type="text" class="form-control" />
                                </div>
                            </div>

                        </c-col>

                        <!-- RIGHT -->
                        <c-col xs="12" md="9">
                            <c-row class="g-3 mb-3 media-form">
                                <c-col md="4">
                                    <label cLabel for="travelType" class="">Jenis Perjalanan</label>
                                    <input cFormControl id="travelType" type="text" formControlName="travelType"
                                        class="form-control" />
                                </c-col>
                                <c-col md="4">
                                    <label cLabel for="visitorType" class="">Jenis Pelawat</label>
                                    <input cFormControl id="visitorType" type="text" formControlName="visitorType"
                                        class="form-control" />
                                </c-col>
                                <c-col md="4">
                                    <label cLabel for="docType" class="">Jenis Dokumen</label>
                                    <input cFormControl id="docType" type="text" formControlName="docType"
                                        class="form-control" />
                                </c-col>
                            </c-row>

                            <c-row class="g-3 mb-3">
                                <c-col md="4">
                                    <label cLabel for="docNo" class="">No. Dokumen</label>
                                    <input cFormControl id="docNo" type="text" formControlName="docNo"
                                        class="form-control" />
                                </c-col>
                                <c-col md="4">
                                    <label cLabel for="DateExpiry" class="">Tarikh Tamat Sahlaku</label>
                                    <input cFormControl id="DateExpiry" type="text" formControlName="DateExpiry"
                                        class="form-control" />
                                </c-col>
                                <c-col md="4">
                                    <label cLabel for="DateIssue" class="">Tarikh Dikeluarkan</label>
                                    <input cFormControl id="DateIssue" type="text" formControlName="DateIssue"
                                        class="form-control" />
                                </c-col>
                            </c-row>

                            <c-row class="g-3 mb-3">
                                <c-col xs="12" md="6">
                                    <label cLabel for="producingCountry" class="">Negara Pengeluar</label>
                                    <input cFormControl id="producingCountry" type="text" formControlName="producingCountry"
                                        class="form-control" />
                                </c-col>
                            </c-row>

                            <c-row class="g-3 mb-3">
                                <label for="header-traveller"><b>Maklumat Pengguna Kerap (FTF)</b></label>
                            </c-row>

                            <c-row class="g-3 mb-3">
                                <c-col xs="12" md="5">
                                    <label cLabel for="idNo" >No. Rujukan FTF</label>
                                    <input cFormControl id="idNo" type="text" formControlName="expiryDate"
                                        class="form-control" />
                                </c-col>
                                <c-col xs="12" md="5">
                                    <label cLabel for="dob" >No. Rujukan QR VDS</label>
                                    <input cFormControl id="dob" type="text" formControlName="expiryDate"
                                        class="form-control" />
                                </c-col>
                            </c-row>

                            <c-row class="g-3 mb-3">
                                <c-col xs="12" md="5">
                                    <label cLabel for="idNo" >Jenis FTF</label>
                                    <input cFormControl id="idNo" type="text" formControlName="expiryDate"
                                        class="form-control" />
                                </c-col>
                            </c-row>

                            <c-row class="g-3 mb-3">
                                <c-col xs="12" md="5">
                                    <label cLabel for="idNo" >Tarikh Dikeluarkan</label>
                                    <input cFormControl id="idNo" type="date" formControlName="expiryDate"
                                        class="form-control" />
                                </c-col>
                                <c-col xs="12" md="5">
                                    <label cLabel for="dob" >Tarikh Tamat Pas</label>
                                    <input cFormControl id="dob" type="date" formControlName="expiryDate"
                                        class="form-control" />
                                </c-col>
                            </c-row>

                            <c-row class="g-3 mb-3">
                                <c-col xs="12" md="10">
                                    <label cLabel for="printedName" >Nama</label>
                                    <input cFormControl id="printedName" type="text" formControlName="kpNo"
                                        class="form-control" />
                                </c-col>
                            </c-row>


                            <c-row class="g-3 mb-3">
                                <c-col xs="12" md="5">
                                    <label cLabel for="nationality" >Tarikh Lahir</label>
                                    <input cFormControl id="nationality" type="date" formControlName="printedName"
                                        class="form-control" />
                                </c-col>
                                <c-col xs="12" md="5">
                                    <label cLabel for="sex" >Jantina</label>
                                    <input cFormControl id="sex" type="text" formControlName="name"
                                        class="form-control" />
                                </c-col>
                            </c-row>

                            <c-row class="g-3 mb-3">
                                <c-col xs="12" md="5">
                                    <label cLabel for="nationality" >Warganegara</label>
                                    <input cFormControl id="nationality" type="text" formControlName="printedName"
                                        class="form-control" />
                                </c-col>
                                <c-col xs="12" md="5">
                                    <label cLabel for="sex" >No. Dokumen</label>
                                    <input cFormControl id="sex" type="text" formControlName="name"
                                        class="form-control" />
                                </c-col>
                            </c-row>


                            <!-- </div> -->
                        </c-col>
                    </c-row>
                    <div class="page-footer">
                        <div class="footer-actions d-flex justify-content-end gap-2 p-3">

                            <button class="btn btn-pertanyaan" type="button" cButton color="dark">
                                Pertanyaan
                            </button>

                            <button class="btn btn-submit d-flex align-items-center gap-1" (click)="simpanMaklumat()"
                                [cModalToggle]="verticallyCenteredModal.id">
                                <i class="bi bi-check-circle"></i> Simpan
                            </button>

                            <button class="btn btn-outline-secondary d-flex align-items-center gap-1" type="reset">
                                <i class="bi bi-arrow-clockwise"></i> Set Semula
                            </button>

                            <button class="btn btn-all" style="margin-left: 40px;" (click)="goToPrevious()">&lt;</button>
                            <button class="btn btn-all" (click)="goToNext()">&gt;</button>
                        </div>
                    </div>
                </form>
            </c-row>
        </c-card-body>
    </c-card>
</div>
<c-modal #verticallyCenteredModal alignment="center" id="verticallyCenteredModal">
    <div class="text-center p-4">
        <div class="border mb-4" style="height: 90px;"></div>
        <h5>Rekod Berjaya Disimpan</h5>
        <button cButton color="primary" class="mt-4 px-5" (click)="emailStatus()">OK</button>
    </div>
</c-modal>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
