<c-container fluid class="p-4">
  <c-card class="mx-auto border shadow" style="max-width: 1000px; border-radius: 8px;">

    <!-- Header -->
    <c-card-header class="text-center border-bottom-2"
      style="background-color: var(--cui-card-cap-bg, #f8f9fa); padding: 1.25rem;">
      <h5 class="mb-0 bold text-body" style="font-size: 1rem; letter-spacing: 0.5px; line-height: 1.2;">
        eGate Monitoring System
      </h5>
    </c-card-header>

    <!-- Body -->
    <c-card-body class="p-4">

      <!-- Search Row -->
      <c-row class="align-items-center mb-4">
        <c-col md="3" class="mb-2 mb-md-0">
          <label for="gateSelect" class="form-label">Carian eGate:</label>
        </c-col>
        <c-col md="4" class="mb-2 mb-md-0">
          <select id="gateSelect" [(ngModel)]="selectedGate" class="form-select form-select-sm">
            <option value="">Pilihan</option>
            <option *ngFor="let gate of gates" [value]="gate">{{ gate }}</option>
          </select>
        </c-col>
        <c-col md="2">
          <button class="btn btn-dark btn-sm w-100" (click)="search()">CARI</button>
        </c-col>
      </c-row>

      <!-- Table Header -->
      <h6 class="bold text-center mb-3">Senarai Operasi eGate</h6>

      <!-- Table -->
      <div class="table-responsive" style="border-radius: 8px;">
        <table cTable hover class="table table-bordered text-center table-sm align-middle">
          <thead cTableColor="light">
            <tr>
              <th scope="col">Bil.</th>
              <th scope="col">eGate No</th>
              <th scope="col">Tarikh</th>
              <th scope="col">Masa</th>
              <th scope="col">Status</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let gate of paginatedData; let i = index" class="hover:bg-light">
              <td>{{ (currentPage - 1) * pageSize + i + 1 }}</td>

              <td>
                <a href="#" class="text-primary text-decoration-underline"
                  (click)="viewGateDetails(gate); $event.preventDefault()">
                  {{ gate.gateNo }}
                </a>
              </td>
              <td>{{ gate.date }}</td>
              <td>{{ gate.time }}</td>
              <td>{{ gate.status }}</td>
            </tr>

          </tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div class="d-flex justify-content-center mt-4 gap-2">
        <button class="btn btn-outline-secondary btn-sm" (click)="prevPage()">◀</button>
        <button class="btn btn-dark btn-sm" (click)="nextPage()">▶</button>
      </div>

      <div class="text-center mt-2 small text-muted">
        Halaman {{ currentPage }} daripada {{ totalPages }}
      </div>

    </c-card-body>
  </c-card>
</c-container>

<!-- Modal -->
<c-modal [(visible)]="showModal" backdrop="static" keyboard="false" alignment="center">
  <c-modal-header>
    <h5 cModalTitle>Kawalan eGATE</h5>
  </c-modal-header>
  <c-modal-body>
    <div class="text-center mb-3">
      <!-- Replace with real logo -->
      <img src="assets/logo.png" alt="LOGO" style="max-height: 100px;" />
    </div>

    <div class="mb-3">
      <label for="egateNo" class="form-label">No. eGATE</label>
      <input type="text" class="form-control" id="egateNo" name="egateNo" [value]="selectedGateData?.gateNo" readonly>
    </div>

    <div class="mb-3">
      <label for="status" class="form-label">Status</label>
      <input type="text" class="form-control" id="status" name="status" [value]="selectedGateData?.status" readonly>
    </div>
  </c-modal-body>
  <c-modal-footer class="justify-content-end">
    <button class="btn btn-dark" (click)="gateStatus(selectedGateData?.gateNo, '1')">BUKA</button>
    <button class="btn btn-dark" (click)="gateStatus(selectedGateData?.gateNo, '2')">TUTUP</button>
  </c-modal-footer>
</c-modal>

<!-- 2nd modal -->
<c-modal [(visible)]="showSuccessModal" alignment="center">
  <c-modal-header>
    <h5 cModalTitle>Makluman</h5>
    <button cButtonClose (click)="handleSuccessModalClose()"></button>
  </c-modal-header>
  <c-modal-body>Pengemaskinian Berjaya Dilakukan</c-modal-body>
  <c-modal-footer>
    <button cButton color="secondary" (click)="handleSuccessModalClose()">OK</button>
  </c-modal-footer>
</c-modal>
