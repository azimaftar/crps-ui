<form
  cForm
  style="
    border: 2px solid #000000;
    padding: 16px;
    border-radius: 6px;
    margin-bottom: 20px;
  "
>
  <fieldset>
    <div
      style="
        display: flex;
        flex-wrap: wrap;
        gap: 1rem;
        margin: 2rem 2rem 1rem 2rem;
      "
    >
      <div style="flex: 1 1 30%">
        <label cLabel for="jenisDokumen">Jenis Dokumen</label><br />
        <input
          type="text"
          id="jenisDokumen"
          name="jenisDokumen"
          class="form-control"
          value="Kod QR"
          readonly
        />
      </div>
      <div style="flex: 1 1 30%">
        <label cLabel for="jantina">Jantina</label><br />
        <select id="jantina" name="jantina" class="form-control">
          <option value="M">M - Male</option>
          <option value="F">F - Female</option>
        </select>
      </div>
      <div style="flex: 1 1 30%">
        <label cLabel for="umur">Umur</label><br />
        <input
          type="text"
          id="umur"
          name="umur"
          class="form-control"
          [(ngModel)]="umur"
          (ngModelChange)="onUmurChange($event)"
        />
      </div>
      <p *ngIf="umurError" class="text-danger mb-1">{{ umurError }}</p>
    </div>

    <!-- Row 2 -->
    <div
      style="
        display: flex;
        flex-wrap: wrap;
        gap: 1rem;
        margin: 0 2rem 1rem 2rem;
      "
    >
      <div style="flex: 1 1 30%">
        <label cLabel for="noDokumen">No Dokumen</label><br />
        <input type="text" id="noDokumen" name="noDokumen" class="form-control" />
      </div>
      <div style="flex: 1 1 30%">
        <label cLabel for="noPengenalan">No Pengenalan</label>
        <input
          type="text"
          id="noPengenalan"
          name="noPengenalan"
          class="form-control"
          [(ngModel)]="noPengenalan"
          (ngModelChange)="onNoPengenalanChange($event)"
        />
        <p *ngIf="noPengenalanError" class="text-danger mb-1">
          {{ noPengenalanError }}
        </p>
      </div>
      <div style="flex: 1 1 30%">
        <label cLabel for="warganegara">Warganegara</label><br />
        <input type="text" id="warganegara" name="warganegara" class="form-control" />
      </div>
    </div>

    <!-- Row 3: 2/3 + 1/3 split -->
    <div
      style="
        display: flex;
        flex-wrap: wrap;
        gap: 1rem;
        margin: 0 2rem 1rem 2rem;
      "
    >
      <div style="flex: 2 1 60%">
        <label cLabel for="nama">Nama</label><br />
        <input type="text" id="nama" name="nama" class="form-control" value="Mohd Russaini Bin Idrus"/>
      </div>

      <!-- Invisible placeholder for Field 5 spacing -->
      <div style="flex: 1 1 30%; visibility: hidden">
        <label cLabel>&nbsp;</label><br />
        <input type="text" style="width: 100%" />
      </div>
    </div>

    <!-- Row 4: skip middle field (field 5) -->
    <div
      style="
        display: flex;
        flex-wrap: wrap;
        gap: 1rem;
        margin: 0 2rem 1rem 2rem;
      "
    >
      <div style="flex: 1 1 30%">
        <label cLabel for="tarikhDikeluarkan">Tarikh Dikeluarkan</label><br />
        <input
          type="date"
          id="tarikhDikeluarkan"
          style="width: 100%"
          name="tarikhDikeluarkan"
          class="form-control"
        />
      </div>

      <div style="flex: 1 1 30%">
        <label cLabel for="tarikhTamatPerjalanan">Tarikh Tamat Dokumen Perjalanan</label><br />
        <input
          type="date"
          id="tarikhTamatPerjalanan"
          class="form-control"
          name="tarikhTamatPerjalanan"
        />
      </div>

      <!-- Invisible placeholder for Field 5 spacing -->
      <div style="flex: 1 1 30%; visibility: hidden">
        <label cLabel>&nbsp;</label><br />
        <input type="text" style="width: 100%" />
      </div>
    </div>

    <!-- Footer Buttons -->
    <div class="card-footer button-row single-button">
      <button class="semak-btn" (click)="gotoNextPage()">
        <span class="icon-circle">✓</span>
        <span>Semak</span>
      </button>
    </div>
  </fieldset>
</form>
