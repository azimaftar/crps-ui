<div class="container-fluid px-4"> <!-- wider padding -->
  <div class="card border-0 shadow-sm">
    <div class="p-4">
      <h3 class="mb-4"><b>PROFIL</b></h3>

      <!-- Step Navigation -->
      <reusable-tab [currentStep]="currentStep" [steps]="steps"></reusable-tab>
      <div class="mb-4">
        <p class="mb-0">{{ currentStep }}. {{ steps[currentStep - 1] }}</p>
        <small class="text-muted">Langkah {{ currentStep }} daripada {{ steps.length }}</small>
      </div>

      <!-- Dokumen Section -->
      <div class="mb-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h6 class="text-uppercase fw-bold text-dark" style="font-size: 14px;">Senarai Dokumen</h6>
          <button class="btn d-flex align-items-center gap-1"
                  style="background-color: rgb(217, 233, 255); color: rgb(20, 97, 186); border-radius: 8px;"
                  (click)="fileInput.click()">
            <i class="bi bi-plus-circle"></i> Muat Naik
          </button>
        </div>

        <input type="file" #fileInput (change)="onFileSelected($event)" multiple hidden />

        <!-- Table -->
        <div class="overflow-hidden">
          <!-- Header -->
          <div class="d-flex border-bottom py-2 px-3 fw-semibold text-muted" style="font-size: 13px;">
            <div style="width: 50px;">Bil.</div>
            <div class="flex-grow-1 ps-2">Keterangan</div>
            <div class="flex-grow-1 ps-4">Nama Dokumen</div>
            <div style="width: 80px;" class="ps-2">Format</div>
            <div style="width: 120px;" class="ps-2">Tindakan</div>
          </div>

          <!-- Rows -->
          <div *ngFor="let dokumen of dokumenList; let i = index"
               class="d-flex align-items-center py-2 px-3 border-bottom" style="font-size: 14px;">
            <div style="width: 50px;">{{ dokumen.bil }}</div>
            <div class="flex-grow-1 ps-2">
              <input class="form-control form-control-sm" type="text" [(ngModel)]="dokumen.keterangan" />
            </div>
            <div class="flex-grow-1 ps-2">
              <input class="form-control form-control-sm" type="text" [(ngModel)]="dokumen.namaDokumen" />
            </div>
            <div class="ps-2" style="width: 80px;">{{ dokumen.format }}</div>
            <div class="ps-2 d-flex gap-2" style="width: 120px;">
              <button class="btn btn-outline-primary btn-sm px-2 py-1" style="border-radius: 10px;">
                <i class="bi bi-arrow-repeat"></i>
              </button>
              <button class="btn btn-outline-danger btn-sm px-2 py-1" (click)="deleteDokumen(i)" style="border-radius: 10px;">
                <i class="bi bi-trash"></i>
              </button>
            </div>
          </div>
        </div>

        <!-- File Size Note -->
        <div class="text-danger mt-2" style="font-size: 13px;">
          Saiz fail maksima: 10MB
        </div>
      </div>

      <!-- Navigation Buttons -->
      <div class="d-flex justify-content-end gap-2 mt-4">
        <!-- Reset -->
        <button class="btn btn-outline-secondary d-flex align-items-center gap-1"
                type="reset" (click)="resetForm()">
          <i class="bi bi-arrow-clockwise"></i> Set Semula
        </button>

        <!-- Save -->
        <button class="btn btn-submit d-flex align-items-center gap-1"
                [disabled]="!isFormValid"
                (click)="saveForm()">
          <i class="bi bi-check-circle"></i> Simpan
        </button>

        <!-- Previous -->
        <button class="btn btn-all" (click)="goToPrevious()">
          &lt;
        </button>

        <!-- Next (disabled) -->
        <button class="btn btn-all" disabled>
          &gt;
        </button>
      </div>
    </div>
  </div>
</div>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
