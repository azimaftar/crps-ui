<div class="container-fluid">
    <div class="card">
        <div class="ms-4 me-4">
            <div class="mt-2 mb-2">
                <h3 class="mb-2 mt-4"><b>PROFIL</b></h3>
            </div>
            <div class="mt-4">
                <!-- Left Side: Step Info -->
                <reusable-tab [currentStep]="currentStep" [steps]="steps"></reusable-tab>
                <div class="col-md-6 mb-4">
                  <p class="mb-0">{{ currentStep }}. {{ steps[currentStep - 1] }}</p>
                  <small class="text-muted">Langkah {{ currentStep }} daripada {{ steps.length }}</small>
                </div>

                <!-- Main Content Area -->
                <div class="row flex-column flex-lg-row">
                    <div class="col-md-2 mb-3 mb-md-0">
                        <div class="d-flex flex-column align-items-center">
                            <img src="assets/images/avatars/9.jpg" alt="Profile Image" class="img-fluid rounded-2"
     style="width: 150px; height: 150px; object-fit: cover;">
                        </div>
                    </div>
                    <div class="col-10">
                        <!-- Profile Image Section -->
                        <!-- <h6 class="mb-3">Maklumat Syarikat Perkapalan</h6> -->
                        <!-- Form Fields -->
                        <!-- Nama Syarikat & No SSM in same row -->
                            <div class="row ps-3">
                            <div class="col-md-6">
                                <div class="mb-3">
                                <label class="form-label">Nama Syarikat</label>
                                <input type="text" class="form-control" [(ngModel)]="formData.companyName" name="companyName">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                <label class="form-label">No Pendaftaran Syarikat (No SSM)</label>
                                <input type="text" class="form-control" [(ngModel)]="formData.companyNo" name="companyNo">
                                </div>
                            </div>
                            </div>

                            <!-- Alamat Syarikat (Full Width) -->
                            <div class="row ps-3">
                            <div class="col-12">
                                <div class="mb-3">
                                <label class="form-label">Alamat Syarikat</label>
                                <input type="text" class="form-control" [(ngModel)]="formData.companyAddr1" name="companyAddr1">
                                </div>
                            </div>
                            </div>

                            <!-- Poskod & Negeri -->
                            <div class="row ps-3">
                            <div class="col-md-6">
                                <div class="mb-3">
                                <label class="form-label">Poskod</label>
                                <input type="text" class="form-control" [(ngModel)]="formData.companyPostcode" name="companyPostcode">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                <label class="form-label">Negeri</label>
                                <input type="text" class="form-control" [(ngModel)]="formData.companyCity" name="companyCity">
                                </div>
                            </div>
                            </div>

                            <!-- E-mel -->
                            <div class="row ps-3">
                            <div class="col-md-6">
                                <div class="mb-3">
                                <label class="form-label">E-mel</label>
                                <input type="email" class="form-control" [(ngModel)]="formData.email" name="email">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                <label class="form-label">No Telefon</label>
                                <input type="text" class="form-control" [(ngModel)]="formData.phoneNo" name="phoneNo">
                                </div>
                            </div>
                            </div>

                            <!-- GAP before Pengurus -->
                            <br>
                            <br>

                            <!-- Nama Pengurus (Full Width) -->
                            <div class="row ps-3">
                            <div class="col-12">
                                <div class="mb-3">
                                <label class="form-label">Nama Pengurus Besar Syarikat</label>
                                <input type="text" class="form-control" [(ngModel)]="formData.directorName" name="directorName">
                                </div>
                            </div>
                            </div>

                            <!-- Below Pengurus: companyPhoneNo, typFile, docNo, companyEmail -->
                            <div class="row ps-3">
                            <div class="col-md-6">
                                <div class="mb-3">
                                <label class="form-label">No. Telefon Syarikat</label>
                                <input type="text" class="form-control" [(ngModel)]="formData.companyPhoneNo" name="companyPhoneNo">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                <label class="form-label">Jenis Dokumen</label>
                                <input type="text" class="form-control" [(ngModel)]="formData.typFile" name="typFile">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                <label class="form-label">No. Dokumen</label>
                                <input type="text" class="form-control" [(ngModel)]="formData.docNo" name="docNo">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                <label class="form-label">E-mel Syarikat</label>
                                <input type="email" class="form-control" [(ngModel)]="formData.companyEmail" name="companyEmail">
                                </div>
                            </div>
                        </div>
                    </div>
                </div> 

            <!-- Bottom Navigation -->
            <div class="row mt-4">
                <div class="col-12">
                    <div class="d-flex justify-content-end gap-2 mb-4">
                        <!-- Reset Button -->
                        <button class="btn btn-outline-secondary d-flex align-items-center gap-1" type="reset" (click)="resetForm()">
                          <i class="bi bi-arrow-clockwise"></i>
                          Set Semula
                        </button>

                        <!-- Save Button -->
                        <button 
                          class="btn btn-submit d-flex align-items-center gap-1" 
                          [disabled]="!isFormValid" 
                          (click)="saveForm()">
                          <i class="bi bi-check-circle"></i>
                          Simpan
                        </button>
                        <button class="btn btn-all" (click)="goToPrevious()">
                            &lt;
                        </button>
                        <button class="btn btn-all" (click)="goToNext()">
                            &gt;
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
