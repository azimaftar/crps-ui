<div class="container-fluid">
    <div class="card">
        <div class="ms-4 me-4">
            <div class="mt-2 mb-2">
                <h3 class="mb-2 mt-4"><b>PROFIL</b></h3>
            </div>
            <div class="mt-4">
                <!-- Left Side: Step Info -->
                <reusable-tab [currentStep]="currentStep" [steps]="steps"></reusable-tab>
                <div class="col-md-6 mb-4">
                  <p class="mb-0">{{ currentStep }}. {{ steps[currentStep - 1] }}</p>
                  <small class="text-muted">Langkah {{ currentStep }} daripada {{ steps.length }}</small>
                </div>

                <!-- Main Content Area -->
                <div class="row flex-column flex-lg-row">
                    <div class="col-md-2 mb-3 mb-md-0">
                        <div class="d-flex flex-column align-items-center">
                            <img src="assets/images/avatars/9.jpg" alt="Profile Image" class="img-fluid rounded-2"
     style="width: 150px; height: 150px; object-fit: cover;">
                        </div>
                    </div>
                    <div class="col-10">
                        <!-- Profile Image Section -->
                        <!-- <h6 class="mb-3">Maklumat Bank Guarantee/Security Bon</h6> -->
                        <!-- Form Fields -->
			                  <div class="row ps-3">
                            <div class="col-md-6">
                                <div class="mb-3">
                                <label class="form-label">No Bank Guarantee</label>
                                <input type="text" class="form-control" [(ngModel)]="formData.bankGuaranteeNo" name="bankGuaranteeNo">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                <label class="form-label">Nama Bank</label>
                                <input type="text" class="form-control" [(ngModel)]="formData.bankName" name="bankName">
                                </div>
                            </div>
                            </div>

			                      <!-- Tarikh Kuatkuasa & Tarikh Tamat -->
                            <div class="row ps-3">
                            <div class="col-md-6">
                                <div class="mb-3">
                                <label class="form-label">Tarikh Kuatkuasa</label>
                                <input type="text" class="form-control" [(ngModel)]="formData.startGuarantee" name="startGuarantee">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                <label class="form-label">Tarikh Tamat</label>
                                <input type="text" class="form-control" [(ngModel)]="formData.expiredGuarantee" name="expiredGuarantee">
                                </div>
                            </div>
                            </div>

			                      <br>
                            <br>

			                      <!-- Dokumen Sokongan Section -->
                            <div class="row ps-3">
                              <div class="col-md-12">
                                <!-- Title and Upload Button in same row -->
                                <div class="d-flex justify-content-between align-items-center mb-3">
                                  <h6 style="text-transform: uppercase; font-weight: 700; font-size: 14px; color: #1D293D;">
                                    Senarai Dokumen
                                  </h6>
                                  <button class="btn d-flex align-items-center gap-1"
                                          style="background-color: rgb(217, 233, 255); color: rgb(20, 97, 186); border-radius: 8px;"
                                          (click)="fileInput.click()">
                                    <i class="bi bi-plus-circle"></i>
                                    Muat Naik
                                  </button>

                                </div>

                                

                                <!-- Table-style Container -->
                                <div class="overflow-hidden">
                                  <input type="file" #fileInput (change)="onFileSelected($event)" multiple hidden />
                                  <!-- Header Row -->
                                  <div class="d-flex border-bottom py-2 px-3 fw-semibold text-muted" style="font-size: 13px;">
                                    <div style="width: 50px;">Bil.</div>
                                    <div class="flex-grow-1 ps-2">Keterangan</div>
                                    <div class="flex-grow-1 ps-5">Nama Dokumen</div>
                                    <div style="width: 80px;" class="ps-2">Format</div>
                                    <div style="width: 120px;" class="ps-2">Tindakan</div>
                                  </div>

                                  <div *ngFor="let dokumen of dokumenList; let i = index" class="d-flex align-items-center py-2 px-3 border-bottom" style="font-size: 14px;">
                                  <div style="width: 50px;">{{ dokumen.bil }}</div>
                                  <div class="flex-grow-1 ps-2">
                                    <input class="form-control form-control-sm" type="text" [(ngModel)]="dokumen.keterangan" />
                                  </div>
                                  <div class="flex-grow-1 ps-2">
                                    <input class="form-control form-control-sm" type="text" [(ngModel)]="dokumen.namaDokumen" />
                                  </div>
                                  <div class="ps-2" style="width: 80px;">{{ dokumen.format }}</div>
                                  <div class="ps-2 d-flex gap-2" style="width: 120px;">
                                    <button class="btn btn-outline-primary btn-sm px-2 py-1" style="border-radius: 10px;">
                                      <i class="bi bi-arrow-repeat"></i>
                                    </button>
                                    <button class="btn btn-outline-danger btn-sm px-2 py-1" (click)="deleteDokumen(i)" style="border-radius: 10px;">
                                      <i class="bi bi-trash"></i>
                                    </button>
                                  </div>
                                </div>
                                </div>
<br>
                                <!-- File Size Note -->
                                <div class="text-danger mb-2" style="font-size: 13px;">
                                  Saiz fail maksima: 10MB
                                </div>
                              </div>
                            </div>
                            

                        </div>
                    </div>
                    

            <!-- Bottom Navigation -->
            <div class="row mt-4">
                <div class="col-12">
                    <div class="d-flex justify-content-end gap-2 mb-4">
                        <!-- Reset Button -->
                        <button class="btn btn-outline-secondary d-flex align-items-center gap-1" type="reset" (click)="resetForm()">
                          <i class="bi bi-arrow-clockwise"></i>
                          Set Semula
                        </button>

                        <!-- Save Button -->
                        <button 
                          class="btn btn-submit d-flex align-items-center gap-1" 
                          [disabled]="!isFormValid" 
                          (click)="saveForm()">
                          <i class="bi bi-check-circle"></i>
                          Simpan
                        </button>
                        <button class="btn btn-all" (click)="goToPrevious()">
                            &lt;
                        </button>
                        <button class="btn btn-all" (click)="goToNext()">
                            &gt;
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
