<div class="container-fluid">
    <div class="card">
        <div class="ms-4 me-4">
            <div class="mt-2 mb-2">
                <h3 class="mb-2 mt-4"><b>Jadual Pergerakan Kapal</b></h3>
            </div>
            <div class="mt-4">
                <!-- Left Side: Step Info -->
                <reusable-tab [currentStep]="currentStep" [steps]="steps"></reusable-tab>
                <div class="col-md-6 mb-4">
                  <p class="mb-0">Muat Naik Dokumen</p>
                </div>

                <!-- Main Content Area -->
                <div class="row flex-column flex-lg-row">
                    <div class="col-md-2 mb-3 mb-md-0">
                        <div class="d-flex flex-column align-items-center">
                            <img src="assets/images/avatars/9.jpg" alt="Profile Image" class="img-fluid rounded-2"
                style="width: 150px; height: 150px; object-fit: cover;">

                        </div>
                    </div>
                    <div class="col-10">

                        <div class="row ps-3">
                            <div class="col-md-6">
                                <!-- Nama -->
                                <div class="mb-3">
                                    <label class="form-label">Nama Fail</label>
                                    <input type="text" class="form-control" [(ngModel)]="formData.NamaFail" name="NamaFail">
                                </div>              
                            </div>
                        </div>

                        <div class="row ps-3">
                            <div class="col-md-6">
                                <!-- Nama -->
                                <div class="mb-3">
                                    <label class="form-label">Catatan</label>
                                    <input type="text" class="form-control" [(ngModel)]="formData.Catatan" name="Catatan">
                                </div>              
                            </div>
                        </div>

                        <div class="row ps-3">
                        <!-- DOKUMEN SOKONGAN -->
            <h5 class="mt-4 mb-3">Dokumen Sokongan*</h5>

            <!-- Upload Section -->
            <c-row class="align-items-center mb-3">
            <c-col md="8">
                <!-- <label cLabel for="supportingDocument" class="form-label">Dokumen Sokongan*</label> -->
                <input 
                type="file" 
                id="supportingDocument" 
                (change)="onFileSelected($event)" 
                accept=".pdf,.jpg,.png" 
                class="form-control"
                />
                
            </c-col>
            <c-col md="4" class="text-end">
                <button 
                cButton 
                type="button" 
                color="primary" 
                class="text-white"
                (click)="uploadDocument()"
                [disabled]="!selectedFile"
                >
                + Muat Naik
                </button>
            </c-col>
            </c-row>

            <!-- Table List of Uploaded Documents -->
            <c-row>
            <c-col>
                <div class="table-responsive" style="border-radius: 8px;">
                <table cTable hover class="table table-bordered text-center table-sm align-middle">
                <thead cTableColor="light">
                    <tr>
                    <th scope="col">Bil.</th>
                    <th scope="col">Keterangan</th>
                    <th scope="col">Nama Dokumen</th>
                    <th scope="col">Format</th>
                    <th scope="col">Tindakan</th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let doc of uploadedDocuments; let i = index">
                    <td>{{ i + 1 }}</td>
                    <td>Dokumen Sokongan</td>
                    <td>{{ doc.name }}</td>
                    <td>{{ doc.format }}</td>
                    <td>
                        <button 
                        cButton 
                        type="button" 
                        color="danger" 
                        class="text-white btn-sm"
                        (click)="removeDocument(i)"
                        >
                        Padam
                        </button>
                    </td>
                    </tr>
                </tbody>
                </table>
                <small class="text-muted mt-1 d-block">*Saiz fail maksimum: 10MB</small>
                </div>
                </c-col>
                </c-row><br><br>
                </div>

                    </div>
                </div>
            <div class="row mt-4">
                <div class="col-12">
                    <div class="d-flex justify-content-end gap-2 mb-4">
                      <button 
                          class="btn btn-submit d-flex align-items-center gap-1"                       
                          (click)="saveForm()">
                          <i class="bi bi-check-circle"></i>
                          Simpan
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <c-row class="mt-4 mb-3 footer-row">
            <c-col class="d-flex justify-content-end align-items-center gap-2">          
            <div class="d-flex gap-2 ms-4">
                        <button class="btn btn-all" (click)="goToPrevious()">
                            &lt;
                        </button>
                        <button class="btn btn-all" (click)="goToNext()">
                            &gt;
                        </button>
            </div>
            </c-col>
        </c-row>
    </div>
</div>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
