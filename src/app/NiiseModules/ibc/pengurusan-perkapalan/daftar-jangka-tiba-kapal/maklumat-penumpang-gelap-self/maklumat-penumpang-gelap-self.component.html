<!-- <p>maklumat-profil-ibc works!</p> -->
 <c-card class="mb-3">  
    <!-- HEADER PROFIL -->
    <c-card-header class="card-header">
      <h4 class="card-header-title">Penumpang Gelap</h4>
    </c-card-header>

    <!-- CONTENT CARD BODY -->
    <c-card-body>
        <c-row>
            <!-- FORMS -->
            <c-col md="8">
                    <!-- FORMS START -->
                    <form [formGroup]="profilForm" class="form" (ngSubmit)="onSubmit()">
                        <!-- Form Title -->
                        <!-- Replace your current h5 heading with this: -->
            <h5 class="mb-4">
            Maklumat Penumpang Gelap
            
            </h5>
                        
                        <!-- Photo Placeholder -->
                        <div class="photo-placeholder mb-4">
                          <img [src]="photoUrl || 'assets/placeholder-image.png'" alt="Gambar Kapal" />
                        </div>

                        
                       
                        <c-row class="g-3 mb-3">
                          <c-col md="6">
                            <label cLabel for="namaAnakKapal" class="mb-2">Nama</label>
                            <input
                              cFormControl
                              id="negaraAsalKapal"
                              type="text"
                              formControlName="negaraAsalKapal"
                              class="form-control"
                            />
                          </c-col>                     
                        </c-row>

                        <c-row class="g-3 mb-3">
                          <c-col md="6">
                            <label cLabel for="namaAnakKapal" class="mb-2">Jantina</label>
                            <input
                              cFormControl
                              id="negaraAsalKapal"
                              type="text"
                              formControlName="negaraAsalKapal"
                              class="form-control"
                            />
                          </c-col>                     
                        </c-row>

                        <c-row class="g-3 mb-3">
                          <c-col md="6">
                            <label cLabel for="namaAnakKapal" class="mb-2">Tarikh lahir</label>
                            <input
                              cFormControl
                              id="negaraAsalKapal"
                              type="date"
                              formControlName="negaraAsalKapal"
                              class="form-control"
                            />
                          </c-col>                     
                        </c-row>

                        <c-row class="g-3 mb-3">
                          <c-col md="6">
                            <label cLabel for="namaAnakKapal" class="mb-2">Warganegara</label>
                            <input
                              cFormControl
                              id="negaraAsalKapal"
                              type="text"
                              formControlName="negaraAsalKapal"
                              class="form-control"
                            />
                          </c-col>                     
                        </c-row>


                        <c-row class="g-3 mb-3">

                          <c-col md="6">
                          <label cLabel for="statusPenumpang" class="mb-2">Status Penumpang</label>
                          <select
                            cFormControl
                            id="statusPenumpang"
                            formControlName="statusPenumpang"
                            class="form-select"
                          >
                            <option value="" disabled selected>-Sila Pilih-</option>
                            <option value="Aktif">Aktif</option>
                            <option value="Sakit">Sakit</option>
                            <option value="Mati">Mati</option>
                            <!-- Add more options as needed -->
                          </select>
                        </c-col>
                        </c-row>

                        <c-row class="g-3 mb-3">

                          <c-col md="6">
                          <label cLabel for="statusPemeriksaan" class="mb-2">Status Pemeriksaan</label>
                          <select
                            cFormControl
                            id="statusPemeriksaan"
                            formControlName="statusPemeriksaan"
                            class="form-select"
                          >
                            <option value="" disabled selected>-Sila Pilih-</option>
                            <option value="Belum">Belum</option>
                            <option value="Semak">Semak</option>
                            <option value="NTL">NTL</option>
                            <!-- Add more options as needed -->
                          </select>
                        </c-col>
                        </c-row>

                        
            </form>
            </c-col>       
        </c-row>
        <!-- END OF CONTENT -->

        <!-- FOOTER CONTENT FOR BUTTONS -->
        <c-row class="mt-4 mb-3 footer-row">
            <c-col class="d-flex justify-content-end align-items-center gap-2">
            <!-- Action Buttons -->
            <c-row class="g-3 mb-3 mt-3 justify-content-end">
    <c-col class="d-flex justify-content-end gap-2">
        <button
            cButton 
            color="primary"
            class="biometric-btn">
            Kembali
        </button>
        <button 
            cButton 
            color="primary"
            class="biometric-btn">
            Simpan
        </button>
    </c-col>
</c-row>

            
            </c-col>
        </c-row>
    </c-card-body>
</c-card>
