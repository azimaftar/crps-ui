<div class="container-fluid d-flex flex-column" style="min-height: 100vh;">
  <div class="card flex-grow-1 d-flex flex-column justify-content-between">
    <div class="ms-4 me-4 flex-grow-1 d-flex flex-column"> <!-- FLEX HERE -->
      <div class="mt-2 mb-2">
        <h3 class="mb-2 mt-4"><b>PROFIL</b></h3>
      </div>
      <div class="mt-4">
        <!-- Main Content Area -->
        <div class="row flex-column flex-lg-row">
          <div class="col-md-2 mb-3 mb-md-0">
            <div class="d-flex flex-column align-items-center">
              <img src="assets/images/avatars/9.jpg" alt="Profile Image"
                class="img-fluid rounded-2"
                style="width: 150px; height: 150px; object-fit: cover;">
            </div>
          </div>
          <div class="col-10">
            <div class="row ps-3">
              <div class="col-md-6">
                <div class="mb-3">
                  <label class="form-label">No Pendaftaran Syarikat</label>
                  <input type="text" class="form-control"
                         [(ngModel)]="formData.companyNo" name="companyNo">
                </div>
              </div>
            </div>

            <div class="row ps-3">
              <div class="col-12">
                <div class="mb-3">
                  <label class="form-label">Nama Syarikat</label>
                  <input type="text" class="form-control"
                         [(ngModel)]="formData.companyName" name="companyName">
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Push Button Down -->
      <div class="flex-grow-1"></div>

      <!-- Bottom Navigation -->
      <div class="row mt-auto">
        <div class="col-12">
          <div class="d-flex justify-content-end gap-2 mb-4">
            <button class="btn btn-primary" (click)="goToNextPage()">Hantar</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
