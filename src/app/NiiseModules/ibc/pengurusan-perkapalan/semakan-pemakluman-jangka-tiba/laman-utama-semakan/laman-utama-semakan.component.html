<c-container fluid>
    <!-- Widget and Carousel Section -->
    <c-row class="mb-4">
        <c-col>
            <c-card>
                <c-card-body class="p-4">
                    <c-row class="g-4">
                        <!-- Left Side: 2x2 Widget Grid -->
                        <c-col lg="6">
                            <c-row class="g-3">
                                <!-- Top Row Widgets -->
                                <c-col sm="6">
                                    <c-widget-stat-a class="h-100" color="primary" [title]="'Total Users'">
                                        <ng-template cTemplateId="widgetValueTemplate" ngPreserveWhitespaces>
                                            1,234
                                            <span class="fs-6 fw-normal">
                                                (15.2% <svg [cIcon]="icons.cilArrowTop"></svg>)
                                            </span>
                                        </ng-template>
                                        <ng-template cTemplateId="widgetActionTemplate">
                                            <c-dropdown alignment="end" variant="btn-group">
                                                <button [caret]="false" cButton cDropdownToggle class="p-0"
                                                    color="transparent">
                                                    <svg [cIcon]="icons.cilOptions"
                                                        class="text-high-emphasis-inverse"></svg>
                                                </button>
                                                <div cDropdownMenu>
                                                    <a [routerLink]="[]" cDropdownItem>View Details</a>
                                                    <a [routerLink]="[]" cDropdownItem>Export</a>
                                                    <a [routerLink]="[]" cDropdownItem>Settings</a>
                                                </div>
                                            </c-dropdown>
                                        </ng-template>
                                        <ng-template cTemplateId="widgetChartTemplate">
                                            <c-chart [data]="widgetData1" [options]="widgetOptions" class="mt-3 mx-3"
                                                height="70" type="line" />
                                        </ng-template>
                                    </c-widget-stat-a>
                                </c-col>
                                <c-col sm="6">
                                    <c-widget-stat-a class="h-100" color="success" [title]="'Active Applications'">
                                        <ng-template cTemplateId="widgetValueTemplate" ngPreserveWhitespaces>
                                            567
                                            <span class="fs-6 fw-normal">
                                                (8.7% <svg [cIcon]="icons.cilArrowTop"></svg>)
                                            </span>
                                        </ng-template>
                                        <ng-template cTemplateId="widgetActionTemplate">
                                            <c-dropdown alignment="end" variant="btn-group">
                                                <button [caret]="false" cButton cDropdownToggle class="p-0"
                                                    color="transparent">
                                                    <svg [cIcon]="icons.cilOptions"
                                                        class="text-high-emphasis-inverse"></svg>
                                                </button>
                                                <div cDropdownMenu>
                                                    <a [routerLink]="[]" cDropdownItem>View Details</a>
                                                    <a [routerLink]="[]" cDropdownItem>Export</a>
                                                    <a [routerLink]="[]" cDropdownItem>Settings</a>
                                                </div>
                                            </c-dropdown>
                                        </ng-template>
                                        <ng-template cTemplateId="widgetChartTemplate">
                                            <c-chart [data]="widgetData2" [options]="widgetOptions" class="mt-3 mx-3"
                                                height="70" type="line" />
                                        </ng-template>
                                    </c-widget-stat-a>
                                </c-col>

                                <!-- Bottom Row Widgets -->
                                <c-col sm="6">
                                    <c-widget-stat-a class="h-100" color="warning" [title]="'Pending Requests'">
                                        <ng-template cTemplateId="widgetValueTemplate" ngPreserveWhitespaces>
                                            89
                                            <span class="fs-6 fw-normal">
                                                (5.4% <svg [cIcon]="icons.cilArrowTop"></svg>)
                                            </span>
                                        </ng-template>
                                        <ng-template cTemplateId="widgetActionTemplate">
                                            <c-dropdown alignment="end" variant="btn-group">
                                                <button [caret]="false" cButton cDropdownToggle class="p-0"
                                                    color="transparent">
                                                    <svg [cIcon]="icons.cilOptions"
                                                        class="text-high-emphasis-inverse"></svg>
                                                </button>
                                                <div cDropdownMenu>
                                                    <a [routerLink]="[]" cDropdownItem>View Details</a>
                                                    <a [routerLink]="[]" cDropdownItem>Export</a>
                                                    <a [routerLink]="[]" cDropdownItem>Settings</a>
                                                </div>
                                            </c-dropdown>
                                        </ng-template>
                                        <ng-template cTemplateId="widgetChartTemplate">
                                            <c-chart [data]="widgetData3" [options]="widgetOptions" class="mt-3 mx-3"
                                                height="70" type="line" />
                                        </ng-template>
                                    </c-widget-stat-a>
                                </c-col>
                                <c-col sm="6">
                                    <c-widget-stat-a class="h-100" color="danger" [title]="'Rejected'">
                                        <ng-template cTemplateId="widgetValueTemplate" ngPreserveWhitespaces>
                                            23
                                            <span class="fs-6 fw-normal">
                                                (2.1% <svg [cIcon]="icons.cilArrowTop"></svg>)
                                            </span>
                                        </ng-template>
                                        <ng-template cTemplateId="widgetActionTemplate">
                                            <c-dropdown alignment="end" variant="btn-group">
                                                <button [caret]="false" cButton cDropdownToggle class="p-0"
                                                    color="transparent">
                                                    <svg [cIcon]="icons.cilOptions"
                                                        class="text-high-emphasis-inverse"></svg>
                                                </button>
                                                <div cDropdownMenu>
                                                    <a [routerLink]="[]" cDropdownItem>View Details</a>
                                                    <a [routerLink]="[]" cDropdownItem>Export</a>
                                                    <a [routerLink]="[]" cDropdownItem>Settings</a>
                                                </div>
                                            </c-dropdown>
                                        </ng-template>
                                        <ng-template cTemplateId="widgetChartTemplate">
                                            <c-chart [data]="widgetData4" [options]="widgetOptions" class="mt-3 mx-3"
                                                height="70" type="line" />
                                        </ng-template>
                                    </c-widget-stat-a>
                                </c-col>
                            </c-row>
                        </c-col>

                        <!-- Right Side: Carousel -->
                        <c-col lg="6">
                            <div class="h-100 mt-3">
                                <c-carousel class="h-100">
                                    <c-carousel-indicators />
                                    <c-carousel-inner>
                                        @for (slide of slides; track slide.src) {
                                        <c-carousel-item>
                                            <img alt="{{slide.title}}" class="d-block w-100" loading="lazy"
                                                src="{{slide.src}}" style="height: 300px; object-fit: cover;" />
                                            <c-carousel-caption class="d-none d-md-block">
                                                <h5>{{ slide.title }}</h5>
                                                <p>{{ slide.subtitle }}</p>
                                            </c-carousel-caption>
                                        </c-carousel-item>
                                        }
                                    </c-carousel-inner>
                                    <c-carousel-control [routerLink] caption="Previous" direction="prev" />
                                    <c-carousel-control [routerLink] caption="Next" direction="next" />
                                </c-carousel>
                            </div>
                        </c-col>
                    </c-row>
                </c-card-body>
            </c-card>
        </c-col>
    </c-row>
</c-container>
