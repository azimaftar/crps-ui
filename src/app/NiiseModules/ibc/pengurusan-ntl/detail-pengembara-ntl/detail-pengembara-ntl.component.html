<c-card class="mb-3">
  <!-- HEADER PROFIL -->
  <c-card-header class="card-header">
    <h4 class="card-header-title">Rayuan NTL</h4>
  </c-card-header>

  <!-- CONTENT CARD BODY -->
  <c-card-body>
    <!-- FORMS -->
    <c-col class="col-12">
      <!-- FORMS START -->
      <form
        cForm
        class="form col-10"
        #formRef="ngForm"
        (ngSubmit)="handleSubmit(formRef)"
      >
        <!-- Form Title -->
        <h5 class="mb-4">Maklumat Profil Pengembara</h5>

        <!-- Photo Placeholder -->
        <div class="photo-placeholder mb-4">
          <img [src]="'assets/placeholder-image.png'" alt="Gambar Pengembara" />
        </div>

        <!-- Jenis Pelawat -->
        <c-row class="g-3 mb-3 mt-3">
          <c-col>
            <label cLabel for="visitorType" class="mb-2">Jenis Pelawat *</label>
            <input
              cFormControl
              id="visitorType"
              type="text"
              class="form-control"
              name="visitorType"
              [(ngModel)]="pengembara.visitorType"
              [disabled]="isFormDisabled"
              required
            />
          </c-col>
          <c-col>
            <!-- Empty right column -->
          </c-col>
        </c-row>

        <!-- Jenis Dokumen dan Jantina -->
        <c-row class="g-3 mb-3">
          <!-- Jenis Dokumen -->
          <c-col>
            <label cLabel for="docType" class="mb-2">Jenis Dokumen *</label>
            <input
              cFormControl
              id="docType"
              type="text"
              class="form-control"
              name="docType"
              [(ngModel)]="pengembara.docType"
              [disabled]="isFormDisabled"
              required
            />
          </c-col>
          <!-- Jantina -->
          <c-col>
            <label cLabel for="gender" class="mb-2">Jantina *</label>
            <input
              cFormControl
              id="gender"
              type="text"
              class="form-control"
              name="gender"
              [(ngModel)]="pengembara.gender"
              [disabled]="isFormDisabled"
              required
            />
          </c-col>
        </c-row>

        <!-- No Dokumen dan No Kad Pengenalan -->
        <c-row class="g-3 mb-3">
          <!-- No Dokumen -->
          <c-col>
            <label cLabel for="docNo" class="mb-2">No. Dokumen *</label>
            <input
              cFormControl
              id="docNo"
              type="text"
              class="form-control"
              name="docNo"
              [(ngModel)]="pengembara.docNo"
              [disabled]="isFormDisabled"
              required
            />
          </c-col>
          <!-- No Pengenalan -->
          <c-col>
            <label cLabel for="kpNo" class="mb-2">No. Pengenalan *</label>
            <input
              cFormControl
              id="kpNo"
              type="text"
              class="form-control"
              name="kpNo"
              [(ngModel)]="pengembara.kpNo"
              [disabled]="isFormDisabled"
              required
            />
          </c-col>
        </c-row>

        <!-- Nama -->
        <c-row class="g-3 mb-3">
          <c-col md="12">
            <label cLabel for="name" class="mb-2">Nama *</label>
            <input
              cFormControl
              id="name"
              type="text"
              class="form-control"
              name="name"
              [(ngModel)]="pengembara.name"
              [disabled]="isFormDisabled"
              required
            />
          </c-col>
        </c-row>

        <!-- Tarikh Dikeluarkan dan Tarikh Tamat -->
        <c-row class="g-3 mb-3">
          <!-- Tarikh Dikeluarkan -->
          <c-col>
            <label cLabel for="issueDatePassport" class="mb-2"
              >Tarikh Dikeluarkan *</label
            >
            <input
              cFormControl
              id="issueDatePassport"
              type="text"
              class="form-control"
              name="issueDatePassport"
              [(ngModel)]="pengembara.issueDatePassport"
              [disabled]="isFormDisabled"
              required
            />
          </c-col>
          <!-- Tarikh Tamat Pas -->
          <c-col>
            <label cLabel for="expiryDate" class="mb-2">Tarikh Tamat *</label>
            <input
              cFormControl
              id="expiryDate"
              type="text"
              class="form-control"
              name="expiryDate"
              [(ngModel)]="pengembara.expiryDate"
              [disabled]="isFormDisabled"
              required
            />
          </c-col>
        </c-row>

        <!-- Umur dan Warganegara -->
        <c-row class="g-3 mb-3">
          <!-- Umur -->
          <c-col>
            <label cLabel for="age" class="mb-2">Umur *</label>
            <input
              cFormControl
              id="age"
              type="text"
              class="form-control"
              name="age"
              [(ngModel)]="pengembara.age"
              [disabled]="isFormDisabled"
              required
            />
          </c-col>
          <!-- Warganegara -->
          <c-col>
            <label cLabel for="nationality" class="mb-2">Warganegara *</label>
            <input
              cFormControl
              id="nationality"
              type="text"
              class="form-control"
              name="nationality"
              [(ngModel)]="pengembara.nationality"
              [disabled]="isFormDisabled"
              required
            />
          </c-col>
        </c-row>

        <c-row class="g-3 mb-3">
          <c-col>
            <label cLabel for="countryIssue" class="mb-2"
              >Negara Pengeluar *</label
            >
            <input
              cFormControl
              id="countryIssue"
              type="text"
              class="form-control"
              name="countryIssue"
              [(ngModel)]="pengembara.countryIssue"
              [disabled]="isFormDisabled"
              required
            />
          </c-col>
          <c-col>
            <label cLabel for="status" class="mb-2">Status *</label>
            <input
              cFormControl
              id="status"
              type="text"
              class="form-control"
              name="status"
              [(ngModel)]="pengembara.status"
              [disabled]="isFormDisabled"
              required
            />
          </c-col>
        </c-row>
        <c-row class="g-3 mb-3">
          <c-col md="12">
            <label cLabel for="categoryNTL" class="mb-2">Kategori NTL *</label>
            <input
              cFormControl
              id="categoryNTL"
              type="text"
              class="form-control"
              name="categoryNTL"
              [(ngModel)]="pengembara.categoryNTL"
              [disabled]="isFormDisabled"
              required
            />
          </c-col>
        </c-row>
        <c-row class="g-3 mb-3">
          <c-col md="12">
            <label cLabel for="sebabNTL" class="mb-2">Sebab-Sebab NTL *</label>
            <input
              cFormControl
              id="sebabNTL"
              type="text"
              class="form-control"
              name="sebabNTL"
              [(ngModel)]="pengembara.sebabNTL"
              [disabled]="isFormDisabled"
              required
            />
          </c-col>
        </c-row>
        <c-row class="g-3 mb-3">
          <c-col class="col-md-6">
            <label cLabel for="kelayakanRayuan" class="mb-2"
              >Kelayakan Rayuan NTL *</label
            >
            <input
              cFormControl
              id="kelayakanRayuan"
              type="text"
              class="form-control"
              name="kelayakanRayuan"
              [(ngModel)]="pengembara.kelayakanRayuan"
              [disabled]="isFormDisabled"
              required
            />
          </c-col>
        </c-row>
        <!-- Show after confirmation -->
        <c-row class="g-3 mb-3" *ngIf="showConfirmation">
          <c-col class="col-md-12">
            <label cLabel for="keputusanView" class="mb-2"
              >Keputusan Rayuan</label
            >
            <input
              type="text"
              id="keputusanView"
              class="form-control"
              [value]="pengembara.keputusanRayuan"
              disabled
            />
          </c-col>
        </c-row>

        <c-row class="g-3 mb-3">
          <c-col class="col-md-12">
            <label cLabel for="catatan" class="mb-2">Catatan *</label>
            <input
              cFormControl
              id="catatan"
              type="text"
              class="form-control"
              name="catatan"
              [(ngModel)]="pengembara.catatan"
              [disabled]="isFormDisabled"
              required
            />
          </c-col>
        </c-row>
        <c-row class="g-3 mb-3 mt-3" *ngIf="showTable">
          <label class="col-12">Dokumen Sokongan *</label>
        </c-row>
        <c-row class="g-3 mb-3 mt-3" *ngIf="showTable">
          <c-col class="col-12">
            <div class="table-responsive">
              <table class="table table-hover">
                <thead>
                  <tr>
                    <th *ngFor="let header of tableHeaders" class="text-center">
                      {{ header }}
                    </th>
                  </tr>
                </thead>
                <tbody>
                  <tr *ngFor="let row of tableData; let i = index">
                    <td class="text-center">{{ i + 1 }}</td>
                    <td class="text-center">{{ row.keterangan }}</td>
                    <td class="text-center">{{ row.file?.name }}</td>
                    <td class="text-center">
                      <div
                        class="d-flex flex-column flex-md-row justify-content-center gap-2"
                      >
                        <button
                          class="btn btn-sm btn-primary col-md-6"
                          (click)="viewFile(row)"
                        >
                          Papar
                        </button>
                        <!-- <button
                  class="btn btn-sm btn-danger col-md-6"
                  (click)="deleteRow(i)"
                >
                  Hapus
                </button> -->
                      </div>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </c-col>
        </c-row>

        <c-row class="g-3 mb-3 mt-3">
          <c-col class="col-12">
            <div class="row" *ngIf="showButtons">
              <div
                class="col-6 offset-8 text-end d-flex gap-2 justify-content-end"
              >
                <button
                  cButton
                  color="primary"
                  type="button"
                  (click)="setKelayakanRayuan(true)"
                >
                  Diluluskan
                </button>
                <button
                  cButton
                  color="danger"
                  type="button"
                  (click)="setKelayakanRayuan(false)"
                >
                  Tidak Diluluskan
                </button>
              </div>
            </div>

            <c-row *ngIf="showConfirmation">
              <c-col
                class="col-6 offset-8 text-end d-flex gap-2 justify-content-end"
              >
                <button cButton color="primary" (click)="paparDokumen()">
                  Cetak
                </button>
              </c-col>
            </c-row>
          </c-col>
        </c-row>
      </form>
    </c-col>
  </c-card-body>
</c-card>

<!-- Modal  -->
<c-modal
  alignment="center"
  [visible]="showError"
  keyboard="false"
  backdrop="static"
  (visibleChange)="showError = $event"
>
  <div
    style="
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      width: 300px;
      margin: auto;
      background-color: white;
    "
  >
    <div
      style="width: 100px; height: 90px; border: 1px solid #999; margin: 20px 0"
    ></div>
    <h5 cModalTitle style="margin-top: 25px" class="text-center">
      {{ errorMessage }}
    </h5>
    <button
      cButton
      color="primary"
      style="margin: 50px; padding: 10px 40px"
      (click)="confirm()"
    >
      OK
    </button>
  </div>
</c-modal>
