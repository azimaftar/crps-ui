<div class="card card-container">
  <div class="card-header p-2">
    <h5 class="mb-3">Semakan Keputusan NTL</h5>
  </div>
  

  <!-- ───── Filter Bar ───── -->
  <div class="row g-3 mb-4 p-2">
    <h5 class="p-2">Ruangan Carian</h5>
    <div class="col-md-4">
      <input
        class="form-control"
        placeholder="Nama Pengembara"
        [(ngModel)]="filters.nama"
        (ngModelChange)="applyFilters()"
      />
    </div>
    <div class="col-md-4">
      <input
        class="form-control"
        placeholder="No Pengenalan"
        [(ngModel)]="filters.noPengenalan"
        (ngModelChange)="applyFilters()"
      />
    </div>
    <div class="col-md-4">
      <select
        class="form-select"
        [(ngModel)]="filters.status"
        (ngModelChange)="applyFilters()"
      >
        <option value="">Semua Status</option>
        <option value="Tidak Dibenarkan Masuk (NTL)">
          Tidak Dibenarkan Masuk (NTL)
        </option>
        <option value="Dibenarkan Masuk (NTL)">Dibenarkan Masuk (NTL)</option>
      </select>
    </div>
    <div class="col-md-4">
      <select
        class="form-select"
        [(ngModel)]="filters.kategori"
        (ngModelChange)="applyFilters()"
      >
        <option value="">Semua Kategori</option>
        <option *ngFor="let kategori of kategoriOptions" [value]="kategori">
          {{ kategori }}
        </option>
      </select>
    </div>
    <div class="col-md-4">
      <select
        class="form-select"
        [(ngModel)]="filters.kelayakan"
        (ngModelChange)="applyFilters()"
      >
        <option value="">Semua Kelayakan</option>
        <option value="Layak">Layak</option>
        <option value="Tidak Layak">Tidak Layak</option>
      </select>
    </div>
    <div class="col-md-4">
      <button
        class="btn btn-primary col-12"
        (click)="applyFilters()"
      >Cari
      </button>
    </div>
  </div>

  <!-- ───── Data Table ───── -->
  <div class="table-responsive">
    <table class="table table-bordered table-hover">
      <thead class="table-light">
        <tr>
          <th class="text-center">No.</th>
          <th class="text-center">Nama Pengembara</th>
          <th class="text-center">No Pengenalan</th>
          <th class="text-center">Status</th>
          <th class="text-center">Kategori</th>
          <th class="text-center">Kelayakan Rayuan NTL</th>
          <th class="text-center">Tindakan</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of pagedData; let i = index">
          <td class="text-center">
            {{ (currentPage - 1) * pageSize + i + 1 }}
          </td>
          <td class="text-center">{{ item.nama }}</td>
          <td class="text-center">{{ item.noPengenalan }}</td>
          <td class="text-center">{{ item.status }}</td>
          <td>{{ item.kategori }}</td>
          <td class="text-center">{{ item.kelayakan }}</td>
          <td class="text-center">
            <div
              class="d-flex flex-column flex-md-row justify-content-center gap-2"
            >
              <button
                class="btn btn-sm btn-primary col-md-10"
                (click)="viewDetail(item)"
              >
                Lihat Detail
              </button>
            </div>
          </td>
        </tr>

        <tr *ngIf="pagedData.length === 0">
          <td colspan="7" class="text-center">Tiada data dijumpai.</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- ───── Pagination bar (Bootstrap) ───── -->
  <nav *ngIf="totalPages > 1">
    <ul class="pagination justify-content-end">
      <li class="page-item" [class.disabled]="currentPage === 1">
        <button class="page-link" (click)="changePage(currentPage - 1)">
          &laquo;
        </button>
      </li>

      <li
        class="page-item"
        *ngFor="let p of pages"
        [class.active]="p === currentPage"
      >
        <button class="page-link" (click)="changePage(p)">{{ p }}</button>
      </li>

      <li class="page-item" [class.disabled]="currentPage === totalPages">
        <button class="page-link" (click)="changePage(currentPage + 1)">
          &raquo;
        </button>
      </li>
    </ul>
  </nav>
</div>
