<div class="container card" style="min-height: 500px">
  <div class="card-header">
    <h4>Pengurusan NTL</h4>
  </div>

  <div class="card-body row gy-4">
    <!-- Left: Form Section -->
    <div class="col-12 col-md-8 border-end pb-3 pb-md-0">
      <form cForm>
        <div class="row gy-3">
          <c-col class="col-12 col-md-6">
            <label cLabel for="categoryNTL">Kategori NTL *</label>
            <select cSelect id="categoryNTL" name="categoryNTL" required>
              <option value="" disabled selected>Pilihan</option>
              <option
                *ngFor="let option of categoryOptions"
                [value]="option.value"
              >
                {{ option.label }}
              </option>
            </select>
          </c-col>
          <c-col class="col-12 col-md-6"></c-col>
          <c-col class="col-12 col-md-6">
            <label cLabel for="reasonNTL">Sebab-Sebab NTL *</label>
            <select cSelect id="reasonNTL" name="reasonNTL" required>
              <option class="p-2" value="" disabled selected>Pilihan</option>
              <option
                class="p-2"
                *ngFor="let reason of reasonOptions"
                [value]="reason.value"
              >
                {{ reason.label }}
              </option>
            </select>
          </c-col>

          <c-col class="col-12">
            <label cLabel for="kelayakanRayuanNTL"
              >Kelayakan Dan Rayuan NTL</label
            >
            <div class="d-flex flex-wrap gap-3">
              <div class="form-check">
                <input
                  cRadio
                  type="radio"
                  class="form-check-input"
                  name="kelayakan"
                  id="layak"
                  value="layak"
                  autocomplete="off"
                />
                <label class="form-check-label" for="layak">Layak</label>
              </div>
              <div class="form-check">
                <input
                  cRadio
                  class="form-check-input"
                  type="radio"
                  name="kelayakan"
                  id="tidakLayak"
                  value="tidakLayak"
                  autocomplete="off"
                />
                <label class="form-check-label" for="tidakLayak"
                  >Tidak Layak</label
                >
              </div>
            </div>
          </c-col>
        </div>
      </form>
      <c-col class="text-end" style="margin-top: 100px">
        <button class="btn btn-back btn-dark m-2  cursor-pointer" (click)="previousSection()">&lt;</button>
        <button class="btn btn-next btn-dark m-2" disabled>&gt;</button>
      </c-col>
    </div>

    <!-- Right: Stepper Section -->
    <div class="col-12 col-md-4">
      <div class="p-3 h-100" style="max-height: 400px; overflow-y: auto">
        <div class="d-flex flex-column gap-3 position-relative">
          <!-- Vertical Line -->
          <div
            class="d-none d-md-block"
            style="
              position: absolute;
              left: 12px;
              top: 12px;
              bottom: 12px;
              width: 2px;
              background-color: #dee2e6;
              z-index: 0;
            "
          ></div>

          <!-- Steps -->
          <div
            class="d-flex align-items-start cursor-pointer"
            *ngFor="let step of steps; let i = index"
            (click)="goToStep(step)"
            style="z-index: 1"
          >
            <!-- Step number circle -->
            <div style="position: relative; margin-right: 8px">
              <div
                class="rounded-circle d-flex align-items-center justify-content-center mt-1"
                [ngClass]="{
                  'bg-primary text-white': i + 1 === activeStep,
                  'bg-light border border-secondary text-secondary':
                    i + 1 !== activeStep
                }"
                style="width: 24px; height: 24px; font-size: 0.75rem"
              >
                {{ i + 1 }}
              </div>
            </div>

            <!-- Step label -->
            <div class="d-flex flex-column">
              <small class="text-muted">Langkah {{ i + 1 }}</small>
              <span
                [ngClass]="{
                  'text-primary fw-bold': i + 1 === activeStep,
                  'text-secondary': i + 1 !== activeStep
                }"
              >
                {{ step.label }}
              </span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div cCard class="card-footer text-end mt-3">
    <button cButton color="primary" type="button">Hantar</button>
  </div>
</div>

<!-- Notification Modal -->
<app-notification-modal
  [modalTitle]="modalTitle"
  [visible]="showModal"
  [showBiometricModal]="showBiometricModal"
  [showModalAlert]="showModalAlert"
  (close)="closeModal()"
></app-notification-modal>
