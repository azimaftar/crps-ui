<div class="d-flex flex-column" style="min-height: 50vh;">
  <!-- Kandungan utama: widget + tengah + kanan -->
  <div class="d-flex flex-row flex-grow-1">
    <!-- KIRI: Widgets -->
<div class="d-flex flex-column justify-content-between p-3" style="width: 20%; max-width: 200px; margin-right: 2px;">
      <!-- widget 1 -->
      <c-widget-stat-e [title]="'Widget Title'" [value]="'1,123'" style="width: 100%">
        <c-chart [data]="data[0]" [options]="barOptions" class="mx-auto" height="40" width="80" />
      </c-widget-stat-e>

      <!-- widget 2 -->
      <c-widget-stat-e [title]="'Widget Title'" [value]="'1,123'" style="width: 100%">
        <c-chart [data]="data[0]" [options]="barOptions" class="mx-auto" height="40" width="80" />
      </c-widget-stat-e>

      <!-- widget 3 -->
      <c-widget-stat-e [title]="'Widget Title'" [value]="'1,123'" style="width: 100%">
        <c-chart [data]="data[0]" [options]="barOptions" class="mx-auto" height="40" width="80" />
      </c-widget-stat-e>
    </div>

<div class="d-flex flex-column gap-4 p-4 bg-white flex-grow-1">

  <!-- Baris 1: Ibu Jari Kanan & Ibu Jari Kiri -->
  <div class="d-flex flex-row justify-content-between w-100">
    
    <!-- Ibu Jari Kanan -->
    <div class="d-flex flex-column text-start">
      <label class="form-label"><b>Ibu Jari Kanan</b></label>
      <img 
        [src]="thumbRightUrl || 'assets/placeholder-image.png'" 
        alt="Ibu Jari Kanan" 
        style="width: 200px; height: 200px; object-fit: cover; border: 1px solid #000; border-radius: 8px;"
      />
    </div>

    <!-- Ibu Jari Kiri -->
    <div class="d-flex flex-column text-start">
      <label class="form-label"><b>Ibu Jari Kiri</b></label>
      <img 
        [src]="thumbLeftUrl || 'assets/placeholder-image.png'" 
        alt="Ibu Jari Kiri" 
        style="width: 200px; height: 200px; object-fit: cover; border: 1px solid #000; border-radius: 8px;"
      />
    </div>
  </div>

  <!-- Baris 2: Empat Jari Kanan & Empat Jari Kiri -->
  <div class="d-flex flex-row justify-content-between w-100">
    
    <!-- Empat Jari Kanan -->
    <div class="d-flex flex-column text-start">
      <label class="form-label"><b>Empat (4) Jari Kanan</b></label>
      <img 
        [src]="fourRightUrl || 'assets/placeholder-image.png'" 
        alt="Empat Jari Kanan" 
        style="width: 200px; height: 200px; object-fit: cover; border: 1px solid #000; border-radius: 8px;"
      />
    </div>

    <!-- Empat Jari Kiri -->
    <div class="d-flex flex-column text-start">
      <label class="form-label"><b>Empat (4) Jari Kiri</b></label>
      <img 
        [src]="fourLeftUrl || 'assets/placeholder-image.png'" 
        alt="Empat Jari Kiri" 
        style="width: 200px; height: 200px; object-fit: cover; border: 1px solid #000; border-radius: 8px;"
      />
    </div>
  </div>

</div>
  <!-- KANAN: Status Imbasan -->
  <div class="d-flex flex-column justify-content-center align-items-center p-4" style="width: 250px; background-color: white; margin-left: 2px;">
    <div class="w-100 text-center py-2 rounded"
      [style.background-color]="statusColor"
      style="color: white;">
      {{ statusMessage }}
    </div>
  </div>
</div>

<!-- FOOTER --> 
<div class="d-flex justify-content-end align-items-center px-4 py-3"
     style="background-color: #ffffff; border-top: 2px solid #dee2e6; max-width: 95vw;">
  <div class="d-flex gap-2">
    <!-- PENGECUALIAN BIOMETRIK -->
<button class="btn btn-dark"
        style="width: 280px;"
        (click)="onDisyakiPalsuClick()"
        id="pengecualianbiometrik"
        [disabled]="statusMessage === 'LULUS'">
  PENGECUALIAN BIOMETRIK
</button>
<button class="btn btn-dark"
        style="width: 180px;"
        (click)="onSimpanClick"
        id="imbas">
  CARIAN BIOMETRIK
</button>
<button class="btn btn-dark"
        style="width: 180px;"
        (click)="OnOKButtonClick()"
        id="imbas"
        [disabled]="statusImbasan === 'GAGAL' || disableSimpanButton">
 SIMPAN
</button>

  </div>
</div>


  <!-- Modal -->
  <app-notification-modal
    [modalTitle]="modalTitle"
    [visible]="showModal"
    [showBiometricModal]="showBiometricModal"
    [showModalAlert]="showModalAlert"
    (close)="closeModal()"
  ></app-notification-modal>
</div>
