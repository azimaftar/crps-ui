<div class="d-flex flex-column" style="min-height: 50vh;"> <!-- Tinggi penuh viewport -->

  <!-- ROW UTAMA: Widget (kiri) + Cap Jari (kanan) -->
  <div class="d-flex flex-row flex-grow-1" style="margin-left: 3px; border-radius: 8px;">

    <!-- WIDGET KIRI -->
    <div class="d-flex flex-column gap-5 p-3"
         style="width: 200px; margin-right: 4px; border-radius: 8px;">
      <!-- Widget 1 -->
      <c-widget-stat-e [title]="'Widget 1'" [value]="'1,123'" style="width: 100%;">
        <c-chart [data]="data[0]" [options]="barOptions" class="mx-auto" height="40" width="80" />
      </c-widget-stat-e>

      <!-- Widget 2 -->
      <c-widget-stat-e [title]="'Widget 2'" [value]="'456'" style="width: 100%;">
        <c-chart [data]="data[1]" [options]="barOptions" class="mx-auto" height="40" width="80" />
      </c-widget-stat-e>
    </div>

    <!-- KANAN: Gambar dan bar nilai -->
    <div class="d-flex flex-column justify-content-center align-items-center flex-grow-1 p-2" style="background-color: white;">

      <div class="d-flex flex-row justify-content-between p-4" style="gap: 2rem;">
        <!-- KANAN -->
        <div style="flex: 1; background-color: white; padding: 1rem;">
          <div class="mb-3 w-100 text-start">
            <label class="form-label"><b>Cap Jari Kanan</b></label>
          </div>
          <div class="d-flex flex-row align-items-center gap-3">
            <img 
              [src]="photoKiri || 'assets/placeholder-image.png'" 
              alt="Cap Jari Kanan" 
              style="width: 200px; height: 200px; object-fit: cover; border: 1px solid #000; border-radius: 8px;" 
            />
          </div>
        </div>

        <!-- KIRI -->
        <div style="flex: 1; background-color: white; padding: 1rem;">
          <div class="mb-3 w-100 text-start">
            <label class="form-label"><b>Cap Jari Kiri</b></label>
          </div>
          <div class="d-flex flex-row align-items-center gap-3">
            <img 
              [src]="photoKanan || 'assets/placeholder-image.png'" 
              alt="Cap Jari Kiri" 
              style="width: 200px; height: 200px; object-fit: cover; border: 1px solid #000; border-radius: 8px;" 
            />
          </div>
        </div>
      </div>

      <!-- Nilai Jari Hidup -->
      <div style="width: 250px;">
        <label style="font-weight: bold; font-size: 1rem; display: block; margin-bottom: 0.5rem;">
          % Nilai Jari Hidup
        </label>
        <div style="height: 24px; background-color: #e9ecef; border-radius: 4px; overflow: hidden;">
          <div 
            [style.width]="WajahKiri"
            style="background-color: #0d6efd; height: 100%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 0.85rem; transition: width 0.3s ease;">
            {{ WajahKiri }}
          </div>
        </div>
      </div>
    </div>
  </div>

<!-- FOOTER: Butang OK & RESET -->
<div class="mt-auto" style="background-color: #ffffff; border-top: 2px solid #dee2e6; padding: 1rem 0;">
  <div class="d-flex justify-content-end pe-4">
    <button class="btn btn-dark me-2"
            style="width: 150px;"
            (click)="OnOKButtonClick()"
            id="okbutton">
      OK
    </button>

    <button class="btn btn-dark"
            style="width: 150px;"
            (click)="onReset()"
            id="resetbutton">
      RESET
    </button>
  </div>
</div>


  <!-- Modal -->
  <app-notification-modal
    [modalTitle]="modalTitle"
    [visible]="showModal"
    [showBiometricModal]="showBiometricModal"
    [showModalAlert]="showModalAlert"
    (close)="closeModal()"
  ></app-notification-modal>
</div>
