<div class="m-4 ms-0 bg-white rounded-3 w-100 h-auto p-4">
    <h3 class="fw-bold">Pelupusan Kad Kuasa</h3>

    <div class="bg-color-offwhite rounded-3 my-3">
        <div class="m-3">
            <app-stepper
            [currentMainStep]="currentMainStep"
            ></app-stepper>
        </div>
    </div>

    <div class="mt-3">
        <h6 class="mb-3 fw-bold mt-3">Maklumat Pelupusan Kad Kuasa</h6>
        <c-row [xs]="2">
            <c-col class="mb-3">
                <label for="noSiriKadKuasa" cLabel>Nombor Siri Kad Kuasa</label>
                <input type="text" class="form-control" id="noSiriKadKuasa" placeholder="Nombor Siri Kad Kuasa" disabled value="{{maklumatPelupusanKadKuasa.noSiriKadKuasa}}">
            </c-col>
            <c-col class="mb-3">
                <label for="tarikhDikeluarkan" cLabel>Tarikh Dikeluarkan</label>
                <input type="text" class="form-control" id="tarikhDikeluarkan" placeholder="Tarikh Dikeluarkan" disabled value="{{maklumatPelupusanKadKuasa.tarikhDikeluarkan}}">
            </c-col>
            <c-col class="mb-3">
                <label for="tarikhTidakAktif" cLabel>Tarikh Tidak Aktif</label>
                <input type="text" class="form-control" id="tarikhTidakAktif" placeholder="Tarikh Tidak Aktif" disabled value="{{maklumatPelupusanKadKuasa.tarikhTidakAktif}}">
            </c-col>
            <c-col class="mb-3">
                <label for="prosesKetidakaktifan" cLabel>Proses Ketidakaktifan</label>
                <input type="text" class="form-control" id="prosesKetidakaktifan" placeholder="Proses Ketidakaktifan" disabled value="{{maklumatPelupusanKadKuasa.prosesKetidakAktifan}}">
            </c-col>
        </c-row>
        <c-row>
            <c-col class="mb-3">
                <label for="sebabPelupusan" cLabel>Sebab Pelupusan</label>
                <textarea type="textarea" class="form-control" id="sebabPelupusan" placeholder="Sebab Pelupusan" rows="3"></textarea>
            </c-col>
        </c-row>
    </div>
    <c-row>
        <hr class="my-3">
        <div class="d-flex justify-content-end">
            <button color="primary" class="primary-custom-btn w-auto px-4 me-4" (click)="SimpanRekod()">
                <c-icon name="cilCheckCircle" class="me-2"></c-icon>
                Simpan</button>
            <button color="primary" class="primary-custom-btn w-auto px-4 me-4" (click)="openRekodDihantarModal()">Hantar</button>
            <button class="l-custom-btn" color="primary" (click)="navigatePreviousPage()">&lsaquo;</button>
            <button class="r-custom-btn" color="primary" (click)="navigateNextPage()">&rsaquo;</button>
        </div>
    </c-row>
</div>

<app-modal-component
  [visible]="PastiyesPasti"
  icon="tick"
  message="Rekod Telah Berjaya Disimpan"
  mode="ok"
  (close)="closePastiModal()"
></app-modal-component>

<app-modal-component
  [visible]="RekodDihantarModal"
  icon="tick"
  message="Rekod Telah Berjaya Dihantar"
  mode="ok"
  (close)="closeRekodDihantarModal()"
></app-modal-component>
