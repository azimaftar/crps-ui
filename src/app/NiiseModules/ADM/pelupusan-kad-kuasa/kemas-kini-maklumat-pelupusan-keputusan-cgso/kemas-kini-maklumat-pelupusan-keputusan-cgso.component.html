<div class="m-4 ms-0 bg-white rounded-3 w-100 h-auto p-4">
    <h3 class="fw-bold">Pelupusan Kad Kuasa</h3>

    <div class="bg-color-offwhite rounded-3 my-3">
        <div class="m-3">
            <app-stepper
            [currentMainStep]="currentMainStep"
            ></app-stepper>
        </div>
    </div>

    <div class="mt-3">
        <h6 class="mb-3 fw-bold">Kemas Kini Maklumat Pelupusan (Keputusan CGSO)</h6>
        <c-row class="mt-3">
            <c-col class="mb-3 d-flex align-items-center">
                <label for="file1" class="btn btn-primary primary-custom-btn me-3">
                  Muat Naik
                </label>
                <span class="ms-2">{{ selectedFileName1 || 'Tiada fail dipilih' }}</span>
                <input
                  type="file"
                  id="file1"
                  hidden
                  (change)="onFileChange1($event)"
                />
            </c-col>
        </c-row>
        <c-row [xs]="2">
            <c-col class="mb-3">
                <label for="caraPelupusan" cLabel class="mb-2">Cara Pelupusan</label>
                <select class="form-select" id="caraPelupusan">
                    <option value="">-Sila Pilih-</option>
                </select>
            </c-col>
            <c-col class="mb-3">
                <label for="tarikhPelupusan" cLabel class="mb-2">Kaedah Pelupusan</label>
                <input type="text" class="form-control" id="kaedahPelupusan" placeholder="Kaedah Pelupusan" disabled value="">
            </c-col>
            <c-col class="mb-3">
                <label for="tarikhPelupusan" cLabel class="mb-2">Tarikh Pelupusan</label>
                <input type="date" name="tarikhPelupusan" id="tarikhPelupusan" class="form-control">
            </c-col>
        </c-row>
        <c-row>
            <c-col class="mb-3 d-flex align-items-center">
                <label for="file2" class="btn btn-primary primary-custom-btn me-3">
                  Muat Naik
                </label>
                <span class="ms-2">{{ selectedFileName2 || 'Tiada fail dipilih' }}</span>
                <input
                  type="file"
                  id="file2"
                  hidden
                  (change)="onFileChange2($event)"
                />
            </c-col>
        </c-row>
    </div>
    <c-row>
        <hr class="my-3">
        <div class="d-flex justify-content-end">
            <button color="primary" class="primary-custom-btn w-auto px-4 me-4" (click)="SimpanRekod()">
                <c-icon name="cilCheckCircle" class="me-2"></c-icon>
                Simpan</button>
                <button color="primary" class="primary-custom-btn w-auto px-4 me-4" (click)="HantarRekod()">Hantar</button>
                <button class="l-custom-btn" color="primary" (click)="navigatePreviousPage()">&lsaquo;</button>
                <button class="r-custom-btn disabled-btn" color="primary" (click)="navigateNextPage()">&rsaquo;</button>
        </div>
    </c-row>
</div>

<app-modal-component
  [visible]="muatnaikModal"
  icon="danger"
  message="Dokumen Tidak Dapat Dimuat Naik. Sila Cuba Lagi"
  mode="ok"
  (close)="closeMuatnaikModal()"
></app-modal-component>

<app-modal-component
  [visible]="simpanRekodModal"
  icon="tick"
  message="Rekod Telah Berjaya Disimpan"
  mode="ok"
  (close)="closeSimpanRekodModal()"
></app-modal-component>

<app-modal-component
  [visible]="hantarRekodModal"
  icon="tick"
  message="Rekod Telah Berjaya Dihantar"
  mode="ok"
  (close)="closeHantarRekodModal()"
></app-modal-component>
