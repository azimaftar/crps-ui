<c-card>
  <c-card-body>
    <c-row class="mb-2">
      <c-col xs="12" md="12"><h6>Carian Maklumat Kakitangan</h6></c-col>
    </c-row>
    <c-row class="mb-4">
      <c-col xs="12" md="4">
        <select id="" class="form-select">
          <option value="">-Sila Pilih-</option>
          <option value="1">MyKad</option>
        </select>
      </c-col>
    </c-row>
    <c-row class="mb-4">
      <c-col xs="12" md="12">
        <label class="form-label">No. Doukumen/ID*</label>
        <input type="text" id="" class="form-control" />
      </c-col>
    </c-row>
    <c-row class="mb-5">
      <c-col xs="12" md="12" class="d-flex justify-content-end">
        <button type="button" class="btn btn-secondary">Carian</button>
      </c-col>
    </c-row>
  </c-card-body>
</c-card>

<!-- Rekod Berjaya Disimpan Modal -->
<c-modal
  [(visible)]="berjayaDisimpanVisible"
  size="sm"
  backdrop="static"
  keyboard="false"
>
  <c-modal-header class="border border-secondary">
    <!-- Image or Anything -->
    Icon Here
  </c-modal-header>
  <c-modal-body> Rekod Berjaya Disimpan </c-modal-body>
  <c-modal-footer class="justify-content-center">
    <button class="btn btn-secondary" (click)="berjayaDisimpanModalconfirm()">
      OK
    </button>
  </c-modal-footer>
</c-modal>

<!-- Rekod Berjaya Dihantar Modal -->
<c-modal
  [(visible)]="berjayaDihantarVisible"
  size="sm"
  backdrop="static"
  keyboard="false"
>
  <c-modal-header class="border border-secondary">
    <!-- Image or Anything -->
    Icon Here
  </c-modal-header>
  <c-modal-body> Rekod Telah Berjaya Dihantar </c-modal-body>
  <c-modal-footer class="justify-content-center">
    <button class="btn btn-secondary" (click)="berjayaDihantarModalconfirm()">
      OK
    </button>
  </c-modal-footer>
</c-modal>

<!-- Carian Tidak Wujud Modal -->
<c-modal
  [(visible)]="carianTidakWujudVisible"
  size="sm"
  backdrop="static"
  keyboard="false"
>
  <c-modal-header class="border border-secondary">
    <!-- Image or Anything -->
    Icon Here
  </c-modal-header>
  <c-modal-body> Maklumat Carian tidak wujud. Sila masukkan kunci carian lain </c-modal-body>
  <c-modal-footer class="justify-content-center">
    <button class="btn btn-secondary" (click)="carianTidakWujudModalconfirm()">
      OK
    </button>
  </c-modal-footer>
</c-modal>
