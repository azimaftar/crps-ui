<c-card>
    <c-card-body class="p-5">
        <h4 class="fw-bold mb-5">Carian Maklumat Pejabat</h4>
        <c-row [xs]="1" [md]="3">
            <c-col class="mb-3">
                <label for="jenisPejabat">Jenis Pejabat</label>
                <select id="jenisPejabat" class="form-select">
                    <option value="">-Sila Pilih-</option>
                    <option value="depot">Depot</option>
                    <option value="pejabat">Pejabat</option>
                </select>
            </c-col>
        </c-row>
        <c-row>
            <c-col class="mb-3">
                <label for="kodCawangan">Kod Cawangan</label>
                <input id="kodCawangan" class="form-control" />
            </c-col>
        </c-row>
        <c-row class="d-flex justify-content-end">
            <button color="primary" class="primary-custom-btn w-auto px-5" (click)="showSearchPopUp = true">
                Carian</button>
        </c-row>
    </c-card-body>
</c-card>

<!-- Carian Pop Up Modal -->
<app-modal-component
  [visible]="showSearchPopUp"
  title=""
  message="Maklumat carian tidak wujud. Sila masukkan kunci carian lain."
  mode="ok" 
  icon="danger"
  (close)="closeSearchPopUp()"
></app-modal-component>
