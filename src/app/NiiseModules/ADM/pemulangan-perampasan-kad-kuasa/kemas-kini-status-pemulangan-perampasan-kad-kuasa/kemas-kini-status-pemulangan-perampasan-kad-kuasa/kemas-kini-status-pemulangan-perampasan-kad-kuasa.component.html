<div class="m-4 ms-0 bg-white rounded-3 w-100 h-auto p-4">
  <h3 class="fw-bold">Kemas Kini Status Pemulangan/ Perampasan Kad Kuasa</h3>

  <div class="bg-color-offwhite rounded-3 my-3">
    <div class="m-3">
      <app-stepper [currentMainStep]="currentMainStep"></app-stepper>
    </div>
  </div>

  <div class="mt-3">
    <!-- <h6 class="mb-3 fw-bold">Maklumat Pengesahan</h6> -->
    <form cForm>
      <c-row [md]="2" [xs]="1">
        <c-col class="mb-3">
          <label for="statusPemulanganKadKuasa" cLabel class="mb-md-3 mb-0"
            >Status Pemulangan Kad Kuasa</label
          >
          <br />
          <c-row [md]="2" [xs]="1">
            <c-col>
              <input
                type="radio"
                name="statusPemulanganKadKuasa"
                value="terima"
                class="form-check-input me-2 custom-radio-color"
                id="terima"
              />
              <label for="terima" class="form-check-label me-5">Terima</label>
            </c-col>
            <c-col>
              <input
                type="radio"
                name="statusPemulanganKadKuasa"
                value="tidak terima"
                class="form-check-input me-2 custom-radio-color"
                id="tidak terima"
              />
              <label for="tidak terima" class="form-check-label"
                >Tidak Terima</label
              >
            </c-col>
          </c-row>
        </c-col>
        <c-col class="mb-3">
          <label for="tarikhTindakanSebenar" cLabel class="mb-md-3 mb-0"
            >Tarikh Tindakan Sebenar</label
          >
          <input type="date" class="form-control" id="tarikhTindakanSebenar" />
        </c-col>
      </c-row>
      <c-row [xs]="1">
        <c-col class="mb-3">
          <label for="disahkanOleh" cLabel>Disahkan Oleh</label>
          <input
            type="text"
            class="form-control"
            id="disahkanOleh"
            placeholder="Disahkan Oleh"
            disabled
            value="Ahmad Bin Zulkifli"
          />
        </c-col>
        <c-col class="mb-3">
          <label for="diterimaOleh" cLabel>Diterima Oleh</label>
          <input
            type="text"
            class="form-control"
            id="diterimaOleh"
            placeholder="Diterima Oleh"
            disabled
            value="Faizal Bin Salleh"
          />
        </c-col>
        <c-col class="mb-3">
          <label for="cacatan" cLabel>Cacatan</label>
          <textarea
            type="text"
            class="form-control"
            id="cacatan"
            placeholder="Cacatan"
            rows="3"
          ></textarea>
        </c-col>
      </c-row>
      <c-row [xs]="2">
        <c-col class="mb-3">
          <label for="statusKadKuasa" cLabel>Status Kad Kuasa</label>
          <select name="statusKadKuasa" id="statusKadKuasa" class="form-select">
            <option value="Aktif">Aktif</option>
            <option value="Tidak Aktif">Tidak Aktif</option>
          </select>
        </c-col>
      </c-row>
      <br />
      <hr />
      <br />
      <h6 class="mb-5 fw-bold">Maklumat Perampasan Kad Kuasa</h6>
      <c-row class="mx-3">
        <h6 class="mb-5 fw-bold">Dokumen Sokongan*</h6>
        <div class="table-responsive mb-3">
          <div class="table-wrapper w-100" style="overflow-x: auto">
            <table
              cTable
              hover
              responsive
              class="table-nowrap"
              style="width: 100%; min-width: 900px; overflow-x: hidden"
            >
              <thead>
                <tr>
                  <th style="min-width: 50px">Bil.</th>
                  <th
                    (click)="sort('namaDokumen')"
                    style="cursor: pointer; min-width: 150px"
                    class="sortable-header"
                  >
                    Nama
                    <mat-icon
                      *ngIf="sortColumn === 'namaDokumen'"
                      class="sort-icon"
                      >{{
                        sortAsc ? "arrow_upward" : "arrow_downward"
                      }}</mat-icon
                    >
                  </th>
                  <th>Format</th>
                  <th>Tindakan</th>
                </tr>
              </thead>
              <tbody>
                <tr *ngFor="let item of data; let i = index">
                  <td>{{ i + 1 + (currentPage - 1) * rowsPerPage }}.</td>
                  <td>{{ item.namaDokumen }}</td>
                  <td>{{ item.format }}</td>
                  <td class="text-nowrap">
                    <div class="d-flex align-items-center">
                      <button
                        color="primary"
                        class="primary-custom-btn w-auto px-4 me-2"
                        (click)="openMuatNaikModal()"
                      >
                        Muat Naik
                      </button>
                      <button
                        color="primary"
                        class="primary-custom-btn w-auto px-4"
                      >
                        Padam
                      </button>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
            <c-row
              class="d-flex align-items-start justify-content-start px-3 mx-0 w-100"
            >
              <button
                color="primary"
                class="primary-custom-btn w-auto h-auto px-4 mt-2 py-1 mb-2"
              >
                <mat-icon>add</mat-icon>
                Tambah Dokumen
              </button>
            </c-row>
          </div>
        </div>
        <c-row [md]="2" [xs]="1">
          <c-col class="mb-3">
            <label for="statusRampasanKadKuasa" cLabel class="mb-md-3 mb-0"
              >Status Rampasan Kad Kuasa</label
            >
            <br />
            <c-row [md]="2" [xs]="1">
              <c-col>
                <input
                  type="radio"
                  name="statusRampasanKadKuasa"
                  value="berjaya"
                  class="form-check-input me-2 custom-radio-color"
                  id="berjaya"
                />
                <label for="berjaya" class="form-check-label me-5"
                  >Berjaya</label
                >
              </c-col>
              <c-col>
                <input
                  type="radio"
                  name="statusRampasanKadKuasa"
                  value="tidak berjaya"
                  class="form-check-input me-2 custom-radio-color"
                  id="tidak berjaya"
                />
                <label for="tidak berjaya" class="form-check-label"
                  >Tidak Berjaya</label
                >
              </c-col>
            </c-row>
          </c-col>
          <c-col class="mb-3">
            <label for="tarikhRampasanKadKuasa" cLabel class="mb-md-3 mb-0"
              >Tarikh Rampasan Kad Kuasa</label
            >
            <input
              type="date"
              class="form-control"
              id="tarikhRampasanKadKuasa"
            />
          </c-col>
        </c-row>
      </c-row>
    </form>
  </div>
  <c-row>
    <hr class="my-3" />
    <div class="d-flex justify-content-end">
      <button
        color="primary"
        class="primary-custom-btn w-auto px-4 me-4"
        (click)="HantarRekodModal()"
      >
        Hantar
      </button>
      <button class="l-custom-btn" (click)="navigatePreviousPage()">
        &lsaquo;
      </button>
      <button class="r-custom-btn disabled-btn">&rsaquo;</button>
    </div>
  </c-row>
</div>

<app-modal-component
  [visible]="hantarRekodModal"
  icon="tick"
  message="Rekod Telah Berjaya Dihantar"
  mode="ok"
  (close)="closeHantarRekodModal()"
></app-modal-component>

<app-modal-component
  [visible]="muatNaikModal"
  icon="danger"
  message="Dokumen Tidak Dapat Dimuat Naik. Sila Cuba Lagi"
  mode="ok"
  (close)="closeMuatNaikModal()"
></app-modal-component>
