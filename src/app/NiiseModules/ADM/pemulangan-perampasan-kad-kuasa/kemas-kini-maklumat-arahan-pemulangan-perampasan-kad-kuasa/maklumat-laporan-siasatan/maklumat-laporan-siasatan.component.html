<div class="m-4 ms-0 bg-white rounded-3 w-100 h-auto p-4">
  <h3 class="fw-bold">Laporan Siasatan</h3>

  <div class="bg-color-offwhite rounded-3 my-3">
    <div class="m-3">
      <app-stepper [currentMainStep]="currentMainStep"></app-stepper>
    </div>
  </div>

  <div class="mt-3">
    <h6 class="mb-3 fw-bold">Maklumat Laporan Siasatan</h6>
    <c-row class="p-3">
      <h6 class="mb-3">Laporan Siasatan</h6>
      <c-col class="rounded-3 border border-secondary">
        <iframe
          src="sample_laporan.pdf"
          width="100%"
          height="500px"
          title="[Maklumat Laporan Siasatan]"
          style="border: none"
        ></iframe>
      </c-col>
    </c-row>
  </div>
  <c-row>
    <hr class="my-3" />
    <div class="d-flex justify-content-end">
      <button
        class="l-custom-btn"
        color="primary"
        (click)="navigatePreviousPage()"
      >
        &lsaquo;
      </button>
      <button class="r-custom-btn" color="primary" (click)="navigateNextPage()">
        &rsaquo;
      </button>
    </div>
  </c-row>
</div>
