<div class="m-4 ms-0 bg-white rounded-3 w-100 h-auto p-4">
  <h3 class="fw-bold">
    Kemas Kini Maklumat Arahan Pemulangan/ Perampasan Kad Kuasa
  </h3>

  <div class="bg-color-offwhite rounded-3 my-3">
    <div class="m-3">
      <app-stepper [currentMainStep]="currentMainStep"></app-stepper>
    </div>
  </div>

  <div class="mt-3">
    <h6 class="mb-3 fw-bold">
      Maklumat Arahan Pemulangan/ Perampasan Kad Kuasa
    </h6>
    <c-row class="mb-3 mt-4">
      <c-col>
        <label for="catatanArahan" cLabel class="mb-2"
          >Catatan Arahan Pemulangan/ Perampasan Kad Kuasa</label
        >
        <textarea
          class="form-control"
          id="catatanArahan"
          placeholder="Catatan Arahan Pemulangan/ Perampasan Kad Kuasa"
        ></textarea>
      </c-col>
    </c-row>
    <c-row class="mb-3" [xs]="2">
      <c-col>
        <label for="nomborRujukan" cLabel class="mb-2"
          >Nombor Rujukan Surat/ Fail/ Laporan Polis</label
        >
        <input
          type="text"
          class="form-control"
          id="nomborRujukan"
          placeholder="Nombor Rujukan Surat/ Fail/ Laporan Polis"
        />
      </c-col>
    </c-row>
  </div>
  <c-row>
    <hr class="my-3" />
    <div class="d-flex justify-content-end">
      <button
        color="primary"
        class="primary-custom-btn w-auto px-4 me-2"
        (click)="SimpanRekod()"
      >
        <c-icon name="cilCheckCircle" class="me-2"></c-icon>
        Simpan
      </button>
      <button
        color="primary"
        class="primary-custom-btn w-auto px-4 me-4"
        (click)="HantarRekod()"
      >
        Hantar
      </button>
      <button class="l-custom-btn" (click)="navigatePreviousPage()">
        &lsaquo;
      </button>
      <button class="r-custom-btn" (click)="navigateNextPage()">
        &rsaquo;
      </button>
    </div>
  </c-row>
</div>

<app-modal-component
  [visible]="simpanRekodModal"
  icon="tick"
  message="Rekod Telah Berjaya Disimpan"
  mode="ok"
  (close)="closeSimpanRekodModal()"
></app-modal-component>

<app-modal-component
  [visible]="hantarRekodModal"
  icon="tick"
  message="Rekod Telah Berjaya Dihantar"
  mode="ok"
  (close)="closeHantarRekodModal()"
></app-modal-component>
