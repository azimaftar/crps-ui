<c-card>
  <c-card-header class="bg-white text-dark">
    KEMAS KINI NOMBOR SIRI KAD KUASA
  </c-card-header>

  <c-card-body>
    <c-row>
      <c-col xs="12" md="9" class="order-2 order-md-1">
        <c-row class="mb-3">
          <h6>Maklumat Pemohon</h6>
        </c-row>
        <c-row
          class="mb-3 border mx-5"
          style="
            max-width: 300px;
            min-height: 300px;
            height: 300px;
            margin: 0 auto;
          "
        >
        </c-row>
        <c-row>
          <c-col xs="12" md="12" class="mb-3">
            <small>[Paparan Masej Status Pengambilan FLC Berjaya/ Gagal]</small>
          </c-col>
        </c-row>
        <c-row>
          <c-col xs="12" md="12" class="mb-3">
            <label>Nama Penuh</label>
            <input
              class="form-control"
              [(ngModel)]="maklumatPemohon.namaPenuh"
              [readonly]="readonlyField"
              [ngClass]="{ 'bg-light text-muted': readonlyField }"
            />
          </c-col>
        </c-row>

        <c-row>
          <c-col xs="12" md="6" class="mb-3">
            <label>Jenis Dokumen</label>
            <input
              class="form-control"
              [(ngModel)]="maklumatPemohon.jenisDokumen"
              [readonly]="readonlyField"
              [ngClass]="{ 'bg-light text-muted': readonlyField }"
            />
          </c-col>
          <c-col xs="12" md="6" class="mb-3">
            <label>No. Dokumen / ID</label>
            <input
              class="form-control"
              [(ngModel)]="maklumatPemohon.noDokumenID"
              [readonly]="readonlyField"
              [ngClass]="{ 'bg-light text-muted': readonlyField }"
            />
          </c-col>
        </c-row>

        <c-row>
          <c-col xs="12" md="6" class="mb-3">
            <label>Tarkih Lahir</label>
            <input
              type="date"
              class="form-control"
              [(ngModel)]="maklumatPemohon.tarikhLahir"
              [readonly]="readonlyField"
              [ngClass]="{ 'bg-light text-muted': readonlyField }"
            />
          </c-col>
          <c-col xs="12" md="6" class="mb-3">
            <label>Jantina</label>
            <input
              class="form-control"
              [(ngModel)]="maklumatPemohon.jantina"
              [readonly]="readonlyField"
              [ngClass]="{ 'bg-light text-muted': readonlyField }"
            />
          </c-col>
        </c-row>

        <c-row>
          <c-col xs="12" md="12" class="mb-3">
            <label>Alamat</label>
            <input
              class="form-control mb-3"
              [(ngModel)]="maklumatPemohon.alamat1"
              [readonly]="readonlyField"
              [ngClass]="{ 'bg-light text-muted': readonlyField }"
            />
            <input
              class="form-control mb-3"
              [(ngModel)]="maklumatPemohon.alamat2"
              [readonly]="readonlyField"
              [ngClass]="{ 'bg-light text-muted': readonlyField }"
            />
            <input
              class="form-control"
              [(ngModel)]="maklumatPemohon.alamat3"
              [readonly]="readonlyField"
              [ngClass]="{ 'bg-light text-muted': readonlyField }"
            />
          </c-col>
        </c-row>

        <c-row>
          <c-col xs="12" md="6" class="mb-3">
            <label>Poskod</label>
            <input
              class="form-control"
              [(ngModel)]="maklumatPemohon.poskod"
              [readonly]="readonlyField"
              [ngClass]="{ 'bg-light text-muted': readonlyField }"
            />
          </c-col>
          <c-col xs="12" md="6" class="mb-3">
            <label>Bandar</label>
            <input
              class="form-control"
              [(ngModel)]="maklumatPemohon.bandar"
              [readonly]="readonlyField"
              [ngClass]="{ 'bg-light text-muted': readonlyField }"
            />
          </c-col>
        </c-row>

        <c-row>
          <c-col xs="12" md="6" class="mb-3">
            <label>Negeri</label>
            <input
              class="form-control"
              [(ngModel)]="maklumatPemohon.negeri"
              [readonly]="readonlyField"
              [ngClass]="{ 'bg-light text-muted': readonlyField }"
            />
          </c-col>
        </c-row>

        <c-row class="mt-3 mb-3">
          <h6>Maklumat Perkhidmatan Dan Perjawatan</h6>
        </c-row>

        <c-row>
          <c-col xs="12" md="6" class="mb-3">
            <label>Pangkat</label>
            <input
              class="form-control"
              [(ngModel)]="maklumatPerkhidmatan.pangkat"
              [readonly]="readonlyField"
              [ngClass]="{ 'bg-light text-muted': readonlyField }"
            />
          </c-col>
          <c-col xs="12" md="6" class="mb-3">
            <label>Nombor Badan/ Perkhidmatan</label>
            <input
              class="form-control"
              [(ngModel)]="maklumatPerkhidmatan.nomborBadanPerkhidmatan"
              [readonly]="readonlyField"
              [ngClass]="{ 'bg-light text-muted': readonlyField }"
            />
          </c-col>
        </c-row>

        <c-row>
          <c-col
            xs="12"
            md="6"
            class="mb-3 d-flex flex-column justify-content-end"
          >
            <label>Tarkih Mula Berkhidmat</label>
            <input
              type="date"
              class="form-control"
              [(ngModel)]="maklumatPerkhidmatan.tarikhMulaBerkhidmat"
              [readonly]="readonlyField"
              [ngClass]="{ 'bg-light text-muted': readonlyField }"
            />
          </c-col>
          <c-col
            xs="12"
            md="6"
            class="mb-3 d-flex flex-column justify-content-end"
          >
            <label
              >Tarikh Lantikan Pertama Sebagai Pegawai Kanan (Jika
              Berkenaan)</label
            >
            <input
              type="date"
              class="form-control"
              [(ngModel)]="maklumatPerkhidmatan.tarikhLantikan"
              [readonly]="readonlyField"
              [ngClass]="{ 'bg-light text-muted': readonlyField }"
            />
          </c-col>
        </c-row>

        <c-row>
          <c-col xs="12" md="6" class="mb-3">
            <label>Nombor Pewartaan Pegawai Kanan</label>
            <input
              class="form-control mb-3"
              [(ngModel)]="maklumatPerkhidmatan.nomborPewartaan"
              [readonly]="readonlyField"
              [ngClass]="{ 'bg-light text-muted': readonlyField }"
            />
          </c-col>
        </c-row>

        <c-row class="mt-3 mb-3">
          <h6>Maklumat Penempatan</h6>
        </c-row>

        <c-row>
          <c-col xs="12" md="6" class="mb-3">
            <label>Bahagian</label>
            <input
              class="form-control"
              [(ngModel)]="maklumatPenempatan.bahagian"
              [readonly]="readonlyField"
              [ngClass]="{ 'bg-light text-muted': readonlyField }"
            />
          </c-col>
          <c-col xs="12" md="6" class="mb-3">
            <label>Negeri</label>
            <input
              class="form-control"
              [(ngModel)]="maklumatPenempatan.negeri"
              [readonly]="readonlyField"
              [ngClass]="{ 'bg-light text-muted': readonlyField }"
            />
          </c-col>
        </c-row>

        <c-row>
          <c-col xs="12" md="6" class="mb-3">
            <label>Cawangan</label>
            <input
              class="form-control"
              [(ngModel)]="maklumatPenempatan.cawangan"
              [readonly]="readonlyField"
              [ngClass]="{ 'bg-light text-muted': readonlyField }"
            />
          </c-col>
          <c-col xs="12" md="6" class="mb-3">
            <label>Unit</label>
            <input
              class="form-control"
              [(ngModel)]="maklumatPenempatan.unit"
              [readonly]="readonlyField"
              [ngClass]="{ 'bg-light text-muted': readonlyField }"
            />
          </c-col>
        </c-row>

        <c-row>
          <c-col xs="12" md="6" class="mb-3">
            <label>Lokasi Bertugas</label>
            <input
              class="form-control"
              [(ngModel)]="maklumatPenempatan.lokasiBertugas"
              [readonly]="readonlyField"
              [ngClass]="{ 'bg-light text-muted': readonlyField }"
            />
          </c-col>
          <c-col xs="12" md="6" class="mb-3">
            <label>Tarikh Berkuatkuasa</label>
            <input
              type="date"
              class="form-control"
              [(ngModel)]="maklumatPenempatan.tarikhBerkuatkuasa"
              [readonly]="readonlyField"
              [ngClass]="{ 'bg-light text-muted': readonlyField }"
            />
          </c-col>
        </c-row>

        <c-row>
          <c-col xs="12" md="6" class="mb-3">
            <label>Jenis Penempatan</label>
            <input
              class="form-control"
              [(ngModel)]="maklumatPenempatan.jenisPenempatan"
              [readonly]="readonlyField"
              [ngClass]="{ 'bg-light text-muted': readonlyField }"
            />
          </c-col>
          <c-col xs="12" md="6" class="mb-3">
            <label>Tempoh Penempatan</label>
            <input
              class="form-control"
              [(ngModel)]="maklumatPenempatan.tempohPenempatan"
              [readonly]="readonlyField"
              [ngClass]="{ 'bg-light text-muted': readonlyField }"
            />
          </c-col>
        </c-row>

        <c-row>
          <c-col xs="12" md="6" class="mb-3">
            <label>Kumpulan Syif (Jika Ada)</label>
            <input
              class="form-control"
              [(ngModel)]="maklumatPenempatan.kumpulanSyif"
              [readonly]="readonlyField"
              [ngClass]="{ 'bg-light text-muted': readonlyField }"
            />
          </c-col>
        </c-row>
      </c-col>

      <c-col xs="12" md="3" class="order-1 order-md-2">
        <!-- Loop through breadcrumb sections -->
        <ng-container *ngFor="let section of breadcrumbSections">
          <!-- Main Step (1, 2, 3, etc.) -->
          <div class="d-flex align-items-center mb-3">
            <div
              class="step-circle me-3"
              [ngClass]="{
                'active-step': section.mainStep === currentMainStep
              }"
            >
              {{ section.mainStep }}
            </div>
            <span>
              {{ section.mainLabel }}
            </span>
          </div>
        </ng-container>
      </c-col>

      <c-col
        xs="12"
        class="d-flex flex-wrap justify-content-end align-items-center gap-5 my-3 order-3 order-md-3"
      >
        <c-row>
          <c-col class="d-flex gap-3">
            <button type="button" class="btn btn-secondary" disabled>
              &lt;
            </button>
            <button type="button" class="btn btn-secondary">&gt;</button>
          </c-col>
        </c-row>
      </c-col>
    </c-row>
  </c-card-body>
</c-card>

<!-- Sila buat tandatangan anda di sini Modal -->
<c-modal
  [(visible)]="pengambilanFLCVisible"
  size="lg"
  backdrop="static"
  keyboard="false"
>
  <c-modal-header class="bg-primary text-white">
    PENGAMBILAN FLC
  </c-modal-header>
  <c-modal-body>
    <c-row class="d-flex justify-content-center">
      <c-row
        class="mb-3 border"
        style="max-width: 200px; min-height: 200px; height: 200px"
      ></c-row>
      <c-col xs="12" md="12" class="d-flex gap-3 justify-content-center">
        <button
          class="btn btn-secondary mb-3"
          (click)="pengambilanFLCModalconfirm()"
        >
          Kamera
        </button>
        <button
          class="btn btn-secondary mb-3"
          (click)="pengambilanFLCModalconfirm()"
        >
          Galeri
        </button>
      </c-col>
      <small class="d-flex justify-content-center mb-3"
        >[Paparan Masej Status Pengambilan FLC Berjaya/ Gagal]</small
      >
    </c-row>
  </c-modal-body>
  <c-modal-footer class="justify-content-end">
    <button type="button" class="btn btn-secondary">
      Hantar
    </button></c-modal-footer
  >
</c-modal>
