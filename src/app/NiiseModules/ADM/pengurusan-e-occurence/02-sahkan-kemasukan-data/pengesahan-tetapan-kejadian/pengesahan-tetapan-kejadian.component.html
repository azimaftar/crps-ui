<c-card>
    <h4 class="fw-bold m-3 mt-5">
        KEMASUKAN MAKLUMAT TETAPAN KEJADIAN e-OCCURENCE
    </h4>
    <div class="m-3">
        <app-stepper
        [currentMainStep]="currentMainStep"
        [currentSubStep]="currentSubStep"
        ></app-stepper>
    </div>
    <c-card-body class="px-5">
        <form [formGroup]="form">
            <c-row>
                <h6 class="fw-bold mb-3">Maklumat Tetapan Kejadian</h6>
            </c-row>
            <c-row>
                <c-col md="2" xs="12">
                    <label for="jenisKejadian" cLabel>Jenis Kejadian</label>
                </c-col>
                <c-col class="col-md-6">
                    <select class="form-select" id="jenisKejadian" formControlName="jenisKejadian">
                        <option value="">-Sila Pilih-</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                    </select>
                </c-col>
            </c-row>
            <c-row>
                <c-col md="2" xs="12">
                    <label for="jenisKejadian" cLabel>Kategori Kejadian</label>
                </c-col>
                <c-col class="col-md-6">
                    <select class="form-select" id="jenisKejadian" formControlName="kategoriKejadian">
                        <option value="">-Sila Pilih-</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                    </select>
                </c-col>
            </c-row>
            <c-row>
                <c-col md="2" xs="12">
                    <label for="jenisKejadian" cLabel>Sub Kategori Kejadian</label>
                </c-col>
                <c-col class="col-md-6">
                    <select class="form-select" id="jenisKejadian" formControlName="subKategoriKejadian">
                        <option value="">-Sila Pilih-</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                    </select>
                </c-col>
            </c-row>
            <c-row>
                <c-col md="2" xs="12">
                    <label for="jenisKejadian" cLabel>Tahap Kejadian</label>
                </c-col>
                <c-col class="col-md-6">
                    <select class="form-select" id="jenisKejadian" formControlName="tahapKejadian">
                        <option value="">-Sila Pilih-</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                    </select>
                </c-col>
            </c-row>
            <c-row>
                <c-col md="2" xs="12">
                    <label for="namaKejadian" cLabel>Nama Kejadian</label>
                </c-col>
                <c-col md="9">
                    <input type="text" class="form-control" id="namaKejadian" formControlName="namaKejadian">
                </c-col>
            </c-row>
            <c-row>
                <h6 class="fw-bold mb-3 mt-5">Pengesahan Maklumat Tetapan Kejadian e-Occurence</h6>
            </c-row>
            <c-row>
                <c-col md="2" xs="12">
                    <label for="statusPengesahan" cLabel>Status Pengesahan</label>
                </c-col>
                <c-col md="6" class="d-flex gap-4">
                    <c-form-check>
                        <input cFormCheckInput type="radio" value="sah" name="statusPengesahan" formControlName="statusPengesahan" id="statusPengesahanSah" />
                        <label cFormCheckLabel for="statusPengesahanSah">Sah</label>
                      </c-form-check>
                      
                      <c-form-check>
                        <input cFormCheckInput type="radio" value="tidakSah" name="statusPengesahan" formControlName="statusPengesahan" id="statusPengesahanTidakSah" />
                        <label cFormCheckLabel for="statusPengesahanTidakSah">Tidak Sah</label>
                      </c-form-check>                      
                </c-col>
            </c-row>
            <c-row>
                <c-col md="2" xs="12">
                    <label for="catatan" cLabel>Catatan</label>
                </c-col>
                <c-col md="9">
                    <textarea class="form-control" id="catatan" formControlName="catatan" rows="3"></textarea>
                </c-col>
            </c-row>
        </form>
    </c-card-body>
    <c-card-footer>
        <c-row>
            <div class="d-flex justify-content-end">
                <button color="primary" class="primary-custom-btn w-auto px-4 me-2" (click)="SimpanRekod(form)">
                    <c-icon name="cilCheckCircle" class="me-2"></c-icon>
                    Simpan</button>
                <button color="primary" class="primary-custom-btn w-auto px-4 me-2" (click)="HantarRekod(form)">
                    Hantar</button>
                <button class="l-custom-btn" (click)="navigatePreviousPage()">&lsaquo;</button>
                <button class="r-custom-btn disabled-btn" disabled>&rsaquo;</button>
            </div>
        </c-row>
    </c-card-footer>
  </c-card>
  
  <app-modal-component
    [visible]="simpanRekodModal"
    title=""
    message="Rekod Telah Berjaya Disimpan"
    mode="ok"
    icon="tick"
    (close)="closeSimpanRekodModal()"
  ></app-modal-component>
  
  <app-modal-component
    [visible]="hantarRekodModal"
    title=""
    message="Rekod Telah Berjaya Dihantar"
    mode="ok"
    icon="tick"
    (close)="closeHantarRekodModal()"
  ></app-modal-component>
  
  <!-- Tidak Dapat Muat Naik Modal -->
  <app-modal-component
    [visible]="medanMandatoriVisible"
    title=""
    message="Medan Mandatori diperlukan"
    mode="ok"
    icon="danger"
    (close)="medanMandatoriModalconfirm()"
  ></app-modal-component>
