<c-card>
  <c-card-body>
    <c-row class="my-4">
      <h4 class="fw-bold">TANDATANGAN DIGITAL</h4>
    </c-row>

    <app-stepper
      [currentMainStep]="currentMainStep"
      [currentSubStep]="currentSubStep"
    ></app-stepper>

    <c-row class="my-5">
      <c-col xs="12" md="12" class="mb-5">
        <c-row class="mb-3">
          <label>Keperluan Tandatangan Digital</label>
        </c-row>
        <c-row>
          <c-col>
            <input
              class="form-check-input mx-2"
              name="keperluanTandatangan"
              [(ngModel)]="keperluanTandatangan"
              type="radio"
              value="Ya"
            />
            <label>Ya</label>
            <input
              class="form-check-input mx-2"
              name="keperluanTandatangan"
              [(ngModel)]="keperluanTandatangan"
              type="radio"
              value="Tidak"
            />
            <label>Tidak</label>
          </c-col>
        </c-row>
      </c-col>
      <c-col xs="12" md="6">
        <label class="mb-2">Status Tandatangan Digital</label>
        <input
          type="text"
          class="form-control"
          [(ngModel)]="maklumatTandatangan.sudahTandatangan"
          [readonly]="readonlyField"
          [ngClass]="{ 'bg-light text-muted': readonlyField }"
        />
      </c-col>
      <c-col
        xs="12"
        md="6"
        class="d-flex justify-content-end align-items-end gap-3"
      >
        <button
          type="button"
          class="btn btn-secondary btn-custom-digitalButton px-lg-5"
          (click)="tandatanganModalVisible = true"
        >
          Semak
        </button>
        <button
          type="button"
          class="btn btn-secondary btn-custom-digitalButton px-lg-5"
          (click)="tandatanganModalVisible = true"
          [disabled]="readonlyFieldSignature"
        >
          Ambil
        </button>
      </c-col>
    </c-row>

    <c-row style="border-top: 1px solid rgba(0, 0, 0, 0.1)" class="pt-4">
      <c-col xs="8" md="10" class="d-flex justify-content-end">
        <button
          type="button"
          class="btn-custom-normalBlue fw-semibold btn btn-primary"
          (click)="navigateClosePage()"
        >
          Tutup
        </button>
      </c-col>

      <c-col xs="4" md="2" class="d-flex justify-content-end">
        <button
          type="button"
          class="btn-custom-normalWhite fw-semibold btn btn-light"
          (click)="navigatePreviousPage()"
        >
          &lt;
        </button>
        <button
          type="button"
          class="btn-custom-normalWhite fw-semibold btn btn-light"
          (click)="navigateNextPage()"
        >
          &gt;
        </button>
      </c-col>
    </c-row>
  </c-card-body>
</c-card>

<!-- Sila buat tandatangan anda di sini Modal -->
<c-modal [(visible)]="tandatanganModalVisible" size="lg">
  <c-modal-body>
    <c-row>
      <c-col
        xs="12"
        md="12"
        class="d-flex justify-content-center"
        *ngIf="!readonlyFieldSignature"
      >
        Sila Buat Tandatangan Anda Di Sini
      </c-col>
      <c-col
        xs="12"
        md="12"
        class="d-flex justify-content-center"
        *ngIf="readonlyFieldSignature"
      >
        Semakan Tandatangan
      </c-col>
      <c-col
        xs="12"
        md="12"
        class="d-flex justify-content-center align-items-center border mx-auto"
        style="min-height: 200px; max-width: 300px"
        *ngIf="readonlyFieldSignature"
      >
        <img
          [src]="'data:image/png;base64,' + digitalSignatureImage"
          alt="Digital Signature"
          style="max-width: 200px; height: auto;"
        />
      </c-col>
      <c-col
        xs="12"
        md="12"
        class="d-flex justify-content-center align-items-center border mx-auto"
        style="min-height: 200px; max-width: 300px"
        *ngIf="!readonlyFieldSignature"
      >
        <input
          type="file"
          accept="image/png"
          class="form-control"
          (change)="onFileSelected($event)"
          [readonly]="readonlyFieldSignature"
          [ngClass]="{ 'bg-light text-muted': readonlyFieldSignature }"
        />
      </c-col>
    </c-row>
  </c-modal-body>
  <c-modal-footer class="justify-content-center">
    <button
      class="btn btn-secondary"
      (click)="SetSemula()"
      [hidden]="readonlyFieldSignature"
    >
      Set Semula
    </button>
    <button
      class="btn btn-secondary"
      (click)="uploadTandatanganDigital('Simpan')"
      [hidden]="readonlyFieldSignature"
    >
      Simpan
    </button>
    <button
      class="btn btn-secondary"
      (click)="uploadTandatanganDigital('Hantar')"
      [hidden]="readonlyFieldSignature"
    >
      Hantar
    </button>
  </c-modal-footer>
</c-modal>
