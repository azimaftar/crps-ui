<div class="custom-content-wrapper">
  <c-card>
    <c-card-body>
      <c-row class="my-2">
        <h4 class="fw-bold">MAKLUMAT PROFIL KAKITANGAN</h4>
      </c-row>

      <c-row class="my-2">
        <c-col>
          <ng-container *ngFor="let section of mainSteps">
            <button
              type="button"
              class="btn-custom-breadcrumbADM btn btn-light d-inline-flex gap-2 fw-semibold"
              [ngClass]="{
                'btn-custom-breadcrumbADM-active':
                  section.mainStep === currentMainStep
              }"
            >
              <span
                class="btn-custom-breadcrumbNoADM"
                [ngClass]="{
                  'btn-custom-breadcrumbNoADM-active':
                    section.mainStep === currentMainStep
                }"
                >{{ section.mainStep }}</span
              >
              <span class="btn-custom-breadcrumbLabelADM">{{
                section.mainLabel
              }}</span>
            </button>
          </ng-container>
        </c-col>
      </c-row>

      <c-row class="my-2">
        <c-col class="d-flex flex-nowrap overflow-auto align-items-stretch">
          <ng-container *ngFor="let section of subSteps">
            <button
              type="button"
              class="btn-custom-breadcrumbADM btn btn-light fw-bold d-inline-flex gap-2 flex-shrink-0"
              #subButton
              [ngClass]="{
                'btn-custom-breadcrumbADM-active':
                  section.mainStep === currentMainStep &&
                  section.subStep === currentSubStep
              }"
            >
              <span
                class="btn-custom-breadcrumbNoADM"
                [ngClass]="{
                  'btn-custom-breadcrumbNoADM-active':
                    section.mainStep === currentMainStep &&
                    section.subStep === currentSubStep
                }"
                >{{ section.subStep }}</span
              >
              <span class="btn-custom-breadcrumbLabelADM">{{
                section.subLabel
              }}</span>
            </button>
          </ng-container>
        </c-col>
      </c-row>

      <c-row>
        <c-col xs="12" md="12" class="order-2 order-md-1 mt-3">
          <c-row class="mb-2">
            <h5 class="fw-semibold">Maklumat Akademik</h5>
          </c-row>
          <c-container class="m-0 px-0 overflow-x-auto" style="max-width: 100vw;">
            <c-row class="align-items-end flex-md-nowrap">
              <c-col xs="12" md="6">
                <label class="fw-semibold">Nama Institusi Pengajian</label>
                <input
                  class="form-control mb-3 mb-3"
                  [(ngModel)]="maklumatAkademik1.namaInsitusi1"
                />
                <input
                  class="form-control mb-3 mb-3"
                  [(ngModel)]="maklumatAkademik1.namaInsitusi2"
                />
                <input
                  class="form-control mb-3"
                  [(ngModel)]="maklumatAkademik1.namaInsitusi3"
                />
                <input
                  class="form-control mb-3"
                  [(ngModel)]="maklumatAkademik1.namaInsitusi4"
                />
                <input
                  class="form-control mb-3"
                  [(ngModel)]="maklumatAkademik1.namaInsitusi5"
                />
              </c-col>
              <c-col xs="12" md="6">
                <label class="fw-semibold">Bidang Pengkhususan</label>
                <input
                  class="form-control mb-3"
                  [(ngModel)]="maklumatAkademik1.bidangPengkususan1"
                />
                <input
                  class="form-control mb-3"
                  [(ngModel)]="maklumatAkademik1.bidangPengkususan2"
                />
                <input
                  class="form-control mb-3"
                  [(ngModel)]="maklumatAkademik1.bidangPengkususan3"
                />
                <input
                  class="form-control mb-3"
                  [(ngModel)]="maklumatAkademik1.bidangPengkususan4"
                />
                <input
                  class="form-control mb-3"
                  [(ngModel)]="maklumatAkademik1.bidangPengkususan5"
                />
              </c-col>
              <c-col xs="12" md="4">
                <label class="fw-semibold">Kelulusan Dicapai</label>
                <select
                  class="form-select mb-3"
                  [(ngModel)]="documentType">
                      <option value="">Ijazah Sarjana Muda</option>
                  </select>
                <input
                  class="form-control mb-3"
                  [(ngModel)]="maklumatAkademik1.kelulusanDicapai2"
                />
                <input
                  class="form-control mb-3"
                  [(ngModel)]="maklumatAkademik1.kelulusanDicapai3"
                />
                <input
                  class="form-control mb-3"
                  [(ngModel)]="maklumatAkademik1.kelulusanDicapai4"
                />
                <input
                  class="form-control mb-3"
                  [(ngModel)]="maklumatAkademik1.kelulusanDicapai5"
                />
              </c-col>
              <c-col xs="12" md="4">
                <label class="fw-semibold">Luar/Dalam Negara</label>
                <select
                  class="form-select mb-3"
                  [(ngModel)]="documentType">
                  <option value="">Luar Negara</option>
                  </select>
                <input
                  class="form-control mb-3"
                  [(ngModel)]="maklumatAkademik1.luarDalamNegara2"
                />
                <input
                  class="form-control mb-3"
                  [(ngModel)]="maklumatAkademik1.luarDalamNegara3"
                />
                <input
                  class="form-control mb-3"
                  [(ngModel)]="maklumatAkademik1.luarDalamNegara4"
                />
                <input
                  class="form-control mb-3"
                  [(ngModel)]="maklumatAkademik1.luarDalamNegara5"
                />
              </c-col>
              <c-col xs="12" md="4">
                <label class="fw-semibold">Tempoh Pengajian</label>
                <input
                  class="form-control mb-3"
                  [(ngModel)]="maklumatAkademik1.tempohPengajian1"
                />
                <input
                  class="form-control mb-3"
                  [(ngModel)]="maklumatAkademik1.tempohPengajian2"
                />
                <input
                  class="form-control mb-3"
                  [(ngModel)]="maklumatAkademik1.tempohPengajian3"
                />
                <input
                  class="form-control mb-3"
                  [(ngModel)]="maklumatAkademik1.tempohPengajian4"
                />
                <input
                  class="form-control mb-3"
                  [(ngModel)]="maklumatAkademik1.tempohPengajian5"
                />
              </c-col>
              <c-col xs="12" md="4">
                <label class="fw-semibold">Tahun Tamat</label>
                <input
                  class="form-control mb-3"
                  [(ngModel)]="maklumatAkademik1.tahunTamat1"
                />
                <input
                  class="form-control mb-3"
                  [(ngModel)]="maklumatAkademik1.tahunTamat2"
                />
                <input
                  class="form-control mb-3"
                  [(ngModel)]="maklumatAkademik1.tahunTamat3"
                />
                <input
                  class="form-control mb-3"
                  [(ngModel)]="maklumatAkademik1.tahunTamat4"
                />
                <input
                  class="form-control mb-3"
                  [(ngModel)]="maklumatAkademik1.tahunTamat5"
                />
              </c-col>
            </c-row>
          </c-container>

          <button class="btn btn-primary mb-3" style="margin-top: 20px;"> + Tambah Maklumat</button>
        </c-col>
      </c-row>

      <c-row style="border-top: 1px solid rgba(0, 0, 0, 0.1)">
        <c-col class="d-flex gap-5 flex-shrink-0 justify-content-end py-3">

          <div class="d-flex">
            <button
              type="button"
              class="btn-custom-normalWhite fw-semibold btn btn-light"
              (click)="back()"
            >
              &lt;
            </button>
            <button
              type="button"
              class="btn-custom-normalWhite fw-semibold btn btn-light"
              (click)="next()"
            >
              &gt;
            </button>
          </div>
        </c-col>
      </c-row>
    </c-card-body>
  </c-card>
</div>
