<c-card>
  <c-card-body>
    <c-row>
      <!-- <c-col xs="12" md="1" class="order-2 order-md-1">
      </c-col> -->
      <c-col xs="12" md="12" class="order-2 order-md-1">
        <c-row class="mb-2 mt-3">
          <h5 class="fw-semibold">Dokumen Sokongan*</h5>
        </c-row>
        <c-row class="mb-5 px-2 table-responsive mx-auto" style="width: 95%;">
          <table class="table">
            <thead>
              <tr class="align-middle">
                <th class="py-4" style="width: 50px;">Bil.</th>
                <th class="py-4" style="width: 550px;">Nama Dokumen</th>
                <th class="py-4" style="width: 100px;">Format</th>
                <th class="py-4" style="width: 50px;">Tindakan</th>
              </tr>
            </thead>
            <tbody>
              <tr
                *ngFor="let item of tableData; let i = index"
                class="align-middle"
              >
                <td class="py-4">{{ i + 1 }}</td>
                <td class="py-4">{{ item.namaDokumen }}</td>
                <td class="py-4">{{ item.format }}</td>
                <td class="py-4 px-6 d-flex gap-2">
                  <button type="button" class="custom-button">
                    <img src="../../../../../../assets/images/file-upload-icon.svg" alt="download" class="saveIcon" style="margin-bottom: 2px;">
                  </button>
                  <button type="button" class="custom-button">
                    <img src="../../../../../../assets/images/trash-2.svg" alt="delete" class="saveIcon" style="margin-bottom: 2px;">
                  </button>
                </td>
              </tr>
            </tbody>
          </table>
        </c-row>
        <button class="btn btn-primary mb-3 ms-5"> + Tambah Maklumat</button>
      </c-col>
    </c-row>
    <c-row style="border-top: 1px solid rgba(0, 0, 0, 0.1)">
      <c-col class="d-flex gap-5 flex-shrink-0 justify-content-end py-3">

        <div class="d-flex gap-3">
          <button type="button" class="custom-button">
            <img src="../../../../../../assets/images/save-44.svg" alt="save" class="saveIcon" style="margin-right: 5px;margin-bottom: 2px;">
            Simpan</button>
          <button type="button" class="btn btn-primary">
            <img src="../../../../../../assets/images/circle-check.svg" alt="send" style="margin-right: 5px;margin-bottom: 2px;">
            Hantar</button>
        </div>

        <div class="d-flex">
          <button
            type="button"
            class="btn-custom-normalWhite fw-semibold btn btn-light"
            (click)="back()"
          >
            &lt;
          </button>
          <button
            type="button"
            class="btn-custom-normalWhite fw-semibold btn btn-light"
            disabled
          >
            &gt;
          </button>
        </div>
      </c-col>
    </c-row>
  </c-card-body>
</c-card>
