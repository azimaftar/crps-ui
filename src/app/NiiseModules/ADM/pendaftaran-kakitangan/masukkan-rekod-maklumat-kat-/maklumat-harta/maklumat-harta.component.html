<div class="custom-content-wrapper">   
  <c-card>
    <c-card-body>
      <c-row class="my-2">
        <h4 class="fw-bold">MAKLUMAT PROFIL KAKITANGAN</h4>
      </c-row>

      <c-row class="my-2">
        <c-col>
          <ng-container *ngFor="let section of mainSteps">
            <button
              type="button"
              class="btn-custom-breadcrumbADM btn btn-light d-inline-flex gap-2 fw-semibold"
              [ngClass]="{
                'btn-custom-breadcrumbADM-active':
                  section.mainStep === currentMainStep
              }"
            >
              <span
                class="btn-custom-breadcrumbNoADM"
                [ngClass]="{
                  'btn-custom-breadcrumbNoADM-active':
                    section.mainStep === currentMainStep
                }"
                >{{ section.mainStep }}</span
              >
              <span class="btn-custom-breadcrumbLabelADM">{{
                section.mainLabel
              }}</span>
            </button>
          </ng-container>
        </c-col>
      </c-row>

      <c-row class="my-2">
        <c-col class="d-flex flex-nowrap overflow-auto align-items-stretch">
          <ng-container *ngFor="let section of subSteps">
            <button
              type="button"
              class="btn-custom-breadcrumbADM btn btn-light fw-bold d-inline-flex gap-2 flex-shrink-0"
              #subButton
              [ngClass]="{
                'btn-custom-breadcrumbADM-active':
                  section.mainStep === currentMainStep &&
                  section.subStep === currentSubStep
              }"
            >
              <span
                class="btn-custom-breadcrumbNoADM"
                [ngClass]="{
                  'btn-custom-breadcrumbNoADM-active':
                    section.mainStep === currentMainStep &&
                    section.subStep === currentSubStep
                }"
                >{{ section.subStep }}</span
              >
              <span class="btn-custom-breadcrumbLabelADM">{{
                section.subLabel
              }}</span>
            </button>
          </ng-container>
        </c-col>
      </c-row>

      <c-row>
        <c-col xs="12" md="12" class="order-2 order-md-1 mt-3">
          <c-row class="mb-2">
            <h5 class="fw-semibold">Maklumat Harta</h5>
          </c-row>
          <c-container class="m-0 px-0 overflow-x-auto" style="max-width: 100vw;">
            <c-row class="align-items-end flex-md-nowrap">
              <c-col xs="12" md="4">
                <label class="fw-semibold">Jenis Harta</label>
                <input
                  class="form-control mb-3 mb-3"
                  [(ngModel)]="maklumatHarta1.jenisHarta1"
                />
                <input
                  class="form-control mb-3 mb-3"
                  [(ngModel)]="maklumatHarta1.jenisHarta2"
                />
                <input
                  class="form-control mb-3"
                  [(ngModel)]="maklumatHarta1.jenisHarta3"
                />
                <input
                  class="form-control mb-3"
                  [(ngModel)]="maklumatHarta1.jenisHarta4"
                />
                <input
                  class="form-control mb-3"
                  [(ngModel)]="maklumatHarta1.jenisHarta5"
                />
              </c-col>
              <c-col xs="12" md="6">
                <label class="fw-semibold">Keterangan Harta</label>
                <input
                  class="form-control mb-3"
                  [(ngModel)]="maklumatHarta1.keteranganHarta1"
                />
                <input
                  class="form-control mb-3"
                  [(ngModel)]="maklumatHarta1.keteranganHarta2"
                />
                <input
                  class="form-control mb-3"
                  [(ngModel)]="maklumatHarta1.keteranganHarta3"
                />
                <input
                  class="form-control mb-3"
                  [(ngModel)]="maklumatHarta1.keteranganHarta4"
                />
                <input
                  class="form-control mb-3"
                  [(ngModel)]="maklumatHarta1.keteranganHarta5"
                />
              </c-col>
              <c-col xs="12" md="4">
                <label class="fw-semibold">Tarikh Diisytiharkan</label>
                <input
                  type="date"
                  class="form-control mb-3"
                  [(ngModel)]="maklumatHarta1.tarikhDiisytiharkan1"
                />
                <input
                  type="date"
                  class="form-control mb-3"
                  [(ngModel)]="maklumatHarta1.tarikhDiisytiharkan2"
                />
                <input
                  type="date"
                  class="form-control mb-3"
                  [(ngModel)]="maklumatHarta1.tarikhDiisytiharkan3"
                />
                <input
                  type="date"
                  class="form-control mb-3"
                  [(ngModel)]="maklumatHarta1.tarikhDiisytiharkan4"
                />
                <input
                  type="date"
                  class="form-control mb-3"
                  [(ngModel)]="maklumatHarta1.tarikhDiisytiharkan5"
                />
              </c-col>
              <c-col xs="12" md="4">
                <label class="fw-semibold">Sumber Perolehan Harta</label>
                <input
                  class="form-control mb-3"
                  [(ngModel)]="maklumatHarta1.sumberPerolehan1"
                />
                <input
                  class="form-control mb-3"
                  [(ngModel)]="maklumatHarta1.sumberPerolehan2"

                />
                <input
                  class="form-control mb-3"
                  [(ngModel)]="maklumatHarta1.sumberPerolehan3"
                />
                <input
                  class="form-control mb-3"
                  [(ngModel)]="maklumatHarta1.sumberPerolehan4"
                />
                <input
                  class="form-control mb-3"
                  [(ngModel)]="maklumatHarta1.sumberPerolehan5"

                />
              </c-col>
              <c-col xs="12" md="4">
                <label class="fw-semibold">Nilai Harta</label>
                <input
                  class="form-control mb-3"
                  [(ngModel)]="maklumatHarta1.nilaiHarta1"
                />
                <input
                  class="form-control mb-3"
                  [(ngModel)]="maklumatHarta1.nilaiHarta2"
                />
                <input
                  class="form-control mb-3"
                  [(ngModel)]="maklumatHarta1.nilaiHarta3"
                />
                <input
                  class="form-control mb-3"
                  [(ngModel)]="maklumatHarta1.nilaiHarta4"
                />
                <input
                  class="form-control mb-3"
                  [(ngModel)]="maklumatHarta1.nilaiHarta5"
                />
              </c-col>
              <c-col xs="12" md="4">
                <label class="fw-semibold">Anggaran Nilai Semasa Harta</label>
                <input
                  class="form-control mb-3"
                  [(ngModel)]="maklumatHarta1.anggaranNilaiSemasa1"
                />
                <input
                  class="form-control mb-3"
                  [(ngModel)]="maklumatHarta1.anggaranNilaiSemasa2"
                />
                <input
                  class="form-control mb-3"
                  [(ngModel)]="maklumatHarta1.anggaranNilaiSemasa3"
                />
                <input
                  class="form-control mb-3"
                  [(ngModel)]="maklumatHarta1.anggaranNilaiSemasa4"
                />
                <input
                  class="form-control mb-3"
                  [(ngModel)]="maklumatHarta1.anggaranNilaiSemasa5"
                />
              </c-col>
              <c-col xs="12" md="6">
                <label class="fw-semibold">Alamat Harta</label>
                <input
                  class="form-control mb-3"
                  [(ngModel)]="maklumatHarta1.alamatHarta1"
                />
                <input
                  class="form-control mb-3"
                  [(ngModel)]="maklumatHarta1.alamatHarta2"
                />
                <input
                  class="form-control mb-3"
                  [(ngModel)]="maklumatHarta1.alamatHarta3"
                />
                <input
                  class="form-control mb-3"
                  [(ngModel)]="maklumatHarta1.alamatHarta4"
                />
                <input
                  class="form-control mb-3"
                  [(ngModel)]="maklumatHarta1.alamatHarta5"
                />
              </c-col>
              <c-col xs="12" md="6">
                <label class="fw-semibold">Catatan</label>
                <input
                  class="form-control mb-3"
                  [(ngModel)]="maklumatHarta1.catatan1"
                />
                <input
                  class="form-control mb-3"
                  [(ngModel)]="maklumatHarta1.catatan2"
                />
                <input
                  class="form-control mb-3"
                  [(ngModel)]="maklumatHarta1.catatan3"
                />
                <input
                  class="form-control mb-3"
                  [(ngModel)]="maklumatHarta1.catatan4"
                />
                <input
                  class="form-control mb-3"
                  [(ngModel)]="maklumatHarta1.sumberPerolehan5"
                />
              </c-col>
            </c-row>
          </c-container>

              <button class="btn btn-primary mb-3" style="margin-top: 20px;"> + Tambah Maklumat</button>

        </c-col>
      </c-row>

      <c-row style="border-top: 1px solid rgba(0, 0, 0, 0.1)">
        <c-col class="d-flex gap-5 flex-shrink-0 justify-content-end py-3">

          <div class="d-flex">
            <button
              type="button"
              class="btn-custom-normalWhite fw-semibold btn btn-light"
              (click)="back()"
            >
              &lt;
            </button>
            <button
              type="button"
              class="btn-custom-normalWhite fw-semibold btn btn-light"
              (click)="next()"
            >
              &gt;
            </button>
          </div>
        </c-col>
      </c-row>
    </c-card-body>
  </c-card>
</div>
