<c-card>
  <c-card-body>
    <c-row class="my-4">
      <h4 class="fw-bold">LULUSKAN PENDAFTARAN KAKITANGAN</h4>
    </c-row>

    <app-stepper
      [currentMainStep]="currentMainStep"
      [currentSubStep]="currentSubStep"
    ></app-stepper>

    <c-row>
      <c-row class="mt-3 mb-3">
        <h6>Maklumat Pendaftaran Kakitangan</h6>
      </c-row>
      <c-row>
        <c-col xs="12" md="12" class="mb-3">
          <label>Nama</label>
          <input
            class="form-control"
            [(ngModel)]="maklumatKakitangan.nama"
            [readonly]="readonlyField"
            [ngClass]="{ 'bg-light text-muted': readonlyField }"
          />
        </c-col>
      </c-row>
      <c-row>
        <c-col xs="12" md="6" class="mb-3">
          <label>No. Dokumen /ID</label>
          <input
            class="form-control"
            [(ngModel)]="maklumatKakitangan.noDokumenID"
            [readonly]="readonlyField"
            [ngClass]="{ 'bg-light text-muted': readonlyField }"
          />
        </c-col>
        <c-col xs="12" md="6" class="mb-3">
          <label>Jawatan</label>
          <input
            class="form-control"
            [(ngModel)]="maklumatKakitangan.jawatan"
            [readonly]="readonlyField"
            [ngClass]="{ 'bg-light text-muted': readonlyField }"
          />
        </c-col>
      </c-row>
      <c-row>
        <c-col xs="12" md="6" class="mb-3">
          <label>Gred</label>
          <input
            class="form-control"
            [(ngModel)]="maklumatKakitangan.gred"
            [readonly]="readonlyField"
            [ngClass]="{ 'bg-light text-muted': readonlyField }"
          />
        </c-col>
      </c-row>
      <c-row class="mt-5 mb-3">
        <h6>Kelulusan Oleh Pelulus</h6>
      </c-row>
      <c-row>
        <c-col xs="12" md="12" class="mb-3">
          <label>Status Kelulusan</label>
          <c-col class="d-flex gap-3">
            <button type="button" class="btn btn-secondary btn-custom-pendaftaranButton">Lulus</button>
            <button type="button" class="btn btn-secondary btn-custom-pendaftaranButton">Tidak Lulus</button>
          </c-col>
        </c-col>
      </c-row>
      <c-row>
        <c-col xs="12" md="12" class="mb-3">
          <label>Disahkan Oleh</label>
          <input
            class="form-control"
            [(ngModel)]="maklumatKakitangan.disahkanOleh"
            [readonly]="readonlyField"
            [ngClass]="{ 'bg-light text-muted': readonlyField }"
          />
        </c-col>
      </c-row>
      <c-row>
        <c-col xs="12" md="12" class="mb-3">
          <label>Catatan</label>
          <textarea class="form-control" style="height: 100px"></textarea>
        </c-col>
      </c-row>
      <c-row>
        <c-col xs="12" md="6" class="mb-3">
          <label>Tarikh Pengesahan</label>
          <input type="date" class="form-control" />
        </c-col>
        <c-col xs="12" md="6" class="mb-3">
          <label>Masa Pengesahan</label>
          <input class="form-control" />
        </c-col>
      </c-row>
    </c-row>

    <c-row style="border-top: 1px solid rgba(0, 0, 0, 0.1)" class="pt-4">
      <c-col xs="8" md="10" class="d-flex justify-content-end">
        <button
          type="button"
          class="btn-custom-normalBlue fw-semibold btn btn-primary"
        >
          Hantar
        </button>
      </c-col>

      <c-col xs="4" md="2" class="d-flex justify-content-end">
        <button
          type="button"
          class="btn-custom-normalWhite fw-semibold btn btn-light"
        >
          &lt;
        </button>
        <button
          type="button"
          class="btn-custom-normalWhite fw-semibold btn btn-light"
          disabled
        >
          &gt;
        </button>
      </c-col>
    </c-row>
  </c-card-body>
</c-card>
