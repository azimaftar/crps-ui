<c-card>
  <c-card-body>
    <c-row class="my-2">
      <h4 class="fw-bold">MAKLUMAT PROFIL KAKITANGAN</h4>
    </c-row>

    <app-stepper
      [currentMainStep]="currentMainStep"
      [currentSubStep]="currentSubStep"
    ></app-stepper>

    <c-row class="my-5">
      <c-row class="mb-3">
        <c-col xs="12" md="6">
          <h5>Maklumat Keluarga (Ibu/Bapa)</h5>
        </c-col>
        <c-col xs="12" md="6" class="d-flex justify-content-end">
          <button type="button" class="btn btn-primary">Kemas Kini</button>
        </c-col>
      </c-row>
      <c-row>
        <c-col xs="12" md="6" class="mb-3">
          <label>Nama Ibu</label>
          <input
            class="form-control"
            [(ngModel)]="maklumatIbuBapa1.namaIbu"
            [readonly]="readonlyField"
            [ngClass]="{ 'bg-light text-muted': readonlyField }"
          />
        </c-col>
        <c-col xs="12" md="6" class="mb-3">
          <label>Hubugan</label>
          <input
            class="form-control"
            [(ngModel)]="maklumatIbuBapa1.hubunganIbu"
            [readonly]="readonlyField"
            [ngClass]="{ 'bg-light text-muted': readonlyField }"
          />
        </c-col>
      </c-row>
      <c-row>
        <c-col xs="12" md="6" class="mb-3">
          <label>Nama Bapa</label>
          <input
            class="form-control"
            [(ngModel)]="maklumatIbuBapa1.namaBapa"
            [readonly]="readonlyField"
            [ngClass]="{ 'bg-light text-muted': readonlyField }"
          />
        </c-col>
        <c-col xs="12" md="6" class="mb-3">
          <label>Hubungan</label>
          <input
            class="form-control"
            [(ngModel)]="maklumatIbuBapa1.hubunganBapa"
            [readonly]="readonlyField"
            [ngClass]="{ 'bg-light text-muted': readonlyField }"
          />
        </c-col>
      </c-row>
    </c-row>

    <c-row class="my-5">
      <c-row class="mb-3">
        <c-col xs="12" md="6">
          <h5>Maklumat Keluarga (Pasangan)</h5>
        </c-col>
        <c-col xs="12" md="6" class="d-flex justify-content-end">
          <button type="button" class="btn btn-primary">Kemas Kini</button>
        </c-col>
      </c-row>
      <c-container class="overflow-x-auto">
        <c-row class="align-items-end flex-md-nowrap">
          <c-col xs="12" md="6">
            <label>Nama</label>
            <input
              class="form-control mb-3"
              *ngFor="let item of maklumatPasangan1.nama; let i = index"
              [(ngModel)]="maklumatPasangan1.nama[i]"
              [readonly]="readonlyField"
              [ngClass]="{ 'bg-light text-muted': readonlyField }"
            />
          </c-col>
          <c-col xs="12" md="4">
            <label>Nombor Kad Pengenalan</label>
            <input
              class="form-control mb-3"
              *ngFor="
                let item of maklumatPasangan1.kadpengenalan;
                let i = index
              "
              [(ngModel)]="maklumatPasangan1.kadpengenalan[i]"
              [readonly]="readonlyField"
              [ngClass]="{ 'bg-light text-muted': readonlyField }"
            />
          </c-col>
          <c-col xs="12" md="4">
            <label>Tarikh Lahir</label>
            <input
              class="form-control mb-3"
              type="date"
              *ngFor="let item of maklumatPasangan1.tarikhLahir; let i = index"
              [(ngModel)]="maklumatPasangan1.tarikhLahir[i]"
              [readonly]="readonlyField"
              [ngClass]="{ 'bg-light text-muted': readonlyField }"
            />
          </c-col>
          <c-col xs="12" md="4">
            <label>Hubungan</label>
            <input
              class="form-control mb-3"
              *ngFor="let item of maklumatPasangan1.hubungan; let i = index"
              [(ngModel)]="maklumatPasangan1.hubungan[i]"
              [readonly]="readonlyField"
              [ngClass]="{ 'bg-light text-muted': readonlyField }"
            />
          </c-col>
        </c-row>
      </c-container>
      <c-row>
        <c-col xs="12" md="4">
          <button
            type="button"
            class="btn btn-primary"
            (click)="addMaklumatPasangan()"
            [disabled]="readonlyField"
          >
            + Tambah Maklumat
          </button>
        </c-col>
      </c-row>
    </c-row>

    <c-row class="my-5">
      <c-row class="mb-3">
        <c-col xs="12" md="6">
          <h5>Maklumat Keluarga (Tanggungan)</h5>
        </c-col>
        <c-col xs="12" md="6" class="d-flex justify-content-end">
          <button type="button" class="btn btn-primary">Kemas Kini</button>
        </c-col>
      </c-row>
      <c-container class="overflow-x-auto">
        <c-row class="align-items-end flex-md-nowrap">
          <c-col xs="12" md="6">
            <label>Nama</label>
            <input
              class="form-control mb-3"
              *ngFor="let item of maklumatTanggungan1.nama; let i = index"
              [(ngModel)]="maklumatTanggungan1.nama[i]"
              [readonly]="readonlyField"
              [ngClass]="{ 'bg-light text-muted': readonlyField }"
            />
          </c-col>
          <c-col xs="12" md="4">
            <label>Nombor Kad Pengenalan</label>
            <input
              class="form-control mb-3"
              *ngFor="
                let item of maklumatTanggungan1.kadpengenalan;
                let i = index
              "
              [(ngModel)]="maklumatTanggungan1.kadpengenalan[i]"
              [readonly]="readonlyField"
              [ngClass]="{ 'bg-light text-muted': readonlyField }"
            />
          </c-col>
          <c-col xs="12" md="4">
            <label>Tarikh Lahir</label>
            <input
              class="form-control mb-3"
              type="date"
              *ngFor="
                let item of maklumatTanggungan1.tarikhLahir;
                let i = index
              "
              [(ngModel)]="maklumatTanggungan1.tarikhLahir[i]"
              [readonly]="readonlyField"
              [ngClass]="{ 'bg-light text-muted': readonlyField }"
            />
          </c-col>
          <c-col xs="12" md="4">
            <label>Hubungan</label>
            <input
              class="form-control mb-3"
              *ngFor="let item of maklumatTanggungan1.hubungan; let i = index"
              [(ngModel)]="maklumatTanggungan1.hubungan[i]"
              [readonly]="readonlyField"
              [ngClass]="{ 'bg-light text-muted': readonlyField }"
            />
          </c-col>
        </c-row>
      </c-container>
      <c-row>
        <c-col xs="12" md="4">
          <button
            type="button"
            class="btn btn-primary"
            (click)="addMaklumatTanggungan()"
            [disabled]="readonlyField"
          >
            + Tambah Maklumat
          </button>
        </c-col>
      </c-row>
    </c-row>

    <c-row>
      <c-row style="border-top: 1px solid rgba(0, 0, 0, 0.1)">
        <c-col class="d-flex gap-5 flex-shrink-0 justify-content-end py-3">
          <div class="d-flex gap-2">
            <button
              type="button"
              class="btn-custom-normalBlue fw-semibold btn btn-primary"
              (click)="navigateClosePage()"
            >
              Tutup
            </button>
          </div>

          <div class="d-flex">
            <button
              type="button"
              class="btn-custom-normalWhite fw-semibold btn btn-light"
              (click)="navigatePreviousPage()"
            >
              &lt;
            </button>
            <button
              type="button"
              class="btn-custom-normalWhite fw-semibold btn btn-light"
              (click)="navigateNextPage()"
            >
              &gt;
            </button>
          </div>
        </c-col>
      </c-row>
    </c-row>
  </c-card-body>
</c-card>
