<c-modal [visible]="hubungiJpn" (close)="closeModal()">
  <c-modal-body class="d-flex justify-content-center align-items-center flex-column" style="min-height: 150px;">

    <div class="modal-container">
      <img src="../../../../../../assets/images/danger.svg" alt="warning" style="width: 100px;height: 100px;" />
    </div>
     <h5 class="text-center m-0">Gagal Menghubungi Sistem JPN (myIdentity)</h5>
  </c-modal-body>
  <c-modal-footer class="d-flex justify-content-center">
    <button class="btn btn-secondary" (click)="closeModal()">OK</button>
  </c-modal-footer>
</c-modal>
