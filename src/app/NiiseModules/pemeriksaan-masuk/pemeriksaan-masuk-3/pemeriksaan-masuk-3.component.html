<!-- Container Row for Widgets, Tabs, Divider, and Form -->
<form>
    <fieldset>
        <c-row>
            <!-- Left Column: Widgets -->
            <c-col style="margin-top: 1rem;">
                <!-- Widgets 1-4 -->
                <c-widget-stat-a class="mb-3" color="primary" [title]="'Widget 1'"
                    style="height: 120px;">...</c-widget-stat-a>
                <c-widget-stat-a class="mb-3" color="primary" [title]="'Widget 2'"
                    style="height: 120px; margin-top: 50px;">...</c-widget-stat-a>
                <c-widget-stat-a class="mb-3" color="primary" [title]="'Widget 3'"
                    style="height: 120px; margin-top: 50px;">...</c-widget-stat-a>
                <c-widget-stat-a class="mb-3" color="primary" [title]="'Widget 4'"
                    style="height: 120px; margin-top: 50px;">...</c-widget-stat-a>
            </c-col>

            <!-- Middle Column: Tabs (vertically aligned between Widget 2 and 3) -->
            <c-col md="4" class="d-flex align-items-start" style="margin-top: 200px;">
                <div style="width: 100%; border: 1px solid #ccc; border-radius: 6px; padding: 1rem;">
                    <c-tabs [activeItemKey]="'white'" (activeItemKeyChange)="handleChange($event)">
                        <c-tabs-list variant="tabs">
                            <button cTab itemKey="white">WHITE</button>
                            <button cTab itemKey="ir">IR</button>
                            <button cTab itemKey="uv">UV</button>
                        </c-tabs-list>
                        <c-tabs-content>
                            <c-tab-panel class="p-3" itemKey="white">
                                <div
                                    style="border: 1px solid #ccc; border-radius: 6px; padding:60px 30px; width: 100%;">
                                    Passport Image WHITE
                                </div>
                            </c-tab-panel>
                            <c-tab-panel class="p-3" itemKey="ir">
                                <div
                                    style="border: 1px solid #ccc; border-radius: 6px; padding:60px 30px; width: 100%;">
                                    Passport Image IR
                                </div>
                            </c-tab-panel>
                            <c-tab-panel class="p-3" itemKey="uv">
                                <div
                                    style="border: 1px solid #ccc; border-radius: 6px; padding:60px 30px; width: 100%;">
                                    Passport Image UV
                                </div>
                            </c-tab-panel>
                        </c-tabs-content>
                    </c-tabs>
                </div>
            </c-col>

            <!-- Divider Column -->
            <c-col md="1" class="d-flex justify-content-center">
                <div style="border-left: 1px solid #aaa; height: 100%;"></div>
            </c-col>

            <!-- Right Column: Blank Form -->
            <c-col md="5">

                <!-- Flex container for two equal divs -->
                <div style="display: flex; gap: 3rem;">
                    <!-- Left div -->
                    <div
                        style=" border: 1px solid #ccc; border-radius: 6px; padding: 1rem; min-width: 180px; max-width: 180px;">
                        <div style=" border: 1px solid #ccc; border-radius: 6px; padding:60px 30px;  height: 150px;">
                            Passport Image
                        </div>
                    </div>
                    <!-- Right div -->
                    <div
                        style=" border: 1px solid #ccc; border-radius: 6px; padding: 1rem;min-width: 180px; max-width: 180px">
                        <div style=" border: 1px solid #ccc; border-radius: 6px; padding:60px 30px; height: 150px;">
                            Passport Image
                        </div>
                    </div>
                </div>

                <div id="input" style="margin-top: 1rem;">
                    <!-- Row 1: 3 equal input fields -->
                    <div style="display: flex; flex-wrap: wrap; gap: 1rem; margin-bottom: 1rem;">
                        <div style="flex: 1 1 30%;">
                            <label for="jenisDokumen">Jenis Dokumen</label><br />
                            <input type="text" id="jenisDokumen" style="width: 100%;" disabled />
                        </div>
                        <div style="flex: 1 1 30%;">
                            <label for="jantina">Jantina</label><br />
                            <input type="text" id="jantina" style="width: 100%;" disabled />
                        </div>
                        <div style="flex: 1 1 30%;">
                            <label for="umur">Umur</label><br />
                            <input type="text" id="umur" style="width: 100%;" disabled />
                        </div>
                    </div>

                    <!-- Row 2 -->
                    <div style="display: flex; flex-wrap: wrap; gap: 1rem; margin-bottom: 1rem;">
                        <div style="flex: 1 1 30%;">
                            <label for="noDokumen">No Dokumen</label><br />
                            <input type="text" id="noDokumen" style="width: 100%;" disabled />
                        </div>
                        <div style="flex: 1 1 30%;">
                            <label for="noPengenalan">No Pengenalan</label><br />
                            <input type="text" id="noPengenalan" style="width: 100%;" disabled />
                        </div>
                        <div style="flex: 1 1 30%;">
                            <label for="tarikhTamat">Tarikh Tamat</label><br />
                            <input type="text" id="tarikhTamat" style="width: 100%;" disabled />
                        </div>
                    </div>

                    <!-- Row 3: 2/3 + 1/3 split -->
                    <div style="display: flex; flex-wrap: wrap; gap: 1rem; margin-bottom: 1rem;">
                        <div style="flex: 2 1 60%;">
                            <label for="nama">Nama</label><br />
                            <input type="text" id="nama" style="width: 100%;" disabled />
                        </div>
                        <div style="flex: 1 1 30%;">
                            <label for="warganegara">Warganegara</label><br />
                            <input type="text" id="warganegara" style="width: 100%;" disabled />
                        </div>
                    </div>

                    <!-- Row 4: skip middle field (field 5) -->
                    <div style="display: flex; flex-wrap: wrap; gap: 1rem;">
                        <div style="flex: 1 1 30%;">
                            <label for="tarikhDikeluarkan">Tarikh Dikeluarkan</label><br />
                            <input type="text" id="tarikhDikeluarkan" style="width: 100%;" disabled />
                        </div>

                        <!-- Invisible placeholder for Field 5 spacing -->
                        <div style="flex: 1 1 26%; visibility: hidden;">
                            <label>&nbsp;</label><br />
                            <input type="text" style="width: 100%;" />
                        </div>

                        <div style="flex: 1 1 30%;">
                            <label for="negaraPengeluar">Negara Pengeluar</label><br />
                            <input type="text" id="negaraPengeluar" style="width: 100%;" disabled />
                        </div>
                    </div>
                </div>
                <c-widget-stat-a class="mb-3" color="primary" [title]="'Widget 1'"
                    style="height: 150px; width: 100%;margin-top: 50px;">
                    ...
                </c-widget-stat-a>


            </c-col>
        </c-row>
        <!-- Divider row under both sides -->
        <div style="width: 95%; border-top: 2px solid #ccc; margin: 2rem 2rem;"></div>
        <!-- Button container aligned to bottom right -->
        <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 2rem; margin-right: 30px;">
            <!-- Show only if docType is 'passport' (case-insensitive) -->
            <button class="under" type="button" *ngIf="docType.toLowerCase() === 'passport'" (click)="openSharedModal()">
                DISYAKI PALSU
            </button>
            <button [cModalToggle]="verticallyCenteredModal.id" class="under" cButton (click)="onTutupClick()">
                TUTUP
            </button>
        </div>
        <c-modal #verticallyCenteredModal alignment="center" id="verticallyCenteredModal">
            <div
                style="display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 6px; width: 300px; margin: auto; background-color: white;">
                <div style="width: 100px; height: 90px; border: 1px solid #999; margin: 20px 0;"></div>
                <h5 cModalTitle style="margin-top: 25px;" *ngIf="modalTitle">{{ modalTitle }}</h5>
                <button cButton color="primary" style="margin: 50px; padding: 10px 40px;" *ngIf="docType.toLowerCase() === 'passport'"  (click)="openSharedModal()">
                    OK
                </button>
                <button cButton color="primary" style="margin: 50px; padding: 10px 40px;" *ngIf="docType === 'kadABTC'" (click)="openProfilPengembara()">
                    OK
                </button>
            </div>
        </c-modal>
    </fieldset>
</form>
