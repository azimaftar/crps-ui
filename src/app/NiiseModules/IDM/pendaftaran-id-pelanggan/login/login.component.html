<div style="background-color: black; max-height:100%">
  <div style="background-color: red">
    <!-- <app-dev-mode/> -->
  </div>
  <div class="bg-light dark:bg-transparent min-vh-100 d-flex flex-row align-items-center" style="
      background-image: url('../../../assets/images/login_background.png');
      /*width: 1440px;*/
      /*height: 1024px;*/
      /*background-color: black;*/
      background-position: center;
      /*background-repeat: no-repeat;*/
    ">

    <c-container breakpoint="md">
      <c-row class="justify-content-center">
        <c-col lg="8" xl="4">
          <c-card-group>
            <c-card class="p-4" style="border-radius: 20px;">
              <img [src]="'../../../../assets/logo/' + config.logo" alt="mySIKAP Logo"
                style="width: 200px; display: block; margin: 0 auto;" />
              <c-card-body class="align-content-center">
                <form cForm>
                  <br />
                  <h4 style="margin:auto; width:100%;" [align]="'center'">Selamat Datang</h4><br>
                  <div class="mb-3">
                    <label cLabel for="userId">ID Pengguna</label>
                    <input id="userId" autoComplete="username" cFormControl placeholder="Enter your ID"
                      [(ngModel)]="username" name="username" />
                  </div>

                  <div class="mb-3">
                    <label cLabel for="password">Kata Laluan</label>
                    <input id="password" autoComplete="password" type="password" cFormControl
                      placeholder="Enter your password" [(ngModel)]="username" name="password" />
                  </div>

                  <c-row class="mb-3">
                    <c-col>
                      <button style="width: 100%;" cButton color="primary" (click)="login()">
                        Log Masuk
                      </button>
                    </c-col>
                  </c-row>

                  <!-- New user registration section -->
                  <c-row>
                    <c-col>
                      <div style="border: 1px solid #ccc; padding: 5px; text-align: center; border-radius: 5px;">
                        <label clabel class="me-1">Pengguna Baharu? Daftar Akaun </label>
                        <a href="#" style="color: #007bff; text-decoration: underline;"><label clabel> Di
                            Sini</label></a>
                      </div>
                    </c-col>
                  </c-row>

                  <c-row class="text-center mt-4">
                    <c-col xs="4">
                      <div class="icon-section" style="cursor: pointer;" >
                        <i class="bi bi-house" style="font-size: 24px; color: #666;"></i>
                        <p style="font-size: 12px; margin-top: 5px; color: #666;">Kembali ke Portal</p>
                      </div>
                    </c-col>
                    <c-col xs="4">
                      <div class="icon-section" style="cursor: pointer;">
                        <i class="bi bi-lock" style="font-size: 24px; color: #666;"></i>
                        <p style="font-size: 12px; margin-top: 5px; color: #666;">Lupa Kata Laluan</p>
                      </div>
                    </c-col>
                    <c-col xs="4">
                      <div class="icon-section" style="cursor: pointer;">
                        <i class="bi bi-journal-bookmark" style="font-size: 24px; color: #666;"></i>
                        <p style="font-size: 12px; margin-top: 5px; color: #666;">Panduan Pendaftaran ID</p>
                      </div>
                    </c-col>
                  </c-row>

                  <p *ngIf="errorMessage" class="text-danger mt-3 text-center">
                    {{ errorMessage }}
                  </p>
                </form>
              </c-card-body>
            </c-card>
          </c-card-group>
        </c-col>
      </c-row>
    </c-container>
  </div>
</div>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
