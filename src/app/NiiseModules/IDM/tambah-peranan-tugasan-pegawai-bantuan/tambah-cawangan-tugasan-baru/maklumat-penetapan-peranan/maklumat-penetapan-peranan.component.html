<div class="container-fluid">
  <!-- Main Content Area -->
  <div class="card">
    <div class="ms-4 me-4">
      <div class="mt-2 mb-2">
        <h3 class="mb-2 mt-4"><b>PERMOHONAN PEGAWAI BANTUAN - PENGESAHAN PERMOHONAN</b></h3>
      </div>
      <div class="mt-4">
        <reusable-tab [currentStep]="currentStep" [steps]="steps"></reusable-tab>
        <div class="row align-items-center mb-3">
          <!-- Left Side: Maklumat Peranan -->
          <div class="col-md-6">
            <p class="mb-0"><b>2. Maklumat Penetapan Peranan</b></p>
            <small class="text-muted">Langkah 2 daripada 3</small>
          </div>
        </div>
        <div class="d-flex justify-content-end mb-3">
          <button class="btn btn-all" (click)="openTambahPerananModal()">Tambah Pegawai</button>
        </div>
      </div>

      <div class="table-pagination-wrapper">
        <div class="table-responsive table-scroll-container">
          <table class="table table-row">
            <thead class="">
              <tr>
                <th style="width: 2%;">
                  <input type="checkbox" class="form-check-input" (change)="toggleSelectAll($event)">
                </th>
                <th style="width: 10%;" class="table-header">Bil.</th>
                <th style="width: 25%;" class="table-header">Nama Dokumen</th>
                <th style="width: 10%;" class="table-header">Unit</th>
                <th style="width: 25%;" class="table-header">Peranan</th>
                <th style="width: 5%;" class="table-header">Tindakan</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let peranan of paginatedPeranan; let i = index">
                <td class="">
                  <input type="checkbox" class="form-check-input" [(ngModel)]="peranan.selected">
                </td>
                <td>{{ i + 1 }}</td>
                <td>{{ peranan.bahagian }}</td>
                <td>{{ peranan.unit }}</td>
                <td>{{ peranan.peranan }}</td>
                <td class="">
                  <button class="btn btn-all" (click)="removePeranan(i)">
                    ✕
                  </button>
                </td>
              </tr>
              <tr *ngIf="paginatedPeranan.length === 0">
                <td colspan="6" class="text-center text-muted py-3">
                  Tiada peranan ditambah
                </td>
              </tr>
            </tbody>
          </table>
        </div>
        <!-- Pagination and Controls -->
        <div class="row mt-3 pagination-row">
          <div class="col">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
              <!-- Left: Items per page -->
              <div class="d-flex align-items-center gap-3">
                <select class="form-select form-select-sm rounded-pill" [(ngModel)]="itemsPerPage"
                  (change)="onItemsPerPageChange()">
                  <option value="10">10</option>
                  <option value="25">25</option>
                  <option value="50">50</option>
                </select>
              </div>

              <!-- Right: Pagination and Pergi ke -->
              <div class="d-flex align-items-center flex-wrap gap-2">
                <!-- Pagination -->
                <nav>
                  <ul class="pagination pagination-sm mb-0">
                    <li class="page-item" [class.disabled]="currentPage === 1">
                      <button class="page-link" (click)="goToPage('first')">&laquo;</button>
                    </li>
                    <li class="page-item" [class.disabled]="currentPage === 1">
                      <button class="page-link" (click)="goToPage('prev')">&lsaquo;</button>
                    </li>
                    <li class="page-item active">
                      <span class="page-link">{{ currentPage }}</span>
                    </li>
                    <li class="page-item" [class.disabled]="currentPage === totalPages">
                      <button class="page-link" (click)="goToPage('next')">&rsaquo;</button>
                    </li>
                    <li class="page-item" [class.disabled]="currentPage === totalPages">
                      <button class="page-link" (click)="goToPage('last')">&raquo;</button>
                    </li>
                  </ul>
                </nav>

                <div class="d-flex align-items-center">
                  <small class="text-muted">Pergi ke</small>
                  <input type="number" class="form-control form-control-sm" style="width: 60px;"
                    [(ngModel)]="goToPageNumber" (keyup.enter)="goToSpecificPage()" />
                </div>
              </div>
            </div>
          </div>
          <div class="mt-4 pb-2 pt-2">
            <div class="d-flex justify-content-end">
              <button class="btn btn-all me-2">Hapus</button>
              <button class="btn btn-all">Simpan</button>
            </div>
          </div>
        </div>
      </div>




      <!-- Bottom Navigation -->
      <div class="pagination-wrapper row mt-4 pb-2 pt-2">
        <div class="col-12">
          <div class="d-flex justify-content-end">
            <button class="btn btn-all me-2">Kembali</button>
            <button class="btn btn-submit me-2">Simpan</button>
            <button class="btn btn-all" (click)="goToPrevious()">&lt;</button>
            <button class="btn btn-all" (click)="goToNext()">&gt;</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="penetapanPerananModal" tabindex="-1" aria-labelledby="penetapanPerananModalLabel"
  aria-hidden="true" [class.show]="isTambahPerananModalOpen"
  [style.display]="isTambahPerananModalOpen ? 'block' : 'none'">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="penetapanPerananModalLabel">Penetapan Peranan</h5>
        <button type="button" class="btn-close" (click)="closePenetapanPerananModal()" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <!-- Penetapan Peranan Form -->
        <div class="row g-3 mb-4">
          <div class="col-md-6">
            <label class="form-label">Bahagian</label>
            <select class="form-select" [(ngModel)]="modalForm.bahagian">
              <option value="">-Sila Pilih-</option>
              <option value="Visa, Pas & Permit">Visa, Pas & Permit</option>
              <option value="Pengurusan ID">Pengurusan ID</option>
              <option value="Operasi">Operasi</option>
              <option value="Teknologi Maklumat">Teknologi Maklumat</option>
              <option value="Keselamatan">Keselamatan</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label">Unit</label>
            <select class="form-select" [(ngModel)]="modalForm.unit">
              <option value="">-Sila Pilih-</option>
              <option value="PLS">PLS</option>
              <option value="Pasport">Pasport</option>
              <option value="Sistem">Sistem</option>
              <option value="Kawalan Akses">Kawalan Akses</option>
            </select>
          </div>
        </div>
        <div class="row g-3 mb-4">
          <div class="col-md-6">
            <label class="form-label">Peranan</label>
            <select class="form-select" [(ngModel)]="modalForm.bahagian">
              <option value="">-Sila Pilih-</option>
              <option value="Visa, Pas & Permit">Visa, Pas & Permit</option>
              <option value="Pengurusan ID">Pengurusan ID</option>
              <option value="Operasi">Operasi</option>
              <option value="Teknologi Maklumat">Teknologi Maklumat</option>
              <option value="Keselamatan">Keselamatan</option>
            </select>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" (click)="closePenetapanPerananModal()">Selesai</button>
        <button type="button" class="btn btn-primary" (click)="tambahPeranan()">Tambah</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal Backdrop -->
<div class="modal-backdrop fade" [class.show]="isTambahPerananModalOpen" *ngIf="isTambahPerananModalOpen">
</div>
