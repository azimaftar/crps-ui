<div class="container mx-auto p-6 bg-white">
  <div class="full-width-underline">
    <h4 class="text-left pb-2 ps-4 pt-3">NOTIFIKASI</h4>
  </div>

  <div class="p-4">
    <form [formGroup]="notificationForm" (ngSubmit)="onSubmit()">
      <c-row class="mb-4">
        <c-col sm="3">
          <label class="form-label">Carian</label>
          <input type="text" formControlName="carian" class="form-control" placeholder="Masukkan Kata Kunci" />
        </c-col>

        <c-col sm="2">
          <label class="form-label">Tarikh Mula</label>
          <input type="text" formControlName="tarikhMula" class="form-control" placeholder="7/5/2025" />
        </c-col>

        <c-col sm="2">
          <label class="form-label">Tarikh Akhir</label>
          <input type="text" formControlName="tarikhAkhir" class="form-control" placeholder="12/5/2025" />
        </c-col>

        <c-col sm="2" class="d-flex align-items-end">
          <button type="reset" class="btn btn-secondary btn-sm w-100">Set Semula </button>
        </c-col>

        <c-col sm="2" class="d-flex align-items-end">
          <button type="submit" class="btn btn-primary btn-sm w-100">Cari </button>
        </c-col>
      </c-row>
    </form>

    <!-- Scrollable Table Container -->
    <div class="table-responsive table-scroll-container">
      <table class="table table-hover table-fixed w-100">
        <colgroup>
          <col style="width: 10%;" />
          <col style="width: 20%;" />
          <col style="width: 60%;" />
        </colgroup>
        <thead>
          <tr>
            <th scope="col">Bil</th>
            <th scope="col">Tarikh dan Masa</th>
            <th scope="col">Mesej</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of paginatedNotifications; let i = index">
            <th scope="row">{{ (currentPage - 1) * itemsPerPage + i + 1 }}</th>
            <td>{{ item.tarikhMasa }}</td>
            <td>{{ item.mesej }}</td>
          </tr>
          <tr *ngIf="paginatedNotifications.length === 0">
            <td colspan="3" class="text-center text-muted py-4">
              Tiada data notifikasi dijumpai
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Pagination and Controls -->
    <c-row class="mt-3">
      <c-col>
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">

          <!-- Left: Items per page -->
          <div class="d-flex align-items-center gap-2">
            <select class="form-select form-select-sm" [(ngModel)]="itemsPerPage" (change)="onItemsPerPageChange()">
              <option value="10">10</option>
              <option value="25">25</option>
              <option value="50">50</option>
            </select>
          </div>

          <!-- Right: Pagination and go-to -->
          <div class="d-flex align-items-center flex-wrap gap-2">
            <!-- Pagination -->
            <nav>
              <ul class="pagination pagination-sm mb-0">
                <li class="page-item" [class.disabled]="currentPage === 1">
                  <button class="page-link" (click)="goToPage('first')">&laquo;</button>
                </li>
                <li class="page-item" [class.disabled]="currentPage === 1">
                  <button class="page-link" (click)="goToPage('prev')">&lsaquo;</button>
                </li>
                <li class="page-item active">
                  <span class="page-link">{{ currentPage }}</span>
                </li>
                <li class="page-item" [class.disabled]="currentPage === totalPages">
                  <button class="page-link" (click)="goToPage('next')">&rsaquo;</button>
                </li>
                <li class="page-item" [class.disabled]="currentPage === totalPages">
                  <button class="page-link" (click)="goToPage('last')">&raquo;</button>
                </li>
              </ul>
            </nav>

            <!-- Go To -->
            <div class="d-flex align-items-center ms-2">
              <small class="text-muted">Pergi ke</small>
              <input type="number" class="form-control form-control-sm ms-2" style="width: 60px;"
                [(ngModel)]="goToPageNumber" (keyup.enter)="goToSpecificPage()" />
            </div>
          </div>
        </div>
      </c-col>
    </c-row>
  </div>
</div>
