<c-card>
  <c-card-body>
    <c-row class="g-3 mb-5">
      <c-col xs="12" class="d-flex align-items-end justify-content-end mb-3">
        <button
          type="button"
          class="btn btn-secondary"
          (click)="visible = true"
        >
          Pendaftaran ID Pengguna
        </button>
      </c-col>
      <c-col xs="12" md="3">
        <label class="form-label">Carian</label>
        <input type="text" class="form-control" />
      </c-col>

      <c-col xs="12" md="3">
        <label class="form-label">Jenis Permohonan</label>
        <select id="" class="form-select">
          <option value="">Semua</option>
        </select>
      </c-col>

      <c-col xs="12" md="3">
        <label class="form-label">No. Permohonan</label>
        <input type="text" class="form-control" />
      </c-col>

      <c-col xs="12" md="3">
        <label class="form-label">Tarikh Permohonan</label>
        <input type="date" id="" class="form-control" />
      </c-col>

      <c-col xs="12" md="3">
        <label class="form-label">Status</label>
        <select id="" class="form-select">
          <option value="">Semua</option>
        </select>
      </c-col>

      <c-col
        xs="12"
        md="3"
        class="d-flex align-items-end justify-content-center gap-2"
      >
        <button type="button" class="btn btn-secondary">Set Semula</button>
        <button type="button" class="btn btn-secondary">Cari</button>
      </c-col>
    </c-row>

    <c-row class="mb-5 table-responsive">
      <table class="table">
        <thead>
          <tr class="align-middle">
            <th class="py-4">Bil.</th>
            <th class="py-4">Nama</th>
            <th class="py-4">No. Permohonan</th>
            <th class="py-4">Jenis Permohonan</th>
            <th class="py-4">Tarikh Permohonan</th>
            <th class="py-4">Status</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of tableData" class="align-middle">
            <td class="py-4">{{ item.bil }}</td>
            <td class="py-4">{{ item.image }} {{ item.nama }}</td>
            <td class="py-4">{{ item.noPermohonan }}</td>
            <td class="py-4">{{ item.jenisPermohonan }}</td>
            <td class="py-4">{{ item.tarikhPermohonan }}</td>
            <td class="py-4">{{ item.status }}</td>
          </tr>
        </tbody>
      </table>
    </c-row>

    <c-row>
      <c-col
        xs="12"
        md="4"
        class="align-items-start justify-content-start mb-2"
      >
        <select id="" class="form-select form-select-sm" style="width: 60px">
          <option value="10">10</option>
          <option value="25">25</option>
          <option value="50">50</option>
        </select>
      </c-col>
      <c-col xs="12" md="6" tag="nav">
        <ul class="pagination justify-content-end">
          <li>
            <a
              class="page-link text-dark"
              href="#/notifikasi"
              aria-label="Previous"
            >
              <span aria-hidden="true">&laquo;&laquo;</span>
            </a>
          </li>
          <li>
            <a
              class="page-link text-dark"
              href="#/notifikasi"
              aria-label="FirstPage"
            >
              <span aria-hidden="true">&laquo;</span>
            </a>
          </li>
          <li><a class="page-link text-dark" href="#/notifikasi">1</a></li>
          <li><a class="page-link text-dark" href="#/notifikasi">2</a></li>
          <li><a class="page-link text-dark" href="#/notifikasi">3</a></li>
          <li>
            <a
              class="page-link text-dark"
              href="#/notifikasi"
              aria-label="Next"
            >
              <span aria-hidden="true">&raquo;</span>
            </a>
          </li>
          <li>
            <a
              class="page-link text-dark"
              href="#/notifikasi"
              aria-label="LastPage"
            >
              <span aria-hidden="true">&raquo;&raquo;</span>
            </a>
          </li>
        </ul>
      </c-col>
      <c-col
        xs="12"
        md="2"
        class="d-flex align-items-start justify-content-end gap-2"
      >
        <label class="form-label mb-0">Pergi ke</label>
        <input
          type="number"
          class="form-control form-control-sm"
          style="width: 50px"
        />
      </c-col>
    </c-row>
  </c-card-body>
</c-card>
