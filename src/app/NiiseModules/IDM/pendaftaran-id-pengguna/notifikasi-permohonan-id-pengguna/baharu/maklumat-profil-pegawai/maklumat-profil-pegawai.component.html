<div class="container-fluid">
    <div class="card">
        <div class="ms-4 me-4">
            <div class="mt-2 mb-2">
                <h3 class="mb-2 mt-4"><b>PERMOHONAN ID PENGGUNA - SEMAKAN PERMOHONAN</b></h3>
            </div>
            <div class="mt-4">
                <!-- Step Info -->
                <reusable-tab [currentStep]="currentStep" [steps]="steps"></reusable-tab>
                <div class="col-md-6 mb-4">
                    <p class="mb-0">1. Maklumat Profil Pegawai</p>
                    <small class="text-muted">Langkah 1 daripada 5</small>
                </div>

                <!-- Main Content -->
                <div class="row flex-column flex-lg-row">
                    <div class="col-md-2 mb-3 mb-md-0">
                        <div class="d-flex flex-column align-items-center">
                            <img src="assets/images/avatars/9.jpg" alt="Profile Image" class="img-fluid"
                                style="width: 150px; height: 150px; object-fit: cover; border: 1px solid #000;">
                            <div class="mt-2" style="font-size: 14px;">
                                Penilaian Risiko: <strong>Rendah</strong>
                            </div>
                        </div>
                    </div>

                    <div class="col-10" *ngIf="formData">
                        <h6 class="mb-3">Maklumat Profil Pegawai</h6>
                        <div class="row ps-3">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Kategori Pegawai</label>
                                    <input type="text" class="form-control" [(ngModel)]="formData.staffType" readonly>
                                </div>
                            </div>
                        </div>
                        <div class="row ps-3">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Jenis Dokumen</label>
                                    <input type="text" class="form-control" [(ngModel)]="formData.staffType" readonly>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Citizenship</label>
                                    <input type="text" class="form-control" [(ngModel)]="formData.citizenship" readonly>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Date of Birth</label>
                                    <input type="text" class="form-control" [(ngModel)]="formData.dob" readonly>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">No. Perkhidmatan</label>
                                    <input type="text" class="form-control" [(ngModel)]="formData.noServ" readonly>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">E-mel</label>
                                    <input type="email" class="form-control" [(ngModel)]="formData.email" readonly>
                                </div>
                            </div>

                            <div class="col-md-6 mt-2">
                                <div class="mb-3">
                                    <label class="form-label">No.Dokumen /ID</label>
                                    <input type="text" class="form-control" [(ngModel)]="formData.currKpNo">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Name</label>
                                    <input type="text" class="form-control" [(ngModel)]="formData.name" readonly>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Jantina</label>
                                    <input type="text" class="form-control" [(ngModel)]="formData.gender" readonly>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">No.Telefon</label>
                                    <input type="text" class="form-control" [(ngModel)]="formData.phoneNumber" readonly>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Lokasi/Negeri</label>
                                    <input type="text" class="form-control" [(ngModel)]="formData.stt" readonly>
                                </div>
                            </div>
                        </div>

                        <div class="row ps-3">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Tempat Bertugas/Cawangan</label>
                                    <input type="text" class="form-control" [(ngModel)]="formData.asgn" readonly>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Unit</label>
                                    <input type="text" class="form-control" [(ngModel)]="formData.unit" readonly>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Gred</label>
                                    <input type="text" class="form-control" [(ngModel)]="formData.gred" readonly>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Bahagian</label>
                                    <input type="text" class="form-control" [(ngModel)]="formData.div" readonly>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Jawatan</label>
                                    <input type="text" class="form-control" [(ngModel)]="formData.post" readonly>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Gred(melebihi gred sedia ada)</label>
                                    <input type="text" class="form-control" [(ngModel)]="formData.gredXtra">
                                </div>
                            </div>
                        </div>
                        <div class="mt-4 mb-2 ps-3">
                            <div class="row align-items-end">
                                <!-- Col 1: Keperluan Biometrik -->
                                <div class="col-md-4">
                                    <label class="form-label">Keperluan Biometrik</label>
                                    <div class="d-flex gap-3">
                                        <div class="form-check">
                                            <input class="form-check-input" type="radio" name="keperluanBiometrik"
                                                value="Y" [(ngModel)]="formData.keperluanBiometrik">
                                            <label class="form-check-label">Ya</label>
                                        </div>
                                        <div class="form-check">
                                            <input class="form-check-input" type="radio" name="keperluanBiometrik"
                                                value="T" [(ngModel)]="formData.keperluanBiometrik">
                                            <label class="form-check-label">Tidak</label>
                                        </div>
                                    </div>
                                </div>

                                <!-- Col 2: Jenis Biometrik -->
                                <div class="col-md-4">
                                    <label class="form-label">Jenis Biometrik</label>
                                    <div class="d-flex gap-3">
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox"
                                                [(ngModel)]="formData.jenisBiometrik.capJari" name="capJari">
                                            <label class="form-check-label">Cap Jari</label>
                                        </div>
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox"
                                                [(ngModel)]="formData.jenisBiometrik.wajah" name="wajah">
                                            <label class="form-check-label">Wajah</label>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6 ps-3">
                            <label class="form-label">Kaedah Log Masuk</label>
                            <div class="d-flex gap-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox"
                                        [(ngModel)]="formData.kaedahLog.capJari" name="capJari">
                                    <label class="form-check-label">Cap Jari</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox"
                                        [(ngModel)]="formData.kaedahLog.wajah" name="wajah">
                                    <label class="form-check-label">Wajah</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" [(ngModel)]="formData.kaedahLog.otp"
                                        name="otp">
                                    <label class="form-check-label">OTP</label>
                                </div>
                            </div>
                        </div>

                        <!-- Navigation Buttons -->
                        <div class="pagination-wrapper row mt-4 pb-2 pt-2">
                            <div class="col-12">
                                <div class="d-flex justify-content-end">
                                    <button class="btn btn-all me-2"  (click)="tolakPermohonan()">Tolak</button>
                                    <button class="btn btn-submit me-2" (click)="wujudID()" disabled>Wujud ID</button>
                                    <button class="btn btn-all me-2" (click)="goToPrevious()">&lt;</button>
                                    <button class="btn btn-all" (click)="goToNext()">&gt;</button>
                                </div>
                            </div>
                        </div>
                    </div> <!-- End formData check -->
                </div>
            </div>
        </div>
    </div>
</div>
