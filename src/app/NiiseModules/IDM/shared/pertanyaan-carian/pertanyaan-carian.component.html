<c-container fluid>
  <div class="card">
    <div class="ms-4 me-4">
            <!-- <div class="mt-2 mb-2">
                <h3 class="mb-2 mt-4"><b>PERTANYAAN</b></h3>
            </div> -->
            <div class="my-4">
                <c-row class="g-3 mb-3">
                    <c-col md="4">
                        <label class="form-label">Menu Pertanyaan</label>
                        <select class="form-select" [(ngModel)]="selectedTable">
                            <option value="">-Sila Pilih-</option>
                            <option value="Senarai Pegawai yang Telah Didaftarkan">Senarai Pegawai yang Telah Didaftarkan</option>
                            <option value="Senarai Pegawai yang Telah Diluluskan (bagi Pelulus ID sahaja)">Senarai Pegawai yang Telah
                            Diluluskan (bagi Pelulus ID sahaja)</option>
                            <option value="Jumlah Pegawai yang Telah Didaftarkan">Jumlah Pegawai yang Telah
                            Didaftarkan</option>
                            <option value="Jumlah Pegawai yang Telah Diluluskan (bagi Pelulus ID sahaja)">Jumlah Pegawai yang Telah
                            Diluluskan (bagi Pelulus ID sahaja)</option>
                            <option value="Jumlah Pegawai yang Mendapat Akses">Jumlah Pegawai yang Mendapat
                            Akses</option>
                            <option value="Jumlah Pengguna Semasa Mengikut Status">Jumlah Pengguna Semasa
                            Mengikut Status</option>
                            <option value="Senarai ID Pengguna Semasa">Senarai ID Pengguna Semasa</option>
                        </select>
                    </c-col>
                </c-row>
                <c-row class="g-3 mb-3">
                    <!-- First Row -->
                    <c-col md="4">
                        <label class="form-label">Negeri</label>
                        <select class="form-select" [(ngModel)]="searchFilters.negeri">
                            <option value="">-Sila Pilih-</option>
                            <option value="Selangor">Selangor</option>
                            <option value="Kuala Lumpur">Kuala Lumpur</option>
                            <option value="Negeri Sembilan">Negeri Sembilan</option>
                            <option value="Melaka">Melaka</option>
                            <option value="Johor">Johor</option>
                            <option value="Putrajaya">Putrajaya</option>
                            <option value="Labuan">Labuan</option>
                            <option value="Perlis">Perlis</option>
                            <option value="Perak">Perak</option>
                            <option value="Terengganu">Terengganu</option>
                            <option value="Kelantan">Kelantan</option>
                            <option value="Kedah">Kedah</option>
                            <option value="Sarawak">Sarawak</option>
                            <option value="Sabah">Sabah</option>
                            <option value="Pulau Pinang">Pulau Pinang</option>
                            <option value="Pahang">Pahang</option>
                        </select>
                    </c-col>

                    <c-col md="4">
                        <label class="form-label">Cawangan</label>
                        <select class="form-select" [(ngModel)]="searchFilters.cawangan">
                            <option value="">-Sila Pilih-</option>
                            <option value="Cyberjaya">Cyberjaya</option>
                            <option value="Seremban">Seremban</option>
                            <option value="Batu Pahat">Batu Pahat</option>
                            <option value="Petaling Jaya">Petaling Jaya</option>
                            <option value="Putrajaya">Putrajaya</option>
                            <option value="Labuan">Labuan</option>
                            <option value="Kangar">Kangar</option>
                            <option value="Ipoh">Ipoh</option>
                            <option value="Kuala Terengganu">Kuala Terengganu</option>
                            <option value="Alor Setar">Alor Setar</option>
                            <option value="Kota Bharu">Kota Bharu</option>
                            <option value="Ayer Keroh">Ayer Keroh</option>
                            <option value="Kuching">Kuching</option>
                            <option value="Kota Kinabalu">Kota Kinabalu</option>
                            <option value="George Town">George Town</option>
                            <option value="Johor Bahru">Johor Bahru</option>
                            <option value="Shah Alam">Shah Alam</option>
                            <option value="Bukit Bintang">Bukit Bintang</option>
                            <option value="Kuantan">Kuantan</option>
                        </select>
                    </c-col>
                </c-row>

                <!-- Second Row -->
                <c-row class="g-3 mb-3">
                    <c-col md="4">
                        <label class="form-label">Bahagian</label>
                        <select class="form-select" [(ngModel)]="searchFilters.bahagian">
                            <option value="">-Sila Pilih-</option>
                            <option value="Keselamatan">Keselamatan</option>
                            <option value="Kewangan">Kewangan</option>
                            <option value="Teknologi">Teknologi</option>
                            <option value="Pentadbiran">Pentadbiran</option>
                        </select>
                    </c-col>

                    <c-col md="4">
                        <label class="form-label">Unit</label>
                        <select class="form-select" [(ngModel)]="searchFilters.unit">
                            <option value="">-Sila Pilih-</option>
                            <option value="SL">SL</option>
                            <option value="ID">ID</option>
                            <option value="Akaun">Akaun</option>
                            <option value="Audit">Audit</option>
                            <option value="ICT">ICT</option>
                            <option value="Rekod">Rekod</option>
                            <option value="Pengusiran">Pengusiran</option>
                            <option value="Aset">Aset</option>
                        </select>
                    </c-col>

                    <ng-container *ngIf="!addDateFilter.includes(selectedTable)">
                        <c-col md="4" class="d-flex align-items-end gap-2 flex-1">
                            <button class="btn btn-all btn-120" (click)="resetFilters()"><mat-icon class="icon me-1">sync</mat-icon>Set Semula</button>
                            <button class="btn btn-submit btn-120" (click)="applyFilters()"><mat-icon class="icon me-1">search</mat-icon>Cari</button>
                        </c-col>
                    </ng-container>
                </c-row>

                <!-- Conditional Tarikh Mula & Tarikh Hingga -->
                <ng-container *ngIf="addDateFilter.includes(selectedTable)">
                    <c-row class="g-3 mb-3">
                        <c-col md="4">
                            <label class="form-label">Tarikh Mula</label>
                            <input type="date" class="form-control" [(ngModel)]="searchFilters.tarikhMula" />
                        </c-col>

                        <c-col md="4">
                            <label class="form-label">Tarikh Hingga</label>
                            <input type="date" class="form-control" [(ngModel)]="searchFilters.tarikhHingga" />
                        </c-col>

                        <ng-container *ngIf="selectedTable !== 'Jumlah Pegawai yang Mendapat Akses' && selectedTable !== 'Jumlah Pengguna Semasa Mengikut Status' && selectedTable !== 'Senarai ID Pengguna Semasa'">
                            <c-col md="4" class="d-flex align-items-end gap-2 flex-1">
                                <button class="btn btn-all btn-120" (click)="resetFilters()"><mat-icon class="icon me-1">sync</mat-icon>Set Semula</button>
                                <button class="btn btn-submit btn-120" (click)="applyFilters()"><mat-icon class="icon me-1">search</mat-icon>Cari</button>
                            </c-col>
                        </ng-container>
                    </c-row>
                </ng-container>

                <!-- Conditional Gred -->
                <ng-container *ngIf="selectedTable === 'Jumlah Pegawai yang Mendapat Akses'">
                    <c-row class="g-3 mb-3">
                        <c-col md="4">
                            <label class="form-label">Gred</label>
                            <select class="form-select" [(ngModel)]="searchFilters.gred">
                                <option value="">-Sila Pilih-</option>
                                <option value="KP22">KP22</option>
                                <option value="KP29">KP29</option>
                                <option value="KP41">KP41</option>
                                <option value="KP19">KP19</option>
                            </select>
                        </c-col>

                        <c-col md="4" class="d-flex align-items-end gap-2 flex-1">
                            <button class="btn btn-all btn-120" (click)="resetFilters()"><mat-icon class="icon me-1">sync</mat-icon>Set Semula</button>
                            <button class="btn btn-submit btn-120" (click)="applyFilters()"><mat-icon class="icon me-1">search</mat-icon>Cari</button>
                        </c-col>
                    </c-row>
                </ng-container>

                <ng-container *ngIf="selectedTable === 'Jumlah Pengguna Semasa Mengikut Status' || selectedTable === 'Senarai ID Pengguna Semasa'">
                    <c-row class="g-3 mb-3">
                        <c-col md="4">
                            <label class="form-label">Status</label>
                            <select class="form-select" [(ngModel)]="searchFilters.status">
                                <option value="">-Sila Pilih-</option>
                                <option value="Nyahaktif">Nyahaktif</option>
                                <option value="Aktif">Aktif</option>
                                <option value="Batal">Batal</option>
                            </select>
                        </c-col>

                        <c-col md="4" class="d-flex align-items-end gap-2 flex-1">
                            <button class="btn btn-all btn-120" (click)="resetFilters()">
                                <mat-icon class="icon me-1">sync</mat-icon>Set Semula
                            </button>
                            <button class="btn btn-submit btn-120" (click)="applyFilters()">
                                <mat-icon class="icon me-1">search</mat-icon>Cari
                            </button>
                        </c-col>
                    </c-row>
                </ng-container>

            </div>

            <div class="my-4">
                <c-row class="justify-content-end mb-3">
                    <c-col md="4" class="d-flex justify-content-end gap-2" *ngIf="currentData.length !== 0">
                        <button class="btn btn-all btn-120" (click)="generateBoth()"><mat-icon class="icon me-1">description</mat-icon>Jana Laporan</button>
                        <button class="btn btn-all btn-120" (click)="printReport()"><mat-icon class="icon me-1">print</mat-icon>Cetak</button>
                    </c-col>
                </c-row>

                <div class="table-pagination-wrapper">
                    <!-- Table -->
                    <div class="table-responsive p-1">
                        <table class="table table-hover table-row">
                            <thead>
                                <tr>
                                    <th style="width: 60px;" *ngIf="selectedTable !== 'Senarai ID Pengguna Semasa'">
                                        <div class="d-flex align-items-center table-header gap-2">
                                            Bil.
                                        </div>
                                    </th>
                                    <th *ngFor="let header of currentConfig?.headers">
                                        <div class="d-flex align-items-center table-header gap-1">
                                            {{ header.label }}
                                        </div>
                                    </th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr *ngFor="let row of currentData; let i = index">
                                    <td *ngIf="selectedTable !== 'Senarai ID Pengguna Semasa'" >{{ (currentPage - 1) * itemsPerPage + i + 1 }}</td>
                                    <td *ngFor="let header of currentConfig?.headers">
                                    {{ row[header.field] }}
                                    </td>
                                </tr>
                                <tr *ngIf="currentData.length === 0">
                                    <td colspan="6" class="text-center text-muted py-4">
                                        Tiada rekod.
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- Pagination -->
                    <c-row class="mt-3 pagination-row">
                        <c-col>
                            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
                                <!-- Left: Items per page -->
                                <div class="d-flex align-items-center gap-2">
                                    <select class="form-select form-select-sm rounded-pill" style="width: auto;"
                                        [(ngModel)]="itemsPerPage" (change)="onItemsPerPageChange()">
                                        <option value="10">10</option>
                                        <option value="25">25</option>
                                        <option value="50">50</option>
                                    </select>
                                </div>

                                <!-- Right: Pagination and Go to page -->
                                <div class="d-flex align-items-center flex-wrap gap-3">
                                    <!-- Pagination -->
                                    <nav>
                                        <ul class="pagination pagination-sm mb-0">
                                            <li class="page-item" [class.disabled]="currentPage === 1">
                                                <button class="page-link" (click)="goToPage('first')">&laquo;</button>
                                            </li>
                                            <li class="page-item" [class.disabled]="currentPage === 1">
                                                <button class="page-link" (click)="goToPage('prev')">&lsaquo;</button>
                                            </li>
                                            <li class="page-item active">
                                                <span class="page-link">{{ currentPage }}</span>
                                            </li>
                                            <li class="page-item" [class.disabled]="currentPage === totalPages">
                                                <button class="page-link" (click)="goToPage('next')">&rsaquo;</button>
                                            </li>
                                            <li class="page-item" [class.disabled]="currentPage === totalPages">
                                                <button class="page-link" (click)="goToPage('last')">&raquo;</button>
                                            </li>
                                        </ul>
                                    </nav>

                                    <!-- Go to page -->
                                    <div class="d-flex align-items-center gap-2">
                                        <small class="text-muted">Pergi ke</small>
                                        <input type="number" class="form-control form-control-sm" style="width: 60px;"
                                            [(ngModel)]="goToPageNumber" (keyup.enter)="goToSpecificPage()" min="1"
                                            [max]="totalPages">
                                    </div>
                                </div>
                            </div>
                        </c-col>
                    </c-row>
                </div>
            </div>
        </div>
    </div>
</c-container>


<!-- Hidden Report but still need to generate -->
<div style="position: absolute; left: -9999px; top: 0;">
    <laporan
    *ngIf="showReport"
    [selectedTable]="selectedTable"
    [searchFilters]="searchFilters"
    [activeReportFilters]="activeReportFilters"
    [tableData]="reportData"
    #child
    >
    </laporan>
</div>
