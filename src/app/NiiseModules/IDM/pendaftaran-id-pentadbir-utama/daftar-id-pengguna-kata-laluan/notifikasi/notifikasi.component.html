<div class="container mx-auto p-6 bg-white">

</div>

<div class="container-fluid">
  <div class="card">
    <div class="ms-4 me-4 mt-4 mb-4">
      <div class="text-center mb-4">
        <h4><b>Selamat Datang</b></h4>
      </div>

      <div class="text-center mb-4">
        <div class="d-inline-block">
          <img src="assets/images/avatars/9.jpg" alt="Profile Image" class="img-fluid"
            style="width: 150px; height: 150px; object-fit: cover; border: 1px solid #000;">
        </div>
      </div>

      <h5 class="text-center mb-4 fw-bold">PERMOHONAN ID PENGGUNA - PENDAFTARAN PENGURUS ID UTAMA</h5>

      <div class="row justify-content-center">
        <div class="col-md-8">
          <form [formGroup]="documentForm" (ngSubmit)="onSubmit()">
            <div class="row mb-4">
              <div class="col-md-6">
                <label class="form-label fw-bold">Jenis Dokumen</label>
                <select formControlName="jenisDokumen" class="form-select">
                  <option value="">MyKad</option>
                  <option value="mykad">MyKad</option>
                  <option value="passport">Passport</option>
                  <option value="other">Lain-lain</option>
                </select>
              </div>

              <div class="col-md-6">
                <label class="form-label fw-bold">No Dokumen / ID</label>
                <input type="text" formControlName="noDokumen" class="form-control" placeholder="980330025489" />
              </div>
            </div>

            <div class="row">
              <div class="col-md-12 text-end">
                <button type="submit" class="btn btn-dark px-4">Semak</button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
