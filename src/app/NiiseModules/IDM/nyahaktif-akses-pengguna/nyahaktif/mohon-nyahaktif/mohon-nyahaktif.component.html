<c-container fluid>
  <div class="card">
    <div class="ms-4 me-4">
      <div class="mt-2 mb-2">
        <h3 class="mb-2 mt-4"><b>PERMOHONAN PEMBATALAN ID PENGGUNA - PENGESAHAN PERMOHONAN</b></h3>
      </div>
      <div class="row mt-4">
        <div class="col-md-12">
          <div class="p-3">
            <div class="row g-3 mb-4">
              <div class="col-md-6">
                <label class="form-label">No. Permohonan</label>
                <input type="text" class="form-control bg-light" name="noPermohonan"
                  [(ngModel)]="newPembatalanID.noPermohonan" readonly />
              </div>
            </div>
            <div class="row g-3 mb-4">
              <div class="col-md-6">
                <label class="form-label">Sebab Nyahaktif ID Pengguna*</label>
                <select class="form-select bg-light disabled" name="sebabPembatalan"
                  [(ngModel)]="newPembatalanID.sebabPembatalan" readonly>
                  <option value="">-Sila Pilih-</option>
                  <option value="Cuti bersalin">Cuti bersalin</option>
                  <option value="Cuti belajar">Cuti belajar</option>
                  <option value="Cuti sakit berpanjangan">Cuti sakit berpanjangan</option>
                  <option value="Cuti mengerjakan Haji">Cuti mengerjakan Haji</option>
                  <option value="Displin/Tatatertib">Cuti mengerjakan Haji</option>
                  <option value="Lain-lain">Lain-lain</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label">Lain-lain Sebab</label>
                <input type="text" class="form-control bg-light" name="lainSebab"
                  [(ngModel)]="newPembatalanID.lainSebab" readonly />
              </div>
            </div>
            <div class="row g-3 mb-4">
              <div class="col-md-6">
                <label class="form-label">Tarikh Mula Pembatalan*</label>
                <input type="date" class="form-control bg-light" name="tarikhTamatPembatalan"
                  [(ngModel)]="newPembatalanID.tarikhTamatPembatalan" readonly />
              </div>
              <div class="col-md-6">
                <label class="form-label">Tarikh Akhir Pembatalan*</label>
                <input type="date" class="form-control bg-light" name="tarikhTamatPembatalan"
                  [(ngModel)]="newPembatalanID.tarikhTamatPembatalan" readonly />
              </div>
            </div>
            <div class="col-md-6">
                <label class="form-label">Catatan</label>
                <textarea class="form-control bg-light" name="catatan" [(ngModel)]="newPembatalanID.catatan" readonly
                  rows="3" placeholder="Tambah Peranan"></textarea>
              </div>
          </div>
        </div>
      </div>

      <!-- Dokumen Sokongan -->
      <div class="col-md-6 mb-4">
        <p class="mb-0"><b>Dokumen Sokongan</b></p>
      </div>
      <div class="mt-2">
        <div class="table-pagination-wrapper">
          <div class="table-responsive table-scroll-container">
            <table class="table table-hover table-row">
              <thead>
                <tr>
                  <th style="width: 10%;" class="table-header">Bil.</th>
                  <th style="width: 30%;" class="table-header">Nama Dokumen</th>
                  <th style="width: 15%;" class="table-header">Format</th>
                </tr>
              </thead>
              <tbody>
                <tr *ngFor="let doc of uploadedDocuments; let i = index">
                  <td>{{ i + 1 }}</td>
                  <td>{{ doc.namaDokumen }}</td>
                  <td>{{ doc.format }}</td>
                </tr>
                <tr *ngIf="uploadedDocuments.length === 0">
                  <td colspan="5" class="text-center text-muted py-3">
                    Tiada dokumen dimuat naik
                  </td>
                </tr>
              </tbody>
            </table>
          </div>

          <!-- Pagination -->
          <div class="row mt-3 pagination-row">
            <div class="col">
              <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
                <div class="d-flex align-items-center gap-3">
                  <select class="form-select form-select-sm rounded-pill" [(ngModel)]="itemsPerPage"
                    (change)="onItemsPerPageChange()">
                    <option value="10">10</option>
                    <option value="25">25</option>
                    <option value="50">50</option>
                  </select>
                </div>
                <div class="d-flex align-items-center flex-wrap gap-2">
                  <nav>
                    <ul class="pagination pagination-sm mb-0">
                      <li class="page-item" [class.disabled]="currentPage === 1">
                        <button class="page-link" (click)="goToPage('first')">&laquo;</button>
                      </li>
                      <li class="page-item" [class.disabled]="currentPage === 1">
                        <button class="page-link" (click)="goToPage('prev')">&lsaquo;</button>
                      </li>
                      <li class="page-item active">
                        <span class="page-link">{{ currentPage }}</span>
                      </li>
                      <li class="page-item" [class.disabled]="currentPage === totalPages">
                        <button class="page-link" (click)="goToPage('next')">&rsaquo;</button>
                      </li>
                      <li class="page-item" [class.disabled]="currentPage === totalPages">
                        <button class="page-link" (click)="goToPage('last')">&raquo;</button>
                      </li>
                    </ul>
                  </nav>
                  <div class="d-flex align-items-center">
                    <small class="text-muted">Pergi ke</small>
                    <input type="number" class="form-control form-control-sm" style="width: 60px;"
                      [(ngModel)]="goToPageNumber" (keyup.enter)="goToSpecificPage()" />
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="pagination-wrapper row mt-4 pb-2 pt-2">
          <div class="col-12">
            <div class="d-flex justify-content-end">
              <!-- Buttons side by side -->
              <button class="btn btn-primary me-2"(click)="onBack()">Tutup</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</c-container>
